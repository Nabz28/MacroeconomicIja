const presets={gup_low:[40,35],gup_high:[80,35],taxcut:[60,25],export:[60,30],import_leak:[45,30],reset:[60,0]};
const v=presets[id]||[60,0];
document.getElementById('kc-mpc').value=v[0];document.getElementById('kc-dg').value=v[1];
window._kcScenario=id;updKCross();
};
function updKCross(){
const W=460,H=340,M={l:50,r:20,t:20,b:40};
const mpc=+document.getElementById('kc-mpc').value/100;
const dg=+document.getElementById('kc-dg').value;
document.getElementById('kc-mpcv').textContent=mpc.toFixed(2);
document.getElementById('kc-dgv').textContent=dg;
const mult=1/(1-mpc);
const pw=document.getElementById('kcross-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'kc-s');
makeAxes(svg,W,H,M,'Income (Y)','Demand (Z)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
gLine(svg,toX(0),toY(0),toX(0.85),toY(0.85),'#aaa',1.5,'6 4');gText(svg,toX(0.87),toY(0.87),'45°',10,'#aaa');
const c0=0.2,dgN=dg*0.004;
if(dg>0){gLine(svg,toX(0),toY(c0),toX(0.9),toY(c0+mpc*0.9),'#ddd',1.5);gText(svg,toX(0.92),toY(c0+mpc*0.92),'ZZ₀',9,'#ccc','start')}
gLine(svg,toX(0),toY(c0+dgN),toX(0.9),toY(c0+dgN+mpc*0.9),'#2563EB',2.2);gText(svg,toX(0.92),toY(c0+dgN+mpc*0.92),dg>0?'ZZ\'':'ZZ',11,'#2563EB','start',700);
const eqY0=c0/(1-mpc),eqY1=(c0+dgN)/(1-mpc);
if(dg>0){gCircle(svg,toX(Math.min(eqY0,0.95)),toY(Math.min(eqY0,0.95)),4,'#ddd','#bbb');gText(svg,toX(Math.min(eqY0,0.95))-12,toY(Math.min(eqY0,0.95))-10,'A',10,'#999')}
gCircle(svg,toX(Math.min(eqY1,0.95)),toY(Math.min(eqY1,0.95)),5,'#DC2626');gText(svg,toX(Math.min(eqY1,0.95))+10,toY(Math.min(eqY1,0.95))-10,dg>0?'B':'A',11,'#DC2626','start',700);
if(dg>0){gRect(svg,toX(eqY0)+2,H-M.b+8,Math.max(1,(toX(eqY1)-toX(eqY0))-4),6,'rgba(37,99,235,.3)',3);gText(svg,(toX(eqY0)+toX(eqY1))/2,H-M.b+22,'ΔY = '+mult.toFixed(1)+' × ΔG',9,'#2563EB')}
const sc=window._kcScenario;
const exps={
gup_low:`<b>G↑ with low MPC (0.40):</b><br>Multiplier = 1/(1−0.40) = <b>1.67</b><br>Step 1: G↑ by ${dg} → ZZ shifts UP by ${dg}<br>Step 2: Round 1: output rises by ${dg}<br>Step 3: Round 2: 40% re-spent → output rises by ${(dg*0.4).toFixed(0)}<br>Step 4: Round 3: 40% of that → ${(dg*0.16).toFixed(0)}... converges<br>Step 5: Total ΔY = ${(dg*1.67).toFixed(0)}<br><b>Low MPC = small multiplier.</b> High-saving economies get less bang for fiscal buck.`,
gup_high:`<b>G↑ with high MPC (0.80):</b><br>Multiplier = 1/(1−0.80) = <b>5.0</b><br>Step 1: G↑ by ${dg} → ZZ shifts UP<br>Step 2: Round 1: +${dg}. Round 2: +${(dg*0.8).toFixed(0)}. Round 3: +${(dg*0.64).toFixed(0)}...<br>Step 3: Each round, 80% is re-spent → slow convergence<br>Step 4: Total ΔY = ${(dg*5).toFixed(0)} — FIVE times the initial spending!<br><b>High MPC = large multiplier.</b> Developing countries with high MPC (less saving) get bigger fiscal multipliers.`,
taxcut:`<b>Tax cut (T↓):</b><br>Step 1: T↓ → disposable income (Y−T)↑ → C↑ → ZZ shifts UP<br>Step 2: BUT: tax multiplier < spending multiplier!<br>Step 3: Why? Only MPC fraction of tax cut is spent. G goes 100% to demand, T goes c₁% to demand<br>Step 4: Tax multiplier = c₁/(1−c₁) = ${(mpc/(1-mpc)).toFixed(2)} vs spending multiplier = ${mult.toFixed(2)}<br><b>Tax cuts are less effective than direct spending</b> (Haavelmo theorem).`,
export:`<b>Export boom (EX↑):</b><br>Step 1: Foreign demand↑ → EX↑ → same as autonomous spending↑<br>Step 2: ZZ shifts UP → same multiplier process<br>Step 3: BUT: as Y↑ → IM↑ (import leakage) → partially offsets<br>Step 4: Open economy multiplier is SMALLER than closed: 1/(1−c₁+m) where m = marginal propensity to import<br><b>Trade openness reduces the multiplier</b> because spending leaks abroad.`,
import_leak:`<b>Import leakage (open economy):</b><br>MPC = ${mpc.toFixed(2)} but some spending goes to imports<br>Step 1: If import propensity m = 0.2, effective MPC for domestic = ${(mpc-0.2).toFixed(2)}<br>Step 2: Open multiplier = 1/(1−${(mpc-0.2).toFixed(2)}) = ${(1/(1-mpc+0.2)).toFixed(2)}<br>Step 3: Compare closed: ${mult.toFixed(2)} vs open: ${(1/(1-mpc+0.2)).toFixed(2)}<br><b>Open economies have weaker fiscal multipliers.</b> This is why small open economies rely more on monetary/exchange rate policy.`
};
document.getElementById('kc-insight').innerHTML=exps[sc]||`MPC = ${mpc.toFixed(2)} → Multiplier = <b>${mult.toFixed(2)}</b>. Click a scenario to see how the multiplier works step by step.`;
}

if(st==='mp'||st==='mt'){gLine(svg,M.l,toY(0.48),W-M.r,toY(0.48),'#ddd',1.5,'4 3');gText(svg,W-M.r+2,toY(0.48),'LM₀',9,'#ccc','start')}
gLine(svg,M.l,toY(lmLevel),W-M.r,toY(lmLevel),'#059669',2.2);gText(svg,W-M.r+2,toY(lmLevel),st==='mp'||st==='mt'?'LM\'':'LM',11,'#059669','start',700);
gText(svg,W-80,M.t+16,'UIP: E = (1+i)/(1+i*) × Ēᵉ',9,'#7C3AED','end');

mp:'<b>Monetary easing (i↓) — DOUBLE STIMULUS:</b><br>Step 1: CB cuts i → LM shifts DOWN<br>Step 2: Channel 1 (domestic): lower i → I↑ → Y↑<br>Step 3: Channel 2 (UIP): lower i → capital outflows → E↑ (depreciation)<br>Step 4: E↑ → domestic goods cheaper for foreigners → EX↑ → Y↑<br>Step 5: Both channels reinforce → Y↑↑<br><b>Result: Y↑↑, i↓, E↑ (depreciation).</b><br><b>Key exam point:</b> Monetary policy is MORE effective in open economy because it works through BOTH i and E.',
mt:'<b>Monetary tightening (i↑):</b><br>Step 1: CB raises i → LM shifts UP<br>Step 2: Higher i → I↓ → Y↓ (domestic)<br>Step 3: Higher i → capital inflows → E↓ (appreciation)<br>Step 4: E↓ → exports more expensive → EX↓ → Y↓ further<br><b>Result: Y↓↓, i↑, E↓ (appreciation).</b> Double contraction.',
fp:'<b>Fiscal expansion (G↑) — PARTIALLY OFFSET:</b><br>Step 1: G↑ → IS shifts RIGHT → Y↑ at given i<br>Step 2: If CB keeps i unchanged: Y↑, E unchanged → full effect<br>Step 3: BUT if Y↑ → CB raises i → capital inflows → E↓ (appreciation)<br>Step 4: E↓ → exports expensive → EX↓ → partially offsets G↑ effect<br><b>Result: Y↑ (but less than closed economy), E↓.</b><br><b>Key exam point:</b> Fiscal policy is LESS effective in open economy due to exchange rate offset (crowding out via E).',
capflight:'<b>Capital flight:</b><br>Step 1: Risk event → investors pull capital out → F↓<br>Step 2: E↑ (sharp depreciation) → import costs↑ → P↑<br>Step 3: IS shifts LEFT (wealth destruction, uncertainty)<br>Step 4: CB may raise i to defend E → further contraction<br><b>Result: Y↓, E↑ (depreciation), P↑.</b> This is the Asian Financial Crisis 1997-98 pattern.',
foreign_rec:'<b>Foreign recession (Y*↓):</b><br>Step 1: Trading partners in recession → their demand↓ → our EX↓<br>Step 2: IS shifts LEFT (lost export demand)<br>Step 3: Y↓ → can trigger domestic recession via multiplier<br>Step 4: CB can cut i to offset → E↑ → helps competitiveness<br><b>Result: Y↓, EX↓.</b> Small open economies are vulnerable to external demand shocks.'

// ===== 7. Solow Growth =====
function drawSolow(){
const c=document.getElementById('gc-solow');
const scenarios=[
{id:'save_up',label:'Higher savings (s↑)'},
{id:'save_dn',label:'Lower savings (s↓)'},
{id:'pop_up',label:'Population growth↑'},
{id:'tech_up',label:'Technology shock (A↑)'},
{id:'war',label:'Capital destruction (war)'},
{id:'reset',label:'⟲ Reset'}
];
c.innerHTML=`<div class="g-card"><h4>Solow Growth Model</h4><p class="g-desc">y=f(k) concave (diminishing returns). Steady state: sf(k) = (δ+n+g)k. Only TFP growth drives long-run growth.</p>
<div class="g-canvas-wrap"><div id="solow-svg"></div></div>
${scBar(scenarios,'solow')}
<div class="g-controls">
<div class="g-ctrl"><label>s:</label><input type="range" min="10" max="60" value="30" id="sol-s" oninput="updSolow()"><span class="g-val" id="sol-sv">0.30</span></div>
<div class="g-ctrl"><label>δ+n+g:</label><input type="range" min="5" max="40" value="15" id="sol-d" oninput="updSolow()"><span class="g-val" id="sol-dv">0.15</span></div>
<div class="g-ctrl"><label>TFP (A):</label><input type="range" min="50" max="200" value="100" id="sol-a" oninput="updSolow()"><span class="g-val" id="sol-av">1.00</span></div>
</div><div class="g-insight" id="sol-insight"></div></div>`;
window._solScenario='';updSolow();
}
window.applyScenario_solow=function(id,btn){
btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const presets={save_up:[50,15,100],save_dn:[15,15,100],pop_up:[30,30,100],tech_up:[30,15,170],war:[30,15,70],reset:[30,15,100]};
const v=presets[id]||[30,15,100];
document.getElementById('sol-s').value=v[0];document.getElementById('sol-d').value=v[1];document.getElementById('sol-a').value=v[2];
window._solScenario=id;updSolow();
};
function updSolow(){
const W=500,H=320,M={l:50,r:20,t:20,b:40};
const s=+document.getElementById('sol-s').value/100;
const dep=+document.getElementById('sol-d').value/100;
const A=+document.getElementById('sol-a').value/100;
document.getElementById('sol-sv').textContent=s.toFixed(2);
document.getElementById('sol-dv').textContent=dep.toFixed(2);
document.getElementById('sol-av').textContent=A.toFixed(2);
const pw=document.getElementById('solow-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'sol-s2');
makeAxes(svg,W,H,M,'Capital per eff. worker (k)','Output per eff. worker (y)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const kMax=8,yMax=3;
const toX=k=>M.l+(k/kMax)*pW,toY=y=>M.t+(1-y/yMax)*pH;
const f=k=>A*Math.pow(k,0.35);
let d1='';for(let k=0.1;k<=kMax;k+=.1){d1+=(k<=0.15?'M':'L')+toX(k)+','+toY(Math.min(f(k),yMax*0.98))}
gPath(svg,d1,'#2563EB',2.2);gText(svg,toX(kMax-0.3),toY(f(kMax-0.3))-12,'f(k)',11,'#2563EB');
let d2='';for(let k=0.1;k<=kMax;k+=.1){d2+=(k<=0.15?'M':'L')+toX(k)+','+toY(Math.min(s*f(k),yMax*0.98))}
gPath(svg,d2,'#059669',2);gText(svg,toX(kMax-0.3),toY(Math.min(s*f(kMax-0.3),yMax*0.95))-12,'sf(k)',11,'#059669');
let d3='';for(let k=0;k<=kMax;k+=.2){d3+=(k<=0.1?'M':'L')+toX(k)+','+toY(Math.min(dep*k,yMax*0.98))}
gPath(svg,d3,'#DC2626',1.8,'5 4');gText(svg,toX(kMax-0.3),toY(Math.min(dep*(kMax-0.3),yMax*0.95))+14,'(δ+n+g)k',11,'#DC2626');
let kStar=1,bestDiff=999;
for(let k=0.1;k<=kMax;k+=.02){const diff=Math.abs(s*f(k)-dep*k);if(diff<bestDiff){bestDiff=diff;kStar=k}}
const yStar=f(kStar);
if(kStar<kMax-0.5){gCircle(svg,toX(kStar),toY(s*f(kStar)),5,'#1B2A4A');gLine(svg,toX(kStar),toY(s*f(kStar)),toX(kStar),H-M.b,'#1B2A4A',1.5,'3 3');gText(svg,toX(kStar),H-M.b+14,'k*='+kStar.toFixed(1),10,'#1B2A4A');gLine(svg,toX(kStar),toY(yStar),M.l,toY(yStar),'#2563EB',1,'3 3');gText(svg,M.l-6,toY(yStar),'y*',10,'#2563EB','end')}
const sc=window._solScenario;
const exps={
save_up:`<b>Higher savings (s↑):</b><br>Step 1: s↑ → sf(k) curve shifts UP (more investment at every k)<br>Step 2: sf(k) > (δ+n+g)k → capital accumulates → k↑<br>Step 3: Economy moves along f(k) to new, higher k*<br>Step 4: y* rises (higher output per worker)<br>Step 5: BUT: growth rate only temporarily higher during transition<br><b>Result: higher k* and y*, but NOT higher long-run growth rate.</b> Savings cannot drive permanent growth due to diminishing returns. Only g_A (TFP growth) can.`,
save_dn:`<b>Lower savings (s↓):</b><br>Step 1: s↓ → sf(k) shifts DOWN<br>Step 2: (δ+n+g)k > sf(k) → capital decumulates → k↓<br>Step 3: y* falls → lower living standards<br><b>Result: lower k*, lower y*.</b> Consuming too much today means less capital and output tomorrow.`,
pop_up:`<b>Population growth↑ (n↑):</b><br>Step 1: n↑ → (δ+n+g)k line becomes STEEPER<br>Step 2: Need more investment just to maintain capital per worker<br>Step 3: k* falls → y* falls<br><b>Result: k*↓, y*↓.</b> This is the Malthusian concern: more people dilute capital per worker. BUT: in practice, more people can also mean more ideas (endogenous growth).`,
tech_up:`<b>Technology shock (A↑):</b><br>Step 1: A↑ → f(k) shifts UP (more output per unit of capital)<br>Step 2: sf(k) also shifts UP → new steady state with higher k* and y*<br>Step 3: Unlike savings, TFP growth (g_A) raises the GROWTH RATE permanently<br>Step 4: This is the Solow residual — the part of growth not explained by K or L<br><b>Result: y*↑, AND permanent growth at rate g_A.</b><br><b>Key insight:</b> Long-run growth = g_A. Everything else (savings, population) only affects the LEVEL.`,
war:`<b>Capital destruction (war/disaster):</b><br>Step 1: K destroyed → k falls below k*<br>Step 2: At low k: sf(k) > (δ+n+g)k → capital rebuilds<br>Step 3: Economy grows FAST during reconstruction (convergence)<br>Step 4: Returns to same k* eventually<br><b>Result: temporary devastation, then rapid catch-up growth.</b> This explains Germany/Japan post-WWII "economic miracles" — they were catching up to their steady state.`
};
document.getElementById('sol-insight').innerHTML=exps[sc]||`Steady state: k* ≈ ${kStar.toFixed(1)}, y* ≈ ${yStar.toFixed(2)}. Click a scenario to understand what drives long-run growth.`;
}

const curves={normal:[2,2.3,2.8,3.2,3.5,4,4.3,4.6,5,5.2],flat:[4,4,4,4,4,4,4,4,4,4],inverted:[5.5,5.3,5,4.5,4.2,3.8,3.5,3.2,3,2.8],qe:[1,1.1,1.3,1.5,1.7,2,2.2,2.4,2.6,2.7]};

gPath(svg,d,color,2.5);
mats.forEach((m,i)=>{gCircle(svg,toX(m),toY(yields[i]),3,color)});

for(let y=1;y<=7;y+=2){gLine(svg,M.l-3,toY(y),M.l,toY(y),'#333',1);gText(svg,M.l-6,toY(y),y+'%',8,'#888','end')}
const exps={
normal:'<b>Normal (upward sloping):</b><br>Step 1: Short-term rates low (CB easing or neutral)<br>Step 2: Markets expect future rate HIKES → iᵉ₁ₜ₊₁ > i₁ₜ<br>Step 3: Long-term yield = average of expected future short rates → higher<br>Step 4: Signals: economic recovery, growth ahead<br><b>Formula:</b> i₂ₜ = ½(i₁ₜ + iᵉ₁ₜ₊₁). If i₁ₜ=2% and iᵉ₁ₜ₊₁=4%, then i₂ₜ=3% → upward slope.',
flat:'<b>Flat curve:</b><br>Step 1: Markets expect rates to stay the SAME<br>Step 2: No expected change → short = long<br>Step 3: Signals: transition period, uncertainty about direction<br>Step 4: Often seen before turning points in the cycle<br><b>Neither bullish nor bearish</b> — the market is waiting for clarity.',
inverted:'<b>Inverted (downward sloping) — RECESSION SIGNAL:</b><br>Step 1: Short-term rates HIGH (CB tightening aggressively)<br>Step 2: Markets expect future rate CUTS → iᵉ₁ₜ₊₁ < i₁ₜ<br>Step 3: Why? Markets think tightening will cause recession → CB will be forced to cut<br>Step 4: Long-term yield < short-term yield<br><b>Historically ~90% accurate recession predictor.</b> Every US recession since 1970 was preceded by yield curve inversion.',
qe:'<b>QE flattening:</b><br>Step 1: CB buys long-term bonds → long bond prices↑ → long yields↓<br>Step 2: Short rates already at zero (ZLB)<br>Step 3: Curve flattens from the long end being pushed down<br>Step 4: Unconventional monetary policy when conventional (i↓) is exhausted<br><b>Result: very low, flat curve.</b> Signals accommodative policy stance but also signals weak growth expectations.'
};

}

  const el=document.getElementById('week-view');
  const hasGraphs=(WEEK_GRAPHS[wk]||[]).length>0;
  let h=`<div class="wk-title">${w.title}</div>`;
  // Mode toggle - always visible
  if(hasGraphs){
    h+=`<div class="wk-mode-toggle" style="margin-top:10px">
      <button class="wk-mode-btn active" onclick="wkToggle('notes',this)">📝 Notes</button>
      <button class="wk-mode-btn" onclick="wkToggle('graphs',this)">📊 Interactive Graphs</button>
    </div>`;
  } else {
    h+=`<div class="wk-mode-toggle" style="margin-top:10px;opacity:.5">
      <button class="wk-mode-btn active" disabled>📝 Notes</button>
      <button class="wk-mode-btn" disabled style="cursor:not-allowed" title="No interactive graphs for this week">📊 No Graphs</button>
    </div>`;
  }
  h+=`<div class="wk-subtitle">${w.subtitle}</div>`;
  // Notes panel
  h+=`<div id="wk-notes-panel">`;
  if(w.sections.length>1 && w.sections[0].head!=='Coming Soon'){
    h+=`<div class="wk-nav">`;
    w.sections.forEach((s,i)=>{h+=`<button class="wk-nav-btn" onclick="document.getElementById('wk-sec-${i}').scrollIntoView({behavior:'smooth',block:'start'})">${s.head}</button>`});
    h+=`</div>`;
  }
  w.sections.forEach((s,i)=>{
    h+=`<div class="wk-section" id="wk-sec-${i}">`;
    if(s.head!=='Coming Soon') h+=`<div class="wk-section-head"><span class="wk-num">${s.num}</span>${s.head}</div>`;
    s.cards.forEach(c=>{
      h+=`<div class="wk-card">`;
      if(c.title) h+=`<h4>${c.title}</h4>`;
      h+=c.content;
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  // Graphs panel
  if(hasGraphs) h+=`<div id="wk-graphs-panel" class="wk-graphs"></div>`;
  el.innerHTML=h;
  el.scrollTop=0;
}

function wkToggle(mode,btn){
  btn.parentElement.querySelectorAll('.wk-mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const notes=document.getElementById('wk-notes-panel');
  const graphs=document.getElementById('wk-graphs-panel');
  if(mode==='notes'){
    if(notes)notes.style.display='';
    if(graphs){graphs.style.display='none';graphs.classList.remove('open')}
  } else {
    if(notes)notes.style.display='none';
    if(graphs){graphs.style.display='block';graphs.classList.add('open');renderWeekGraphs(window._currentWeek)}
  }
}
</script>
</body>
</html>
