<p>Four simultaneous adjustments across four markets — this is the complete Workhorse Macroeconomic Model in action.</p>
<div class="wk-highlight">💡 <strong>The four-market diagram:</strong> Top-left: IS-LM (r vs Y). Top-right: Interest parity (i vs E). Bottom: Phillips Curve (Δπ vs Y). Any policy shock traces through all three panels. Practice drawing this for the exam.</div>`},
]},
]},
week4:{title:"Week 4 — Long Run: Technology, Solow Model & Macro Econometric Modeling",
subtitle:"Prof. Iwan J. Azis · Summary of 4 Markets, Solow Growth Model, TFP & Productivity, Single Equations vs System of Equations, Basic Econometrics Review",
sections:[
{head:"Summary of the Four-Market Model",num:"1",cards:[
{title:"Mundell-Fleming: 3 Markets Simultaneously",content:`<p>The Mundell-Fleming model captures simultaneous equilibrium in goods, money, and exchange rate markets:</p>
<div class="wk-formula">IS: Y = C(Y−T) + I(Y,i) + G + NX(Y,Y*,E)  [goods market — downward sloping]
LM: i = ī  [money market — horizontal, CB targets rate]
UIP: (1+iₜ) = (1+i*ₜ)(Eₜ/Eᵉₜ₊₁)  [exchange rate market]</div>
<p><strong>Key result:</strong> An increase in interest rate reduces output both <em>directly</em> (via I↓) and <em>indirectly</em> (through exchange rate appreciation → NX↓).</p>`},
{title:"AD Curve Derivation (From IS-LM)",content:`<div class="wk-formula">From IS: Y = C(Y−T) + I(Y,i) + G + EX − IM(Y) → Expenditure
From LM: M/P = Y·L(i) → Real Balance
Hence: AD relation: Y = Y(M/P, G, T, EX, IM)

When P↑ → M/P↓ → i↑ → Y↓  [AD slopes DOWN]</div>`},
{title:"Adding the Labor Market: AS Curve & Phillips Curve",content:`<div class="wk-formula">AS: P = Pᵉ(1+μ)F(1 − Y/L, z)  [upward sloping: Y↑ → u↓ → W↑ → P↑]

Key dynamics:
• If Y < Yₙ → P < Pᵉ → Pᵉ adjusts down → AS shifts RIGHT → Y rises back
• If Y > Yₙ → P > Pᵉ → Pᵉ adjusts up → AS shifts LEFT → Y falls back

PC Curve replaces AS: π − πᵉ = (α/L)(Y − Yₙ)
NAIRU = natural rate of unemployment that keeps inflation constant</div>
<p><strong>Monetary expansion in AD-AS:</strong> M↑ → M/P↑ → AD shifts right → Y↑ above Yₙ → P↑ → Pᵉ↑ → W↑ → AS shifts left → process continues until Y = Yₙ at higher P. <strong>Money is neutral in the medium run.</strong></p>`},
{title:"Four-Market Equilibrium Diagram",content:`<p>The complete 4-market diagram has <strong>four panels</strong>:</p>
<ul>
<li><strong>Top-left (GM & MM):</strong> IS-LM in (Y, r) space — goods & money markets</li>
<li><strong>Top-right (EM):</strong> Interest parity in (E, i) space — exchange rate market</li>
<li><strong>Bottom-left (LbM/AS):</strong> AD-AS in (Y, P) space — labor/price level</li>
<li><strong>Bottom-right (PC):</strong> Phillips Curve in (Y, π−π̄) space — inflation dynamics</li>
</ul>
<div class="wk-exam">📝 <strong>Application — Monetary Tightening:</strong> i↑ → LM shifts up → Y↓ and r↑ (GM&MM) → E appreciates, Rp/$ falls (EM) → π falls below target, PC shifts down (LbM) → In medium run: lower inflation → lower Pᵉ → AS shifts right → Y recovers to Yₙ at permanently lower P and π.</div>`},
]},
{head:"Long-Run Growth: Technology, Saving & Productivity",num:"2",cards:[
{title:"The Solow Growth Model",content:`<p>The production function in intensive (per-worker) form:</p>
<div class="wk-formula">Y/N = f(K/N)  [output per worker depends on capital per worker]
Investment per worker: I/N = s·f(K/N)  [savings = investment]
Depreciation per worker: δ·(K/N)
Capital dynamics: K_{t+1}/N − K_t/N = s·f(K_t/N) − δ·(K_t/N)</div>
<p><strong>When capital is low:</strong> investment > depreciation → capital increases → output grows.</p>
<p><strong>When capital is high:</strong> investment < depreciation → capital decreases → output falls.</p>
<p>The economy converges to the <strong>steady state</strong> where s·f(K/N)* = δ·(K/N)*.</p>`},
{title:"Steady State & Golden Rule",content:`<p><strong>Steady state:</strong> Y/N and K/N are no longer changing. The economy has reached its long-run equilibrium.</p>
<div class="wk-formula">Steady state condition: s·f(K/N)* = δ·(K/N)*
Production at steady state: Y = f(K/N)* where (K/N)* is the steady-state capital</div>
<p><strong>Effects of different saving rates:</strong> A country with a higher saving rate (s₁ > s₀) achieves a higher level of output per worker in steady state. But it does NOT grow faster permanently — just reaches a higher level.</p>
<p><strong>Golden Rule:</strong> The level of capital that maximizes steady-state consumption per worker. If capital exceeds the Golden Rule level, reducing savings would increase both current AND future consumption. Most countries are below the Golden Rule → higher savings helps future generations but costs current ones.</p>
<div class="wk-highlight">💡 <strong>Key insight:</strong> Higher saving rate (s) increases the LEVEL of K/AN and Y/AN but does NOT affect the GROWTH RATE of Y/N or Y. Only technological progress (gA) determines long-run growth.</div>`},
{title:"Technology & Effective Labor",content:`<div class="wk-formula">Y = F(K, AN)  where AN = "effective labor"
Y/AN = f(K/AN)  [output per effective worker]
I/AN = s·f(K/AN)
Required investment: (δ + gA + gN)·K/AN

Steady state: s·f(K/AN)* = (δ + gA + gN)·(K/AN)*</div>
<p>In the long-run steady state, Y and K must grow at the same rate as AN, i.e., <strong>gA + gN</strong>. The economy is on a "balanced growth path."</p>
<div class="wk-formula">Solow Residual = Rate of TFP growth = gY − [α·gN + (1−α)·gK]
In steady state: labor productivity growth (gY − gN) = gA</div>
<p><strong>Technology's ambiguous effect on AD:</strong> TP can shift AS right (lower costs). TP may raise confidence → C↑, I↑ → AD right. But TP can also cause job insecurity fears → C↓ → AD left. So AS shift is clear, AD shift is unknown.</p>`},
]},
{head:"Indonesia's Labor Productivity",num:"3",cards:[
{title:"International Comparison (ILO 2023 Data)",content:`<table class="wk-table"><tr><th>Country</th><th>Output per Worker (PPP $)</th><th>GDP per Hour Worked (PPP $)</th></tr>
<tr><td>USA</td><td>134,766.6</td><td>70</td></tr>
<tr><td>Malaysia</td><td>61,903.8</td><td>26</td></tr>
<tr><td>China</td><td>37,549.8</td><td>15</td></tr>
<tr><td><strong>Indonesia</strong></td><td><strong>27,262.3</strong></td><td><strong>14</strong></td></tr>
<tr><td>India</td><td>20,108.2</td><td>8</td></tr></table>
<p>Indonesia's labor productivity in PPP terms ($27,262) is much higher than in nominal USD ($5,088) because goods/services are cheaper domestically — PPP adjusts for this purchasing power difference.</p>
<p><strong>Indonesia's productivity growth decomposition (2011-2023):</strong> Productivity growth fluctuated between -4% to +4%, with the COVID period showing a sharp decline. The decomposition shows: static structural change (workers moving between sectors), dynamic structural (within-sector improvement), and a "within" component (technological change within sectors).</p>`},
{title:"Saving, Steady State & Policy Implications",content:`<p>Prof. Azis emphasizes key policy conclusions from the Solow model:</p>
<ul>
<li>Output level depends on capital amount; capital depends on saving/investment → the interaction leads to convergence to steady state</li>
<li>Higher saving rate → higher steady-state level of output, but <strong>growth rate in long run = zero</strong> (without tech progress)</li>
<li>Increasing s requires an <strong>initial decrease in consumption</strong> → long-run benefit (higher C) comes at short-run cost (lower C)</li>
<li><strong>Golden Rule dilemma:</strong> policymakers must decide how much weight to put on welfare of CURRENT vs FUTURE generations</li>
</ul>
<div class="wk-exam">📝 Labor productivity = GDP per employed person. It's linked to economic growth, competitiveness, and living standards. Indonesia's low productivity per hour ($14 vs US $70) reflects the development gap — closing it requires TFP growth (A), not just capital accumulation (K).</div>`},
]},
{head:"Macro Econometric Modeling: Single vs System Equations",num:"4",cards:[
{title:"Single Equation Estimation (OLS)",content:`<p>Estimating each behavioral equation independently using OLS regression:</p>
<div class="wk-formula">Consumption: C = c₀ + c₁·YDIS + c₂·C(t-1) + c₃·WEALTH + ε
Investment: I = a₀ + a₁·Y + a₂·i + a₃·COVID + ε
Money Demand: M = b₀ + b₁·i + b₂·YCUR² + ε
Exchange Rate: E = d₀ + d₁·F + d₂·E(t-1) + ε
Prices: P = e₀ + e₁·M + e₂·u + e₃·MGAP + ε
Employment: N = f₀ + f₁·Y + ε
Wages: W = g₀ + g₁·P + ε</div>
<p><strong>Problem:</strong> OLS ignores that variables are simultaneously determined. Y affects C, but C affects Y back. This endogeneity biases OLS estimates.</p>`},
{title:"System of Simultaneous Equations",content:`<p>Better approach: estimate ALL equations together as a system, accounting for endogeneity. STATA results from the slides show coefficients change between single-equation and system estimation:</p>
<table class="wk-table"><tr><th>Equation</th><th>Key Variable</th><th>OLS Coefficient</th><th>System Coefficient</th></tr>
<tr><td>Consumption</td><td>MPC (YDIS)</td><td>0.308</td><td>0.382</td></tr>
<tr><td>Investment</td><td>Y effect</td><td>0.336</td><td>0.272</td></tr>
<tr><td>Investment</td><td>i effect</td><td>-9,164</td><td>-9,257</td></tr>
<tr><td>Exchange Rate</td><td>F (capital flows)</td><td>-0.028</td><td>-0.104</td></tr>
<tr><td>Prices</td><td>M effect</td><td>0.000011</td><td>0.0000088</td></tr>
<tr><td>Employment</td><td>Y effect</td><td>24.67</td><td>23.90</td></tr>
<tr><td>Wages</td><td>P effect</td><td>21,494</td><td>23,134</td></tr></table>
<p><strong>Notice:</strong> Coefficients change — sometimes substantially — between single and system estimation. The system approach captures the feedback loops that OLS misses.</p>`},
{title:"Cautionary Notes on Modeling",content:`<ul>
<li>This is a <strong>simplified version</strong> of Indonesia's model, tailored for the class</li>
<li>Results depend on country-specific conditions</li>
<li>Data quality, availability, and scale matter</li>
<li><strong>Common pitfalls:</strong> wrong functional form, excluded relevant variables, deliberate policy changes, missing interactions among variables (endogeneity)</li>
</ul>`},
]},
{head:"Review of Basic Econometrics",num:"5",cards:[
{title:"The Three Key Statistics",content:`<p>Prof. Azis says: "The only statistics you need to pay attention to in this course":</p>
<div class="wk-formula">1. Coefficient (β) = size and sign (direction of relationship)
2. t-ratio = β / Standard Error  [≥ 1.6 is acceptable]
   → larger |t| = more confident the sign is correct → smaller p-value
3. R² = proportion of variance in Y explained by X variables (0 to 1, higher = better)</div>
<p><strong>Critical distinction:</strong> t-ratio and R² measure DIFFERENT things. High t-ratio but low R² may indicate large sample size. High R² but low t-ratio may indicate multicollinearity.</p>`},
{title:"Hypothesis Testing & P-Value",content:`<p><strong>Steps:</strong> (1) Set H₀ (null: no relationship) and Hₐ (alternative: relationship exists). (2) Calculate t-statistic and p-value. (3) If p ≤ α (typically 0.05), reject H₀.</p>
<div class="wk-formula">t = β̂ / SE(β̂)    [coefficient divided by its standard error]
Reject H₀ if |t| > t(α/2, n−k)    [compare against t-table critical value]
p-value: probability of getting result ≥ |t| under H₀</div>
<p><strong>Type I error:</strong> reject H₀ when it's true (false alarm). <strong>Type II error:</strong> accept H₀ when it's false (missed detection). Example: H₀ = "no virus." Type I = declare virus when none exists. Type II = declare no virus when it's present.</p>`},
{title:"R² and Adjusted R²",content:`<div class="wk-formula">R² = 1 − SSR/SST = 1 − (unexplained variation / total variation)
SST = Σ(y − ȳ)² = SSR + SSE
SSR (residual) = Σ(y − ŷ)²  [unexplained]
SSE (explained) = Σ(ŷ − ȳ)²  [explained]

Adjusted R² = 1 − [(1−R²)(n−1)/(n−k−1)]
  → penalizes for adding useless variables
  → always ≤ R²</div>
<p><strong>Degree of freedom:</strong> n − k where n = sample size, k = number of estimated parameters. If {4, 2, 6, 8} with no constraints → 4 degrees of freedom. If told "mean = 5" → only 3 df (4th value is determined).</p>
<div class="wk-exam">📝 <strong>Exam checklist for reading regression output:</strong> (1) Check coefficient SIGN — does it match theory? (2) Check t-ratio (≥ 1.6) or p-value (< 0.05) — is it statistically significant? (3) Check R² — how much variation is explained? (4) Compare single-equation vs system results — do coefficients change meaningfully?</div>`},
]},
]},
week5:{title:"Week 5 — Financial Markets: Bonds, Stocks & Uncertainty",
subtitle:"Prof. Iwan J. Azis · Bond Pricing & Yields, Yield Curve, Stock Prices, Tobin\'s q, Wealth Effect, Financial Stability",
sections:[
{head:"Recapitulation: SR & MR Macroeconomics",num:"1",cards:[
{title:"Short Run vs Medium Run",content:'<table class="wk-table"><tr><th></th><th>Short Run</th><th>Medium Run</th></tr><tr><td><strong>Output</strong></td><td>Determined by demand (AD)</td><td>Output = potential output (Yₙ)</td></tr><tr><td><strong>Inflation</strong></td><td>Higher GAP → higher inflation</td><td>Inflation is stable</td></tr><tr><td><strong>Interest rate</strong></td><td>Set by CB</td><td>Converges to natural rate (rₙ)</td></tr><tr><td><strong>Fiscal consolidation</strong></td><td>G↓ → Y↓, C↓, I↓</td><td>Y returns to Yₙ, C lower, I higher</td></tr><tr><td><strong>Oil price↑</strong></td><td>Higher π, possibly Y↓ (stagflation)</td><td>Lower Yₙ permanently</td></tr></table><div class="wk-highlight">💡 Deflation spiral: GAP<0 → π↓ → real rate rises (even if i=0) → Y↓ more → π↓ more. Japan since mid-1990s. Speed of adjustment to medium-run determines if you are "classical" or "Keynesian."</div>'},
]},
{head:"Bond Market Fundamentals & PDV",num:"2",cards:[
{title:"Present Discount Value — Foundation of All Asset Pricing",content:'<div class="wk-formula">Rp 1 today → Rp (1+iₜ) next year → Rp (1+iₜ)(1+iₜ₊₁) in 2 years\nReverse: Rp 1 in 2 years = Rp 1/[(1+iₜ)(1+iₜ₊₁)] today\nExample: i=5%, PDV of Rp1 in 2 years = 1/(1.05)² ≈ Rp 0.91</div><p>General formula: V = zₜ + zᵉₜ₊₁/(1+iₜ) + zᵉₜ₊₂/[(1+iₜ)(1+iᵉₜ₊₁)] + ...</p><p>For bonds (fixed nominal payments) → use nominal rates. For C and I decisions → use real rates. Both give same answer.</p>'},
{title:"Bond Pricing & Yields",content:'<div class="wk-formula">1-year bond: P₁ₜ = 1000/(1+i₁ₜ)\n2-year bond: P₂ₜ = 1000/[(1+i₁ₜ)(1+iᵉ₁ₜ₊₁)]\nWith constant yield: P₂ₜ = 1000/(1+i₂ₜ)²\n\nExample: P₂ₜ = Rp800 → i₂ₜ = (1000/800)^0.5 − 1 = 11.8%</div><p>Bond prices and yields are INVERSELY related — always. CB bond purchases (QE) → price↑ → yield↓ → stimulus. Government deficit → bond supply↑ → price↓ → yield↑ → crowding out.</p>'},
{title:"Money Creation via Bond Purchases",content:'<p>When CB buys a Rp1000 bond (reserve requirement = 10%):</p><ul><li>Bank-1 receives Rp1000 deposit → keeps Rp100 reserves → lends Rp900</li><li>Bank-2 receives Rp900 → keeps Rp90 → lends Rp810</li><li>Bank-3 receives Rp810 → keeps Rp81 → lends Rp729...</li><li><strong>Total money created: Rp10,000</strong> (= 1000 × 1/rr = 1000/0.10)</li></ul><p>Money multiplier = 1/reserve requirement. CB selling bonds reverses this: reduces reserves → contracts money supply.</p>'},
]},
{head:"Yield Curve — Predicting Recessions",num:"3",cards:[
{title:"Deriving Future Expected Rates",content:'<div class="wk-formula">i₂ₜ = 0.5(i₁ₜ + iᵉ₁ₜ₊₁)\nRearranging: iᵉ₁ₜ₊₁ = 2·i₂ₜ − i₁ₜ\n\nExample: i₁ₜ=1.5%, i₂ₜ=2.5% → iᵉ₁ₜ₊₁ = 5% − 1.5% = 3.5%\n→ Markets expect HIGHER rates → positive slope → recovery signal</div><p><strong>Normal curve</strong> (upward): markets expect rates↑ → recovery. <strong>Inverted</strong> (downward): markets expect rates↓ → recession ahead. <strong>Caveat:</strong> If CB is reluctant to cut despite recession signals, yield curve may stay upward-sloping even as recession approaches.</p><p><strong>Two theories:</strong> (1) Expectations theory — purely about expected future rates. (2) Liquidity preference — investors demand a premium for holding long-term → naturally upward-sloping even without rate expectations.</p>'},
{title:"Indonesia Bond Market Data",content:'<p>Indonesia 2-yr yield fell 2bps, 10-yr rose 18bps (Sep-Oct 2024). US inflation has larger impact on Indonesia short-term yields; Germany/Japan on long-term. EM response is asymmetric: weak under expansion, stronger under contraction. Indonesia = 16.9% of ASEAN bond issuance (Q3 2024).</p>'},
]},
{head:"Stock Market: Pricing & Wealth Effect",num:"4",cards:[
{title:"Stock Price = PDV of Expected Dividends",content:'<div class="wk-formula">Nominal: Qₜ = Dᵉₜ₊₁/(1+i₁ₜ) + Dᵉₜ₊₂/[(1+i₁ₜ)(1+iᵉ₁ₜ₊₁)] + ...\nReal: Qₜ = Dₜ₊₁/(1+r₁ₜ) + Dₜ₊₂/[(1+r₁ₜ)(1+rᵉ₁ₜ₊₁)] + ...\n\nKey vs Bonds: Bond numerator FIXED (coupon), Stock numerator VARIABLE (dividends = f(Y))\nDividend D is positively related to firm profit → positively related to GDP</div>'},
{title:"Wealth Effect & Policy Response",content:'<p>Stocks enter consumption via wealth: Y = C[(W, (Y−T))] + I + G + NX</p><p>Two scenarios after C↑ shifts IS right:</p><ul><li><strong>Market expects i unchanged:</strong> Y↑ → higher earnings → STOCK↑</li><li><strong>Market expects CB raises i:</strong> r↑ → higher discount rate → STOCK↓ even if Y unchanged</li></ul><p>With non-flat LM: Steep LM → i↑ a lot, Y↑ little → stocks DOWN. Flat LM → i↑ little, Y↑ a lot → stocks UP.</p>'},
{title:"Tobin\'s q & Fads",content:'<div class="wk-formula">q = Market value / Replacement cost\nq > 1 → build new capital (invest) rather than buy existing\nq < 1 → buy existing firms rather than build (M&A)</div><p><strong>Fads:</strong> Past price increases create excessive optimism → extrapolation → "hot" stocks priced above fundamentals. The Magnificent 7 (>30% of S&P 500) trade at 2-3× P/E of remaining 493. Not purely AI — investors see them as safe bets with fortress balance sheets.</p>'},
]},
{head:"Financial Stability & Diversification",num:"5",cards:[
{title:"Key Findings",content:'<p><strong>IMF 2025 study (6,600+ banks):</strong> 5% AE / 8% EM banks vulnerable to rate changes. 3%/6% as exposed as SVB. Little aggregate risk, but outlier banks can trigger panics → need macroprudential policy.</p><p><strong>Post-2020 structural shift:</strong> Stock-bond correlation turned positive during selloffs → diversification fails when needed most. Investors must rethink portfolios; policymakers need credible frameworks and stress testing.</p><div class="wk-exam">📝 <strong>Exam essentials:</strong> (1) Bond price = PDV of coupons, inversely related to yield. (2) Stock price = PDV of dividends (variable). (3) Yield curve predicts recessions. (4) Wealth effect: STOCK↑ → W↑ → C↑ → IS right. (5) Tobin\'s q links stock prices to real investment. (6) Stock reaction depends on whether policy was ANTICIPATED (rational expectations).</div>'},
]},
]},
week6:{title:"Week 6 — Expectation, Uncertainty & Time Inconsistency",
subtitle:"Prof. Iwan J. Azis \u00b7 Modeling Financial Markets, Role of Expectation in C & I, Uncertainty in Macro Models, Time Inconsistency (Kydland & Prescott)",
sections:[
{head:"Modeling Financial Markets",num:"1",cards:[
{title:"Bond Market Function",content:'<p>The bond market is modeled both as a single equation and within a simultaneous equations system.</p><div class="wk-formula">Single equation: Bond = \u03b1 + \u03b2 Yield + e\n  \u2192 OLS: \u03b2 = -49.80, R\u00b2 = 0.408\n\nSimultaneous (3SLS): \u03b2 = -59.42 (larger magnitude!)\n  \u2192 Endogeneity bias corrected\n\nExtended single eq: Bond = \u03b1 + \u03b2 Yield + \u03b3 Gn + \u03b4 COVID + e\n  \u2192 R\u00b2 = 0.637, Yield coeff = -36.92, Gn positive & significant</div><p><strong>Key insight:</strong> Government spending in current prices (Gn) is positively related to bond issuance. COVID dummy is significant — the pandemic period shifted bond market dynamics. The simultaneous equations coefficient is LARGER than OLS, suggesting OLS underestimates the yield-bond relationship due to endogeneity.</p>'},
{title:"Bond Yield Function",content:'<div class="wk-formula">Single equation: Yield = \u03b1 + \u03b2 i + e\n  \u2192 \u03b2 = 0.505, R\u00b2 = 0.643 (81 obs)\n\nSimultaneous: \u03b2 = 0.505, highly significant (z = 7.98)\n\nExtended: Yield = \u03b1 + \u03b2 ilag + \u03b3 idif + e\n  \u2192 ilag coeff = 0.794 (R\u00b2 = 0.596)\n  \u2192 idif (interest rate differential) coeff = 0.08 (not significant at 5%)</div><p>The yield closely tracks the policy rate (i) with a positive relationship. Using lagged interest rate (ilag) gives better fit, reflecting that yield adjusts with a delay to policy changes. Interest rate differential (idif = i \u2212 i_world) captures global spillovers but is weaker.</p>'},
{title:"Stock Market Function",content:'<div class="wk-formula">Basic: Stock = \u03b1 + \u03b2 Y + \u03b3 Yield + e\n  \u2192 Y coeff = 0.003 (+), Yield = -204.83 (-), R\u00b2 = 0.956\n\nWith COVID: Stock = \u03b1 + \u03b2 Y + \u03b3 Yield + \u03b4 COVID + e\n  \u2192 COVID coeff = -422.64 (significant negative shock)\n\nRevised (with YWORLD): Stock = \u03b1 + \u03b2 Y + \u03b3 Yield + \u03b4 YWORLD + e\n  \u2192 Single eq: all significant, R\u00b2 = 0.956\n\nSimultaneous: Y = 0.0022 (+), Yield = -228.48 (-)\n  \u2192 Magnitudes change vs OLS!</div><p><strong>Interpretation:</strong> Stock prices are positively driven by GDP (Y) and negatively by yields. Higher yields mean higher discount rates \u2192 lower PV of dividends \u2192 lower stock prices. COVID had a large negative impact (\u2248 -423 index points). Adding world output (YWORLD) captures global sentiment spillovers.</p>'},
{title:"Mechanism of 5 Markets: Open Capital Account",content:'<p>The interaction of all five markets shows how monetary policy transmits through the entire economy:</p><div class="wk-formula">Case: i\u2193 (monetary easing)\n  F\u2193 \u2192 E\u2191 (depreciation) \u2192 NEX\u2191 \u2192 P\u2191\n  i\u2193 \u2192 Y\u2191 \u2192 u\u2193 \u2192 C\u2191\n  Bond\u2191 \u2192 Yield\u2193 \u2192 Stock\u2191 \u2192 Wealth\u2191 \u2192 C\u2191\n\nCase: i\u2191 (monetary tightening)\n  F\u2191 \u2192 E\u2193 (appreciation) \u2192 NEX\u2193 \u2192 P\u2193\n  i\u2191 \u2192 Y\u2193 \u2192 u\u2191 \u2192 C\u2193\n  Bond\u2193 \u2192 Yield\u2191 \u2192 Stock\u2193 \u2192 Wealth\u2193 \u2192 C\u2193</div><div class="wk-highlight">\ud83d\udca1 Macroeconomics is fundamentally a story about the process from disequilibrium to equilibrium, except when rigidity causes prolonged disequilibrium. This partly explains why workhorse models fail to explain extreme events like the 2008 GFC and COVID \u2014 they assume smooth adjustment mechanisms.</div><p><strong>Why simultaneous equations?</strong> Single equations miss the feedback loops. Y affects Stock, but Stock affects Wealth which affects C which affects Y. Only a simultaneous system captures these interdependencies correctly.</p>'},
]},
{head:"Role of Expectation in C & I",num:"2",cards:[
{title:"Consumption: Beyond Current Income",content:'<p>Consumption depends on more than just current disposable income:</p><div class="wk-formula">Y = C[W, (Y \u2212 T)] + I(\u03a0\u1d49/(1+r)) + G + EX(Y*, E) \u2212 E\u00b7IM(Y, RER)\n\nConsumption determinants:\n  1. Current disposable income (Y \u2212 T)\n  2. Expected future income (Ye)\n  3. Financial wealth W = non-human wealth\n     (stocks, bonds, bank accounts, house value)\n  4. Human wealth = PV of after-tax labor income</div><p><strong>Friedman\u2019s Permanent Income Theory (PITC):</strong> Consumers look beyond current income \u2014 they consume based on their \u201cpermanent\u201d (long-run average) income. A temporary bonus won\u2019t change spending much; a permanent raise will.</p><p><strong>Modigliani\u2019s Life Cycle Theory (LCTC):</strong> Planning horizon = entire lifetime. Each year, consume roughly the same level \u2192 borrow when income is low (young), save when income is high (middle-age), dissave in retirement.</p>'},
{title:"Investment: Keynes\u2019 Approach",content:'<p>Keynes argued that we can only reach full employment if investment offsets the full employment level of savings. Investment creates income which creates equivalent saving.</p><div class="wk-formula">I = \u03b1 + \u03b2 \u03a0f + \u03b3 S + \u03b4 PK + \u03b5 r + e\n    (+)  (+)  (\u2212)  (\u2212)\n\n\u03a0f = entrepreneurial forecast of profitability\nS = surprise (realized \u2212 forecast profits)\nPK = price of a unit of capital\nr = interest rate</div><p><strong>Keynes\u2019 key insight:</strong> The demand for new capital is first and foremost a function of its <em>prospective yield</em> \u2014 not interest rates. Investment is critically dependent on entrepreneurial expectations. The focus is not physical productivity but <em>discounted lifetime value</em>.</p><div class="wk-highlight">\ud83d\udca1 Keynes de-emphasized interest rates: \u201cA more typical explanation of the crisis is not primarily a rise in the rate of interest, but a sudden collapse in the marginal efficiency of capital.\u201d \u2014 This means animal spirits and expectations matter more than the cost of borrowing!</div>'},
{title:"Investment & Present Value of Expected Profits",content:'<div class="wk-formula">Machine bought in year t generates expected profit \u03a0\u1d49\u209c\u208a\u2081 in t+1:\n  PV in year t = [1/(1+r\u209c)] \u00d7 \u03a0\u1d49\u209c\u208a\u2081\n\nWith depreciation \u03b4, profit in t+2:\n  (1\u2212\u03b4)\u03a0\u1d49\u209c\u208a\u2082\n  PV = [1/((1+r\u209c)(1+r\u1d49\u209c\u208a\u2081))] \u00d7 (1\u2212\u03b4)\u03a0\u1d49\u209c\u208a\u2082\n\nTotal PV of expected profits:\n  V(\u03a0\u1d49\u209c) = \u03a0\u1d49\u209c\u208a\u2081/(1+r\u209c) + (1\u2212\u03b4)\u03a0\u1d49\u209c\u208a\u2082/[(1+r\u209c)(1+r\u1d49\u209c\u208a\u2081)] + ...</div><p>Investment is fundamentally <strong>forward-looking</strong> and depends primarily on expected future profits, discounted by expected future real interest rates, adjusted for depreciation.</p>'},
{title:"Static Expectation & User Cost of Capital",content:'<p>Under static expectation, firms assume future profits and rates stay constant:</p><div class="wk-formula">If \u03a0\u1d49\u209c\u208a\u2081 = \u03a0\u1d49\u209c\u208a\u2082 = ... = \u03a0\u209c and r\u1d49\u209c\u208a\u2081 = r\u1d49\u209c\u208a\u2082 = ... = r\u209c\n\nThen: V(\u03a0\u1d49\u209c) = \u03a0\u209c / (r\u209c + \u03b4)\n\nInvestment: I\u209c = I(\u03a0\u209c / (r\u209c + \u03b4))\n\nRental (user) cost of capital = r\u209c + \u03b4\n  r = real interest rate\n  \u03b4 = depreciation rate</div><p>Investment depends on the <strong>ratio of profit to user cost</strong>. Higher profit \u2192 more investment. Higher user cost \u2192 less investment. This is linked to <strong>Tobin\u2019s q</strong>: stock price tells firms how much the market values each unit of existing capital. If q > 1, build new capital. If q < 1, buy existing firms (M&A).</p>'},
{title:"Dropping Static Expectation & Current Profit",content:'<p>When we drop the assumption that the future equals the past:</p><ul><li>If current profit is low, firms cannot easily finance new machines \u2014 borrowing is risky (bankruptcy risk)</li><li>Hence investment depends on BOTH expected PV of future profits AND current profit level</li></ul><div class="wk-formula">I\u209c = I[V(\u03a0\u1d49\u209c), \u03a0\u209c]\n       (+)    (+)\n\nWhat determines \u03a0\u209c?\n  \u03a0\u209c = \u03a0(Y\u209c/K\u209c)   (+)\n  Higher sales-to-capital ratio \u2192 higher profits per unit of capital</div>'},
{title:"C vs I: Similarity & Key Difference",content:'<p><strong>Similarity:</strong> Both C and I respond to whether shocks are perceived as transitory or permanent. Holiday sales lead to transitory investment boom. Temporary income bonus barely changes consumption.</p><p><strong>Critical difference:</strong></p><ul><li><strong>Consumption:</strong> Permanent income\u2191 \u2192 C\u2191 by roughly the same amount (one-for-one). Increasing C by MORE would require cuts later.</li><li><strong>Investment:</strong> Faced with a permanent sales increase, PV of expected profits rises, firms may proceed quickly with large capital spending \u2192 I can EXCEED the increase in sales (overshoot)</li></ul><div class="wk-highlight">\ud83d\udca1 Investment should be MORE VOLATILE than consumption. Data from Indonesia (1991\u20132020) confirms this: investment growth deviates from its mean by up to ~45%, while consumption deviations are far smaller (\u223c10-15%). During the 1998 Asian crisis, investment collapsed by nearly 50% while consumption fell by about 5%.</div>'},
]},
{head:"Uncertainty in Macro Models",num:"3",cards:[
{title:"Model Uncertainty: IMF\u2019s 10-Model Exercise",content:'<p>The IMF used 10 macroeconometric models (EAGLE, GIMF, QUEST, FSGM, G-Cubed, GFM, SIGMA, Oxford, GMUSE, NiGEM) with roughly similar structure (detailed IS-LM-PC) to trace the effects of a US policy rate cut of 100bps for 2 years.</p><div class="wk-formula">Results: Output response to 1% rate cut\n  After 1 year: Average = +0.8%, Range = 0.1% to 2.1%\n  After 2 years: Average = +1.0%, Range = 0.2% to 2.0%\n\n\u2192 Substantial uncertainty about policy effects!</div><div class="wk-highlight">\ud83d\udca1 Robert Solow (Nobel laureate): \u201cI was once able to explain to the Board of Directors of the Federal Reserve Bank of Boston that Brainard had proved that if you don\u2019t know what you\u2019re doing, for heaven\u2019s sake do it gently.\u201d</div>'},
{title:"Policy Under Certainty vs Uncertainty: A Numerical Example",content:'<p>Scenario: Economy in recession, u = 6%, u\u2099 = 4%, gap = 2%. By Okun\u2019s law, 1% extra output growth \u2192 0.4% reduction in u. Need 5% extra growth to close gap.</p><div class="wk-formula">WITH CERTAINTY (using model average):\n  1% rate cut \u2192 0.8% output growth\n  To get 5% growth: cut rate by 5%/0.8% = 6.25%\n\nWITH UNCERTAINTY (using model range):\n  6.25% rate cut \u2192 Y response ranges from:\n    0.625% (0.1 \u00d7 6.25) to 13.1% (2.1 \u00d7 6.25)\n  \u2192 u reduction ranges from:\n    0.25% (0.4 \u00d7 0.625) to 5.24% (0.4 \u00d7 13.1)\n  \u2192 u could end up between:\n    0.76% (6% \u2212 5.24%) and 5.75% (6% \u2212 0.25%)!\n\nIf strongest model is right: u = 0.76% \u2192 3.24% below u\u2099\n  \u2192 ENORMOUS inflationary pressures!</div><p><strong>Conclusion:</strong> Given uncertainty, the CB should cut rates by MUCH LESS than 6.25%. This is the Brainard principle \u2014 when uncertain about effects, move cautiously and adjust incrementally.</p>'},
]},
{head:"Time Inconsistency (Kydland & Prescott)",num:"4",cards:[
{title:"The Core Problem: Good Intentions \u2192 Bad Outcomes",content:'<p><strong>Finn Kydland & Edward Prescott (2004 Nobel Prize):</strong> Good intentions by policy makers can lead to disaster when they think the trade-off between macro objectives can be compromised.</p><div class="wk-formula">Phillips Curve: \u03c0 = \u03c0\u1d49 \u2212 \u03b1(u \u2212 u\u2099)\n  (NAIRU = Non-Accelerating Inflation Rate of Unemployment)\n\nStep 1: CB announces 0% inflation target\n  \u2192 If believed: \u03c0\u1d49 = 0, u = u\u2099, \u03c0 = 0 \u2713\n\nStep 2: CB \u201cseemingly\u201d does better\n  If \u03b1 = 0.5, accepting \u03c0 = 1% \u2192 u drops 2% below u\u2099\n  Attractive! CB deviates from its promise.\n\nStep 3: Wage setters catch on\n  \u2192 They raise \u03c0\u1d49 to 1%\n  \u2192 To still get u 2% below u\u2099, need \u03c0 = 2%\n\nStep 4: Spiral continues...\n  \u03c0\u1d49 keeps rising, actual \u03c0 keeps rising\n  Eventually: high persistent inflation with NO unemployment benefit</div>'},
{title:"Why It\u2019s Called \u201cTime Inconsistency\u201d",content:'<p>The policy that is <em>optimal at the time of announcement</em> (0% inflation) becomes <em>suboptimal once others have acted</em> (set wages based on the announcement). The CB has an incentive to deviate AFTER the private sector has committed.</p><ul><li><strong>Before wage setting:</strong> Optimal plan = 0% inflation \u2713</li><li><strong>After wage setting:</strong> CB sees opportunity to reduce u by accepting some inflation \u2192 deviates from plan \u2718</li><li><strong>Result:</strong> Wage setters learn this, stop trusting announcements \u2192 \u03c0\u1d49 rises \u2192 worse outcome than simply sticking to the original 0% target</li></ul><div class="wk-exam">\ud83d\udcdd <strong>Exam essentials:</strong> (1) Bond\u2191 when Yield\u2193 (inverse). Stock\u2191 when Y\u2191 and Yield\u2193. (2) Investment depends on V(\u03a0\u1d49) and current \u03a0 \u2014 Keynes says expectations matter more than interest rates. (3) User cost = r + \u03b4. Tobin\u2019s q links stock market to real investment. (4) Investment is MORE volatile than consumption. (5) Brainard principle: under uncertainty, act gently. (6) Time inconsistency: CB promise of low \u03c0 is not credible if it has incentive to deviate \u2192 solution: CB independence, rules, inflation targeting.</div>'},
]},
]},
week7:{title:"Week 7 — Technological Progress & Modeling 5 Markets",
subtitle:"Prof. Iwan J. Azis \u00b7 Technological Progress & Solow Residual, TFP Growth, FEBUI 2026 Simultaneous Equations Model, Counterfactual Analysis, Recent Events (Oil Price, War, Financial Crisis)",
sections:[
{head:"Technological Progress (TP)",num:"1",cards:[
{title:"TP & Effective Labor",content:'<p>A \u201cstate of technology\u201d (A) tells us how much output (Y) can be produced from given amounts of capital (K) and labor (N). TP can either increase Y with the same N, or maintain Y with less N.</p><div class="wk-formula">Production function with TP:\n  Y = F(K, AN)   where AN = \u201ceffective labor\u201d\n  Y/AN = f(K/AN) ............(1)\n\nFrom I = S = sY:\n  I/AN = s \u00d7 Y/AN\n  I/AN = s \u00d7 f(K/AN) .........(2)</div><p>The concept of <strong>effective labor (AN)</strong> is crucial: technological progress is \u201clabor-augmenting\u201d \u2014 it\u2019s as if each worker becomes more productive, equivalent to having more workers. Growth in A is what drives long-run increases in output per capita.</p>'},
{title:"Solow Residual & TFP",content:'<div class="wk-formula">Solow residual = g_Y \u2212 [\u03b1 g_N + (1\u2212\u03b1) g_K]\n  = actual output growth MINUS growth attributable\n    to labor and capital\n\nTFP growth (g_A):\n  residual = \u03b1 \u00d7 g_A\n  \u2192 g_A = residual / \u03b1 (labor share)\n\nDistinction:\n  Labor productivity growth = g_Y \u2212 g_N = Y/N growth\n  TFP growth = g_A = \u201cpure\u201d technology contribution\n  TFP captures efficiency gains beyond just adding K or N</div>'},
{title:"Measuring TFP: Cobb-Douglas Production Function",content:'<div class="wk-formula">Y\u209c = A\u209c K\u209c\u1d45 L\u209c\u00b9\u207b\u1d45\n\nIn growth rates:\n  \u0394ln Y\u209c = \u0394ln A\u209c + \u03b1 \u0394ln K\u209c + (1\u2212\u03b1) \u0394ln L\u209c\n\nSolving for TFP:\n  \u0394ln A\u209c = \u0394ln Y\u209c \u2212 \u03b1 \u0394ln K\u209c \u2212 (1\u2212\u03b1) \u0394ln L\u209c\n\nEmpirical regression:\n  ln Y\u209c = const + \u03b1 ln K\u209c + \u03b2 ln L\u209c\n\nDiscrete version (for annual data):\n  ln(A\u209c\u208a\u2081/A\u209c) = ln(Y\u209c\u208a\u2081/Y\u209c) \u2212 \u03b1\u0305 ln(K\u209c\u208a\u2081/K\u209c) \u2212 (1\u2212\u03b1\u0305) ln(L\u209c\u208a\u2081/L\u209c)\n  where \u03b1\u0305 = average capital share over the period</div>'},
{title:"Determinants of Technological Progress",content:'<p>What drives TP varies across countries and institutional contexts:</p><ul><li><strong>R&D activities:</strong> Trade-off between fertility (generating ideas) and appropriability (capturing returns from ideas)</li><li><strong>Legal/Patent system:</strong> Little advantage to being first \u2192 innovation vs imitation trade-off</li><li><strong>Property rights protection:</strong> Few create new technologies if profits are appropriated by state (bribes, corrupt bureaucrats) or stolen by others</li><li><strong>Management practices:</strong> Study of 20 Indian textile firms showed improved management raised productivity by 18% through better quality, efficiency, and reduced inventory</li><li><strong>Institutions:</strong> South vs North Korea \u2014 private ownership vs nationalized, strong state vs central planning, legal protection vs state-decision</li></ul><p>There is a strong positive correlation between protection from expropriation and GDP per capita (Acemoglu, 2004).</p>'},
]},
{head:"TP Effects on AS-AD & Unemployment",num:"2",cards:[
{title:"Short-Run Effects of TP on Output & Prices",content:'<p>TP reduces the number of inputs required to produce 1 unit of Y, so producers can lower prices:</p><div class="wk-formula">AS effect: AS shifts RIGHT (equilibrium at point C)\n  \u2192 Lower prices, higher output\n\nAD effect: AMBIGUOUS!\n  Optimistic case: TP \u2192 confidence\u2191, expectations\u2191\n    \u2192 C\u2191 and I\u2191 \u2192 AD shifts RIGHT (point B\u2019)\n  Pessimistic case: TP \u2192 job security concerns,\n    restructuring fears, no new I needed\n    \u2192 C\u2193 (or S\u2191) \u2192 AD shifts LEFT\n\nNet AD shift is UNKNOWN\n\nEmployment effect: N = Y/A\n  If g_Y > g_A \u2192 employment increases\n  If g_Y < g_A \u2192 employment decreases</div><div class="wk-highlight">\ud83d\udca1 The price effects differ between the two AD shift cases. If AD shifts right, both output and prices could increase (point B\u2019). If AD stays put, output rises but prices fall (point C). This ambiguity is a central analytical challenge.</div>'},
{title:"Case 1: Correct Expectation of Productivity Growth (A\u1d49 = A)",content:'<div class="wk-formula">With TP, cost of producing 1 unit of Y becomes W/A (not W)\n\nPrice setting: P = (1+m) W/A  \u2192  W/P = A/(1+m)\nWage setting: W = A\u1d49 P\u1d49 F(u,z)\n  If A\u1d49 = A: W/P = A F(u,z)\n\nIf g_A = 10%:\n  g(W/P) from BOTH price-setting AND wage-setting = 10%\n  \u2192 u\u2099 is INDEPENDENT of A and g_A</div><p><strong>Key result:</strong> When expectations are correct, an increase in productivity shifts BOTH the wage-setting and price-setting curves up by the same proportion. The natural rate of unemployment does not change. Real wages grow at the same rate as productivity.</p>'},
{title:"Case 2: Incorrect Expectation (A\u1d49 \u2260 A)",content:'<p>If workers incorrectly predict productivity growth \u2014 say actual A growth is SLOWER than expected (A\u1d49):</p><div class="wk-formula">Wage setting W/P = A\u1d49 F(u,z) shifts up MORE\n  than price setting W/P = A/(1+m)\n\n\u2192 u\u2099 INCREASES temporarily\n\u2192 Stays elevated until expectations adjust: A\u1d49 = A</div><p><strong>Practical implication:</strong> A slowdown in productivity growth, if workers\u2019 expectations adjust slowly, leads to a temporary increase in the natural rate of unemployment. Workers demand wages as if productivity is still growing fast \u2192 firms can\u2019t afford it \u2192 higher equilibrium unemployment. This happened in many economies during the post-2000 productivity slowdown.</p>'},
]},
{head:"FEBUI 2026 Simultaneous Equations Model",num:"3",cards:[
{title:"The 5 Markets + Supply Side",content:'<p>The FEBUI Class 2026 model covers 5 markets plus a supply-side (production function):</p><table class="wk-table"><tr><th>#</th><th>Market</th><th>Key Variables</th></tr><tr><td>1</td><td>Goods Market</td><td>Y, C, I, G, EX, IM</td></tr><tr><td>2</td><td>Money Market</td><td>M, i, P</td></tr><tr><td>3</td><td>Exchange Rate Market</td><td>E, EXNO, IMNO, idif</td></tr><tr><td>4</td><td>Labor (Price) Market</td><td>W, P, N, u, gu</td></tr><tr><td>5</td><td>Financial & Capital Market</td><td>Stock, Bond, Yield, Wealth, INFLOW</td></tr><tr><td>6</td><td>Supply Side (PF)</td><td>lnYS = f(lnN, lnK) Cobb-Douglas</td></tr></table>'},
{title:"Equations List (3SLS System)",content:'<div class="wk-formula">Behavioral Equations (estimated via 3SLS):\n  cons_eq:    C = f(YDIS, Clag1, Wealth)\n  invest_eq:  I = f(Y, r, E, COVID)\n  EXNO_eq:    EXNO = f(EXNO, E, IMNO)\n  IMNO_eq:    IMNO = f(IMNO, E, IGC)\n  M_eq:       M = f(M, i, YCUR)\n  E_eq:       E = f(E, idif, INFLOW)\n  P_eq:       P = f(P, M, u, GAPlag1)\n  gu_eq:      gu = f(gu, gY, gW)\n  Stock_eq:   Stock = f(Stock, Y, Yield, INFLOW)\n  Bond_eq:    Bond = f(Bond, Yield, GCUR)\n  Yield_eq:   Yield = f(Yield, i, Yieldlag1)\n  gYield_eq:  gYield = f(gYield, i, Bond, Yieldlag)\n  W_eq:       W = f(W, P)\n  INFLOW_eq:  INFLOW = f(INFLOW, i, Bond)\n  N_eq:       N = f(N, Y, gW)\n  YS_eq:      lnYS = f(lnYS, lnN, lnK)  [CD-PF]</div>'},
{title:"Key Identities in the Model",content:'<div class="wk-formula">Y     = C + I + G + EX \u2212 IM\nWealth = Stock + Bond\nIM    = IMNO + IMO\nEX    = EXNO + EXO\nYDIS  = Y \u2212 T/P\nidif  = i \u2212 iworld\nr     = i/P\ngY    = Y \u2212 Ylag1\nu     = L.u + gu   (u accumulates from gu)\nYS    = exp(lnYS)\nGAP   = YS \u2212 Y\nG     = GCUR/P\nIGC   = I + G + C\n\nExogenous: i, iworld, VWORLD, EXO, IMO,\n           T, G, LF, L, COVID, INFLOW1</div>'},
{title:"3SLS Regression Results Overview",content:'<p>The model uses <strong>Three-Stage Least Squares (3SLS)</strong> estimation with 40 observations across 16 behavioral equations:</p><table class="wk-table"><tr><th>Equation</th><th>R\u00b2</th><th>\u03c7\u00b2</th><th>Significant?</th></tr><tr><td>C (consumption)</td><td>0.991</td><td>5587.62</td><td>\u2713\u2713\u2713</td></tr><tr><td>I (investment)</td><td>0.872</td><td>313.26</td><td>\u2713\u2713\u2713</td></tr><tr><td>EXNO</td><td>0.924</td><td>815.58</td><td>\u2713\u2713\u2713</td></tr><tr><td>IMNO</td><td>0.971</td><td>1716.91</td><td>\u2713\u2713\u2713</td></tr><tr><td>M (money)</td><td>0.977</td><td>2314.89</td><td>\u2713\u2713\u2713</td></tr><tr><td>E (exchange rate)</td><td>0.451</td><td>96.76</td><td>\u2713\u2713</td></tr><tr><td>P (prices)</td><td>0.615</td><td>141.61</td><td>\u2713\u2713\u2713</td></tr><tr><td>Stock</td><td>0.736</td><td>150.49</td><td>\u2713\u2713\u2713</td></tr><tr><td>Bond</td><td>0.578</td><td>190.56</td><td>\u2713\u2713\u2713</td></tr><tr><td>N (employment)</td><td>0.948</td><td>1602.35</td><td>\u2713\u2713\u2713</td></tr><tr><td>lnYS (prod fn)</td><td>0.952</td><td>1851.57</td><td>\u2713\u2713\u2713</td></tr></table><p>Most equations have very high R\u00b2 values. Exchange rate (E) has the lowest R\u00b2 at 0.451, reflecting the inherent difficulty of modeling FX movements.</p>'},
]},
{head:"Counterfactual Analysis",num:"4",cards:[
{title:"Interest Rate Increased by 10% (i \u00d7 1.1)",content:'<p>Shock period: 2025Q1 to 2025Q4. Average % deviation from dynamic baseline:</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th><th>Direction</th></tr><tr><td>Wealth</td><td>\u22125.51%</td><td style="color:#DC2626">\u2193\u2193\u2193</td></tr><tr><td>Investment (I)</td><td>\u22124.73%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Exports (EX)</td><td>\u22124.49%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Output (Y)</td><td>\u22124.08%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Exchange Rate (E)</td><td>\u22123.78%</td><td style="color:#DC2626">\u2193 (appreciation)</td></tr><tr><td>Consumption (C)</td><td>\u22123.55%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Imports (IM)</td><td>\u22123.37%</td><td style="color:#DC2626">\u2193</td></tr><tr><td>Prices (P)</td><td>\u22121.60%</td><td style="color:#DC2626">\u2193</td></tr><tr><td>Yield</td><td>+2.70%</td><td style="color:#059669">\u2191</td></tr><tr><td>Unemployment (u)</td><td>+2.94%</td><td style="color:#DC2626">\u2191</td></tr></table><div class="wk-highlight">\ud83d\udca1 A 10% interest rate hike is contractionary across the board: wealth falls most (\u22125.5%), followed by investment and exports. The Rupiah appreciates (E\u2193) due to capital inflows, hurting exports. Unemployment rises while yields increase as expected.</div>'},
{title:"Interest Rate Decreased by 10% (i \u00d7 0.9)",content:'<p>Symmetrically opposite effects (roughly mirror image):</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th><th>Direction</th></tr><tr><td>Wealth</td><td>+5.51%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Investment (I)</td><td>+4.72%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Exports (EX)</td><td>+4.48%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Output (Y)</td><td>+4.08%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Exchange Rate (E)</td><td>+3.78%</td><td style="color:#059669">\u2191 (depreciation)</td></tr><tr><td>Consumption (C)</td><td>+3.54%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Imports (IM)</td><td>+3.36%</td><td style="color:#059669">\u2191</td></tr><tr><td>Prices (P)</td><td>+1.60%</td><td style="color:#059669">\u2191</td></tr><tr><td>Yield</td><td>\u22122.70%</td><td style="color:#059669">\u2193</td></tr><tr><td>Unemployment (u)</td><td>\u22122.94%</td><td style="color:#059669">\u2193</td></tr></table><p>Rate cut is expansionary: wealth, investment, output, and consumption all rise. E depreciates (capital outflows), boosting exports. Near-perfect symmetry confirms the model is approximately linear around baseline.</p>'},
{title:"Government Spending Increased by 10% (G \u00d7 1.1)",content:'<p>Fiscal expansion has MUCH LARGER effects than monetary policy:</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th><th>Magnitude</th></tr><tr><td>Wealth</td><td>+91.1%</td><td style="color:#059669">\u2191\u2191\u2191 (massive)</td></tr><tr><td>Exports (EX)</td><td>+36.1%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Imports (IM)</td><td>+34.4%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Consumption (C)</td><td>+33.9%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Output (Y)</td><td>+33.4%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Investment (I)</td><td>+29.5%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Prices (P)</td><td>+3.9%</td><td style="color:#059669">\u2191</td></tr><tr><td>Unemployment (u)</td><td>\u221227.4%</td><td style="color:#059669">\u2193\u2193\u2193</td></tr><tr><td>Yield</td><td>\u22120.36%</td><td>small</td></tr></table><div class="wk-highlight">\ud83d\udca1 G\u00d710% has 8\u201310\u00d7 larger impact than i\u00d710%! This reflects the direct demand injection of fiscal policy vs the indirect transmission of monetary policy. Wealth effect is enormous (+91%) due to the stock-bond-wealth-consumption feedback loop. However, both imports and exports rise, and prices increase modestly (+3.9%).</div>'},
{title:"Government Spending Decreased by 10% (G \u00d7 0.9)",content:'<p>Fiscal contraction (austerity):</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th></tr><tr><td>Wealth</td><td>\u221289.6%</td></tr><tr><td>Exports (EX)</td><td>\u221235.6%</td></tr><tr><td>Imports (IM)</td><td>\u221234.0%</td></tr><tr><td>Consumption (C)</td><td>\u221233.4%</td></tr><tr><td>Output (Y)</td><td>\u221232.9%</td></tr><tr><td>Investment (I)</td><td>\u221229.1%</td></tr><tr><td>Exchange Rate (E)</td><td>\u221220.2%</td></tr><tr><td>Prices (P)</td><td>\u22123.8%</td></tr><tr><td>Unemployment (u)</td><td>+26.9%</td></tr><tr><td>Yield</td><td>+52.0%</td></tr></table><p>Austerity causes devastating contraction. Yield spikes by 52% as markets lose confidence. Unemployment surges by 27%. This is why abrupt fiscal consolidation during recessions is dangerous \u2014 the multiplier effects cascade through all 5 markets.</p>'},
]},
{head:"Selected Recent Events: Macro Impacts",num:"5",cards:[
{title:"Capital Flows & Sterilized Intervention",content:'<div class="wk-formula">Capital INFLOWS:\n  \u2192 Rp appreciation (E\u2193)\n  \u2192 Unfavorable for net-exports\n  \u2192 Increased vulnerability (weakened fundamentals)\n\nSterilized Intervention:\n  CB buys $ using Rp \u2192 Ms\u2191 \u2192 Rp depreciates\n  But Ms\u2191 raises inflation risk\n  \u2192 CB \u201csterilizes\u201d by raising i\n  \u2192 Back to square one: Rp appreciates again!\n\nCapital OUTFLOWS:\n  \u2192 Rp depreciation (E\u2191)\n  \u2192 CB unloads forex reserves to add $ supply\n  \u2192 Dwindling reserves = increased vulnerability</div>'},
{title:"Oil Price Increase: Effect on Unemployment",content:'<div class="wk-formula">POIL\u2191 \u2192 Price-setting curve shifts DOWN\n  W/P = A/(1+m)  where m\u2019 > m (higher markup)\n  \u2192 Lower real wage (w_real\u2193)\n  \u2192 Higher natural unemployment (u\u2099\u2191)\n  \u2192 Lower natural employment (EMP\u2099\u2193)\n  \u2192 Lower natural output (Y\u2099\u2193)\n  Equilibrium shifts from A to A\u2019</div><p><strong>Dynamic adjustment:</strong> POIL increase \u2192 new AS goes through B with lower Y\u2099 and expected price P\u1d49 \u2192 AS shifts to AS\u2019. AD effect is ambiguous: firms may cancel investment plans OR shift to less oil-intensive production; income redistributes from oil buyers (who spend more) to oil producers (who spend less). Net AD shift may cancel out. In short run, only AS shifts: eq from A to A\u2019 with higher prices and lower output (<strong>stagflation</strong>). Over time, AS continues shifting up as output remains above the new, lower Y\u2099.</p>'},
{title:"Current War, Energy & Tariff Shocks",content:'<ul><li><strong>Strait of Hormuz closure</strong> deprived the world of ~20mn br/day \u2014 largest-ever oil supply shock. Wild intraday price swings and strategic reserve releases without historical precedent.</li><li><strong>2025 \u201cliberation day\u201d tariffs:</strong> Initially, asset prices fell sharply, gold rallied, growth forecasts slashed. But: tech wave swamped the tariff wave, carrying risk appetite and growth. Global equities ended a fifth higher than at their start.</li><li><strong>Now deeper:</strong> Unlike 2025, inflation pressures are resurgent due to energy prices \u2192 CBs cannot ease rates to cushion demand. Rising defense spending \u2192 fiscal pressures \u2192 global bond yields rising \u2192 tighter monetary conditions squeezing global demand.</li></ul><div class="wk-highlight">\ud83d\udca1 Risk of AI valuation correction: if AI companies fail to deliver earnings matching lofty valuations, reevaluation of productivity expectations could interact with geopolitical strains to (1) hinder effective policy implementation, and (2) trigger abrupt financial market corrections spreading from AI-linked companies to broader markets, eroding household wealth.</div>'},
{title:"Another Financial Crisis Looming?",content:'<p>Private credit funds are reporting customer withdrawal attempts. Financial crises typically have two features:</p><ul><li><strong>1. Runs:</strong> The 2023 mini-crisis started with a run on SVB (depositors withdrew over fears of bond losses). Private credit has \u201cgates\u201d (limits on withdrawal amounts per period), so no chaotic unwinding.</li><li><strong>2. Contagion:</strong> Already happening. Investors are scanning for funds similar to those facing withdrawals. The gates that prevent runs may perversely SPEED contagion: \u201cIf you can\u2019t sell what you want, you sell what you can.\u201d</li></ul>'},

// Shared SVG utilities
function mkEl(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function gLine(svg,x1,y1,x2,y2,color,width=1.5,dash=''){const l=mkEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':width});if(dash)l.setAttribute('stroke-dasharray',dash);svg.appendChild(l)}
function gPath(svg,d,color,width=2,fill='none'){svg.appendChild(mkEl('path',{d,stroke:color,'stroke-width':width,fill}))}
function gText(svg,x,y,text,size=11,color='#555',anchor='middle',weight=500){const t=mkEl('text',{x,y,fill:color,'font-size':size,'font-family':'Inter,sans-serif','font-weight':weight,'text-anchor':anchor,'dominant-baseline':'middle'});t.textContent=text;svg.appendChild(t)}
function gCircle(svg,x,y,r,fill,stroke='none'){svg.appendChild(mkEl('circle',{cx:x,cy:y,r,fill,stroke,'stroke-width':stroke!=='none'?2:0}))}
function gRect(svg,x,y,w,h,fill,rx=0){svg.appendChild(mkEl('rect',{x,y,width:w,height:h,fill,rx}))}
function makeAxes(svg,W,H,M,xLabel,yLabel){
gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);
gText(svg,W/2+M.l/2,H-6,xLabel,11,'#555');gText(svg,14,(H-M.b-M.t)/2+M.t,yLabel,11,'#555','middle');
const yt=svg.lastChild;yt.setAttribute('transform',`rotate(-90,14,${(H-M.b-M.t)/2+M.t})`);
}
function makeSVG(parent,W,H,id){
const s=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',preserveAspectRatio:'xMidYMid meet',id});
s.style.background='#FEFEFE';s.style.borderRadius='8px';s.style.border='1px solid #ECEAE6';
parent.appendChild(s);return s;
}
function clearSVG(id){const s=document.getElementById(id);if(s)while(s.firstChild)s.removeChild(s.firstChild);return s}

<div class="g-ctrl"><label>Confidence:</label><input type="range" min="-30" max="30" value="0" id="islm-c" oninput="updISLM()"><span class="g-val" id="islm-cv">0</span></div>
</div><div class="g-insight" id="islm-insight"></div></div>`;

window.applyScenario_islm=function(id,btn){
btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const s={gup:[50,0,0],gdn:[-50,0,0],mup:[0,35,0],mdn:[0,-35,0],cup:[0,0,25],cdn:[0,0,-25],tdn:[30,0,10],combo:[40,30,0],reset:[0,0,0]};
const v=s[id]||[0,0,0];
document.getElementById('islm-g').value=v[0];document.getElementById('islm-m').value=v[1];document.getElementById('islm-c').value=v[2];

function updISLM(){
const W=520,H=340,M={l:50,r:20,t:20,b:40};
const dG=+document.getElementById('islm-g').value;
const dM=+document.getElementById('islm-m').value;
const dC=+document.getElementById('islm-c').value;
document.getElementById('islm-gv').textContent=dG>0?'+'+dG:dG;
document.getElementById('islm-mv').textContent=dM>0?'+'+dM:dM;
document.getElementById('islm-cv').textContent=dC>0?'+'+dC:dC;
const pw=document.getElementById('islm-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'islm-s');
makeAxes(svg,W,H,M,'Output (Y)','Interest rate (i)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
const isShift=(dG+dC)*0.003;
// Base IS (gray)
if(isShift!==0){let d0='';for(let t=0;t<=1;t+=.02){const y=0.85-0.7*t;d0+=(t===0?'M':'L')+toX(t)+','+toY(Math.max(0,Math.min(1,y)))}gPath(svg,d0,'#E0E0DC',1.5);gText(svg,toX(0.95),toY(0.85-0.7*0.95)-8,'IS₀',9,'#ccc','start')}
// Shifted IS
let d='';for(let t=0;t<=1;t+=.02){const y=0.85-0.7*t+isShift;d+=(t===0?'M':'L')+toX(t)+','+toY(Math.max(0,Math.min(1,y)))}
gPath(svg,d,'#2563EB',2.2);gText(svg,toX(0.95),toY(Math.max(0.05,0.85-0.7*0.95+isShift))-8,isShift!==0?'IS\'':'IS',11,'#2563EB','start',700);
// LM
const lmLevel=0.45-dM*0.004;
if(dM!==0){gLine(svg,M.l,toY(0.45),W-M.r,toY(0.45),'#C0C0BC',1.5,'4 3');gText(svg,W-M.r+2,toY(0.45)-2,'LM₀',9,'#aaa','start')}
gLine(svg,M.l,toY(lmLevel),W-M.r,toY(lmLevel),'#059669',2.2);gText(svg,W-M.r+2,toY(lmLevel)-2,dM!==0?'LM\'':'LM',11,'#059669','start',700);
// Equilibria
const eqY=(0.85+isShift-lmLevel)/0.7;const eqI=lmLevel;
const e0Y=(0.85-0.45)/0.7;
if(isShift!==0||dM!==0){const e0x=toX(e0Y),e0y=toY(0.45);gCircle(svg,e0x,e0y,4,'#ddd','#bbb');gText(svg,e0x+10,e0y-10,'A',10,'#aaa')}
const ex=toX(Math.max(0.05,Math.min(0.95,eqY))),ey=toY(Math.max(0.05,Math.min(0.95,eqI)));
gCircle(svg,ex,ey,5,'#DC2626','#fff');gText(svg,ex+10,ey-10,isShift!==0||dM!==0?'B':'A',11,'#DC2626','start',700);
gLine(svg,ex,ey,ex,H-M.b,'#DC2626',1,'3 3');gLine(svg,ex,ey,M.l,ey,'#DC2626',1,'3 3');
gText(svg,ex,H-M.b+14,'Y*',10,'#DC2626');gText(svg,M.l-12,ey,'i*',10,'#DC2626');
// Explanation
let exp='';
if(dG>0&&dM===0) exp='<b>Fiscal expansion (G↑):</b><br>Step 1: G↑ → total demand Z↑ → IS shifts RIGHT<br>Step 2: At same i, higher demand → firms produce more → Y↑<br>Step 3: With horizontal LM (CB keeps i fixed), no crowding out<br>Step 4: New equilibrium B has higher Y, same i<br><b>Result: Y↑, i unchanged.</b> Pure demand stimulus.';
else if(dG<0&&dM===0) exp='<b>Fiscal contraction (G↓):</b><br>Step 1: G↓ → total demand Z↓ → IS shifts LEFT<br>Step 2: At same i, lower demand → firms cut production → Y↓<br>Step 3: Multiplier amplifies: Y↓ → C↓ → Y↓ further<br>Step 4: New equilibrium B has lower Y<br><b>Result: Y↓, i unchanged.</b> Austerity contracts the economy.';
else if(dM>0&&dG===0&&dC===0) exp='<b>Monetary easing (M↑):</b><br>Step 1: CB buys bonds → injects money → M↑ → LM shifts DOWN<br>Step 2: Lower i → cost of borrowing falls → I↑<br>Step 3: I↑ → AD↑ → Y↑ (movement along IS curve)<br>Step 4: New equilibrium B has lower i AND higher Y<br><b>Result: i↓, Y↑.</b> Monetary policy works through the investment channel.';
else if(dM<0&&dG===0&&dC===0) exp='<b>Monetary tightening (M↓):</b><br>Step 1: CB sells bonds → absorbs money → M↓ → LM shifts UP<br>Step 2: Higher i → borrowing more expensive → I↓<br>Step 3: I↓ → AD↓ → Y↓ (movement along IS curve)<br>Step 4: New equilibrium B has higher i AND lower Y<br><b>Result: i↑, Y↓.</b> Tight money cools the economy but hurts investment.';
else if(dC>0&&dG===0&&dM===0) exp='<b>Confidence boom (animal spirits↑):</b><br>Step 1: Optimism → consumers spend more (c₀↑), firms invest more → IS shifts RIGHT<br>Step 2: Same mechanism as fiscal expansion but driven by private sector<br>Step 3: Y↑ at given i<br><b>Result: Y↑.</b> Keynes emphasized these "animal spirits" as key drivers of business cycles.';
else if(dC<0&&dG===0&&dM===0) exp='<b>Confidence crash (animal spirits↓):</b><br>Step 1: Pessimism/fear → C↓, I↓ → IS shifts LEFT<br>Step 2: Even if CB holds i steady, demand collapses<br>Step 3: Y↓, potentially triggering a feedback loop (Y↓ → more pessimism → Y↓ more)<br><b>Result: Y↓.</b> This is why recessions can be self-reinforcing — confidence is contagious.';
else if(dG>0&&dM>0) exp='<b>Fiscal + Monetary expansion (policy mix):</b><br>Step 1: G↑ → IS shifts RIGHT (higher demand)<br>Step 2: M↑ → LM shifts DOWN (lower rates)<br>Step 3: BOTH channels reinforce: Y↑↑ from demand AND cheaper borrowing<br>Step 4: This is the most powerful stimulus combination<br><b>Result: Y↑↑, i↓.</b> Used during severe recessions (e.g., COVID response). Risk: inflation if economy near capacity.';
else if(dG>0&&dC>0&&dM===0) exp='<b>Tax cut:</b><br>Step 1: T↓ → disposable income (Y−T)↑ → C↑<br>Step 2: Confidence also rises (optimism about future income)<br>Step 3: Both shift IS RIGHT → Y↑<br><b>Result: Y↑.</b> Tax cuts work through both income and confidence channels, but create fiscal deficit.';
if(!exp) exp='Drag the sliders or click a scenario above. IS slopes down because higher i → lower I → lower Y. LM is horizontal because the CB sets i directly (modern central banking). Fiscal policy shifts IS; monetary policy shifts LM.';
document.getElementById('islm-insight').innerHTML=exp;
}

const presets={fiscal:[0.15,0],monetary:[0.12,0],oil:[0,-0.18],tech:[0,0.15],wage:[0,-0.12],conf_neg:[-0.15,0],stagflation:[-0.06,-0.15],recovery:[0.12,0.08],reset:[0,0]};
const v=presets[id]||[0,0]; s.adShift=v[0];s.asShift=v[1];s.scenario=id;updASAD();

function updASAD(){
const W=520,H=340,M={l:50,r:20,t:20,b:40};
const s=window._asadState;
const pw=document.getElementById('asad-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'asad-s');
makeAxes(svg,W,H,M,'Output (Y)','Price level (P)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
const yn=0.5;
gLine(svg,toX(yn),M.t+5,toX(yn),H-M.b,'#999',1.5,'5 4');gText(svg,toX(yn),M.t-2,'Yₙ',11,'#999');
// Base curves (gray if shifted)
if(s.adShift!==0){let d0='';for(let t=0.02;t<=0.98;t+=.02){d0+=(t<=0.03?'M':'L')+toX(t)+','+toY(0.9-0.7*t)}gPath(svg,d0,'#ddd',1.5);gText(svg,toX(0.1),toY(0.9-0.07)+12,'AD₀',9,'#ccc')}
if(s.asShift!==0){let d0='';for(let t=0.02;t<=0.98;t+=.02){d0+=(t<=0.03?'M':'L')+toX(t)+','+toY(0.1+0.65*t)}gPath(svg,d0,'#ddd',1.5);gText(svg,toX(0.9)+6,toY(0.1+0.65*0.9),'AS₀',9,'#ccc','start')}
// Shifted curves
let dAD='';for(let t=0.02;t<=0.98;t+=.02){dAD+=(t<=0.03?'M':'L')+toX(t)+','+toY(0.9-0.7*t+s.adShift)}
gPath(svg,dAD,'#2563EB',2.2);gText(svg,toX(0.1),toY(0.9-0.07+s.adShift)+12,s.adShift!==0?'AD\'':'AD',11,'#2563EB');
let dAS='';for(let t=0.02;t<=0.98;t+=.02){dAS+=(t<=0.03?'M':'L')+toX(t)+','+toY(0.1+0.65*t+s.asShift)}
gPath(svg,dAS,'#DC2626',2.2);gText(svg,toX(0.9)+6,toY(0.1+0.65*0.9+s.asShift),s.asShift!==0?'AS\'':'AS',11,'#DC2626','start',700);
// Equilibria
const findEq=(adS,asS)=>{const y=(0.9+adS-0.1-asS)/(0.7+0.65);return{y:Math.max(0.05,Math.min(0.95,y)),p:Math.max(0.05,Math.min(0.95,0.1+0.65*y+asS))}};
const eq0=findEq(0,0),eq1=findEq(s.adShift,s.asShift);
if(s.adShift!==0||s.asShift!==0){gCircle(svg,toX(eq0.y),toY(eq0.p),4,'#ddd','#bbb');gText(svg,toX(eq0.y)-12,toY(eq0.p)-10,'A',10,'#999')}
gCircle(svg,toX(eq1.y),toY(eq1.p),5,'#1B2A4A');gText(svg,toX(eq1.y)+12,toY(eq1.p)-10,s.adShift!==0||s.asShift!==0?'B':'A',11,'#1B2A4A','start',700);
const exps={
fiscal:'<b>Fiscal expansion (G↑):</b><br>Step 1: G↑ → total spending↑ → AD shifts RIGHT<br>Step 2: At old P, excess demand → firms raise P and expand Y<br>Step 3: Short-run eq at B: Y↑ AND P↑<br>Step 4: <i>Medium run:</i> P>Pᵉ → workers demand higher W → AS shifts LEFT → Y returns to Yₙ at even higher P<br><b>Short run: Y↑, P↑. Medium run: Y→Yₙ, P↑↑.</b>',
monetary:'<b>Monetary expansion (M↑):</b><br>Step 1: CB buys bonds → M↑ → i↓ → I↑ → AD shifts RIGHT<br>Step 2: Same as fiscal: excess demand → Y↑, P↑<br>Step 3: <i>Medium run:</i> same self-correction back to Yₙ<br><b>Short run: Y↑, P↑. Medium run: Y→Yₙ, P↑↑.</b> Money is neutral in the medium run — only P changes permanently.',
oil:'<b>Oil price shock (POIL↑):</b><br>Step 1: Oil = input cost → markup μ↑ → production costs↑ → AS shifts LEFT<br>Step 2: At old Y, costs too high → firms cut output, raise prices<br>Step 3: New eq at B: Y↓ AND P↑ = <b>STAGFLATION</b><br>Step 4: CB dilemma: raise i to fight inflation? (worsens recession) or cut i to fight recession? (worsens inflation)<br><b>Result: Y↓, P↑.</b> The policymaker\'s nightmare — no good options.',
tech:'<b>Technology boom (A↑):</b><br>Step 1: TFP↑ → each worker produces more → unit costs fall → AS shifts RIGHT<br>Step 2: At old P, firms can supply more at lower cost → Y↑, P↓<br>Step 3: <i>Bonus:</i> if confidence rises too → AD may also shift right<br>Step 4: The BEST outcome — more output at lower prices<br><b>Result: Y↑, P↓.</b> This is what every economy wants.',
wage:'<b>Wage push (W↑):</b><br>Step 1: Unions/minimum wage → W↑ above equilibrium<br>Step 2: Higher labor costs → firms raise prices → AS shifts LEFT<br>Step 3: Y↓, P↑ (same direction as oil shock but from labor market)<br>Step 4: If W stays elevated → new higher uₙ (structural unemployment)<br><b>Result: Y↓, P↑.</b> Cost-push inflation from labor market rigidity.',
conf_neg:'<b>Demand collapse (confidence crash):</b><br>Step 1: Pessimism → C↓, I↓ → AD shifts LEFT<br>Step 2: Less demand → firms cut production and prices → Y↓, P↓<br>Step 3: <i>Medium run:</i> P<Pᵉ → workers accept lower W (slowly!) → AS shifts RIGHT → recovery<br>Step 4: BUT wages are sticky downward → self-correction is VERY SLOW<br><b>Result: Y↓, P↓.</b> This is why active policy is needed in recessions — waiting for self-correction takes years.',
stagflation:'<b>Stagflation (AD↓ + AS↓):</b><br>Step 1: Supply shock (AS left) AND demand weakness (AD left) simultaneously<br>Step 2: Double hit: Y↓↓ while P effect is ambiguous (AS pushes P↑, AD pushes P↓)<br>Step 3: Net: severe recession with persistent cost-push inflation<br>Step 4: Worst case scenario — all policy tools have tradeoffs<br><b>Result: Y↓↓, P ambiguous.</b> The 1970s oil crises + recession combined.',
recovery:'<b>Post-recession recovery (AD↑ + AS↑):</b><br>Step 1: Fiscal/monetary stimulus → AD shifts RIGHT<br>Step 2: Simultaneously, supply chains heal, tech improves → AS shifts RIGHT<br>Step 3: Both shifts boost Y; price effect depends on relative magnitudes<br>Step 4: Ideal recovery: Y↑↑ with moderate P<br><b>Result: Y↑↑, P depends on balance.</b> Post-COVID saw this pattern (but with inflation due to AD outpacing AS).',
};
document.getElementById('asad-insight').innerHTML=exps[s.scenario]||'Click a scenario to see how AS-AD equilibrium shifts. Each scenario shows the transmission mechanism step by step.';
}

// ===== 3. Phillips Curve =====
function drawPC(){
const c=document.getElementById('gc-pc');
const scenarios=[
{id:'below_un',label:'CB pushes u below uₙ'},
{id:'recession',label:'Recession (u > uₙ)'},
{id:'supply_shock',label:'Supply shock (πᵉ↑)'},
{id:'structural',label:'Structural reform (uₙ↓)'},
{id:'disinflation',label:'Volcker disinflation'},
{id:'deflation',label:'Deflation trap'},
{id:'reset',label:'⟲ Reset'}
];
c.innerHTML=`<div class="g-card"><h4>Phillips Curve: π − πᵉ = −α(u − uₙ)</h4><p class="g-desc">The inflation-unemployment tradeoff. Below uₙ → inflation accelerates. Above uₙ → inflation decelerates.</p>
<div class="g-canvas-wrap"><div id="pc-svg"></div></div>
${scBar(scenarios,'pc')}
<div class="g-controls">
<div class="g-ctrl"><label>πᵉ:</label><input type="range" min="0" max="80" value="20" id="pc-pe" oninput="updPC()"><span class="g-val" id="pc-pev">2%</span></div>
<div class="g-ctrl"><label>uₙ:</label><input type="range" min="20" max="60" value="40" id="pc-un" oninput="updPC()"><span class="g-val" id="pc-unv">4%</span></div>
<div class="g-ctrl"><label>α:</label><input type="range" min="20" max="80" value="50" id="pc-a" oninput="updPC()"><span class="g-val" id="pc-av">0.5</span></div>
</div><div class="g-insight" id="pc-insight"></div></div>`;

}
window.applyScenario_pc=function(id,btn){
btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const presets={below_un:[20,40,50],recession:[20,40,50],supply_shock:[50,40,50],structural:[20,25,50],disinflation:[60,40,70],deflation:[0,40,30],reset:[20,40,50]};
const v=presets[id]||[20,40,50];
document.getElementById('pc-pe').value=v[0];document.getElementById('pc-un').value=v[1];document.getElementById('pc-a').value=v[2];
window._pcScenario=id;updPC();
};
function updPC(){
const W=520,H=320,M={l:50,r:20,t:20,b:40};
const pe=+document.getElementById('pc-pe').value/10;
const un=+document.getElementById('pc-un').value/10;
const alpha=+document.getElementById('pc-a').value/100;
document.getElementById('pc-pev').textContent=pe.toFixed(1)+'%';
document.getElementById('pc-unv').textContent=un.toFixed(1)+'%';
document.getElementById('pc-av').textContent=alpha.toFixed(2);
const pw=document.getElementById('pc-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'pc-s');
makeAxes(svg,W,H,M,'Unemployment rate (u)','Inflation (π)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const uMax=10,piMax=8;
const toX=u=>M.l+(u/uMax)*pW,toY=pi=>M.t+(1-pi/piMax)*pH;
let d='';for(let u=0.5;u<=9.5;u+=.2){const pi=pe-alpha*(u-un);d+=(u<=0.6?'M':'L')+toX(u)+','+toY(pi)}
gPath(svg,d,'#2563EB',2.5);gText(svg,toX(9),toY(pe-alpha*(9-un))-12,'PC',11,'#2563EB','start',700);
gLine(svg,toX(un),M.t,toX(un),H-M.b,'#DC2626',1.5,'5 4');gText(svg,toX(un),M.t-4,'uₙ='+un.toFixed(1)+'%',10,'#DC2626');
gLine(svg,M.l,toY(pe),W-M.r,toY(pe),'#059669',1,'4 3');gText(svg,W-M.r-4,toY(pe)-10,'πᵉ='+pe.toFixed(1)+'%',10,'#059669','end');
gCircle(svg,toX(un),toY(pe),5,'#1B2A4A');
// Scenario-specific markers
const sc=window._pcScenario;
if(sc==='below_un'){const u2=un-2,pi2=pe-alpha*(u2-un);gCircle(svg,toX(u2),toY(pi2),5,'#DC2626');gText(svg,toX(u2)+8,toY(pi2)-10,'B (u<uₙ)',9,'#DC2626','start');
gPath(svg,`M${toX(u2)},${toY(pi2)}L${toX(un)},${toY(pe)}`,'#DC2626',1.5,'3 3')}
if(sc==='recession'){const u2=un+2.5,pi2=pe-alpha*(u2-un);gCircle(svg,toX(u2),toY(pi2),5,'#2563EB');gText(svg,toX(u2)+8,toY(pi2)+12,'B (u>uₙ)',9,'#2563EB','start')}
for(let u=2;u<=8;u+=2){gLine(svg,toX(u),H-M.b,toX(u),H-M.b+4,'#333',1);gText(svg,toX(u),H-M.b+16,u+'%',9,'#888')}
for(let pi=0;pi<=piMax;pi+=2){if(pi===0)continue;gLine(svg,M.l-4,toY(pi),M.l,toY(pi),'#333',1);gText(svg,M.l-8,toY(pi),pi+'%',9,'#888','end')}
const exps={
below_un:'<b>CB pushes u below uₙ:</b><br>Step 1: CB cuts i → Y↑ → u↓ below uₙ → move to point B<br>Step 2: At B: π > πᵉ (actual inflation exceeds expected)<br>Step 3: Workers observe higher π → revise πᵉ upward<br>Step 4: PC shifts UP → to maintain u < uₙ, need even higher π<br>Step 5: This is the TIME INCONSISTENCY spiral — inflation accelerates with no permanent u benefit<br><b>Lesson:</b> You cannot permanently buy lower unemployment with higher inflation.',
recession:'<b>Recession (u > uₙ):</b><br>Step 1: Demand shock → Y↓ → u↑ above uₙ → move to point B<br>Step 2: At B: π < πᵉ (actual inflation below expected)<br>Step 3: Workers gradually lower πᵉ → PC shifts DOWN<br>Step 4: Self-correcting: lower πᵉ → lower W demands → costs↓ → firms expand<br>Step 5: BUT this adjustment is SLOW because wages are sticky downward<br><b>Lesson:</b> Recessions self-correct, but painfully slowly — hence active policy.',
supply_shock:'<b>Supply shock (πᵉ↑):</b><br>Step 1: Oil price↑ → input costs↑ → firms raise prices → actual π↑<br>Step 2: Workers observe higher prices → raise πᵉ (e.g., from 2% to 5%)<br>Step 3: Entire PC shifts UP — at every u, inflation is now higher<br>Step 4: To keep inflation at old level → CB must raise i → u↑ above uₙ<br><b>Lesson:</b> Supply shocks shift the PC up — there is no free lunch. Fighting inflation requires accepting higher unemployment.',
structural:'<b>Structural reform (uₙ↓):</b><br>Step 1: Labor market reforms (reduce z, increase competition → lower μ)<br>Step 2: WS-PS intersection shifts LEFT → uₙ falls (e.g., from 4% to 2.5%)<br>Step 3: The vertical NAIRU line shifts LEFT<br>Step 4: Economy can sustain lower u without inflation accelerating<br><b>Lesson:</b> Structural reforms permanently improve the inflation-unemployment tradeoff. This is the ONLY way to reduce uₙ — demand policy cannot do it.',
disinflation:'<b>Volcker disinflation:</b><br>Step 1: Start with high πᵉ (6%) — entrenched inflation expectations<br>Step 2: CB dramatically raises i → u↑↑ well above uₙ (severe recession)<br>Step 3: Sustained slack → π falls below πᵉ → workers gradually lower πᵉ<br>Step 4: PC shifts DOWN over time as expectations re-anchor<br>Step 5: Eventually πᵉ falls to target → u can return to uₙ at low π<br><b>Lesson:</b> Disinflation requires temporary pain (sacrifice ratio). Credibility speeds the process — if people trust the CB, πᵉ adjusts faster.',
deflation:'<b>Deflation trap:</b><br>Step 1: πᵉ = 0 or negative → PC passes through or below zero<br>Step 2: If u > uₙ → π < 0 (deflation)<br>Step 3: Deflation → real rate rises (r = i - π, if π < 0, r > i) even at i = 0<br>Step 4: Higher r → I↓ → Y↓ → u↑ → more deflation → spiral<br>Step 5: This is the liquidity trap (Japan since 1990s)<br><b>Lesson:</b> Zero lower bound on i makes deflation self-reinforcing. Need unconventional policy (QE, fiscal stimulus).'
};
document.getElementById('pc-insight').innerHTML=exps[sc]||`At u = uₙ (${un.toFixed(1)}%), π = πᵉ (${pe.toFixed(1)}%). Click a scenario to see the transmission mechanism.`;
}

// ===== 4. WS-PS =====
function drawWSPS(){
const c=document.getElementById('gc-wsps');
const scenarios=[
{id:'union',label:'Stronger unions (z↑)'},
{id:'deunion',label:'Weaker unions (z↓)'},
{id:'oil',label:'Oil price↑ (μ↑)'},
{id:'compete',label:'More competition (μ↓)'},

];
c.innerHTML=`<div class="g-card"><h4>Wage Setting – Price Setting</h4><p class="g-desc">WS slopes down: higher u → weaker bargaining → lower W/P. PS is horizontal at 1/(1+μ). Intersection = natural rate uₙ.</p>
<div class="g-canvas-wrap"><div id="wsps-svg"></div></div>
${scBar(scenarios,'wsps')}
<div class="g-controls">
<div class="g-ctrl"><label>z (union):</label><input type="range" min="0" max="80" value="30" id="ws-z" oninput="updWSPS()"><span class="g-val" id="ws-zv">0.30</span></div>
<div class="g-ctrl"><label>μ (markup):</label><input type="range" min="5" max="60" value="20" id="ws-m" oninput="updWSPS()"><span class="g-val" id="ws-mv">0.20</span></div>
<div class="g-ctrl"><label>Oil effect:</label><input type="range" min="0" max="40" value="0" id="ws-oil" oninput="updWSPS()"><span class="g-val" id="ws-oilv">0</span></div>
</div><div class="g-insight" id="wsps-insight"></div></div>`;

window.applyScenario_wsps=function(id,btn){

const presets={union:[60,20,0],deunion:[10,20,0],oil:[30,20,30],compete:[30,8,0],minwage:[55,20,0],tp:[30,12,0],reset:[30,20,0]};

document.getElementById('ws-z').value=v[0];document.getElementById('ws-m').value=v[1];document.getElementById('ws-oil').value=v[2];
window._wspsScenario=id;updWSPS();
};
function updWSPS(){
const W=520,H=320,M={l:50,r:20,t:20,b:40};
const z=+document.getElementById('ws-z').value/100;
const mu=+document.getElementById('ws-m').value/100+document.getElementById('ws-oil').value/200;
document.getElementById('ws-zv').textContent=(+document.getElementById('ws-z').value/100).toFixed(2);
document.getElementById('ws-mv').textContent=(+document.getElementById('ws-m').value/100).toFixed(2);
document.getElementById('ws-oilv').textContent=(+document.getElementById('ws-oil').value/100).toFixed(2);
const pw=document.getElementById('wsps-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'wsps-s');
makeAxes(svg,W,H,M,'Unemployment rate (u)','Real wage (W/P)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const toX=u=>M.l+(u/12)*pW,toY=w=>M.t+(1-w)*pH;
const ps=1/(1+mu);
gLine(svg,M.l,toY(ps),W-M.r,toY(ps),'#DC2626',2.2);gText(svg,W-M.r+2,toY(ps),'PS',11,'#DC2626','start',700);
if(+document.getElementById('ws-oil').value>0){const ps0=1/(1+(+document.getElementById('ws-m').value/100));gLine(svg,M.l,toY(ps0),W-M.r,toY(ps0),'#EDCDCD',1.5,'4 3');gText(svg,W-M.r+2,toY(ps0),'PS₀',9,'#caa','start')}
let d='';for(let u=0.5;u<=11;u+=.3){const w=0.4+z+0.55*Math.exp(-0.3*u);d+=(u<=0.6?'M':'L')+toX(u)+','+toY(Math.max(0.05,Math.min(0.95,w)))}
gPath(svg,d,'#2563EB',2.2);gText(svg,toX(1),toY(0.4+z+0.55*Math.exp(-0.3*1))-14,'WS',11,'#2563EB','start',700);
let bestU=5,bestDiff=999;
for(let u=0.5;u<=11;u+=.05){const w=0.4+z+0.55*Math.exp(-0.3*u);if(Math.abs(w-ps)<bestDiff){bestDiff=Math.abs(w-ps);bestU=u}}
gCircle(svg,toX(bestU),toY(ps),6,'#1B2A4A');
gLine(svg,toX(bestU),toY(ps),toX(bestU),H-M.b,'#1B2A4A',1.5,'3 3');
gText(svg,toX(bestU),H-M.b+14,'uₙ='+bestU.toFixed(1)+'%',10,'#1B2A4A');
for(let u=2;u<=10;u+=2){gLine(svg,toX(u),H-M.b,toX(u),H-M.b+4,'#333',1);gText(svg,toX(u),H-M.b+16,u+'%',9,'#888')}
const sc=window._wspsScenario;
const exps={
union:'<b>Stronger unions (z↑):</b><br>Step 1: Unions increase bargaining power → at every u, workers demand higher W/P<br>Step 2: WS curve shifts UP<br>Step 3: New intersection with (unchanged) PS occurs at HIGHER u<br>Step 4: uₙ↑ — the economy needs more unemployment to keep wage demands compatible with firms\' pricing<br><b>Result: uₙ↑, W/P unchanged</b> (still = 1/(1+μ) in equilibrium). Structural unemployment rises.',
deunion:'<b>Weaker unions (z↓):</b><br>Step 1: Less bargaining power → workers accept lower W/P at every u<br>Step 2: WS shifts DOWN<br>Step 3: Intersection moves LEFT → uₙ↓<br><b>Result: uₙ↓.</b> This is why Anglo-Saxon economies (US, UK) with weaker unions tend to have lower structural unemployment than continental Europe.',
oil:'<b>Oil price↑ (μ↑):</b><br>Step 1: Oil = production input → higher costs → firms raise markup μ<br>Step 2: PS line = 1/(1+μ) shifts DOWN (lower real wage firms are willing to pay)<br>Step 3: WS unchanged → intersection moves RIGHT → uₙ↑<br>Step 4: Workers get lower real wage AND higher unemployment<br><b>Result: uₙ↑, W/P↓.</b> Oil shocks hit workers twice — lower pay AND fewer jobs. This is the labor market mechanism behind stagflation.',
compete:'<b>More competition (μ↓):</b><br>Step 1: Anti-trust, deregulation → less market power → lower markup μ<br>Step 2: PS = 1/(1+μ) shifts UP (firms pass more value to workers)<br>Step 3: Intersection moves LEFT → uₙ↓<br><b>Result: uₙ↓, W/P↑.</b> Workers benefit from competition — higher real wages AND lower unemployment.',
minwage:'<b>Minimum wage↑:</b><br>Step 1: Legal minimum pushes W/P above equilibrium at low u<br>Step 2: Effectively shifts WS UP (workers won\'t accept below minimum)<br>Step 3: uₙ↑ if minimum wage is binding<br>Step 4: <i>BUT:</i> Card & Krueger showed that if labor market is monopsonistic, moderate min wage can INCREASE employment<br><b>Result: ambiguous</b> — depends on market structure. Standard model says uₙ↑, but reality is more nuanced.',
tp:'<b>Productivity↑ (A↑):</b><br>Step 1: Higher A → firms can produce more per worker<br>Step 2: If expectations are correct (Aᵉ=A): BOTH WS and PS shift up proportionally<br>Step 3: uₙ unchanged! Real wages rise at rate of productivity growth<br>Step 4: If expectations are incorrect (Aᵉ>A): WS shifts up MORE → uₙ↑ temporarily<br><b>Result: uₙ unchanged if Aᵉ=A; uₙ↑ temporarily if Aᵉ≠A.</b>'
};
document.getElementById('wsps-insight').innerHTML=exps[sc]||`Natural rate uₙ ≈ ${bestU.toFixed(1)}%. Real wage = ${ps.toFixed(3)}. Click a scenario to explore what shifts WS or PS.`;
}

function drawKCross(){
const c=document.getElementById('gc-kcross');
const scenarios=[
{id:'gup_low',label:'G↑, low MPC (0.4)'},
{id:'gup_high',label:'G↑, high MPC (0.8)'},
{id:'taxcut',label:'Tax cut (T↓)'},
{id:'export',label:'Export boom (EX↑)'},
{id:'import_leak',label:'Import leakage (open)'},
{id:'reset',label:'⟲ Reset'}
];
c.innerHTML=`<div class="g-card"><h4>Keynesian Cross & Multiplier</h4><p class="g-desc">45° line = Y=Z. ZZ line slope = MPC. Where they cross = equilibrium output. Multiplier = 1/(1−MPC).</p>
<div class="g-canvas-wrap"><div id="kcross-svg"></div></div>
${scBar(scenarios,'kcross')}
<div class="g-controls">
<div class="g-ctrl"><label>MPC (c₁):</label><input type="range" min="30" max="90" value="60" id="kc-mpc" oninput="updKCross()"><span class="g-val" id="kc-mpcv">0.60</span></div>
<div class="g-ctrl"><label>ΔG:</label><input type="range" min="0" max="50" value="0" id="kc-dg" oninput="updKCross()"><span class="g-val" id="kc-dgv">0</span></div>
</div><div class="g-insight" id="kc-insight"></div></div>`;

}
window.applyScenario_kcross=function(id,btn){
