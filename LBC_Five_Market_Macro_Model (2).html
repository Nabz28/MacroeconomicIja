IMO:{name:"IMO — Oil Imports",desc:"Oil and energy import bill — treated as exogenous because volume is price-inelastic in the short run and price is set on global markets (OPEC, geopolitics). For oil-importing countries like Indonesia, oil price spikes are the classic supply shock causing STAGFLATION: P↑ AND Y↓ simultaneously.",
eqs:["IMO = P_oil × Q_oil","SRAS left shift: P_oil↑ → production costs↑","Subsidi energi (Indonesia): government absorbs part of P_oil increase"],
det:["Global oil price (OPEC, geopolitics — fully exogenous)","Domestic energy intensity / efficiency","Energy subsidies (buffer but fiscal cost)"],
eff:["IM total → import bill spike","CUR → current account deterioration","E → depreciation pressure","P → cost-push inflation (energy is in everything)","Y → negative supply shock (higher production costs)","Government budget → if subsidies absorb the shock (Indonesia's subsidi BBM)"],
chains:["P_oil↑ → IMO↑ → CUR↓ → E↓ → imported inflation → P↑ [external channel: trade balance → FX → prices]","P_oil↑ → production costs↑ → SRAS shifts left → Y↓ AND P↑ simultaneously (STAGFLATION) [supply channel: direct cost impact]","P_oil↑ → IM↑ → NX↓ → AD↓ → reinforces Y decline [demand channel: trade balance worsening reduces AD]","Indonesia: P_oil↑ → subsidi BBM cost↑ → APBN deficit↑ → fiscal space shrinks → G constrained [fiscal channel specific to Indonesia]"],
intuition:"An oil price spike is the macroeconomic equivalent of being punched from three directions at once: (1) your import bill surges → CUR worsens → currency weakens → imported inflation. (2) Energy costs in production rise → SRAS shifts left → output falls AND prices rise. (3) The central bank faces an impossible choice: raise i to fight inflation (deepens recession) or cut i to support growth (worsens inflation). There is no good answer — only bad and less bad. For Indonesia specifically, the ICP (Indonesian Crude Price) vs APBN assumption gap is critical: when actual oil prices exceed the budget assumption, subsidi energi costs explode, widening the fiscal deficit.",
tip:"Stagflation = SRAS shifts left → P↑ and Y↓. This is the HARDEST policy scenario because tools that fix one problem worsen the other. Historical cases: 1973 OPEC embargo, 1979 Iranian revolution, 2022 Russia-Ukraine energy crisis. For Indonesia: track ICP vs APBN assumption. If APBN assumes ICP = $70/bbl but actual = $90/bbl, the subsidi gap creates ~Rp50T additional fiscal pressure. SKK Migas lifting data determines domestic oil production (partially offsets imports).",graph:null},

CUR:{name:"CUR — Current Account",desc:"Current account ≈ EX − IM + net income + transfers. The broadest measure of whether a country is earning more from the world than it spends. CUR deficit = spending more abroad than earning = must be financed by capital inflows (INFLOW). The critical identity: CUR = S − I (national savings minus investment). A deficit means domestic investment exceeds domestic savings — the gap is funded by foreign savings.",
eqs:["CUR ≈ NX = EX − IM (simplified)","CUR = S − I (savings-investment identity)","BOP: CUR + Financial Account (INFLOW) = 0","Twin deficits: CUR = (S_private − I) + (T − G)","Persistent CUR deficit → net foreign debtor"],
det:["EX, IM (trade flows)","E (competitiveness)","Y vs Y_world (relative income)","S − I gap (structural)","G − T (fiscal deficit feeds into CUR via twin deficits)"],
eff:["E — deficit → depreciation pressure (self-correcting)","INFLOW — deficit must be financed by foreign capital","GCUR — one country's deficit = another's surplus","BOND — foreign holdings of domestic debt increase","National wealth — persistent deficit = accumulating foreign liabilities"],
chains:["CUR deficit → E depreciates → EX↑, IM↓ → CUR improves [automatic correction — but takes 12-18 months via J-curve]","CUR deficit → needs INFLOW → must keep i attractive → constrains monetary policy [external constraint on domestic policy]","G↑ → budget deficit↑ → national saving↓ → S−I gap widens → CUR↓ [twin deficits: fiscal profligacy → external imbalance]","Sudden stop: INFLOW reverses → E crashes → IM costs spike → forced import compression → deep recession [EM crisis mechanism — Indonesia 1997-98, Argentina 2001]"],
intuition:"Think of CUR as a household budget: if you spend more than you earn, you must borrow the difference. A country running a CUR deficit is doing exactly that — borrowing from foreigners to finance excess spending. This is fine as long as foreigners are willing to lend (INFLOW continues). But if confidence evaporates — political crisis, global risk-off, contagion — capital can flee overnight (sudden stop), forcing a brutal adjustment: currency crashes, imports collapse, deep recession. Indonesia experienced exactly this in 1997-98. The S − I identity reveals the structural cause: either investment is too high relative to savings (possibly good — building productive capacity) or savings are too low (possibly bad — consumption-driven deficit).",
tip:"Key identities to memorize: (1) CUR = S − I. (2) CUR + Financial Account = 0 (BOP). (3) Twin deficits: fiscal deficit → CUR deficit. Use these on any exam question about trade balances. The S − I identity is especially powerful: it shows that trade deficits are fundamentally about savings-investment imbalances, NOT about trade policy. A country can't fix its CUR deficit with tariffs if the underlying S−I gap persists — the deficit just shifts to other trading partners.",
graph:"CUR"},

INFLOW:{name:"INFLOW — Capital Inflows",desc:"Net capital/financial account flows. Driven by interest differentials (i − i_world), growth expectations, and risk appetite. The impossible trinity links INFLOW to exchange rate regime and monetary policy independence. Sudden capital flow reversals are the primary mechanism of EM financial crises.",
eqs:["INFLOW = f(i − i_world, growth, risk premium)","BOP: CUR + INFLOW = 0","Interest parity links INFLOW to E dynamics"],
det:["i − i_world (primary short-run driver)","GDP growth prospects (attracts FDI)","Risk premium / institutional quality","Global risk appetite (risk-on/risk-off cycles)","Capital controls"],
eff:["E — appreciation (capital inflow = FX supply increase)","BOND demand ↑ → YIELD↓","STOCK demand ↑ (portfolio flows)","Forex reserves (if central bank intervenes)"],
chains:["i↑ → INFLOW↑ → E appreciates → EX↓ → Y↓ [exchange rate channel: domestic tightening spills over via trade]","INFLOW↑ → BOND demand↑ → YIELD↓ → r↓ → I↑ [foreign capital eases domestic financial conditions]","Sudden reversal → INFLOW↓↓ → E crashes → imported inflation → banking crisis → deep recession [the EM crisis template]","Fed tightens → global risk-off → EM INFLOW↓ → EM currencies depreciate → forced EM tightening [global financial cycle contagion]"],
intuition:"Capital flows are the financial counterpart of trade flows. In the short run, money moves MUCH faster than goods — billions can flow in or out in a single day based on interest differentials or risk sentiment. This makes exchange rates volatile and can overwhelm trade fundamentals. For Indonesia, the experience of 1997-98 was traumatic: capital that had flowed in during the boom years suddenly reversed, the rupiah collapsed from ~2,400 to ~17,000 per USD, and the economy contracted 13%. The lesson: dependence on short-term capital flows (hot money) creates fragility. That's why BI maintains forex reserves and Indonesia has developed macroprudential policies to manage capital flow volatility.",
tip:"The impossible trinity is the ORGANIZING FRAMEWORK for open economy macro. Mundell-Fleming: with free capital mobility + flexible E → monetary policy works (via E channel), fiscal policy offset (via E appreciation). With free capital + fixed E → fiscal works, monetary impotent. Indonesia chose: free capital (mostly) + flexible E → retains monetary policy independence → BI can set i based on domestic conditions. Key for exams: sudden stops cause the worst EM crises. A current account deficit financed by volatile portfolio flows (hot money) is much more dangerous than one financed by stable FDI.",
graph:"INFLOWS"},

STOCK:{name:"STOCK — Stock Prices",desc:"Equity market valuations — forward-looking: P = Σ E(dividends)/(1+r)^t. Two competing forces: expected earnings (from Y growth — bullish) and the discount rate (from r — bearish). Connects to real economy via wealth effect (STOCK → WEALTH → C) and Tobin's q (STOCK → q → I).",
eqs:["P_stock = Σ E(dividends)/(1+r)^t","P/E = 1/(r − g) [Gordon growth model]","Tobin's q = market cap / replacement cost","WEALTH includes STOCK value","MPC out of stock wealth ≈ 0.03-0.05"],
det:["r (inverse — discount rate: r↑ → STOCK↓)","Y (positive — earnings growth)","M (liquidity: QE → STOCK↑)","Risk appetite / sentiment","i vs bond yields (relative return)"],
eff:["WEALTH → C (wealth effect)","I via Tobin's q (q>1 → build new capital)","Confidence / animal spirits","Financial stability (crashes → systemic risk)"],
chains:["i↑ → r↑ → STOCK↓ → WEALTH↓ → C↓ → Y↓ [monetary → asset → consumption: why rate hikes often trigger sell-offs]","Y↑ → earnings↑ → STOCK↑ → WEALTH↑ → C↑ → Y↑ more [virtuous cycle: growth feeds asset prices feeds consumption feeds more growth]","STOCK↑ → q > 1 → I↑ → Y↑ → earnings↑ → STOCK↑ [Tobin's q investment accelerator — powerful in booms]","STOCK crash → WEALTH↓↓ → C↓↓ → Y↓↓ → earnings↓ → STOCK↓ more [doom loop: 2008-style financial crisis transmission]"],
intuition:"Stock prices reflect a tug-of-war between EARNINGS (what companies make, driven by Y growth — optimistic force) and DISCOUNT RATE (what investors demand as return, driven by r — pessimistic force). This is why stocks can fall even when the economy is strong: if the central bank raises rates aggressively, the discount rate effect overwhelms the earnings effect. During QE (M↑↑), both forces were aligned: low rates (low discount) plus recovery (rising earnings) → STOCK↑↑. The wealth effect then transmits to Main Street: Americans' stock wealth is ~$40 trillion, so even a 3-5 cent per dollar MPC means a 10% market move shifts consumption by $120-200 billion — enough to measurably affect GDP.",
tip:"Know the two stock price drivers: (1) earnings/growth (Y link — numerator of DCF) and (2) discount rate (r link — denominator of DCF). When both move in the SAME direction (Y↑ and r↑ during tightening), the net effect on STOCK depends on which dominates — that's why market reactions to rate hikes are ambiguous. Tobin's q is the investment link: if market values the existing capital stock above replacement cost, it's cheaper to build new capital than buy existing → I↑. Wealth effect: ~3-5 cents per dollar of wealth gain goes to consumption. On exams, trace the full channel: i↑ → r↑ → STOCK↓ → WEALTH↓ → C↓ → Y↓.",
graph:"STOCK"},

BOND:{name:"BOND — Bond Prices",desc:"Government and corporate bond prices — INVERSE of yields. When BOND prices rise, YIELD falls, and vice versa — this is a mathematical identity, not a behavioral relationship. Bonds are the vehicle for government deficit financing, QE/QT, and the risk-free rate benchmark that anchors ALL other rates in the economy.",
eqs:["P_bond = Σ C/(1+y)^t + F/(1+y)^n","P_bond ↔ YIELD (inverse identity)","Duration: % price change per 1% yield change","BOND supply = government deficit financing","QE: central bank buys BOND → price↑ → YIELD↓"],
det:["YIELD (inverse — the core identity)","i — policy rate anchors short-term bond prices","πᵉ — inflation expectations (higher → BOND↓ → YIELD↑)","G − T — fiscal deficit drives BOND supply (more issuance → prices↓)","INFLOW — foreign demand (→ prices↑ → yields↓)","QE/QT — central bank buying/selling"],
eff:["YIELD (inverse by definition)","WEALTH — bond portfolio value","r — benchmark for all borrowing costs","I — corporate bonds priced off government bonds","E — foreign bond demand affects capital flows"],
chains:["i↑ → BOND↓ → YIELD↑ → r↑ → I↓ → Y↓ [monetary transmission through the bond market]","G↑ → deficit → BOND supply↑ → BOND↓ → YIELD↑ → I↓ [CROWDING OUT — government borrowing raises rates for everyone]","INFLOW↑ → BOND demand↑ → BOND↑ → YIELD↓ → r↓ → I↑ [foreign capital eases domestic conditions]","QE: central bank buys BOND → BOND↑ → YIELD↓ → r↓ → I↑ + WEALTH↑ → stimulus [unconventional monetary policy]","QT: central bank sells BOND → BOND↓ → YIELD↑ → r↑ → tightening [unwinding stimulus]"],
intuition:"Bond prices and yields are like a seesaw: when one goes up, the other goes down by mathematical necessity. If a bond pays $50/year coupon and you buy it for $1,000, your yield is 5%. If the price drops to $833, the same $50 coupon gives you 6% yield. Central banks exploit this: buying bonds (QE) pushes prices up and yields down, reducing borrowing costs economy-wide. Government deficit spending works in reverse: issuing more bonds floods the market with supply → prices fall → yields rise → borrowing becomes more expensive for EVERYONE including private firms → crowding out.",
tip:"When exam says 'bond yields rise': bond prices FALL, borrowing costs INCREASE, investment FALLS, government debt becomes more expensive to service. Crowding out mechanism: G↑ → deficit → more bond issuance (supply↑) → BOND prices↓ → YIELD↑ → private I↓. QE does the opposite: central bank buys bonds (demand↑) → BOND↑ → YIELD↓ → stimulus. Duration tells you sensitivity: a 10-year bond with duration 8 loses ~8% of its value for each 1% yield increase.",graph:"BOND"},

WEALTH:{name:"WEALTH — Household Net Worth",desc:"Total household wealth = financial assets (STOCK + BOND) + real estate − liabilities. The critical channel transmitting asset market movements to consumption and the real economy. The MPC out of wealth is small (~3-5 cents per dollar) but total wealth is ENORMOUS, making the aggregate effect significant. The 2008 crisis demonstrated the catastrophic potential: simultaneous stock AND housing wealth destruction → massive deleveraging → consumption collapse → deep recession.",
eqs:["WEALTH = STOCK + BOND + Housing − Debt","C = C₀ + c₁(Y−T) + c₂·WEALTH","c₂ ≈ 0.03-0.05 (MPC out of wealth)"],
det:["STOCK prices","BOND prices / yields","Housing prices (often the largest component for typical households)","Household debt (leverage amplifies both gains and losses)"],
eff:["C — wealth effect: feel richer → spend more (even without selling assets)","Confidence — wealth gains improve sentiment broadly","Collateral — higher home values → can borrow more against equity → C↑ further","Financial stability — WEALTH crash → forced deleveraging → systemic risk"],
chains:["STOCK↑ → WEALTH↑ → C↑ → Y↑ [equity wealth channel — primary for upper-income households]","Housing↑ → WEALTH↑ → C↑ + collateral↑ → borrowing↑ → C↑ even more [housing wealth is MORE potent because more households own homes than stocks]","WEALTH crash → deleveraging → C↓↓ → Y↓↓ → more asset price falls → vicious spiral [2008 doom loop — Minsky moment]","QE → STOCK↑ + BOND↑ → WEALTH↑ → C↑ [how unconventional monetary policy reaches the real economy]"],
intuition:"WEALTH is the bridge between Wall Street and Main Street. When your stock portfolio or home value rises, you don't have to SELL to feel the effect — you simply feel wealthier and more confident, loosening your wallet: dining out more, buying a nicer car, renovating the kitchen. This behavioral response, multiplied across millions of households, moves the macroeconomy. The danger is the reverse: when asset prices crash (as in 2008), households face a triple hit: (1) negative wealth effect reduces consumption, (2) underwater mortgages prevent refinancing, (3) margin calls and debt covenants force asset sales at depressed prices (deleveraging), which pushes prices down further. This vicious cycle is what turned a housing correction into the worst recession since the 1930s.",
tip:"Quantitative benchmark: a 20% stock market decline reduces consumption by approximately 1-1.5% of GDP. A 20% housing price decline is WORSE because (1) more households own homes than stocks, (2) housing is typically leveraged (mortgage), amplifying the wealth loss, and (3) housing serves as collateral for other borrowing. On exams: always specify the wealth channel explicitly: STOCK↑ → WEALTH↑ → C↑ → Y↑. For 2008 questions: simultaneous housing + stock crash → unprecedented wealth destruction → deleveraging → credit crunch → deep recession → needed both fiscal (G↑↑) and unconventional monetary (QE) response.",graph:null},

YIELD:{name:"YIELD & gYIELD — Bond Yields",desc:"Government bond yield = inverse of BOND price. The risk-free benchmark that anchors ALL borrowing costs: mortgage rates, corporate bond rates, bank lending rates. The YIELD CURVE (short vs long-term yields) is one of the most powerful predictive indicators in economics — an inverted curve has preceded every US recession since 1970.",
eqs:["YIELD ↔ BOND price (inverse identity)","YIELD = i + term premium + πᵉ + credit risk","Real yield = YIELD − πᵉ","Yield curve: plot of yields across maturities (3m to 30y)","Normal: upward sloping (long > short). Inverted: downward (short > long)"],
det:["i — policy rate anchors the short end","πᵉ — inflation expectations drive the long end","BOND supply (government deficits) — more supply → higher YIELD","BOND demand (QE, INFLOW, risk appetite) — more demand → lower YIELD","Term premium — compensation for holding longer-duration bonds"],
eff:["r — THE benchmark borrowing cost for the entire economy","I — corporate investment cost: corporate yield = YIELD + credit spread","STOCK — competing return: YIELD↑ → investors rotate from stocks to bonds → STOCK↓","E — higher YIELD attracts foreign capital → INFLOW↑ → E appreciates","Government debt service — higher YIELD → more expensive to service existing debt → constrains fiscal space"],
chains:["i↑ → short YIELD↑ → curve flattens/inverts → recession signal [rate hikes first hit the short end, signaling future economic weakness]","G↑ → deficit → BOND supply↑ → YIELD↑ → r↑ → I↓ [crowding out: the fiscal deficit channel]","INFLOW↑ → BOND demand↑ → YIELD↓ → easier financial conditions [capital inflows suppress domestic yields]","πᵉ↑ → long YIELD↑ → real borrowing costs↑ → tighter conditions [inflation expectations channel]","Yield curve inverts (short > long) → recession within 12-18 months (historically reliable signal) [markets pricing in future rate cuts due to expected economic weakness]"],
intuition:"The yield curve is like the bond market's weather forecast for the economy. NORMAL (upward sloping): markets expect growth and gradual rate normalization — lending long-term is riskier, so long rates are higher. FLAT: markets are uncertain — short rates have been raised but the economy is showing strain. INVERTED (short > long): markets are saying 'the central bank will HAVE to cut rates in the future because a recession is coming.' The track record is remarkable: yield curve inversions have preceded every US recession since 1970, with roughly a 12-18 month lead time. It's not magic — it's rational expectations: if markets expect a recession, they expect future rate cuts, which drives long-term rates below short-term rates.",
tip:"Yield curve inversion = recession warning. When exam provides yield curve data, check if short rates exceed long rates. Crowding out quantitative trace: G↑ $100B → needs $100B more bond issuance → BOND supply↑ → YIELD↑ by ~0.1-0.3pp (depends on market depth) → private borrowing costs rise → some I projects become unprofitable → I↓. The more elastic investment is to r, the more crowding out. In a liquidity trap (i≈0, flat yield curve), crowding out is minimal because yields are already at the floor — this is when fiscal policy is most effective.",
graph:"YIELD"},

IGC:{name:"IGC — Investment Grade Credit",desc:"Corporate credit spreads — the extra cost firms pay above the risk-free rate (YIELD). Widens in recessions (default risk rises), tightens in booms. The FINANCIAL ACCELERATOR mechanism: recession → wider spreads → higher corporate borrowing costs → less investment → deeper recession → even wider spreads.",
eqs:["Corporate yield = YIELD + credit spread","Spread = f(default risk, liquidity, risk appetite)","Financial accelerator: Y↓ → spreads↑ → I↓ → Y↓ more"],
det:["YIELD (risk-free benchmark)","Y (recessions raise default probability → wider spreads)","Corporate health (leverage, profitability)","Risk appetite (risk-on: tight spreads. Risk-off: wide)","M / liquidity conditions"],
eff:["I — the ACTUAL corporate borrowing cost includes the spread","Financial stability — spread spikes signal systemic stress","STOCK — higher funding costs reduce profitability"],
chains:["Y↓ → default risk↑ → spreads widen → effective r↑ → I↓ → Y↓ more [financial accelerator — the amplification mechanism]","Risk-off → spreads spike → I↓ globally → synchronized downturn [global financial contagion channel]","Central bank QE → buys corporate bonds → spreads compress → I↑ [unconventional policy directly targeting credit conditions]"],
intuition:"The financial accelerator explains why financial crises cause such DEEP recessions compared to 'normal' downturns. In a normal recession, GDP falls maybe 2-3% and recovers in a year. In a financial crisis (2008, 1997-98), GDP falls 5-13% and recovery takes 5-10 years. Why? Because the credit market AMPLIFIES the shock: recession → banks worried about defaults → charge higher spreads → companies can't afford to invest or refinance → more companies fail → banks' fears confirmed → spreads widen more → vicious cycle. The financial sector doesn't just transmit shocks — it makes them worse.",
tip:"The financial accelerator is the key concept for explaining why financial crises are so severe. On exams: (1) Normal recession: AD↓ → Y↓ → recovery via self-correction. (2) Financial crisis: AD↓ → Y↓ → spreads widen → I↓ further → Y↓ further → spreads widen more → doom loop. Breaking the cycle requires the central bank acting as lender of last resort (prevent bank failures) plus QE (directly compress spreads) plus fiscal stimulus (bypass the broken financial system).",
graph:null},

GCUR:{name:"GCUR — Global Current Account",desc:"By accounting identity, all countries' current accounts sum to zero globally. One country's surplus = another country's deficit. Global imbalances drive capital flows, exchange rates, and financial stability risks.",
eqs:["Σ CUR_i = 0 (global identity)"],det:["Global savings-investment imbalances","Commodity super-cycles","Exchange rate misalignments","Demographics (aging savers vs young borrowers)"],eff:["E — global FX adjustment pressures","BOND — cross-border capital flows","INFLOW — surplus countries finance deficit countries"],
chains:["China surplus → capital flows to US → low US interest rates → housing bubble → 2008 crisis [Bernanke's 'global savings glut' hypothesis]","GCUR imbalances → political tensions → trade wars → EXO shocks [imbalances create political friction]"],
intuition:"In a closed global system, every dollar of surplus somewhere is a dollar of deficit elsewhere. When China ran massive surpluses, that capital had to GO somewhere — it flowed to the US, financing the US current account deficit, suppressing US interest rates, and fueling the housing bubble that eventually triggered the 2008 crisis. Global imbalances are not abstract accounting — they have real, sometimes catastrophic, consequences.",
tip:"Global identity: Σ CUR = 0. The 'global savings glut' (Bernanke hypothesis) explains the pre-2008 puzzle of low interest rates despite strong growth: excess saving from China, Germany, and oil exporters flooded into US financial markets.",graph:null},

K:{name:"K — Capital Stock",desc:"Accumulated physical capital — machines, factories, infrastructure. Grows via investment, shrinks via depreciation. The Solow model shows K accumulation has DIMINISHING RETURNS (α < 1): doubling K less than doubles Y. Only TFP growth (A) can sustain long-run per-capita growth.",
eqs:["K_{t+1} = K_t + I_t − δK_t","Y = A·Kᵅ·N¹⁻ᵅ (α typically 0.3-0.4)","MPK = α·A·(N/K)¹⁻ᵅ (diminishing in K)","Solow steady state: s·f(k) = (n+δ)·k"],
det:["I — gross investment adds to K","δ — depreciation rate (typically 5-10% per year)","Historical accumulation"],
eff:["Yₛ — more K → higher potential output","MPL — K-L complementarity raises labor productivity","N demand — more productive workers are in higher demand","r — MPK determines return on capital (diminishes as K grows)"],
chains:["I↑ → K↑ → Yₛ↑ → LRAS shifts right [investment today = capacity tomorrow]","K↑ → diminishing MPK → r↓ eventually → K growth slows [Solow convergence — why poor countries can grow fast by accumulating K, but growth eventually slows]","K↑ → MPL↑ → Nᵈ↑ → N↑ → Y↑ [capital makes workers more productive, increasing labor demand]"],
intuition:"The Solow model's KEY insight: capital accumulation ALONE cannot sustain growth because of diminishing returns. The first factory in a village transforms productivity. The 1000th factory in an industrial district adds barely anything. In steady state, investment just replaces depreciated capital — no net growth. Only A (technology/TFP) can keep pushing the production function up without limit. This is why institutions, education, and innovation matter more than just building things.",
tip:"K shifts LRAS right. In Solow: increasing savings rate s raises steady-state K and Y/N level but NOT the long-run GROWTH RATE — only A growth does that. This is the levels vs. growth distinction: higher s → richer in level, but same growth rate once steady state is reached. Practice the Solow diagram: y = f(k) production function (concave) vs. (n+δ)k depreciation line (linear). Intersection = steady state k*.",
graph:"SOLOW"},

A:{name:"A — Technology / TFP",desc:"Total Factor Productivity — measures how efficiently K and N combine into output. The Solow residual: everything in growth that K and N accumulation can't explain. The ONLY variable that can sustain long-run per-capita growth, because unlike K, there are no diminishing returns to ideas. This is why institutions, education, rule of law, and innovation ecosystems matter more than any other policy for long-run prosperity.",
eqs:["Y = A · Kᵅ · N¹⁻ᵅ","Solow residual: gA = gY − α·gK − (1−α)·gN","MPL = (1−α)·A·(K/N)ᵅ [A raises worker productivity]","MPK = α·A·(N/K)¹⁻ᵅ [A raises capital productivity]","Historically: gA accounts for ~50% of GDP growth in developed countries"],
det:["R&D investment and innovation rates","Institutional quality (rule of law, property rights, contract enforcement, corruption)","Education quality and human capital","Openness to trade and FDI (technology transfer)","Entrepreneurship culture","Geographic and historical factors"],
eff:["Yₛ — directly raises potential output at EVERY level of K and N","MPL — workers produce more per hour → sustainable real wage growth without inflation","MPK — capital is more productive → investment returns rise → I↑","W — productivity growth (gA) allows wage growth without cost-push inflation"],
chains:["A↑ → Yₛ↑ → LRAS shifts right → economy can grow without inflation [the only free lunch in macro]","A↑ → MPL↑ → Nᵈ↑ → N↑ → Y↑ [productivity-driven employment growth]","A↑ → gA allows gW without P↑ [wages can rise without inflation when workers are more productive]","A↑ → MPK↑ → investment more attractive → I↑ → K↑ → Yₛ↑ further [virtuous cycle: better technology attracts investment which builds capacity which enables more innovation]"],
intuition:"A is the magic variable — the only one without tradeoffs. Higher A means BOTH more output AND lower unit costs → LRAS AND SRAS shift right → you get growth without inflation. This is the growth economist's holy grail. But A can't be directly controlled by policy — it emerges from institutions, education, culture, and serendipity. The countries that got rich (US, Europe, Japan, Korea, Singapore) did so primarily through A growth, not just K accumulation. The countries that stagnated despite massive investment (Soviet Union) did so because institutional failure suppressed A. For Indonesia, the hilirisasi (downstream processing) agenda and digital economy development are fundamentally about raising A in specific sectors.",
tip:"A shifts BOTH LRAS right AND SRAS right — it's the only variable that unambiguously improves the supply side. In growth accounting: gA = gY − α·gK − (1−α)·gN (the Solow residual). Historically, TFP growth accounts for about 40-60% of GDP growth in developed countries — the rest is factor accumulation. For development economics questions: explain why institutions and A matter more than investment (K) for sustained growth — reference Solow convergence and diminishing returns to K.",
graph:"TFP"},

TP:{name:"T/P — Taxes & Transfers",desc:"Tax policy (T) and transfer payments — the fiscal instruments that affect household disposable income and the budget balance. Key distinction: spending multiplier > tax multiplier because some of a tax cut is SAVED (MPC < 1). Automatic stabilizers (taxes fall and transfers rise automatically in recessions) provide countercyclical support without legislation.",
eqs:["Disposable income = Y − T + Transfers","Tax multiplier = −c₁/(1−c₁(1−t)+m) [SMALLER than spending mult]","Spending multiplier = 1/(1−c₁(1−t)+m)","Balanced-budget multiplier = 1 (Haavelmo theorem)","Auto stabilizers: T↓ when Y↓, transfers↑ when U↑"],
det:["Tax rates and brackets (political decisions)","Transfer programs (unemployment insurance, social safety net)","Automatic stabilizers (built into the tax/transfer system)"],
eff:["C via disposable income (primary channel)","Y via fiscal multiplier","Budget balance → BOND supply","Income distribution → affects aggregate MPC"],
chains:["T↓ → (Y−T)↑ → C↑ → Y↑ [tax cut stimulus — but multiplier < G multiplier because MPC < 1]","Transfers↑ → direct income support → C↑ (high MPC for transfer recipients) → Y↑","Auto stabilizers: Y↓ → T↓ automatically + transfers↑ → cushions demand → stabilizes Y [the economy's built-in shock absorbers]","T↓ → deficit↑ → BOND supply↑ → YIELD↑ → partial crowding out [financing cost of tax cuts]"],
intuition:"Why is the tax multiplier smaller than the spending multiplier? When government spends $1, ALL of it enters the spending stream (the road gets built). When government cuts taxes by $1, households SAVE some of it (MPC < 1) — only c₁ of the tax cut becomes spending. If c₁ = 0.75, a $1 tax cut generates only $0.75 of new spending. That's why |tax mult| < |spending mult|. Automatic stabilizers are the economy's immune system: during a recession, tax collections fall (people earn less → pay less tax) and transfer payments rise (more people qualify for unemployment benefits), automatically supporting demand without anyone in parliament having to vote. This 'passive' fiscal policy prevents recessions from becoming depressions.",
tip:"Three multipliers to memorize and compare: (1) Spending: k_G = 1/(1−c₁(1−t)+m). (2) Tax: k_T = −c₁/(1−c₁(1−t)+m). (3) Balanced-budget: k_BB = 1 (Haavelmo — if ΔG = ΔT, then ΔY = ΔG, always). Note: |k_T| < |k_G| because c₁ < 1. On exams, if asked 'which is more effective — spending increase or tax cut?' the answer is spending increase (bigger multiplier). But tax cuts may be preferred politically or if spending takes time to implement.",
graph:null},

COVID:{name:"COVID — Pandemic Shock",desc:"The 'everything shock' — simultaneously hitting demand (lockdowns → C↓↓), supply (disruptions → SRAS left), labor (LF↓, Great Resignation), trade (supply chain collapse), and asset markets (initial crash, then QE-fueled recovery). Unique because it hit BOTH AD and AS — P direction was genuinely ambiguous. The unprecedented policy response (fiscal + monetary, globally coordinated) prevented a depression but laid groundwork for 2022-23 inflation.",
eqs:["AD↓: lockdowns → C₀ collapses → AD shifts left","AS↓: supply disruptions → SRAS shifts left","Y↓ unambiguously (both shifts reduce output)","P direction AMBIGUOUS (demand↓ pulls P down, supply↓ pushes P up)","Policy: G↑↑↑ + M↑↑↑ → unprecedented stimulus"],
det:["Exogenous health crisis (virus emergence and spread)","Lockdown policy severity and duration","Vaccination timeline","Global coordination of policy response"],
eff:["C — dramatic consumption collapse (lockdowns physically prevented spending)","Y — fell ~3-10% globally in 2020 (worst since WWII for many countries)","N — mass layoffs, furloughs, remote work transition","LF — Great Resignation → workers exited labor force → N*↓ → Yₛ↓","G — massive fiscal packages (US: $5T+, most countries: 10-20% of GDP)","M — rates cut to zero, QE expanded massively","STOCK — crashed March 2020, recovered by late 2020 (V-shaped, liquidity-driven)"],
chains:["COVID → lockdowns → C↓↓ → AD↓ → Y↓ → N↓ → U↑ [demand channel]","COVID → supply disruptions → SRAS↓ → Y↓ AND P↑ [supply channel]","Policy response: G↑↑ + M↑↑ → rapid demand recovery BUT supply still constrained → excess demand → P↑↑ (2022-23 inflation surge) [the sequencing problem: demand recovered faster than supply]","COVID → Great Resignation → LF↓ → labor shortages → W↑ → P↑ [structural labor market damage lasting years]","COVID → global supply chain disruptions → intermediate goods shortage → production bottlenecks → cost-push inflation [global supply shock]"],
intuition:"COVID was the ultimate macro stress test — and the world's response was a live experiment in macroeconomic policy. The initial shock was unprecedented: a simultaneous collapse in both demand (people couldn't spend) and supply (factories couldn't produce). The policy response was equally unprecedented: governments directly replaced lost income (transfers, furlough schemes), and central banks flooded the system with liquidity. This prevented a depression — but created a new problem. When lockdowns ended, demand snapped back quickly (stimulus checks + pent-up demand + low rates), while supply recovered slowly (supply chains, labor shortages, chip shortages). The result: a classic case of too much demand chasing too few goods → inflation surge of 2022-23. The lesson: you can prevent a demand-side collapse with policy, but you can't fix supply disruptions with demand-side tools. The mismatch between rapid demand recovery and slow supply normalization is the textbook explanation for post-COVID inflation.",
tip:"COVID is the PERFECT exam question because it tests everything: (1) AD-AS: show BOTH curves shifting left → Y↓ unambiguous, P ambiguous. (2) Policy: explain unprecedented G + M response. (3) Sequencing: demand recovery → supply-constrained → inflation (2022-23). (4) Labor: Great Resignation → LF↓ → structural damage. (5) Open economy: supply chain disruptions as global supply shock. The key insight: the P outcome depends on which shift dominates. Initially: demand shock dominated → P↓ (deflation fear). After policy response: demand recovered but supply didn't → P↑ (inflation). This SEQUENCE is what exams want you to explain.",
graph:null},

EXO:{name:"EXO — Trade Shocks",desc:"Exogenous shocks to trade: trade wars, sanctions, supply chain disruptions, geopolitical events. Hit the trade channel first, then cascade to output, employment, and prices.",
eqs:["Shifts EX or IM schedule directly","Cannot be predicted from model variables"],
det:["Trade policy (tariffs, sanctions, embargoes)","Geopolitical events (wars, political crises)","Supply chain disruptions (pandemic, natural disaster)"],
eff:["EX — direct export impact","CUR, E, Y, N, P — cascading effects through the system"],
chains:["EXO negative → EX↓ → NX↓ → AD↓ → Y↓ → N↓ → U↑ [demand channel via trade]","EXO → CUR↓ → E depreciates → P↑ (imported inflation) [trade → FX → prices]","US-China trade war 2018-19: tariffs → EXO negative for both → global trade↓ → global growth↓ [real-world example]"],
intuition:"Trade shocks are the 'wild cards' of macroeconomics — they originate outside the model and cannot be predicted from economic fundamentals alone. A trade war, a new sanction regime, or a pandemic disrupting global shipping can suddenly shift EX or IM in ways that cascade through the entire economy.",
tip:"Trace the full chain: EXO → EX↓ → NX↓ → AD↓ → Y↓ → N↓ → U↑. Don't forget the E adjustment: CUR↓ → E depreciates → partial self-correction. Also consider retaliatory shocks: if country A imposes tariffs, country B may retaliate, creating a second-round EXO shock.",
graph:null},

iworld:{name:"i_world — World Interest Rate",desc:"Global benchmark rate (primarily the US Federal Reserve's rate). For small open economies like Indonesia, i_world is an EXTERNAL CONSTRAINT on monetary policy. When the Fed tightens, capital flows out of emerging markets → currencies depreciate → inflation pressure → domestic central banks must tighten too, even if domestic conditions don't warrant it. This is the 'global financial cycle' identified by Hélène Rey: US monetary policy is transmitted worldwide regardless of exchange rate regime.",
eqs:["Interest parity: i = i_world + E(ΔE)/E + RP","INFLOW = f(i − i_world, risk)","With perfect mobility: i must ≈ i_world + RP"],
det:["US Federal Reserve policy (dominant global influence)","ECB, BOJ policy (secondary)","Global inflation and growth cycle","Global risk appetite (VIX, credit conditions)"],
eff:["INFLOW direction and magnitude","E — exchange rate via interest parity","Domestic i — constrains monetary independence","BOND yields globally","r — via international arbitrage"],
chains:["i_world↑ (Fed tightens) → INFLOW↓ → E depreciates → imported inflation → domestic i must rise → domestic Y↓ [global monetary policy contagion]","i_world↓ (Fed eases) → capital flows to EM → E appreciates → mixed blessing (cheaper imports but weaker exports) [capital flow surge]","Fed taper tantrum 2013: hint of QE reduction → massive EM capital outflows → EM currencies crashed [example of financial contagion from i_world expectations]"],
intuition:"For Bank Indonesia and other EM central banks, the Fed Funds rate is the single most important external variable. When the Fed raises rates, the interest differential (i − i_world) narrows or reverses → foreign investors pull capital out of Indonesia (selling rupiah assets, buying USD assets) → rupiah depreciates → imported goods become more expensive → inflation rises → BI must raise its own rate to stabilize the rupiah and contain inflation — even if the Indonesian domestic economy is slowing and actually NEEDS rate cuts. This is the 'tightening imported from abroad' problem. The 2013 Taper Tantrum and 2022-23 Fed tightening cycle both demonstrated this: BI had to raise rates primarily to defend the rupiah, not because domestic conditions required it.",
tip:"Mundell-Fleming with perfect capital mobility: i must ≈ i_world + RP. Domestic monetary policy can only deviate temporarily before capital flows force adjustment. With flexible E: monetary policy works via the exchange rate channel (lower i → E depreciates → NX↑ → Y↑). With fixed E: monetary policy is completely impotent (any attempt to change i is reversed by capital flows). This is the impossible trinity in action. For Indonesia-specific questions: discuss BI's rate decisions in the context of the Fed cycle and rupiah stability.",
graph:null},

// ====================== NODE SELECTION ======================
let selected=null,chartInst=null;
function selNode(k){
  selected=k;
  // Highlight flowchart
  svgEl.classList.add('dimmed');
  const conn=new Set([k]);ADJ[k].out.forEach(c=>conn.add(c));ADJ[k].inn.forEach(c=>conn.add(c));
  document.querySelectorAll('.node-g').forEach(g=>{g.classList.remove('hl','selected');if(conn.has(g.dataset.key))g.classList.add('hl');if(g.dataset.key===k)g.classList.add('selected')});
  document.querySelectorAll('.edge-path').forEach(p=>{p.classList.toggle('hl',p.dataset.f===k||p.dataset.t===k)});
  document.querySelectorAll('.edge-lbl,.edge-lbl-bg').forEach(el=>{const e=EDGES[el.dataset.i];if(e)el.classList.toggle('hl',e[0]===k||e[1]===k)});
  // Highlight explorer buttons
  document.querySelectorAll('.nbtn').forEach(b=>{b.classList.toggle('active',b.dataset.key===k)});
  const eh=document.getElementById('exp-hint');if(eh)eh.style.display='none';
  // Open sidebar
  openSB(k);
}
function resetSVG(){svgEl.classList.remove('dimmed');document.querySelectorAll('.hl,.selected').forEach(e=>e.classList.remove('hl','selected'));document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));const eh=document.getElementById('exp-hint');if(eh)eh.style.display=''}

const WEEKS={
week1:{
title:"Week 1 — Introduction & Macroeconomic Accounts",
subtitle:"Prof. Iwan J. Azis (ija1@cornell.edu) · Macroeconomics 1 · Spring 2026 · Textbook: Blanchard, Macroeconomics (9th ed.)",
sections:[
{head:"Course Overview & Why Macroeconomics Matters",num:"1",cards:[
{title:"Rationale",content:`<p>Macroeconomics describes how the <em>whole economy</em> works and functions. Studying it helps understand not only the broader economic landscape but also the role and importance of how people's <strong>expectations about future economic policies</strong> influence their current actions — including decisions made by business and the financial community.</p><p>From the policy maker's standpoint, macroeconomics is a critical tool to design effective economic strategies based on the <strong>interaction of expectations and decisions</strong> within the economy. We also need to understand how interactions of macro variables like unemployment, inflation, and key components of GDP are connected to welfare measures beyond GDP (e.g., inequality and poverty).</p>`},
{title:"Course Structure — Three-Pronged Approach",content:`<ul>
<li><strong>Phase 1:</strong> Main concepts of macroeconomics introduced — basic mathematical relations</li>
<li><strong>Phase 2:</strong> Combine them into one integrated model — the <em>Workhorse Macroeconomic Model</em></li>
<li><strong>Phase 3:</strong> Use the model to analyze relevant macro issues and policies (slowing growth, record debt, persistent uncertainty, higher inflation), and explore new/emerging issues (digital technology, poverty, inequality, MMT, climate change)</li>
</ul><p>The class uses <strong>STATA software</strong> to build and operate the macro-econometric model with policy applications.</p>`},
{title:"Grading Breakdown",content:`<table class="wk-table"><tr><th>Component</th><th>Weight</th></tr>
<tr><td>In-class participation (questions, answers, discussions)</td><td>25%</td></tr>
<tr><td>Exercises</td><td>25%</td></tr>
<tr><td>Mid-term exam</td><td>25%</td></tr>
<tr><td>Final exam</td><td>25%</td></tr></table>
<div class="wk-exam">📝 <strong>Important:</strong> Quiz at the BEGINNING of every class covering materials discussed AND materials to be discussed that day. Bring the syllabus and the 1-page Macro Model Flowchart to every class. Use of AI is encouraged for basic questions.</div>`},
]},
{head:"GDP — Three Approaches to Measurement",num:"2",cards:[
{title:"1. Production Approach (Value Added)",content:`<p>GDP = sum of <strong>value added</strong> across all sectors of the economy. Avoids double-counting by measuring only the value each stage of production adds.</p>
<ul>
<li><strong>Primary:</strong> Agriculture, Mining & Quarrying</li>
<li><strong>Secondary:</strong> Manufacturing, Construction, Electricity-Gas-Water</li>
<li><strong>Tertiary:</strong> Trade/Hotel/Restaurant, Transport & Communication, Finance/Real Estate, Other Services</li>
</ul>
<div class="wk-formula">GDP₂₀₂₁ (Indonesia) = Rp 11,118,868.5 billion</div>
<p><strong>Key Indonesia trends:</strong> Manufacturing share declined from 23% (2000) to 20% (2021). Mining & Quarrying fell from 16% to 12%. Trade and Transport grew significantly. This reflects Indonesia's ongoing structural transformation from industrial to service-based economy.</p>`},
{title:"2. Income Approach (Factor Payments)",content:`<p>GDP = total income earned by factors of production in creating output.</p>
<div class="wk-formula">GDP = Wages + Operating Surplus (Profit) + Taxes on Production</div>
<p><strong>Indonesia data:</strong> Wages are about <strong>one-third of GDP</strong> (~30-35%). Operating surplus (profit) is the largest share (~60-65%). Taxes on production are small (~3-5%). In manufacturing, the profit share is even higher relative to wages — indicating capital-intensive production and potential inequality implications.</p>
<div class="wk-highlight">💡 The low wage share of GDP in Indonesia has implications for inequality — if profits are concentrated among capital owners while most workers earn relatively low wages, GDP growth may not translate into broad-based welfare improvement. This connects to Prof. Azis's research on the macro-poverty-inequality nexus.</div>`},
{title:"3. Expenditure Approach (Most Used in Macroeconomics!)",content:`<p>The approach used in the <strong>Workhorse Macro Model</strong>. GDP = total spending on final goods and services.</p>
<div class="wk-formula">Y = C + I + G + (EX − IM)</div>
<table class="wk-table"><tr><th>Component</th><th>Label</th><th>Indonesia Share (2021)</th><th>Key Feature</th></tr>
<tr><td>Household Consumption</td><td>C</td><td>~52-54%</td><td>Largest, most stable</td></tr>
<tr><td>Non-profit Consumption</td><td>(part of C)</td><td>~1%</td><td>Small</td></tr>
<tr><td>Government Consumption</td><td>G</td><td>~8-9%</td><td>Policy instrument</td></tr>
<tr><td>Government Investment</td><td>I_G</td><td>~2-3%</td><td>Infrastructure</td></tr>
<tr><td>Private Investment</td><td>I_P</td><td>~29-30%</td><td>Most volatile!</td></tr>
<tr><td>Exports</td><td>EX</td><td>~21-23%</td><td>Foreign demand</td></tr>
<tr><td>Imports</td><td>IM</td><td>~18-19%</td><td>Leakage</td></tr></table>
<div class="wk-exam">📝 <strong>Exam focus:</strong> Know all three approaches and that they must give the SAME GDP figure. The expenditure approach (Y = C+I+G+NX) is the one used in macro modeling. Private Investment (I_P) is the most volatile component — its swings drive business cycles. C is the largest but most stable.</div>`},
]},
{head:"Four Key Macroeconomic Indicators",num:"3",cards:[
{title:"The Macro Dashboard",content:`<p>Every economy is evaluated on four key metrics. These correspond directly to variables in the flowchart model:</p>
<table class="wk-table"><tr><th>Indicator</th><th>Variable</th><th>What It Measures</th><th>Indonesia (recent)</th></tr>
<tr><td>Real GDP Growth (gY)</td><td>Y</td><td>Speed of economic expansion</td><td>~5% (pre-COVID trend)</td></tr>
<tr><td>Inflation (π)</td><td>P</td><td>Rate of price level increase</td><td>~3-4% (BI target: 2.5±1%)</td></tr>
<tr><td>Current Account (CA)</td><td>CUR</td><td>External balance position</td><td>~0 to -3% of GDP</td></tr>
<tr><td>Unemployment Rate (u)</td><td>U</td><td>Labor market slack</td><td>~5-6%</td></tr></table>
<div class="wk-highlight">💡 These four indicators are interconnected through the model: gY↑ → u↓ (Okun's Law) → π↑ (Phillips Curve) → CA↓ (income leaks to imports). No indicator can be analyzed in isolation — this is the WHOLE POINT of the five-market model.</div>`},
]},
{head:"Macroeconomic Accounts — Money, Fiscal, BOP",num:"4",cards:[
{title:"Monetary Survey (Central Bank Balance Sheet)",content:`<p>The monetary survey shows how money is created and distributed in the economy. Key components:</p>
<ul>
<li><strong>Assets side:</strong> Net Foreign Assets + Net Domestic Assets (claims on government, claims on private sector)</li>
<li><strong>Liabilities side:</strong> Broad Money (M2) = Currency in circulation + Transferable deposits + Other deposits + Securities</li>
</ul>
<div class="wk-formula">Broad Money (M2) Indonesia 2021 ≈ Rp 7,324.8 trillion (~43% of GDP)
Base money growth → via money multiplier → Broad money
Velocity: V = Nominal GDP / M2 ≈ 2.3</div>
<p><strong>Policy tools beyond interest rates:</strong> Bond selling/buying (OMO), reserve requirements, QE. Central banks use the <em>active use of balance sheets</em> (both assets and liabilities) to navigate policy challenges.</p>`},
{title:"Central Government Budget (Fiscal)",content:`<p>Indonesia's fiscal structure (2021, Rp trillion):</p>
<ul>
<li><strong>Revenue:</strong> ~Rp 1,744T (tax revenue ~Rp 1,432T + non-tax ~Rp 247T + oil & gas ~Rp 97T)</li>
<li><strong>Expenditure:</strong> ~Rp 2,750T (current ~Rp 1,505T + personnel ~Rp 381T + subsidies ~Rp 193T + interest ~Rp 311T + capital ~Rp 389T + transfers to regions ~Rp 729T)</li>
<li><strong>Overall balance:</strong> Deficit ~Rp 906T (~5.7% of GDP in 2020-2021 due to COVID, normally capped at 3%)</li>
<li><strong>Financing:</strong> Net government securities issuance ~Rp 1,066T</li>
</ul>
<p><strong>Energy subsidies</strong> (subsidi energi: fuel + electricity) are a major fiscal pressure point — when global oil prices spike, subsidi BBM costs explode, widening the deficit.</p>`},
{title:"Balance of Payments (BOP)",content:`<p>Indonesia's external accounts (USD million):</p>
<div class="wk-formula">BOP = Current Account + Capital/Financial Account = 0
CUR = Goods trade + Services + Primary Income + Secondary Income
Financial Account = FDI + Portfolio + Other Investment</div>
<ul>
<li><strong>Goods trade:</strong> Generally surplus (commodity exports: palm oil, coal, nickel), but oil & gas is a deficit item (~$-12B)</li>
<li><strong>Services:</strong> Deficit (~$-3.5B, tourism partially offsets)</li>
<li><strong>Primary income:</strong> Deficit (~$-6 to -8B, profit repatriation by foreign companies)</li>
<li><strong>Financial account:</strong> Net inflow finances the CUR deficit — heavily dependent on portfolio flows (hot money) and FDI</li>
</ul>
<div class="wk-exam">📝 <strong>Exam connection:</strong> BOP identity: CUR + Financial Account = 0. A CUR deficit MUST be financed by capital inflows (INFLOW). If INFLOW stops suddenly → balance of payments crisis → E crashes (1997-98 Indonesia). Reserve assets (USD ~$130-140B) provide a buffer.</div>`},
]},
{head:"The Workhorse Macroeconomic Model",num:"5",cards:[
{title:"Short Run & Medium Run: The Triangle",content:`<p>Prof. Azis presents the macro core as a <strong>triangle</strong> connecting three key variables:</p>
<div class="wk-formula">Growth of Output (gY) ←→ Unemployment (u) ←→ Inflation (π)</div>
<ul>
<li><strong>Okun's Law</strong> connects gY and u: (Ȳ − Y)/Ȳ = c(u − ū). When Y grows faster than potential, u falls.</li>
<li><strong>Phillips Relation</strong> connects u and π: π_t − π_{t-1} = −α(u_t − u_n). When u falls below natural rate, inflation accelerates.</li>
<li><strong>Aggregate Demand</strong> connects π and gY: through the IS-LM-Phillips framework, inflation feeds back to monetary policy which affects demand.</li>
</ul>
<div class="wk-highlight">💡 This triangle IS the short-to-medium run macro model. Every shock traces through this triangle. Example: G↑ → gY↑ (demand) → u↓ (Okun's) → π↑ (Phillips) → central bank raises i → gY↓ (feedback). The triangle captures the fundamental tradeoffs in macro policy.</div>`},
{title:"Long Run: Saving, Capital & Technology",content:`<p>In the long run, the model shifts from demand-driven to supply-driven:</p>
<div class="wk-formula">Y = F(K, N) — production function
I = S = sY — investment equals savings
K_t − (1−δ)K_{t-1} = I — capital accumulation</div>
<ul>
<li><strong>Short-run:</strong> Comparative-static analysis (IS-LM shifts, multiplier effects)</li>
<li><strong>Medium-run:</strong> Trend implications (SRAS adjusts, expectations update)</li>
<li><strong>Long-run:</strong> Technology (TFP) drives sustained growth. Short-run fluctuations look very small relative to the long-run trend.</li>
</ul>`},
{title:"The Full Integrated Model (Slide 34)",content:`<p>Prof. Azis's integrated model connects ALL the pieces:</p>
<ul>
<li><strong>External shock (F)</strong> → through UIP → E → via Marshall-Lerner → EX, IM → NX & CA</li>
<li><strong>IS-LM</strong> (short run): M↑ → M/P↑ → i↓ → Y↑ → u↓ (Okun's) → π↑ (Phillips) → Taylor Rule response</li>
<li><strong>Medium run:</strong> P changes → M/P↓ → real effects. Asset prices (P_stock, P_bond) → Wealth Effect → C</li>
<li><strong>Long run:</strong> S & ΔA (savings and TFP growth) → Y↓ trend → permanent capacity</li>
<li><strong>Hicks-Mundell-Fleming:</strong> Open economy IS-LM with exchange rate and capital flows</li>
<li><strong>Macroprudential Policy:</strong> Additional regulatory tools beyond monetary/fiscal</li>
</ul>
<div class="wk-exam">📝 <strong>Exam strategy:</strong> This integrated model IS the flowchart you built. Every exam question can be answered by tracing through this system. Always start with which market the shock hits, then trace through the connections to all other markets. The model captures short-run (IS-LM), medium-run (Phillips + expectations), and long-run (Solow + TFP).</div>`},
]},
{head:"Anomalies & Contemporary Issues",num:"6",cards:[
{title:"Anomaly: Expectations",content:`<p>Expectations play a central role in all macro models. Economic agents (households, firms, government) must think not just about today's conditions but years into the future when making decisions about investment, consumption, and saving.</p>
<ul>
<li><strong>Problem of measurement:</strong> How do people actually form expectations? This affects what data we collect and how.</li>
<li><strong>Lucas Critique (1970s):</strong> Macro policy evaluation is invalid if the policy change itself alters how people form expectations. This led to <strong>Rational Expectations</strong> — the assumption that people use all available information and understand the economic model.</li>
<li><strong>Implications:</strong> Anticipated policy changes may have NO real effect if agents have already adjusted. Only SURPRISE policies work — but then credibility suffers.</li>
</ul>`},
{title:"Anomaly: Credibility & Time Inconsistency",content:`<p><strong>Time Inconsistency (TI):</strong> The incentive for the central bank to deviate from its announced policy once other players have committed. Example: CB announces low inflation target → workers set wages accordingly → CB then has incentive to lower rates for stimulus (since inflation expectations are already anchored).</p>
<p><strong>Standard solutions:</strong></p>
<ul>
<li>Inflation targeting — questionable effectiveness!</li>
<li>Central bank independence — unclear if sufficient!</li>
<li>Choose "conservative" central bankers who hate inflation — but what about society's broader welfare?</li>
</ul>
<p>Prof. Azis (quoting Solow): <em>"If you don't know what you're doing, for heaven's sake do it gently."</em></p>
<div class="wk-highlight">💡 <strong>Bounded rationality:</strong> Heterogeneous agents have different — and sometimes conflicting — goals, information, capacities to process it, expectations, and beliefs about how the economy works. Real expectations formation is a social and psychological process, not the purely rational process assumed in textbook models.</div>`},
{title:"Anomaly: Macro & Welfare Disconnect",content:`<p>Prof. Azis's research shows that <strong>increasing GDP growth can coexist with growing interregional inequality</strong>. Indonesia's Williamson Index of consumption per capita inequality ROSE even as GDP growth trended upward (2001-2019).</p>
<p>This means: GDP growth alone is NOT sufficient for welfare improvement. The distribution of growth matters — who benefits and who is left behind. This connects to why the course covers inequality, poverty, and welfare measures beyond GDP.</p>`},
]},
{head:"Evolution of Macroeconomics — Historical Context",num:"7",cards:[
{title:"Timeline of Macro Thought",content:`<table class="wk-table"><tr><th>Era</th><th>Key Development</th><th>Key Concept</th></tr>
<tr><td>1930s</td><td>Great Depression → Keynesian macro</td><td>Demand deficiency, government intervention</td></tr>
<tr><td>1950s+</td><td>Post-WWII welfare state</td><td>Mixed economy, Phillips curve</td></tr>
<tr><td>1970s</td><td>Great Inflation & oil shocks</td><td>Price rigidity, New Keynesian, stagflation</td></tr>
<tr><td>>1980s</td><td>Great Moderation</td><td>New Classical, RBC, Rational Expectations, DSGE</td></tr>
<tr><td>1990s</td><td>Financial crises (Asia 1997-98)</td><td>Macro vs Financial Imbalances, Liquidity trap</td></tr>
<tr><td>2000s</td><td>Global imbalances → GFC 2008</td><td>Financial innovation risks, NIRP, QE</td></tr>
<tr><td>2010s</td><td>Taper Tantrum</td><td>Capital flow risks, financial spillover</td></tr>
<tr><td>2020s</td><td>COVID-19</td><td>Health capital, Macro-SD, unprecedented stimulus</td></tr></table>
<p>Contemporary extensions: <strong>MMT</strong> (Modern Monetary Theory — government as currency issuer, inflation controlled by taxes), <strong>Technology & robotization</strong> (elasticity of substitution between K and L determines inequality impact), <strong>Crypto currency</strong> (challenges to monetary policy and financial stability), <strong>Climate change</strong> (uncertainty, social discount rate, lasting productivity effects).</p>`},
]},
]},

week2:{title:"Week 2 — Short Run: From IS-LM to AD, and Exchange Rate to UIP",
subtitle:"Prof. Iwan J. Azis · Equilibrium in Goods, Money & Exchange Rate Markets · Lead Characters: Y, i, Mˢ, C, I, NX, E, Twin Deficit, UIP, AD",
sections:[
{head:"Goods Market Equilibrium & Behavioral Equations",num:"1",cards:[
{title:"The Goods Market System",content:`<p>The goods market is built from behavioral equations for each GDP component. Prof. Azis lays out the full system:</p>
<div class="wk-formula">Y = GDP = C + I + G + (EX − IM/ε)</div>
<p>Each component has a <strong>behavioral function</strong> — it doesn't just sit there, it responds to other variables:</p>
<div class="wk-formula">C = c₀ + c₁(Y − T)    [consumption: c₁ = MPC > 0]
I = a₀ + a₁(Y) + a₂(i)   [investment: a₁ > 0, a₂ < 0]
EX = α* + β*Y* + γε    [exports: depend on foreign Y*, real ER]
IM = α + βY + γε    [imports: depend on domestic Y]
IM/ε = α + βY    [imports in domestic goods terms]</div>
<p>Key variables: <span class="wk-key">ε = E/Pᵈᶠ</span> real exchange rate, <span class="wk-key">E = Rp/USD</span> nominal exchange rate, <span class="wk-key">Pᵈᶠ = P/P*</span> price ratio.</p>
<div class="wk-highlight">💡 Production (Y) → Income (Y) → Demand (Z) — these are interchangeable! Z = Y = GDP. The circular flow: output creates income, income creates demand, demand determines output.</div>`},
{title:"Indonesia GDP by Expenditure (2025 data from slides)",content:`<table class="wk-table"><tr><th>Component</th><th>2025 (Current, Rp B)</th><th>Share</th></tr>
<tr><td>Consumption (C)</td><td>13,156,300</td><td>55.23%</td></tr>
<tr><td>Investment (I)</td><td>7,293,700</td><td>30.62%</td></tr>
<tr><td>Government (G)</td><td>1,794,300</td><td>7.53%</td></tr>
<tr><td>Exports (EX)</td><td>5,442,300</td><td>22.85%</td></tr>
<tr><td>Imports (IM)</td><td>4,894,000</td><td>20.54%</td></tr></table>
<div class="wk-formula">Nominal GDP 2025 = Rp 23,821,100 B ≈ $1.42 Trillion
GDP per Capita ≈ $4,963 | Population: 286.7 million | IDR/USD: 16,741.87</div>`},
]},
{head:"The Multiplier — Why $1 of Spending Creates More Than $1 of GDP",num:"2",cards:[
{title:"Deriving the Multiplier (Balanced Trade Case)",content:`<p>If trade is balanced (NX = 0), substitute C into Y:</p>
<div class="wk-formula">Y = Z = c₀ + c₁(Y − T) + I + G
Y = 1/(1 − c₁) × [c₀ − c₁T + I + G]
      ↑                    ↑
   Multiplier    Autonomous Spending</div>
<p><strong>Example:</strong> If c₁ = 0.6, multiplier = 1/(1−0.6) = <strong>2.5</strong>. So a Rp 100B increase in G raises Y by Rp 250B. The key insight: c₀ represents consumer confidence — a shift in sentiment shifts autonomous spending.</p>
<div class="wk-exam">📝 On the Keynesian cross diagram: the demand line ZZ has slope c₁ < 1, crossing the 45° line at equilibrium. When autonomous spending increases by δ, output increases by ρ > δ due to the multiplier (ρ = multiplier × δ).</div>`},
{title:"Open Economy Multiplier & Trade Imbalance",content:`<p>Adding trade changes everything. With imports as a leakage:</p>
<div class="wk-formula">Y = 1/(1−c₁) × [c₀ − c₁T + I + G] + EX − IM/ε</div>
<p>The demand curve for <strong>domestic goods</strong> now has a <em>smaller slope</em> (and hence <strong>lower multiplier</strong>) because some spending leaks to imports. Two critical implications:</p>
<ul><li><strong>Smaller effect on output</strong> — domestic policy less effective</li>
<li><strong>Adverse effect on trade balance</strong> — as Y rises, IM rises, NX worsens</li></ul>
<p><em>The higher the output, the greater the tendency toward trade deficit.</em> This is because IM = α + βY — imports are an increasing function of domestic income.</p>`},
]},
{head:"Twin Deficits — Fiscal Deficit ↔ Trade Deficit",num:"3",cards:[
{title:"The Twin Deficit Identity (Key Derivation!)",content:`<p>Start from the AD identity and derive the savings-investment balance:</p>
<div class="wk-formula">Y = C + I + G + EX − IM/ε
Subtract (C + T) from both sides:
Y − C − T = I + (G − T) + (EX − IM/ε)
     S    = I + (G − T) + NX

Rearrange:
(T − G) = (I − S) + (EX − IM/ε)

Thus: if (T − G) < 0 (fiscal deficit),
then (EX − IM/ε) < 0 (trade deficit) → "TWIN DEFICIT"</div>
<p>If fiscal and trade are both in balance: <strong>S = I</strong> (private saving equals investment).</p>
<div class="wk-highlight">💡 The twin deficit is a fundamental identity, not just a theory. If government spends more than it collects (fiscal deficit), and saving-investment gap is unchanged, the trade balance MUST worsen. This is why G↑ → Y↑ → IM↑ → trade deficit → CUR deficit. Larger government deficit also leads to larger CA deficit.</div>`},
{title:"Application 1: Increased G → Twin Deficit",content:`<p>Fiscal expansion in an open economy: G↑ shifts AD up → Y rises at new equilibrium → but at the new higher Y, the economy is in both fiscal AND trade deficit.</p>
<div class="wk-formula">Fiscal Expansion → Higher gY → Fiscal Deficit → Trade Deficit (IM leakage) → Twin Deficits → Current Account Deficit</div>
<p>This is the fundamental <strong>macro policy tradeoff</strong>: fiscal stimulus boosts output but worsens external balance.</p>`},
{title:"Application 2: Increased Foreign Demand (EX↑)",content:`<p>When there's a recession, it's better if FOREIGN demand increases (rather than domestic). But this requires either:</p>
<ol><li>A strong world economy → problem: may cause a world recession if all countries try this</li>
<li>Currency depreciation to make exports cheaper → problem: leads to 'currency war'</li></ol>
<p><strong>The need for international coordination!</strong> If every country tries to depreciate simultaneously, no one gains competitiveness — it's a zero-sum game.</p>`},
]},
{head:"Exchange Rate, Depreciation & J-Curve",num:"4",cards:[
{title:"Exchange Rate-Inflation Tradeoff",content:`<p>Depreciation can boost exports but causes inflation through two channels:</p>
<ul><li><strong>Direct channel (short run):</strong> E↑ → import prices↑ → P↑ ("imported inflation"). Prices adjust faster than trade volumes.</li>
<li><strong>Indirect channel (medium run):</strong> E↑ → EX↑ → Y↑ → via Phillips Curve → P↑</li></ul>
<div class="wk-formula">Rising E → rising P or rising π (always!)
This is why "just depreciate the currency" is NOT a free lunch.</div>`},
{title:"The J-Curve Effect",content:`<p>After depreciation, the trade balance initially <strong>worsens before improving</strong>:</p>
<ul><li><strong>Short run:</strong> Prices adjust immediately but volumes (quantities of EX and IM) are slow to respond → import bill rises in domestic currency → NX worsens</li>
<li><strong>Medium run:</strong> Volumes adjust — export quantities rise, import quantities fall → NX improves</li></ul>
<p>The path traces a "J" shape on the NX vs time graph.</p>
<div class="wk-formula">RER-NER-Inflation relationship:
(Δε/ε) = (ΔE/E) + π_t − π*_t
% real appreciation = % nominal appreciation + inflation differential</div>`},
{title:"Marshall-Lerner Condition",content:`<p>For depreciation to ACTUALLY improve the trade balance, exports must increase enough and imports decrease enough to compensate for higher import prices:</p>
<div class="wk-formula">ML Condition: |ε_EX| + |ε_IM| > 1
(sum of export and import price elasticities must exceed 1)</div>
<p><strong>Example:</strong> If 1% depreciation → 0.9% relative increase in EX, and 0.8% relative decrease in IM, trade balance NX/EX improves by (0.9 + 0.8 − 1)% = 0.7%.</p>
<div class="wk-exam">📝 <strong>Policy Mix:</strong> Depreciation reduces trade deficit via EX↑, but also raises Y and P. If inflation is to be avoided, combine depreciation with reduced spending (G↓). But if initial Y and P are low, depreciation alone is favorable.</div>`},
]},
{head:"Money Market, LM Curve & Interest Rate Determination",num:"5",cards:[
{title:"Types of Money Supply",content:`<ul>
<li><span class="wk-key">M0 (Monetary Base)</span> — notes and coins in circulation. Expanded by CB purchases (OMO)</li>
<li><span class="wk-key">Reserve Money (RM)</span> — base money = currency in circulation + reserve balances at CB</li>
<li><span class="wk-key">M1 (Narrow)</span> — currency held by public + demand deposits (DD)</li>
<li><span class="wk-key">M2 (Broad)</span> — M1 + savings, time deposits, retail money market funds</li></ul>`},
{title:"Money Market Equilibrium & Bond Pricing",content:`<p>Money demand (Mᵈ) depends on two things:</p>
<div class="wk-formula">M = $Y · L(i)    or    M/P = Y · L(i)
     (+)  (-)              Real money stock = Real balance</div>
<p><strong>1. Level of transactions → $Y</strong> (more output → more money needed). Note: $Y/Mᵈ = "velocity of money."</p>
<p><strong>2. Interest rate → L(i)</strong> (higher i → hold less money, buy more bonds).</p>
<p>Bond price and interest rate are inversely related:</p>
<div class="wk-formula">If 1-year bond (e.g., SUN) pays RpX/year, price = Pᵇ:
i = (RpX − Pᵇ) / Pᵇ  →  given Pᵇ, we know i
Pᵇ = RpX / (1 + i)    →  given i, we know Pᵇ</div>`},
{title:"LM Curve: Traditional vs Modern",content:`<p><strong>Traditional way (money targeting):</strong> CB chooses Mˢ. If Y increases → Mᵈ increases → i must increase to restore equilibrium. Result: LM curve <strong>slopes upward</strong>.</p>
<p><strong>Modern way (interest rate targeting):</strong> CB chooses i directly and adjusts Mˢ to achieve it. Result: LM curve is <strong>horizontal</strong> at the target rate. When Y changes, CB adjusts Mˢ to keep i constant.</p>
<div class="wk-exam">📝 Modern central banks (BI, Fed, ECB) all use interest rate targeting. The LM is horizontal. This simplifies IS-LM: the IS curve determines Y for a given i set by the CB. This is why the Taylor Rule (which sets i) is so central.</div>`},
]},
{head:"UIP, Exchange Rate Market & Mundell-Fleming",num:"6",cards:[
{title:"Uncovered Interest Parity (UIP)",content:`<p>UIP connects the money market to the exchange rate market. Investors choosing between Indonesian bonds and US bonds:</p>
<div class="wk-formula">UIP: (1 + iₜ) = (Eₜ)(1 + i*ₜ)(1/Eᵉₜ₊₁)

Simplified: iₜ ≈ i*ₜ − (Eᵉₜ₊₁ − Eₜ)/Eₜ

Domestic interest rate = Foreign rate − Expected appreciation</div>
<p><strong>Example:</strong> If US 1-year rate is 3% lower than Indonesian rate, investors expect the dollar to appreciate ~3% against the rupiah. That's why they hold US bonds despite lower yield.</p>
<p><strong>Key insight:</strong> Higher i → capital INFLOW → E <strong>appreciates</strong> (Rp/$ falls). Lower i → capital OUTFLOW → E <strong>depreciates</strong> (Rp/$ rises).</p>`},
{title:"IS-LM-UIP: The Mundell-Fleming Model",content:`<div class="wk-formula">Goods: Y = C(Y−T) + I(Y,i) + G + NX(Y, Y*, (1+i)/(1+i*) × Ēᵉ)
Money: i = ī  (horizontal LM)
ER: E = (1+i)/(1+i*) × Ēᵉ  (from UIP)</div>
<p>This three-equation system is the <strong>Mundell-Fleming model</strong> — the workhorse for open-economy short-run analysis. The IS curve slopes down in (Y, i) space. The LM is horizontal. The exchange rate is determined by interest parity.</p>`},
{title:"Policy Analysis: Monetary & Fiscal in Mundell-Fleming",content:`<p><strong>Monetary policy (i↓):</strong> LM shifts down → Y↑ directly AND E depreciates → EX↑ → further Y↑. Monetary policy works through BOTH channels.</p>
<p><strong>Fiscal policy (G↑):</strong> IS shifts right → if CB keeps i unchanged, Y↑ and E unchanged. If CB raises i in response → E appreciates → EX↓ → partially offsets the fiscal stimulus.</p>
<div class="wk-exam">📝 Key exam result: In open economy with flexible E and capital mobility, monetary policy is MORE effective than fiscal policy (fiscal gets offset by E appreciation). This is the opposite of fixed E regimes where fiscal works and monetary doesn't.</div>`},
{title:"From IS-LM to AD Curve",content:`<p>The AD curve shows how P affects Y through the money market:</p>
<div class="wk-formula">If M↑ (or P↓): M/P↑ → i↓ → Y↑    [movement along AD]
If M↓ (or P↑): M/P↓ → i↑ → Y↓    [movement along AD]

From IS: Y = C(Y−T) + I(Y,i) + G + EX − IM(Y)  → Expenditure
From LM: M/P = Y · L(i)  → Real Balance
Hence AD: Y = Y(M/P, G, T, EX, IM)  → AD curve slopes down</div>
<p>The AD curve summarizes simultaneous equilibrium in goods and money markets. It slopes down because P↑ → M/P↓ → i↑ → I↓ → Y↓.</p>
<div class="wk-highlight">💡 The complete Week 2 equilibrium determines four variables simultaneously: <span class="wk-key">Y</span> (output), <span class="wk-key">i</span> (interest rate), <span class="wk-key">P</span> (price level), and <span class="wk-key">E</span> (exchange rate). All four markets (goods, money, ER, and later labor) must clear together.</div>`},
]},
]},
week3:{title:"Week 3 — Medium Run: Labor Market, Prices & Combining 4 Markets",
subtitle:"Prof. Iwan J. Azis · Wage & Price Setting, AS Curve, Phillips Curve, IS-LM-PC Model, AD-AS Equilibrium, Supply & Demand Shocks",
sections:[
{head:"Wage Determination: Labor Market & Wages",num:"1",cards:[
{title:"Wage-Setting Relation",content:`<p>Wages are set based on unemployment, expected prices, and institutional factors:</p>
<div class="wk-formula">W = Pᵉ · F(u, z)
         (−) (+)

u = unemployment (inverse: high u → low W)
z = institutional factors (positive: stronger institutions → higher W)
Pᵉ = expected price level</div>
<p><strong>Institutional factors (z):</strong> Collective bargaining, unemployment insurance, labor unions, minimum wage laws, political factors (labor party strength).</p>
<div class="wk-highlight">💡 <strong>COVID-19 exception:</strong> Normally high u → low W. But post-COVID saw high u WITH high W because of high labor demand during recovery vs workers' changed preferences (Great Resignation) → labor shortage despite measured unemployment.</div>`},
{title:"Price-Setting Relation",content:`<p>Firms set prices as a markup (μ) over wages:</p>
<div class="wk-formula">P = (1 + μ) · W

Rearranging for real wage:
W/P = 1/(1 + μ)    ← Price-Setting line (horizontal in W/P vs u space)</div>
<p>The markup μ reflects market power — monopolistic competition means firms charge above marginal cost.</p>`},
{title:"Equilibrium: Natural Rate of Unemployment",content:`<p>Setting wage-setting equal to price-setting:</p>
<div class="wk-formula">W/Pᵉ = F(u, z)    [Wage Setting — downward sloping]
W/P = 1/(1 + μ)    [Price Setting — horizontal]

In equilibrium (Pᵉ = P): F(uₙ, z) = 1/(1 + μ)
→ uₙ = natural rate of unemployment</div>
<p><strong>What shifts the natural rate?</strong></p>
<ul><li>If <strong>z goes up</strong> (stronger unions, higher unemployment insurance, Europe): WS shifts up → uₙ <strong>increases</strong></li>
<li>If <strong>μ goes down</strong> (anti-trust law, more competition): PS shifts up → uₙ <strong>decreases</strong></li></ul>
<div class="wk-exam">📝 The natural rate uₙ is NOT fixed — it depends on institutional factors (z) and market structure (μ). Policy CAN change uₙ through structural reforms, just not through demand management.</div>`},
]},
{head:"Indonesia's Labor Market Structure",num:"2",cards:[
{title:"Labor Market Breakdown (August 2020)",content:`<div class="wk-formula">Population: 270.2 million
→ Manpower (15-64): 204 million
  → Labor Force (L): 138.2 million  [LFP = L/MP = 67.7%]
    → Employed (N): 128.5 million
    → Unemployed (U): 9.7 million = 7.02%
  → Non-Labor Force: 65.8 million
→ Non-manpower (<15 or >64): 30.2 million</div>
<p>Key Indonesia definitions: employed = minimum 1 hour continuously during last week. Half/partially employed = less than 35 hours per week. Data from SAKERNAS survey (4 times per year, 75,000 household sample).</p>
<p><strong>NEET (Not in Education, Employment or Training):</strong> ~9.9 million young Indonesians (aged 15-24) — a major structural concern for Indonesia's demographic dividend.</p>`},
{title:"Wages, Labor Productivity & Output Growth",content:`<p>In competitive equilibrium: <strong>W/P = Y/L</strong> (real wage = labor productivity). The relationship between labor productivity growth and output growth:</p>
<div class="wk-formula">Production Function: Y = A · F(K, L)
MPL = dY/dL (marginal product)
APL = Y/L (average product)

Growth of A or TFP ─┐
                     ├→ Growth of Y/L → Growth of Y or Y/N
Growth of K/L ──────┘</div>
<p><strong>Indonesia data:</strong> National labor productivity grew 2.91%/year on average, real wage grew 3.13%/year. But the absolute gap is enormous: productivity at Rp 3.8M vs real wage at Rp 977K. The productivity-wage ratio averaged 3.69x over 23 years — meaning workers capture only ~27% of their productivity in wages.</p>`},
{title:"Minimum Wage & Omnibus Law",content:`<p><strong>Minimum wage tradeoff:</strong> Higher wages vs potential job losses. Impact depends on the level:</p>
<ul><li>If set at moderate level → employment impact is modest (David Card, Nobel 2021: "very unlikely that minimum wage has large negative employment effect")</li>
<li>If set too high → significant job losses for least-skilled workers</li>
<li>Can increase productivity in some cases</li></ul>
<p><strong>Indonesia's Omnibus Law (Cipta Kerja):</strong></p>
<ul><li>Minimum wage no longer sectoral</li>
<li>Reduced severance from 36-60 weeks to 24 weeks (+ 8 weeks insurance = 32 total)</li>
<li>Fixed-term contracts capped at 5 years</li>
<li>Employment insurance scheme added as safety net</li></ul>
<div class="wk-exam">📝 Card & Krueger's finding: minimum wage increases were accompanied by employment INCREASES in some cases — contradicting the standard textbook prediction. The key is whether the labor market is competitive (textbook: min wage → unemployment) or monopsonistic (min wage can raise both wages AND employment).</div>`},
]},
{head:"Aggregate Supply (AS) Curve Derivation",num:"3",cards:[
{title:"From Labor Market to AS",content:`<p>Deriving the AS curve step by step from wage and price setting:</p>
<div class="wk-formula">Given: u = (L−N)/L = 1 − N/L
Simple production: Y = N → u = 1 − Y/L

From Price Setting: P = (1 + μ) · W
From Wage Setting: W = Pᵉ · F(u, z)

Combine: P = Pᵉ · (1 + μ) · F(1 − Y/L, z)

AS Relation: P = Pᵉ(1 + μ)F(1 − Y/L, z)
                              ↑
                         negative: Y↑ → u↓ → W↑ → P↑</div>
<p>The AS curve slopes <strong>upward</strong>: higher Y → lower u → higher wages → higher prices.</p>`},
{title:"AS Curve Properties & Shifts",content:`<p><strong>Key properties:</strong></p>
<ul><li>If Y < Yₙ → P < Pᵉ (economy below potential, prices below expected)</li>
<li>If Y > Yₙ → P > Pᵉ (overheating, prices above expected)</li>
<li>AS passes through (Yₙ, Pᵉ) — at natural output, actual price equals expected price</li></ul>
<p><strong>What shifts AS?</strong> If W goes up for any reason → Pᵉ goes up → AS shifts LEFT (upward). This is the medium-run adjustment mechanism:</p>
<div class="wk-formula">Y > Yₙ → P > Pᵉ → workers revise Pᵉ upward → W↑ → AS shifts left → Y↓ back toward Yₙ
Y < Yₙ → P < Pᵉ → workers revise Pᵉ downward → W↓ → AS shifts right → Y↑ back toward Yₙ</div>
<p>Natural output (Yₙ) = output with flexible prices/wages (medium run). Potential output (Yₚₒₜ) = output under perfect competition.</p>`},
]},
{head:"Phillips Curve — AS in Growth Rates",num:"4",cards:[
{title:"From AS Levels to PC Growth Rates",content:`<p>Instead of looking at price LEVELS (AS curve), convert to growth RATES:</p>
<div class="wk-formula">AS: Y↑ → N↑ → u↓ → W↑ → P↑
Convert to growth rates:
gY↑ → gN↑ → gu↓ → gW↑ → gP↑

gP = inflation rate = π

Phillips Curve: π − πᵉ = −α(u − uₙ)

If πᵉ = π(t−1) [adaptive expectations]:
π − π(−1) = (α/L)(Y − Yₙ)  ← PC in output gap form</div>
<p>The <strong>Phillips Curve replaces the AS curve</strong> when we work with growth rates instead of levels. Lower output lowers inflation; higher output raises inflation.</p>
<p><strong>NAIRU:</strong> The natural rate of unemployment is the rate required to keep inflation CONSTANT — hence "Non-Accelerating Inflation Rate of Unemployment."</p>`},
]},
{head:"Combining All 4 Markets: IS-LM-PC Model",num:"5",cards:[
{title:"The IS-LM-PC Framework",content:`<p>Prof. Azis introduces the complete <strong>IS-LM-PC</strong> model (Goods + Money + Labor, later + ER):</p>
<div class="wk-formula">IS: Y = C(Y−T) + I(Y,r) + G + NX    [goods market, uses REAL rate r]
LM: i = ī  (horizontal, CB targets rate)    [money market]
PC: π − π(−1) = (α/L)(Y − Yₙ)    [labor/prices, Phillips curve]

Real rate: r ≈ i − πᵉₜ₊₁    [Fisher equation]</div>
<p><strong>Why use r instead of i?</strong> (1) Investment decisions are in real terms — what matters is the cost net of inflation. (2) In deflation: lowering nominal i during falling prices → r actually RISES → contractionary. This is the deflation spiral (Japan since mid-1990s).</p>`},
{title:"Medium-Run Convergence & Policy Effects",content:`<p><strong>Key result:</strong> Any deviation from potential output will, in the medium run, return to potential output. The mechanism:</p>
<ul><li>Y > Yₙ → π rising → Pᵉ↑ → AS shifts left → Y↓ back to Yₙ (at higher P)</li>
<li>Y < Yₙ → π falling → Pᵉ↓ → AS shifts right → Y↑ back to Yₙ (at lower P)</li></ul>
<p><strong>AD Shock (fiscal consolidation):</strong> G↓ → IS shifts left → Y↓ below Yₙ → π falls → in medium run, inflation decline lowers r → Y recovers to Yₙ at lower interest rate. Fiscal consolidation is contractionary short-run but neutral medium-run.</p>
<p><strong>Supply Shock (oil price↑):</strong> Oil price acts like μ↑ → PS shifts down → uₙ rises → Yₙ falls → AS shifts left → P↑ AND Y↓ = <strong>STAGFLATION</strong>. In medium run, higher oil price permanently raises the price level.</p>`},
{title:"The Deflation Spiral Trap",content:`<p>If the zero lower bound prevents monetary policy from lowering i further:</p>
<div class="wk-formula">Y < Yₙ → π falls → πᵉ falls → r = i − πᵉ RISES (because πᵉ is falling!)
→ higher r → Y falls more → π falls more → r rises more → spiral!</div>
<p>This is the <strong>deflation spiral</strong> — Japan's experience since mid-1990s. Lowering nominal i during deflation actually causes real rate r to increase, worsening the recession. This is why fiscal policy (G↑) becomes crucial at the zero lower bound.</p>
<div class="wk-exam">📝 <strong>Exam essential:</strong> At the zero lower bound, monetary policy is trapped. Only fiscal policy or unconventional monetary policy (QE) can stimulate. The deflation spiral is self-reinforcing: falling prices → rising real rates → falling output → falling prices more. Japan is the canonical case study.</div>`},
{title:"All Four Markets Together",content:`<p>The complete four-market model (slide 42-43): IS-LM (goods + money) + UIP (exchange rate) + PC (labor/prices):</p>
<div class="wk-formula">Monetary Tightening (i↑):
Goods & Money: i↑ → r↑ → I↓ → Y↓ below Yₙ
Exchange Rate: i↑ → capital inflow → E appreciates (Rp/$ falls) → NX↓
Labor/Phillips: Y↓ → u↑ → π falls → PC shifts down
Medium run: Y returns to Yₙ, π permanently lower, E overshoots then settles</div>
