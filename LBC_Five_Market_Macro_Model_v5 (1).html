sections:[
{head:"A1 вАФ IS-LM Equilibrium",num:"A1",pts:"12.5%",prompt:"Ekonomi Negara Indostan: C=200+0.75(YвИТT), I=150вИТ10r, G=250, T=200, M/P=YвИТ50r, M=3000, P=4.",
cards:[
{title:"A1(i) вАФ Find Y* and r*",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>IS Curve:</b> C = 50+0.75Y. Y = 50+0.75Y+150вИТ10r+250 вЖТ 0.25Y = 450вИТ10r вЖТ <b>Y = 1800вИТ40r</b></div>
<div class="exam-step"><b>LM Curve:</b> M/P = 3000/4 = 750. 750 = YвИТ50r вЖТ <b>Y = 750+50r</b></div>
<div class="exam-step"><b>Solve:</b> 1800вИТ40r = 750+50r вЖТ 1050 = 90r вЖТ <b>r* = 35/3 вЙИ 11.67</b></div>
<div class="exam-step"><b>Y* = 750 + 50(35/3) = 4000/3 вЙИ <b>1333.33</b></b></div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM Equilibrium: Indostan</div><svg id="eg-2024-a1i" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">The IS and LM curves intersect at (YвЙИ1333, rвЙИ11.67), giving simultaneous goods and money market equilibrium.</div>
</div>`},
{title:"A1(ii) вАФ G rises to 370, find multiplier",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>New IS:</b> Y = 50+0.75Y+150вИТ10r+370 вЖТ 0.25Y = 570вИТ10r вЖТ <b>Y = 2280вИТ40r</b></div>
<div class="exam-step"><b>LM unchanged:</b> Y = 750+50r</div>
<div class="exam-step"><b>Solve:</b> 2280вИТ40r = 750+50r вЖТ 1530 = 90r вЖТ <b>r* = 17</b></div>
<div class="exam-step"><b>Y* = 750+50(17) = <b>1600</b></b></div>
<div class="exam-step"><b>Multiplier:</b> ќФY/ќФG = (1600вИТ1333.33)/(370вИТ250) = 266.67/120 вЙИ <b>2.22</b></div>
<div class="exam-step"><b>Note:</b> IS-LM multiplier (2.22) < simple Keynesian multiplier (4) because iвЖС crowds out some I.</div>
<div class="exam-interp">The government spending multiplier in IS-LM is smaller than 1/(1вИТMPC) because rising income raises money demand, pushing up i, which partially crowds out private investment.</div>
</div>`},
]},
{head:"A2 вАФ IS-LM-AD Shifts",num:"A2",pts:"7.5%",prompt:"Gambar perubahan kurva IS-LM dan AD.",
cards:[
{title:"A2(i) вАФ PPN naik ke 12%, G unchanged",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>IS shifts LEFT</b> (C falls due to reduced purchasing power).</div>
<div class="exam-step"><b>LM unchanged.</b></div>
<div class="exam-step"><b>AD shifts LEFT</b> (for every P, equilibrium Y is lower).</div>
<div class="exam-step"><b>Result:</b> YвЖУ, rвЖУ.</div>
</div>`},
{title:"A2(ii) вАФ Otoritas moneter membeli obligasi pemerintah (Covid)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>LM shifts RIGHT/DOWN</b> (MвЖС via bond purchases вЖТ liquidity injection).</div>
<div class="exam-step"><b>IS unchanged.</b></div>
<div class="exam-step"><b>AD shifts RIGHT.</b></div>
<div class="exam-step"><b>Result:</b> YвЖС, rвЖУ.</div>
</div>`},
{title:"A2(iii) вАФ Wheat firms reduce spending (Russia-Ukraine)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>IS shifts LEFT</b> (autonomous spending and I fall).</div>
<div class="exam-step"><b>LM unchanged.</b></div>
<div class="exam-step"><b>AD shifts LEFT.</b></div>
<div class="exam-step"><b>Result:</b> YвЖУ, rвЖУ.</div>
</div>`},
]},
{head:"B1 вАФ Wage/Price Setting & Natural Rate",num:"B1",pts:"10%",prompt:"Markup=10%, WS: W=P(1вИТu), PS: P=(1+m)W.",
cards:[
{title:"B1(i)вАУ(iii) вАФ Real wage & natural rate",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>(i) Real wage:</b> W/P = 1/(1+m) = 1/1.10 = <b>0.9091</b></div>
<div class="exam-step"><b>(ii) Natural rate:</b> WS=PS: 1вИТu_n = 1/1.10 вЖТ u_n = 1вИТ0.9091 = <b>9.09%</b></div>
<div class="exam-step"><b>Interpretation:</b> At 9.09% unemployment, workers' wage demands are exactly consistent with firms' markups.</div>
<div class="exam-step"><b>(iii) If m=15%:</b> W/P = 1/1.15 = 0.8696 вЖТ u_n = 1вИТ0.8696 = <b>13.04%</b></div>
<div class="exam-step"><b>Explanation:</b> Higher markup means firms want lower real wages. Workers must face higher unemployment to accept those lower wages вЖТ u_n rises.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">WS-PS: Effect of Markup Increase</div><svg id="eg-2024-b1" viewBox="0 0 420 280"></svg></div>
</div>`},
]},
{head:"B2 вАФ Phillips Curve with ќЄ",num:"B2",pts:"10%",prompt:"ѕА_t = (1вИТќЄ)ѕАћД + ќЄѕА_{tвИТ1} + (m+z) вИТ ќ±u_t",
cards:[
{title:"B2(i)вАУ(iii) вАФ ќЄ=0 vs ќЄ=1 and Original Phillips Curve",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>(i) ќЄ=0:</b> ѕА_t = ѕАћД + (m+z) вИТ ќ±u_t вЖТ Direct tradeoff between ѕА LEVEL and u. Downward-sloping in (u, ѕА) space.</div>
<div class="exam-step"><b>(ii) ќЄ=1:</b> ѕА_t вИТ ѕА_{tвИТ1} = (m+z) вИТ ќ±u_t вЖТ Tradeoff between CHANGE in ѕА and u. No permanent tradeoff.</div>
<div class="exam-step"><b>(iii) Original Phillips curve = ќЄ=0.</b> A.W. Phillips (1958) found a stable negative relationship between wage inflation and unemployment in UK data вАФ a direct level tradeoff.</div>
<div class="exam-step"><b>When ќЄ=1:</b> This is the modern accelerationist PC. Below u_n вЖТ inflation keeps rising. At u_n вЖТ inflation is stable. No long-run tradeoff.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Original vs Accelerationist Phillips Curve</div><svg id="eg-2024-b2" viewBox="0 0 420 280"></svg></div>
</div>`},
]},
{head:"B3 вАФ IS-LM-PC (Filipa)",num:"B3",pts:"15%",prompt:"IS: Y=C(YвИТT)+I(Y,r+x)+G, LM: r=rћД, PC: ѕАвИТѕАћД=(ќ±/L)(YвИТYвВЩ). Three shocks: political risk, oil price, investment incentives.",
cards:[
{title:"B3(i) вАФ Political risk rises вЖТ contraction",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>xвЖС (risk premium) вЖТ I falls вЖТ IS shifts LEFT.</b></div>
<div class="exam-step"><b>LM horizontal at rћД вЖТ r unchanged.</b></div>
<div class="exam-step"><b>YвЖУ вЖТ Y < Y_n вЖТ from PC: ѕА < ѕАћД.</b></div>
<div class="exam-step"><b>Result:</b> r unchanged, YвЖУ, ѕАвЖУ.</div>
<div class="exam-step"><b>Restoration:</b> Expansionary fiscal policy (GвЖС or TвЖУ) shifts IS back right until Y=Y_n, then ѕА=ѕАћД.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM-PC: Political Risk Shock</div><svg id="eg-2024-b3i" viewBox="0 0 420 400"></svg></div>
</div>`},
{title:"B3(ii) вАФ Oil priceвЖС, no fiscal change",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Supply/cost-push shock вЖТ PC shifts UP.</b></div>
<div class="exam-step"><b>IS and LM unchanged вЖТ r unchanged, Y unchanged initially.</b></div>
<div class="exam-step"><b>But at same Y: ѕА > ѕАћД (higher inflation from cost pressure).</b></div>
<div class="exam-step"><b>Result:</b> r unchanged, Y unchanged initially, ѕАвЖС.</div>
<div class="exam-step"><b>Restoration:</b> Best = supply-side policies (energy subsidies, diversification) to shift PC back down. Alternative: contractionary fiscal вЖТ IS left вЖТ YвЖУ temporarily вЖТ reduces inflation pressure.</div>
</div>`},
{title:"B3(iii) вАФ Investment incentives",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>IвЖС вЖТ IS shifts RIGHT.</b></div>
<div class="exam-step"><b>LM horizontal вЖТ r unchanged.</b></div>
<div class="exam-step"><b>YвЖС вЖТ Y > Y_n вЖТ from PC: ѕА > ѕАћД.</b></div>
<div class="exam-step"><b>Result:</b> r unchanged, YвЖС, ѕАвЖС.</div>
<div class="exam-step"><b>Medium-run:</b> If incentives also raise productive capacity, Y_nвЖС вЖТ sustainable. If purely demand-driven, need to taper stimulus or accept higher inflation.</div>
</div>`},
]},
{head:"C1 вАФ Growth Model (no tech progress)",num:"C1",pts:"20%",prompt:"Y_t = AF(K_t, N), N constant, no tech progress. Output per worker, capital dynamics, steady state, nickel boom.",
cards:[
{title:"C1(i)вАУ(iv) вАФ Output per worker, dynamics, steady state, nickel",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>(i) y = Af(k):</b> Positive but diminishing relationship. More k вЖТ more y, but at decreasing rate (concavity).</div>
<div class="exam-step"><b>(ii) Capital dynamics:</b> K_{t+1} = (1вИТќі)K_t + I_t. If I > ќіK вЖТ K grows вЖТ Y grows. If I < ќіK вЖТ K shrinks.</div>
<div class="exam-step"><b>(iii) Steady state:</b> K_{t+1}=K_t вЖТ I* = ќіK*. Investment exactly replaces depreciation. K, Y constant.</div>
<div class="exam-step"><b>(iv) Nickel boom:</b> Higher nickel prices вЖТ explorationвЖС вЖТ YвЖС вЖТ I=sYвЖС. Movement along I=sY schedule. If persistent, capital accumulates toward new equilibrium.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Solow: No Tech Progress (Simple)</div><svg id="eg-2024-c1" viewBox="0 0 460 300"></svg></div>
</div>`},
]},
{head:"C2 вАФ Numerical Solow",num:"C2",pts:"25%",prompt:"Y=вИЪK¬ЈвИЪ(AN), s=16%, ќі=10%, n=2%, g=4%. Find steady-state values, then recompute for g=8%.",
cards:[
{title:"C2(i) вАФ Steady-state values",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Per effective worker:</b> y = вИЪk, i = 0.16вИЪk, required = (0.10+0.02+0.04)k = 0.16k.</div>
<div class="exam-step"><b>Steady state:</b> 0.16вИЪk = 0.16k вЖТ вИЪk = k вЖТ <b>k* = 1</b></div>
<div class="exam-step"><b>y* = вИЪ1 = <b>1</b></b></div>
<div class="exam-step"><b>g_{y/(AN)} = <b>0%</b></b> (y per effective worker constant in SS)</div>
<div class="exam-step"><b>g_{Y/N} = g_A = <b>4%</b></b> (output per worker grows at rate of tech)</div>
<div class="exam-step"><b>g_Y = g_A + g_N = 4%+2% = <b>6%</b></b></div>
</div>`},
{title:"C2(ii) вАФ If g doubles to 8%",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>New required investment:</b> (0.10+0.02+0.08)k = 0.20k</div>
<div class="exam-step"><b>Steady state:</b> 0.16вИЪk = 0.20k вЖТ вИЪk = 0.20k/0.16 = 1.25k вЖТ 1/вИЪk = 1.25 вЖТ вИЪk = 0.8 вЖТ <b>k* = 0.64</b></div>
<div class="exam-step"><b>y* = вИЪ0.64 = 0.8</b></div>
<div class="exam-step"><b>Explanation:</b> Faster g_A makes the break-even line steeper вЖТ k* and y* per effective worker fall. But Y/N now grows at 8% (faster), and total Y grows at 10%.</div>
</div>`},
{title:"C2(iii) вАФ Endogenous Growth Theory vs Solow",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Solow:</b> Capital faces diminishing returns вЖТ cannot sustain growth alone. Long-run growth requires exogenous technology (g_A).</div>
<div class="exam-step"><b>Endogenous growth:</b> Technology is produced INSIDE the model вАФ R&D, human capital, learning-by-doing, knowledge spillovers. Growth is self-sustaining.</div>
<div class="exam-step"><b>AK model:</b> Y=AK вЖТ no diminishing returns to broad capital вЖТ investment can sustain permanent growth.</div>
<div class="exam-step"><b>Key difference:</b> In Solow, policy (saving) affects levels only. In endogenous growth, policy (R&D subsidies, education) can affect the long-run growth rate itself.</div>
</div>`},
]},
]},

examIJA:{title:"Mid-Term Exam вАФ Macroeconomics 1, Spring 2023",
subtitle:"Prof. Iwan Jaya Azis & Teguh Dartanto ¬Ј Closed Book ¬Ј 3 hours ¬Ј Problem 1: 45%, Problem 2: 30%, Problem 3: 25%",
sections:[
{head:"Problem 1a вАФ IS slope, horizontal LM, AD derivation",num:"1a",pts:"45% total",
prompt:"Explain why the IS curve has a negative slope and the LM curve is a horizontal line (instead of having a positive slope), then derive the AD curve based on the IS-LM model.",
cards:[
{title:"Why IS Has a Negative Slope",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Starting point вАФ goods market equilibrium:</b><br>Y = C(YвИТT) + I(Y,i) + G + NX(Y,Y*,q)<br>Using linear forms: C = cвВА+cвВБ(YвИТT), I = ƒ™+bYвИТdi (d>0), NX = NXћДвИТmY+xY*+nq</div>
<div class="exam-step"><b>Solving for Y:</b><br>Y[1вИТcвВБвИТb+m] = A вИТ di, where A collects all autonomous terms.<br>So: Y = A/(1вИТcвВБвИТb+m) вИТ [d/(1вИТcвВБвИТb+m)]¬Јi = ќ± вИТ ќ≤i, where ќ≤>0.</div>
<div class="exam-step"><b>Therefore dY/di < 0 вАФ the IS curve slopes downward.</b></div>
<div class="exam-step"><b>Economic intuition:</b> A higher interest rate reduces business investment (cost of capital rises), reduces durable consumption and housing demand, and in an open economy may also appreciate the currency and reduce net exports. All three channels reduce aggregate demand. For the goods market to remain in equilibrium, output must fall. That is why higher i is associated with lower Y вАФ a downward slope.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS Curve: Negative Slope</div><svg id="eg-ija-1a-is" viewBox="0 0 400 260"></svg></div>
</div>`},
{title:"Why LM Is a Horizontal Line",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Traditional model:</b> M/P = L(Y,i). If M is fixed, YвЖС вЖТ money demandвЖС вЖТ i must rise вЖТ upward-sloping LM.</div>
<div class="exam-step"><b>Modern workhorse model:</b> The central bank does NOT passively fix M and let i adjust. Instead, it directly targets the interest rate: <b>i = ƒЂ</b>. It then supplies whatever money is needed so the money market clears at that rate.</div>
<div class="exam-step"><b>Result:</b> In (Y, i) space, the LM/MP line is perfectly horizontal at i = ƒЂ. No matter what Y is, the interest rate stays at the policy-chosen level because the CB accommodates any change in money demand.</div>
<div class="exam-step"><b>Key distinction:</b> The traditional upward-sloping LM assumes the CB controls the money supply quantity. The horizontal LM assumes the CB controls the price of money (the interest rate). Most central banks today operate via interest rate targeting, making the horizontal LM the empirically relevant representation.</div>
</div>`},
{title:"Deriving the AD Curve from IS-LM",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Critical conceptual link:</b> If the CB kept i literally fixed regardless of inflation, there would be no downward-sloping AD. The missing ingredient is the <b>monetary policy reaction function</b>: when inflation/price level rises, the CB raises i.</div>
<div class="exam-step"><b>Write the policy rule:</b> i = ƒЂ(P), where dƒЂ/dP > 0 (e.g., Taylor Rule).</div>
<div class="exam-step"><b>From IS:</b> Y = ќ± вИТ ќ≤i. Substitute policy rule: Y = ќ± вИТ ќ≤¬ЈƒЂ(P).</div>
<div class="exam-step"><b>Differentiate:</b> dY/dP = вИТќ≤¬Ј(dƒЂ/dP) < 0. <b>The AD curve slopes downward.</b></div>
<div class="exam-step"><b>Intuition:</b> When P or ѕА rises вЖТ CB tightens (raises i) вЖТ investment and interest-sensitive spending fall вЖТ Y falls. Higher prices are associated with lower output вАФ that is the AD curve.</div>
<div class="exam-step"><b>Graphical derivation (two-panel method):</b><br>
<b>Panel 1 (IS-LM):</b> Start with IS and horizontal LM at iвВА, equilibrium at YвВА. When P rises to PвВБ, CB raises rate вЖТ LM shifts up to iвВБ вЖТ new equilibrium at YвВБ < YвВА.<br>
<b>Panel 2 (AD):</b> Plot (YвВА, PвВА) and (YвВБ, PвВБ). Connect вЖТ downward-sloping AD curve.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM вЖТ AD Derivation (Two-Panel)</div><svg id="eg-ija-1a-ad" viewBox="0 0 440 400"></svg></div>
</div>`},
]},
{head:"Problem 1b вАФ AS derivation & PC positive slope",num:"1b",pts:"",
prompt:"Explain how the AS curve is derived and why the Phillips Curve has a positive slope.",
cards:[
{title:"Deriving AS from Labor Market",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Wage-setting:</b> W = PбµЙ¬ЈF(u, z), where Fбµ§ < 0. Low unemployment вЖТ strong bargaining вЖТ higher wages.</div>
<div class="exam-step"><b>Price-setting:</b> P = (1+ќЉ)¬ЈW/A. Firms set prices as a markup over unit labor cost.</div>
<div class="exam-step"><b>Combine:</b> P = (1+ќЉ)¬ЈPбµЙ¬ЈF(u, z)/A</div>
<div class="exam-step"><b>Link u to Y via Okun's Law:</b> YвЖС вЖТ firms hire more вЖТ NвЖС вЖТ uвЖУ.</div>
<div class="exam-step"><b>Chain:</b> Higher Y вЖТ lower u вЖТ higher W вЖТ higher P. Therefore P = P(Y; PбµЙ, z, ќЉ, A) with <b>dP/dY > 0</b>. That is the upward-sloping AS curve.</div>
<div class="exam-step"><b>Shifts:</b> AS shifts UP when PбµЙвЖС, ќЉвЖС (oil shock), zвЖС. AS shifts DOWN when AвЖС (productivity).</div>
</div>`},
{title:"Why the Phillips Curve Has a Positive Slope (in Y-ѕА space)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Important distinction on axes:</b><br>
вАҐ In (u, ѕА) space вАФ the classic Phillips curve вАФ the slope is <b>negative</b>: ѕА = ѕАбµЙ вИТ ќ±(u вИТ uвВЩ).<br>
вАҐ In (Y, ѕА) space вАФ the "AS in growth rates" version вАФ the slope is <b>positive</b>: ѕА = ѕАбµЙ + ќЇ(Y вИТ YвВЩ), ќЇ>0.<br>
The exam asks why the PC has a positive slope, so it means the (Y, ѕА) version.</div>
<div class="exam-step"><b>Why positive in (Y, ѕА):</b> Higher output вЖТ stronger demand вЖТ tighter labor market вЖТ lower unemployment вЖТ faster wage growth вЖТ higher inflation. So YвЖС is associated with ѕАвЖС вАФ upward slope.</div>
<div class="exam-step"><b>At Y = YвВЩ:</b> ѕА = ѕАбµЙ (inflation equals expectations вАФ stable). Left of YвВЩ: slack вЖТ ѕА < ѕАбµЙ. Right of YвВЩ: overheating вЖТ ѕА > ѕАбµЙ.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">AS Curve and Phillips Curve (Y, ѕА)</div><svg id="eg-ija-1b" viewBox="0 0 440 280"></svg></div>
</div>`},
]},
{head:"Problem 1c вАФ Open economy amplifies policy",num:"1c",pts:"",
prompt:"Explain how an expansionary policy has a bigger effect when the exchange rate market is included.",
cards:[
{title:"Two Channels vs One Channel",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Without FX market (closed economy):</b><br>CB cuts i вЖТ IвЖС вЖТ ADвЖС вЖТ YвЖС. Only the domestic investment channel operates.<br>ќФY = вИТќ≤ќФi (just the IS effect).</div>
<div class="exam-step"><b>With FX market (open economy):</b><br>CB cuts i вЖТ two things happen simultaneously:<br>
<b>Channel 1 (domestic):</b> IвЖС вЖТ ADвЖС вЖТ YвЖС (same as above).<br>
<b>Channel 2 (exchange rate):</b> Lower domestic return relative to foreign вЖТ capital outflow вЖТ domestic currency depreciates вЖТ exports become cheaper for foreigners вЖТ imports become more expensive for domestics вЖТ NXвЖС вЖТ ADвЖС even more вЖТ YвЖС more.</div>
<div class="exam-step"><b>Formal expression:</b><br>Open-economy IS: Y = A вИТ ќ≤i + ќ≥e (where higher e = depreciation).<br>When iвЖУ: ќФY = вИТќ≤ќФi + ќ≥ќФe. Both terms are positive вЖТ total ќФY is LARGER than the closed-economy effect (вИТќ≤ќФi alone).</div>
<div class="exam-step"><b>Graphically:</b> In IS-LM, the initial rate cut moves equilibrium right along IS. But then depreciation ALSO shifts IS further right (NX improves). The final YвВБ is farther right than in the closed-economy case.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Open Economy Amplification</div><svg id="eg-ija-1c" viewBox="0 0 440 280"></svg></div>
<div class="exam-interp">This is the core of Mundell-Fleming for flexible exchange rates: monetary policy is MORE effective in an open economy because the exchange rate channel reinforces the interest rate channel. (Conversely, fiscal policy is LESS effective because the exchange rate channel partially offsets it.)</div>
</div>`},
]},
{head:"Problem 1d вАФ Full 4-market disequilibrium вЖТ equilibrium",num:"1d",pts:"",
prompt:"Using monetary policy as starting point and considering capital flows, describe the full macroeconomic process across all 4 markets highlighting the transition from disequilibrium to equilibrium.",
cards:[
{title:"Complete 4-Market Story (Expansionary Monetary Policy)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Step 1 вАФ Money Market (policy shock):</b><br>CB lowers the policy interest rate. Horizontal LM/MP shifts down from ƒЂвВА to ƒЂвВБ. This is the initial shock that creates disequilibrium вАФ at the old output, planned spending now exceeds actual output.</div>
<div class="exam-step"><b>Step 2 вАФ Goods Market (initial disequilibrium):</b><br>At the lower i, investment rises, durable consumption rises, housing demand rises. Planned expenditure > actual output вЖТ firms see unexpected inventory declines вЖТ firms increase production вЖТ YвЖС, incomeвЖС. The multiplier process amplifies: YвЖС вЖТ CвЖС вЖТ YвЖС more вЖТ converges to new higher equilibrium.</div>
<div class="exam-step"><b>Step 3 вАФ Exchange Rate Market (capital flows):</b><br>Lower domestic i reduces return on domestic assets relative to foreign assets вЖТ capital outflow вЖТ excess supply of domestic currency вЖТ depreciation. The weaker currency makes exports cheaper and imports more expensive вЖТ NXвЖС вЖТ further AD boost. This AMPLIFIES the original stimulus (the Mundell-Fleming insight).</div>
<div class="exam-step"><b>Step 4 вАФ New short-run equilibrium:</b><br>The economy reaches a new goods-market equilibrium at: higher Y, lower i, weaker currency, stronger NX. Both the investment channel and the NX channel have contributed to higher output.</div>
<div class="exam-step"><b>Step 5 вАФ Labor Market adjustment:</b><br>Higher Y вЖТ firms hire more вЖТ NвЖС вЖТ uвЖУ. The labor market tightens. Workers gain bargaining power and demand higher wages: WвЖС. This is the Phillips curve mechanism activating.</div>
<div class="exam-step"><b>Step 6 вАФ Price adjustment (AS/PC mechanism):</b><br>Higher wages raise firms' unit labor costs вЖТ firms raise prices вЖТ PвЖС, ѕАвЖС. In the modern workhorse model, the CB now REACTS to rising inflation by raising i back up (Taylor Rule). In the traditional model, rising P reduces real money balances M/P, achieving the same tightening effect.</div>
<div class="exam-step"><b>Step 7 вАФ Medium-run convergence:</b><br>As PвЖС and CB tightens, the expansion partially unwinds. Over time: Y drifts back toward YвВЩ (natural output), u returns toward uвВЩ, and inflation stabilizes. The main lasting effect is on the PRICE LEVEL, not on output вАФ the long-run neutrality of money.</div>
<div class="exam-step"><b>Summary chain:</b></div>
<div class="exam-eq-box" style="text-align:left;font-size:12px;font-family:'JetBrains Mono',monospace;line-height:2">
iвЖУ вЖТ IвЖС, C_durвЖС вЖТ ADвЖС вЖТ YвЖС (goods market)<br>
iвЖУ вЖТ capital outflow вЖТ EвЖС (depreciation) вЖТ NXвЖС вЖТ YвЖСвЖС (FX market)<br>
YвЖС вЖТ NвЖС вЖТ uвЖУ вЖТ WвЖС (labor market)<br>
WвЖС вЖТ PвЖС вЖТ CB reacts: iвЖС вЖТ partial reversal (price adjustment)<br>
Eventually: Y вЖТ YвВЩ, u вЖТ uвВЩ, P permanently higher
</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">4-Market Transmission Sequence</div><svg id="eg-ija-1d" viewBox="0 0 460 420"></svg></div>
<div class="exam-interp"><b>Key exam point:</b> Macroeconomics is fundamentally a story about the PROCESS from disequilibrium to equilibrium. The workhorse model links all 4 markets sequentially: policy (money) вЖТ spending & capital flows (goods + FX) вЖТ employment (labor) вЖТ prices (AS/PC) вЖТ policy feedback вЖТ convergence. The contractionary story is the exact mirror image.</div>
</div>`},
]},
{head:"Problem 2 вАФ Powell's Statement & Chart Narrative",num:"2",pts:"30%",
prompt:'"Inflation remains too high" вАФ using this as starting point, provide the narrative to the 4-market charts showing the interactions among goods, money, exchange rate, and labor markets.',
cards:[
{title:"Chart Narrative: Contractionary Monetary Response to High Inflation",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Starting point вАФ inflation is too high:</b><br>Powell: "inflation remains too highвА¶ we remain strongly committed to bringing inflation back down to our 2 percent goal." In the workhorse model, this triggers contractionary monetary policy. The economy starts at point A (YвВЩ, iвВА) where output is at or above natural level and inflation exceeds target.</div>
<div class="exam-step"><b>Chart 1 вАФ IS-LM: LM shifts UP from LM to LM'.</b><br>The Fed raises the policy rate from iвВА to iвВБ. The horizontal LM line shifts upward. The new equilibrium A* is at the intersection of IS and LM' вЖТ Y falls from YвВЩ to Y*_A < YвВЩ. Powell confirms: "The U.S. economy slowed significantly last year, with real GDP rising at a below-trend pace of 0.9 percent."</div>
<div class="exam-step"><b>Chart 2 вАФ Exchange Rate Market: iвЖС вЖТ EвЖУ (appreciation).</b><br>Higher US interest rates make dollar assets more attractive вЖТ capital inflows вЖТ dollar appreciates (E falls from EвБї to E, matching the chart notation). This is the open-economy transmission: a stronger dollar makes US exports less competitive and imports cheaper вЖТ NXвЖУ. Powell implicitly captures this: the economy is weakening through multiple channels simultaneously.</div>
<div class="exam-step"><b>Chart 3 вАФ Phillips Curve: Economy moves from A to A*.</b><br>The PC panel shows the upward-sloping Phillips curve in (Y, ѕАвИТѕА(вИТ1)) space. Initially at point A (YвВЩ, 0) вАФ output at natural level, inflation stable. After tightening, output falls to Y*_A < YвВЩ вЖТ the economy moves to point A* where ѕА вИТ ѕА(вИТ1) < 0, meaning inflation is DECELERATING. This is the intended disinflation process.<br><br>Powell confirms each channel:<br>вАҐ "activity in the housing sector remains weak, largely reflecting higher mortgage rates" вЖТ I_housingвЖУ<br>вАҐ "higher interest ratesвА¶ weighing on business fixed investment" вЖТ I_businessвЖУ<br>вАҐ "subdued growth to continueвА¶ 0.4% this year, 1.2% next year" вЖТ YвЖУ<br>вАҐ "labor market continues to be very tight" вЖТ this is the ANOMALY вАФ u should be rising faster given the output weakness, but it hasn't yet (lags in transmission).</div>
<div class="exam-step"><b>Full narrative chain:</b><br>
ѕА too high вЖТ Fed raises i (LMвЖТLM') вЖТ IвЖУ (housing, business) вЖТ YвЖУ (below trend) вЖТ capital inflows вЖТ dollar appreciates вЖТ NXвЖУ вЖТ further YвЖУ вЖТ labor market gradually loosens вЖТ wage pressure moderates вЖТ ѕА gradually falls toward 2% target.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Problem 2: IS-LM, FX, and PC Panels</div><svg id="eg-ija-2" viewBox="0 0 460 420"></svg></div>
<div class="exam-interp"><b>The Powell anomaly:</b> In the textbook model, YвЖУ вЖТ uвЖС вЖТ WвЖУ вЖТ ѕАвЖУ cleanly. But Powell notes the labor market "continues to be very tight" despite output weakness. This reflects real-world lags, structural shifts (post-COVID labor supply changes), and the fact that the Phillips curve relationship can be noisy in practice. The exam asks you to note this anomaly but still explain the textbook mechanism.</div>

{head:"Problem 3b вАФ Interest Rate Hike Through the 3SLS System",num:"3b",pts:"",
prompt:"Using the 3SLS coefficients, explain what happens when the Central Bank raises i. Indicate changes in all relevant variables across all 4 markets.",
cards:[
{title:"Simultaneous System: CB Raises Interest Rate",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Why 3SLS matters here:</b> In a simultaneous system, a change in one variable propagates through ALL equations at once. The coefficients capture the partial effects, but the total effect includes all feedback loops. This is exactly why 3SLS is used instead of OLS equation-by-equation.</div>
<div class="exam-step"><b>Step 1 вАФ Direct effects of iвЖС:</b><br>
вАҐ Investment: I = 0.356Y <b>вИТ3690¬Јi</b> вИТ 129941¬ЈCOVID + const. Higher i вЖТ ќФI < 0 (investment falls). Even though p=0.153, the sign and mechanism are textbook-correct.<br>
вАҐ Money: M = <b>21171¬Јi</b> + 3.32Y + 515389¬ЈCOVID + const. Direct effect: ќФM > 0. But this will be offset by indirect YвЖУ channel (see below).<br>
вАҐ Miu: Miu = <b>вИТ42.3¬Јi</b> + const. Weak and insignificant вАФ not the centerpiece.</div>
<div class="exam-step"><b>Step 2 вАФ Exchange rate market (idif channel):</b><br>
iвЖС with i_world unchanged вЖТ idif = i вИТ i_world вЖС.<br>
E = <b>вИТ452.3¬Јidif</b> + 2552¬ЈCOVID + const.<br>
ќФE < 0 вЖТ domestic currency <b>appreciates</b>.<br>
Capital inflows attracted by higher domestic return вЖТ stronger currency. This is the UIP/interest-parity channel.</div>
<div class="exam-step"><b>Step 3 вАФ Trade effects (RER channel):</b><br>
Appreciation changes the real exchange rate (RER), which feeds into exports and imports:<br>
вАҐ EXNO = 9.17e-9¬ЈYWORLD <b>вИТ1044¬ЈRER</b> + const. The direction depends on the RER definition, but the exchange rate movement affects trade competitiveness.<br>
вАҐ IMNO = 0.081¬ЈY <b>вИТ2354¬ЈRER</b> + const. Similar channel.<br>
The textbook prediction: appreciation вЖТ exports less competitive, imports cheaper вЖТ NX worsens вЖТ further contractionary pressure on Y.</div>
<div class="exam-step"><b>Step 4 вАФ Output falls (goods market multiplier):</b><br>
IвЖУ and potential NXвЖУ вЖТ aggregate demand falls вЖТ YвЖУ.<br>
Then the multiplier kicks in:<br>
вАҐ C = <b>0.486¬ЈYDIS</b> + const. YвЖУ вЖТ YDISвЖУ вЖТ CвЖУ (the consumption-income feedback loop).<br>
вАҐ IMNO = <b>0.081¬ЈY</b> + const. YвЖУ вЖТ IMNOвЖУ (imports fall with income вАФ this PARTIALLY offsets the trade deterioration).<br>
вАҐ I = <b>0.356¬ЈY</b> вИТ 3690i + const. YвЖУ вЖТ IвЖУ further (accelerator in reverse).</div>
<div class="exam-step"><b>Step 5 вАФ Money market feedback:</b><br>
M = 21171¬Јi + <b>3.32¬ЈY</b> + const.<br>
Direct: iвЖС вЖТ MвЖС. Indirect: YвЖУ вЖТ MвЖУ.<br>
Net effect is a simultaneous-equations result вАФ this is precisely why 3SLS is needed. In practice, the Y effect likely dominates given the massive coefficient (3.32 on Y vs 21,171 on i), since ќФY is proportionally much larger than ќФi.</div>
<div class="exam-step"><b>Step 6 вАФ Labor market:</b><br>
u = <b>вИТ4.66e8¬ЈPROD</b> + 3.16e6¬ЈCOVID + const.<br>
The unemployment equation doesn't include Y directly, but the macroeconomic interpretation is clear: YвЖУ вЖТ firms produce less вЖТ labor demandвЖУ вЖТ some workers become redundant вЖТ uвЖС.<br>
The productivity channel also matters: if the output decline reduces measured productivity, the PRODвЖУ вЖТ uвЖС effect reinforces the labor market weakening.</div>
<div class="exam-step"><b>Step 7 вАФ Price block:</b><br>
P = <b>1.002¬ЈPEX</b> + 3.01e-8¬Јu + const.<br>
The dominant force is price expectations (PEX), which track actual prices almost one-for-one. The direct uвЖТP channel is marginal (p=0.085).<br>
<b>Important implication:</b> Disinflation from rate hikes works SLOWLY. Prices are not directly responsive to unemployment in this estimated system. Instead, the transmission is indirect: iвЖС вЖТ YвЖУ вЖТ uвЖС вЖТ expectations eventually adjust вЖТ PEXвЖУ вЖТ PвЖУ gradually. This matches real-world experience where disinflation takes time.</div>
<div class="exam-step"><b>Complete 4-market chain with coefficients:</b></div>
<div class="exam-eq-box" style="text-align:left;font-size:11.5px;font-family:'JetBrains Mono',monospace;line-height:2">
<b>Money mkt:</b>  iвЖС (policy shock)<br>
<b>FX mkt:</b>    idifвЖС вЖТ[вИТ452.3]вЖТ EвЖУ (appreciation)<br>
<b>Goods mkt:</b> iвЖС вЖТ[вИТ3690]вЖТ IвЖУ вЖТ YвЖУ<br>
              YвЖУ вЖТ[+0.486]вЖТ YDISвЖУ вЖТ CвЖУ<br>
              YвЖУ вЖТ[+0.081]вЖТ IMNOвЖУ<br>
              YвЖУ вЖТ[+0.356]вЖТ IвЖУ (accelerator feedback)<br>
<b>Labor mkt:</b> YвЖУ вЖТ labor demandвЖУ вЖТ uвЖС<br>
<b>Price blk:</b> uвЖС вЖТ P adjusts slowly via PEX channel
</div>
<div class="exam-interp"><b>Key 3SLS insight:</b> In the simultaneous system, each coefficient is a PARTIAL effect holding other endogenous variables constant. But because all equations solve simultaneously, the TOTAL effect includes all the feedback loops. For example, IвЖУ вЖТ YвЖУ вЖТ CвЖУ вЖТ YвЖУ more вЖТ IвЖУ more (via the 0.356¬ЈY accelerator) вАФ this multiplier cascade is captured by the system solution but not by any single equation's coefficient. That is the fundamental advantage of 3SLS over OLS.</div>
</div>`},
]},
]},
};

{name:'Natural Rate of Unemployment',eq:'u_n = 1 - \\frac{1}{1+\\mu}',vars:[['u_n','Natural rate вАФ the unemployment rate where WS = PS'],['\\mu','Markup']],interp:'Found by setting WS = PS: 1вИТu_n = 1/(1+ќЉ). Higher markup вЖТ higher u_n. More market power means firms suppress real wages, requiring higher unemployment to make workers accept those wages.',example:'If ќЉ=0.10: u_n = 1вИТ1/1.10 = 1вИТ0.909 = 0.091 = 9.1%. If ќЉ=0.15: u_n = 1вИТ1/1.15 = 13.0%.'},
],
week4:[
{name:'Solow Steady-State Condition',eq:'sf(k^*) = (\\delta + g_N + g_A) k^*',vars:[['s','Saving rate вАФ fraction of output invested'],['f(k^*)','Output per effective worker at steady state'],['k^*','Steady-state capital per effective worker = K/(AN)'],['\\delta','Depreciation rate'],['g_N','Labor force growth rate'],['g_A','Technological progress growth rate']],interp:'At steady state, actual investment sf(k) exactly equals break-even investment (ќі+g_N+g_A)k. Capital per effective worker stops changing. Output per effective worker is constant. But total output grows at g_N+g_A, and output per worker grows at g_A.',example:'If s=0.16, f(k)=вИЪk, ќі=0.10, g_N=0.02, g_A=0.04: 0.16вИЪk* = 0.16k* вЖТ вИЪk*=k* вЖТ k*=1, y*=1.'},
{name:'Law of Motion for Capital (per effective worker)',eq:'\\Delta k = sf(k) - (\\delta + g_A + g_N)k',vars:[['\\Delta k','Change in capital per effective worker'],['sf(k)','Actual investment per effective worker'],['(\\delta+g_A+g_N)k','Required (break-even) investment per effective worker']],interp:'If sf(k) > required investment вЖТ ќФk > 0 вЖТ economy accumulates capital вЖТ moves right toward k*. If sf(k) < required вЖТ ќФk < 0 вЖТ economy decumulates вЖТ moves left toward k*. Steady state is stable.',example:'If k=0.5, s=0.16, f(k)=вИЪk, ќі+g_N+g_A=0.16: sf(k)=0.16√Ч0.707=0.113, required=0.16√Ч0.5=0.08 вЖТ ќФk=0.033>0, k rises.'},
{name:'Steady-State Growth Rates',eq:'g_{Y/N} = g_A, \\quad g_Y = g_A + g_N',vars:[['g_{Y/N}','Growth rate of output per worker in steady state'],['g_Y','Growth rate of total output in steady state'],['g_A','Rate of technological progress'],['g_N','Rate of labor force growth']],interp:'In Solow steady state, only technology drives per-capita growth. Saving rate affects the LEVEL but not the long-run GROWTH RATE. This is why the Solow model implies policy (saving) cannot permanently raise growth вАФ only technology can.',example:'If g_A=4%, g_N=2%: output per worker grows at 4%, total output grows at 6%.'},
],
week5:[
{name:'Bond Pricing',eq:'P_B = \\frac{C}{(1+i)} + \\frac{C}{(1+i)^2} + \\cdots + \\frac{C+F}{(1+i)^n}',vars:[['P_B','Bond price вАФ present value of all future cash flows'],['C','Coupon payment (periodic interest)'],['F','Face value (principal, repaid at maturity)'],['i','Market interest rate (yield to maturity)'],['n','Number of periods to maturity']],interp:'Bond price and yield are INVERSELY related. When market rates rise, existing bonds with lower coupons become less attractive вЖТ price falls. Longer maturity bonds are more sensitive to rate changes (higher duration).',example:'A 2-year bond with F=1000, C=50, i=6%: P = 50/1.06 + 1050/1.06¬≤ = 47.17 + 934.49 = $981.67.'},
{name:'Gordon Growth Model (Stocks)',eq:'P_0 = \\frac{D_1}{r - g}',vars:[['P_0','Current stock price'],['D_1','Expected dividend next period'],['r','Required rate of return (discount rate)'],['g','Expected dividend growth rate (g < r)']],interp:'Stock price equals the PV of all future dividends growing at rate g. Higher expected dividends вЖТ higher price. Higher discount rate вЖТ lower price. This explains why stocks fall when interest rates rise.',example:'If DвВБ=$2, r=8%, g=3%: PвВА = 2/(0.08вИТ0.03) = 2/0.05 = $40.'},
{name:'User Cost of Capital',eq:'\\text{User cost} = r + \\delta',vars:[['r','Real interest rate вАФ opportunity cost of funds'],['\\delta','Depreciation rate вАФ physical wear and obsolescence']],interp:'The minimum return a capital investment must earn to be worthwhile. Invest if expected profit rate ќ†/K exceeds user cost (r+ќі). This links financial markets (r) to real investment decisions.',example:'If r=5% and ќі=10%: user cost = 15%. A machine must generate at least 15% return to justify purchase.'},
],
week6:[
{name:'Phillips Curve with Anchored Expectations',eq:'\\pi_t = (1-\\theta)\\bar{\\pi} + \\theta\\pi_{t-1} + (m+z) - \\alpha u_t',vars:[['\\pi_t','Current inflation'],['\\bar{\\pi}','Anchored/constant inflation benchmark (e.g., CB target)'],['\\theta','Weight on lagged inflation (0=fully anchored, 1=fully adaptive)'],['m','Markup'],['z','Labor market institutions/unemployment benefits'],['\\alpha','Sensitivity of inflation to unemployment'],['u_t','Current unemployment rate']],interp:'When ќЄ=0 (original Phillips curve): direct level tradeoff between ѕА and u. When ќЄ=1 (modern/augmented): tradeoff is between CHANGE in inflation and u. The natural rate is u_n = (m+z)/ќ±.',example:'ќЄ=0: ѕА = ѕАћД + (m+z) вИТ ќ±u вЖТ classic downward-sloping curve. ќЄ=1: ѕАвИТѕА_{tвИТ1} = (m+z)вИТќ±u вЖТ accelerationist Phillips curve.'},
{name:'Time Inconsistency Condition',eq:'\\text{If } \\alpha > 0: \\text{ accepting } \\pi = \\epsilon \\text{ gives } u = u_n - \\frac{\\epsilon}{\\alpha}',vars:[['\\alpha','Phillips curve slope'],['\\epsilon','Small inflation increase accepted by CB'],['u_n','Natural unemployment rate']],interp:'The CB can temporarily reduce u below u_n by allowing some surprise inflation. But once wage-setters catch on, expected inflation rises, requiring even more inflation for the same u benefit вЖТ inflationary spiral.',example:'If ќ±=0.5, u_n=6%: accepting ѕА=1% yields u = 6%вИТ1%/0.5 = 4%. But next period, ѕА^e rises to 1%, so CB needs ѕА=2% for same u=4%.'},
],
week7:[
{name:'Production Function per Effective Worker',eq:'y = f(k) = \\frac{Y}{AN} = f\\left(\\frac{K}{AN}\\right)',vars:[['y','Output per effective worker вАФ constant in steady state'],['k','Capital per effective worker'],['A','Technology level'],['N','Number of workers'],['AN','Effective labor вАФ the labor-augmenting concept']],interp:'Dividing by effective labor AN normalizes for both population and technology growth. In steady state, y and k are constant, but Y/N grows at rate g_A because A keeps increasing.',example:'If Y=вИЪK√ЧвИЪ(AN), then y = Y/(AN) = вИЪ(K/(AN)) = вИЪk. So f(k)=вИЪk.'},
{name:'Required Investment (Break-Even)',eq:'\\text{Required } i = (\\delta + g_A + g_N)k',vars:[['\\delta','Depreciation вАФ must replace worn-out capital'],['g_A','Technology growth вАФ effective labor grows, so need more K to keep k constant'],['g_N','Labor force growth вАФ more workers need capital to maintain k']],interp:'Three reasons an economy must invest: (1) replace depreciated capital, (2) equip new workers, (3) keep up with technological progress. If actual investment falls short, k declines.',example:'If ќі=10%, g_A=4%, g_N=2%, k=1: required investment = 0.16√Ч1 = 0.16 per effective worker.'},
{name:'3SLS Estimation (Simultaneous Equations)',eq:'\\hat{\\beta}_{3SLS} = (X\'Z(Z\'\\hat{\\Sigma}^{-1}Z)^{-1}Z\'X)^{-1} X\'Z(Z\'\\hat{\\Sigma}^{-1}Z)^{-1}Z\'y',vars:[['X','Matrix of endogenous and exogenous regressors'],['Z','Matrix of instruments (IVs)'],['\\hat{\\Sigma}','Estimated variance-covariance matrix of errors across equations'],['y','Dependent variable vector']],interp:'3SLS corrects for both endogeneity (using instruments, like 2SLS) and cross-equation error correlations (like SUR). It is more efficient than estimating each equation separately when equations are interconnected вАФ exactly the case for the 5-market model.',example:'The 5-market model has 16 equations estimated simultaneously. OLS of Bond on Yield gives ќ≤=вИТ49.8, but 3SLS gives ќ≤=вИТ59.4 вАФ endogeneity bias corrected.'},
],
};

function renderFormulas(wk){

}
function mkEl(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function gLine(svg,x1,y1,x2,y2,color,width=1.5,dash=''){const l=mkEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':width});if(dash)l.setAttribute('stroke-dasharray',dash);svg.appendChild(l)}
function gPath(svg,d,color,width=2,fill='none'){svg.appendChild(mkEl('path',{d,stroke:color,'stroke-width':width,fill}))}
function gText(svg,x,y,text,size=11,color='#555',anchor='middle',weight=500){const t=mkEl('text',{x,y,fill:color,'font-size':size,'font-family':'Inter,sans-serif','font-weight':weight,'text-anchor':anchor,'dominant-baseline':'middle'});t.textContent=text;svg.appendChild(t)}
function gCircle(svg,x,y,r,fill,stroke='none'){svg.appendChild(mkEl('circle',{cx:x,cy:y,r,fill,stroke,'stroke-width':stroke!=='none'?2:0}))}
function gRect(svg,x,y,w,h,fill,rx=0){svg.appendChild(mkEl('rect',{x,y,width:w,height:h,fill,rx}))}
function makeAxes(svg,W,H,M,xLabel,yLabel){
gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);
gText(svg,W/2+M.l/2,H-6,xLabel,11,'#555');gText(svg,14,(H-M.b-M.t)/2+M.t,yLabel,11,'#555','middle');
const yt=svg.lastChild;yt.setAttribute('transform',`rotate(-90,14,${(H-M.b-M.t)/2+M.t})`);
}
function makeSVG(parent,W,H,id){
const s=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',preserveAspectRatio:'xMidYMid meet',id});
s.style.background='#FEFEFE';s.style.borderRadius='8px';s.style.border='1px solid #ECEAE6';
parent.appendChild(s);return s;
}
function clearSVG(id){const s=document.getElementById(id);if(s)while(s.firstChild)s.removeChild(s.firstChild);return s}

function drawISLM(){
const c=document.getElementById('gc-islm');
const scenarios=[

];
c.innerHTML=`<div class="g-card"><h4>IS-LM Equilibrium</h4><p class="g-desc">Goods market (IS) √Ч Money market (LM). IS slopes down: higher i вЖТ lower I вЖТ lower Y. LM is horizontal (CB targets i).</p>
<div class="g-canvas-wrap"><div id="islm-svg"></div></div>
${scBar(scenarios,'islm')}
<div class="g-controls">

<div class="g-ctrl"><label>M shift:</label><input type="range" min="-40" max="40" value="0" id="islm-m" oninput="updISLM()"><span class="g-val" id="islm-mv">0</span></div>
<div class="g-ctrl"><label>Confidence:</label><input type="range" min="-30" max="30" value="0" id="islm-c" oninput="updISLM()"><span class="g-val" id="islm-cv">0</span></div>
</div><div class="g-insight" id="islm-insight"></div></div>`;

window.applyScenario_islm=function(id,btn){
btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const s={gup:[50,0,0],gdn:[-50,0,0],mup:[0,35,0],mdn:[0,-35,0],cup:[0,0,25],cdn:[0,0,-25],tdn:[30,0,10],combo:[40,30,0],reset:[0,0,0]};
const v=s[id]||[0,0,0];
document.getElementById('islm-g').value=v[0];document.getElementById('islm-m').value=v[1];document.getElementById('islm-c').value=v[2];

function updISLM(){
const W=520,H=340,M={l:50,r:20,t:20,b:40};
const dG=+document.getElementById('islm-g').value;
const dM=+document.getElementById('islm-m').value;
const dC=+document.getElementById('islm-c').value;
document.getElementById('islm-gv').textContent=dG>0?'+'+dG:dG;
document.getElementById('islm-mv').textContent=dM>0?'+'+dM:dM;
document.getElementById('islm-cv').textContent=dC>0?'+'+dC:dC;
const pw=document.getElementById('islm-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'islm-s');
makeAxes(svg,W,H,M,'Output (Y)','Interest rate (i)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
const isShift=(dG+dC)*0.003;
// Base IS (gray)
if(isShift!==0){let d0='';for(let t=0;t<=1;t+=.02){const y=0.85-0.7*t;d0+=(t===0?'M':'L')+toX(t)+','+toY(Math.max(0,Math.min(1,y)))}gPath(svg,d0,'#E0E0DC',1.5);gText(svg,toX(0.95),toY(0.85-0.7*0.95)-8,'ISвВА',9,'#ccc','start')}
// Shifted IS
let d='';for(let t=0;t<=1;t+=.02){const y=0.85-0.7*t+isShift;d+=(t===0?'M':'L')+toX(t)+','+toY(Math.max(0,Math.min(1,y)))}
gPath(svg,d,'#2563EB',2.2);gText(svg,toX(0.95),toY(Math.max(0.05,0.85-0.7*0.95+isShift))-8,isShift!==0?'IS\'':'IS',11,'#2563EB','start',700);
// LM
const lmLevel=0.45-dM*0.004;
if(dM!==0){gLine(svg,M.l,toY(0.45),W-M.r,toY(0.45),'#C0C0BC',1.5,'4 3');gText(svg,W-M.r+2,toY(0.45)-2,'LMвВА',9,'#aaa','start')}
gLine(svg,M.l,toY(lmLevel),W-M.r,toY(lmLevel),'#059669',2.2);gText(svg,W-M.r+2,toY(lmLevel)-2,dM!==0?'LM\'':'LM',11,'#059669','start',700);
// Equilibria
const eqY=(0.85+isShift-lmLevel)/0.7;const eqI=lmLevel;
const e0Y=(0.85-0.45)/0.7;
if(isShift!==0||dM!==0){const e0x=toX(e0Y),e0y=toY(0.45);gCircle(svg,e0x,e0y,4,'#ddd','#bbb');gText(svg,e0x+10,e0y-10,'A',10,'#aaa')}
const ex=toX(Math.max(0.05,Math.min(0.95,eqY))),ey=toY(Math.max(0.05,Math.min(0.95,eqI)));
gCircle(svg,ex,ey,5,'#DC2626','#fff');gText(svg,ex+10,ey-10,isShift!==0||dM!==0?'B':'A',11,'#DC2626','start',700);
gLine(svg,ex,ey,ex,H-M.b,'#DC2626',1,'3 3');gLine(svg,ex,ey,M.l,ey,'#DC2626',1,'3 3');
gText(svg,ex,H-M.b+14,'Y*',10,'#DC2626');gText(svg,M.l-12,ey,'i*',10,'#DC2626');
// Explanation
let exp='';
if(dG>0&&dM===0) exp='<b>Fiscal expansion (GвЖС):</b><br>Step 1: GвЖС вЖТ total demand ZвЖС вЖТ IS shifts RIGHT<br>Step 2: At same i, higher demand вЖТ firms produce more вЖТ YвЖС<br>Step 3: With horizontal LM (CB keeps i fixed), no crowding out<br>Step 4: New equilibrium B has higher Y, same i<br><b>Result: YвЖС, i unchanged.</b> Pure demand stimulus.';
else if(dG<0&&dM===0) exp='<b>Fiscal contraction (GвЖУ):</b><br>Step 1: GвЖУ вЖТ total demand ZвЖУ вЖТ IS shifts LEFT<br>Step 2: At same i, lower demand вЖТ firms cut production вЖТ YвЖУ<br>Step 3: Multiplier amplifies: YвЖУ вЖТ CвЖУ вЖТ YвЖУ further<br>Step 4: New equilibrium B has lower Y<br><b>Result: YвЖУ, i unchanged.</b> Austerity contracts the economy.';
else if(dM>0&&dG===0&&dC===0) exp='<b>Monetary easing (MвЖС):</b><br>Step 1: CB buys bonds вЖТ injects money вЖТ MвЖС вЖТ LM shifts DOWN<br>Step 2: Lower i вЖТ cost of borrowing falls вЖТ IвЖС<br>Step 3: IвЖС вЖТ ADвЖС вЖТ YвЖС (movement along IS curve)<br>Step 4: New equilibrium B has lower i AND higher Y<br><b>Result: iвЖУ, YвЖС.</b> Monetary policy works through the investment channel.';
else if(dM<0&&dG===0&&dC===0) exp='<b>Monetary tightening (MвЖУ):</b><br>Step 1: CB sells bonds вЖТ absorbs money вЖТ MвЖУ вЖТ LM shifts UP<br>Step 2: Higher i вЖТ borrowing more expensive вЖТ IвЖУ<br>Step 3: IвЖУ вЖТ ADвЖУ вЖТ YвЖУ (movement along IS curve)<br>Step 4: New equilibrium B has higher i AND lower Y<br><b>Result: iвЖС, YвЖУ.</b> Tight money cools the economy but hurts investment.';
else if(dC>0&&dG===0&&dM===0) exp='<b>Confidence boom (animal spiritsвЖС):</b><br>Step 1: Optimism вЖТ consumers spend more (cвВАвЖС), firms invest more вЖТ IS shifts RIGHT<br>Step 2: Same mechanism as fiscal expansion but driven by private sector<br>Step 3: YвЖС at given i<br><b>Result: YвЖС.</b> Keynes emphasized these "animal spirits" as key drivers of business cycles.';
else if(dC<0&&dG===0&&dM===0) exp='<b>Confidence crash (animal spiritsвЖУ):</b><br>Step 1: Pessimism/fear вЖТ CвЖУ, IвЖУ вЖТ IS shifts LEFT<br>Step 2: Even if CB holds i steady, demand collapses<br>Step 3: YвЖУ, potentially triggering a feedback loop (YвЖУ вЖТ more pessimism вЖТ YвЖУ more)<br><b>Result: YвЖУ.</b> This is why recessions can be self-reinforcing вАФ confidence is contagious.';
else if(dG>0&&dM>0) exp='<b>Fiscal + Monetary expansion (policy mix):</b><br>Step 1: GвЖС вЖТ IS shifts RIGHT (higher demand)<br>Step 2: MвЖС вЖТ LM shifts DOWN (lower rates)<br>Step 3: BOTH channels reinforce: YвЖСвЖС from demand AND cheaper borrowing<br>Step 4: This is the most powerful stimulus combination<br><b>Result: YвЖСвЖС, iвЖУ.</b> Used during severe recessions (e.g., COVID response). Risk: inflation if economy near capacity.';
else if(dG>0&&dC>0&&dM===0) exp='<b>Tax cut:</b><br>Step 1: TвЖУ вЖТ disposable income (YвИТT)вЖС вЖТ CвЖС<br>Step 2: Confidence also rises (optimism about future income)<br>Step 3: Both shift IS RIGHT вЖТ YвЖС<br><b>Result: YвЖС.</b> Tax cuts work through both income and confidence channels, but create fiscal deficit.';
if(!exp) exp='Drag the sliders or click a scenario above. IS slopes down because higher i вЖТ lower I вЖТ lower Y. LM is horizontal because the CB sets i directly (modern central banking). Fiscal policy shifts IS; monetary policy shifts LM.';
document.getElementById('islm-insight').innerHTML=exp;
}

const scenarios=[

gPath(svg,dAD,'#2563EB',2.2);gText(svg,toX(0.1),toY(0.9-0.07+s.adShift)+12,s.adShift!==0?'AD\'':'AD',11,'#2563EB');
let dAS='';for(let t=0.02;t<=0.98;t+=.02){dAS+=(t<=0.03?'M':'L')+toX(t)+','+toY(0.1+0.65*t+s.asShift)}
gPath(svg,dAS,'#DC2626',2.2);gText(svg,toX(0.9)+6,toY(0.1+0.65*0.9+s.asShift),s.asShift!==0?'AS\'':'AS',11,'#DC2626','start',700);
// Equilibria
const findEq=(adS,asS)=>{const y=(0.9+adS-0.1-asS)/(0.7+0.65);return{y:Math.max(0.05,Math.min(0.95,y)),p:Math.max(0.05,Math.min(0.95,0.1+0.65*y+asS))}};

gCircle(svg,toX(eq1.y),toY(eq1.p),5,'#1B2A4A');gText(svg,toX(eq1.y)+12,toY(eq1.p)-10,s.adShift!==0||s.asShift!==0?'B':'A',11,'#1B2A4A','start',700);
const exps={
fiscal:'<b>Fiscal expansion (GвЖС):</b><br>Step 1: GвЖС вЖТ total spendingвЖС вЖТ AD shifts RIGHT<br>Step 2: At old P, excess demand вЖТ firms raise P and expand Y<br>Step 3: Short-run eq at B: YвЖС AND PвЖС<br>Step 4: <i>Medium run:</i> P>PбµЙ вЖТ workers demand higher W вЖТ AS shifts LEFT вЖТ Y returns to YвВЩ at even higher P<br><b>Short run: YвЖС, PвЖС. Medium run: YвЖТYвВЩ, PвЖСвЖС.</b>',
monetary:'<b>Monetary expansion (MвЖС):</b><br>Step 1: CB buys bonds вЖТ MвЖС вЖТ iвЖУ вЖТ IвЖС вЖТ AD shifts RIGHT<br>Step 2: Same as fiscal: excess demand вЖТ YвЖС, PвЖС<br>Step 3: <i>Medium run:</i> same self-correction back to YвВЩ<br><b>Short run: YвЖС, PвЖС. Medium run: YвЖТYвВЩ, PвЖСвЖС.</b> Money is neutral in the medium run вАФ only P changes permanently.',
oil:'<b>Oil price shock (POILвЖС):</b><br>Step 1: Oil = input cost вЖТ markup ќЉвЖС вЖТ production costsвЖС вЖТ AS shifts LEFT<br>Step 2: At old Y, costs too high вЖТ firms cut output, raise prices<br>Step 3: New eq at B: YвЖУ AND PвЖС = <b>STAGFLATION</b><br>Step 4: CB dilemma: raise i to fight inflation? (worsens recession) or cut i to fight recession? (worsens inflation)<br><b>Result: YвЖУ, PвЖС.</b> The policymaker\'s nightmare вАФ no good options.',
tech:'<b>Technology boom (AвЖС):</b><br>Step 1: TFPвЖС вЖТ each worker produces more вЖТ unit costs fall вЖТ AS shifts RIGHT<br>Step 2: At old P, firms can supply more at lower cost вЖТ YвЖС, PвЖУ<br>Step 3: <i>Bonus:</i> if confidence rises too вЖТ AD may also shift right<br>Step 4: The BEST outcome вАФ more output at lower prices<br><b>Result: YвЖС, PвЖУ.</b> This is what every economy wants.',
wage:'<b>Wage push (WвЖС):</b><br>Step 1: Unions/minimum wage вЖТ WвЖС above equilibrium<br>Step 2: Higher labor costs вЖТ firms raise prices вЖТ AS shifts LEFT<br>Step 3: YвЖУ, PвЖС (same direction as oil shock but from labor market)<br>Step 4: If W stays elevated вЖТ new higher uвВЩ (structural unemployment)<br><b>Result: YвЖУ, PвЖС.</b> Cost-push inflation from labor market rigidity.',
conf_neg:'<b>Demand collapse (confidence crash):</b><br>Step 1: Pessimism вЖТ CвЖУ, IвЖУ вЖТ AD shifts LEFT<br>Step 2: Less demand вЖТ firms cut production and prices вЖТ YвЖУ, PвЖУ<br>Step 3: <i>Medium run:</i> P<PбµЙ вЖТ workers accept lower W (slowly!) вЖТ AS shifts RIGHT вЖТ recovery<br>Step 4: BUT wages are sticky downward вЖТ self-correction is VERY SLOW<br><b>Result: YвЖУ, PвЖУ.</b> This is why active policy is needed in recessions вАФ waiting for self-correction takes years.',

recovery:'<b>Post-recession recovery (ADвЖС + ASвЖС):</b><br>Step 1: Fiscal/monetary stimulus вЖТ AD shifts RIGHT<br>Step 2: Simultaneously, supply chains heal, tech improves вЖТ AS shifts RIGHT<br>Step 3: Both shifts boost Y; price effect depends on relative magnitudes<br>Step 4: Ideal recovery: YвЖСвЖС with moderate P<br><b>Result: YвЖСвЖС, P depends on balance.</b> Post-COVID saw this pattern (but with inflation due to AD outpacing AS).',
};

oil:'<b>Oil priceвЖС (ќЉвЖС):</b><br>Step 1: Oil = production input вЖТ higher costs вЖТ firms raise markup ќЉ<br>Step 2: PS line = 1/(1+ќЉ) shifts DOWN (lower real wage firms are willing to pay)<br>Step 3: WS unchanged вЖТ intersection moves RIGHT вЖТ uвВЩвЖС<br>Step 4: Workers get lower real wage AND higher unemployment<br><b>Result: uвВЩвЖС, W/PвЖУ.</b> Oil shocks hit workers twice вАФ lower pay AND fewer jobs. This is the labor market mechanism behind stagflation.',
compete:'<b>More competition (ќЉвЖУ):</b><br>Step 1: Anti-trust, deregulation вЖТ less market power вЖТ lower markup ќЉ<br>Step 2: PS = 1/(1+ќЉ) shifts UP (firms pass more value to workers)<br>Step 3: Intersection moves LEFT вЖТ uвВЩвЖУ<br><b>Result: uвВЩвЖУ, W/PвЖС.</b> Workers benefit from competition вАФ higher real wages AND lower unemployment.',
minwage:'<b>Minimum wageвЖС:</b><br>Step 1: Legal minimum pushes W/P above equilibrium at low u<br>Step 2: Effectively shifts WS UP (workers won\'t accept below minimum)<br>Step 3: uвВЩвЖС if minimum wage is binding<br>Step 4: <i>BUT:</i> Card & Krueger showed that if labor market is monopsonistic, moderate min wage can INCREASE employment<br><b>Result: ambiguous</b> вАФ depends on market structure. Standard model says uвВЩвЖС, but reality is more nuanced.',
tp:'<b>ProductivityвЖС (AвЖС):</b><br>Step 1: Higher A вЖТ firms can produce more per worker<br>Step 2: If expectations are correct (AбµЙ=A): BOTH WS and PS shift up proportionally<br>Step 3: uвВЩ unchanged! Real wages rise at rate of productivity growth<br>Step 4: If expectations are incorrect (AбµЙ>A): WS shifts up MORE вЖТ uвВЩвЖС temporarily<br><b>Result: uвВЩ unchanged if AбµЙ=A; uвВЩвЖС temporarily if AбµЙвЙ†A.</b>'
};
document.getElementById('wsps-insight').innerHTML=exps[sc]||`Natural rate uвВЩ вЙИ ${bestU.toFixed(1)}%. Real wage = ${ps.toFixed(3)}. Click a scenario to explore what shifts WS or PS.`;
}

gLine(svg,toX(0),toY(c0+dgN),toX(0.9),toY(c0+dgN+mpc*0.9),'#2563EB',2.2);gText(svg,toX(0.92),toY(c0+dgN+mpc*0.92),dg>0?'ZZ\'':'ZZ',11,'#2563EB','start',700);

if(dg>0){gCircle(svg,toX(Math.min(eqY0,0.95)),toY(Math.min(eqY0,0.95)),4,'#ddd','#bbb');gText(svg,toX(Math.min(eqY0,0.95))-12,toY(Math.min(eqY0,0.95))-10,'A',10,'#999')}
gCircle(svg,toX(Math.min(eqY1,0.95)),toY(Math.min(eqY1,0.95)),5,'#DC2626');gText(svg,toX(Math.min(eqY1,0.95))+10,toY(Math.min(eqY1,0.95))-10,dg>0?'B':'A',11,'#DC2626','start',700);
if(dg>0){gRect(svg,toX(eqY0)+2,H-M.b+8,Math.max(1,(toX(eqY1)-toX(eqY0))-4),6,'rgba(37,99,235,.3)',3);gText(svg,(toX(eqY0)+toX(eqY1))/2,H-M.b+22,'ќФY = '+mult.toFixed(1)+' √Ч ќФG',9,'#2563EB')}
const sc=window._kcScenario;
const exps={
gup_low:`<b>GвЖС with low MPC (0.40):</b><br>Multiplier = 1/(1вИТ0.40) = <b>1.67</b><br>Step 1: GвЖС by ${dg} вЖТ ZZ shifts UP by ${dg}<br>Step 2: Round 1: output rises by ${dg}<br>Step 3: Round 2: 40% re-spent вЖТ output rises by ${(dg*0.4).toFixed(0)}<br>Step 4: Round 3: 40% of that вЖТ ${(dg*0.16).toFixed(0)}... converges<br>Step 5: Total ќФY = ${(dg*1.67).toFixed(0)}<br><b>Low MPC = small multiplier.</b> High-saving economies get less bang for fiscal buck.`,
gup_high:`<b>GвЖС with high MPC (0.80):</b><br>Multiplier = 1/(1вИТ0.80) = <b>5.0</b><br>Step 1: GвЖС by ${dg} вЖТ ZZ shifts UP<br>Step 2: Round 1: +${dg}. Round 2: +${(dg*0.8).toFixed(0)}. Round 3: +${(dg*0.64).toFixed(0)}...<br>Step 3: Each round, 80% is re-spent вЖТ slow convergence<br>Step 4: Total ќФY = ${(dg*5).toFixed(0)} вАФ FIVE times the initial spending!<br><b>High MPC = large multiplier.</b> Developing countries with high MPC (less saving) get bigger fiscal multipliers.`,
taxcut:`<b>Tax cut (TвЖУ):</b><br>Step 1: TвЖУ вЖТ disposable income (YвИТT)вЖС вЖТ CвЖС вЖТ ZZ shifts UP<br>Step 2: BUT: tax multiplier < spending multiplier!<br>Step 3: Why? Only MPC fraction of tax cut is spent. G goes 100% to demand, T goes cвВБ% to demand<br>Step 4: Tax multiplier = cвВБ/(1вИТcвВБ) = ${(mpc/(1-mpc)).toFixed(2)} vs spending multiplier = ${mult.toFixed(2)}<br><b>Tax cuts are less effective than direct spending</b> (Haavelmo theorem).`,
export:`<b>Export boom (EXвЖС):</b><br>Step 1: Foreign demandвЖС вЖТ EXвЖС вЖТ same as autonomous spendingвЖС<br>Step 2: ZZ shifts UP вЖТ same multiplier process<br>Step 3: BUT: as YвЖС вЖТ IMвЖС (import leakage) вЖТ partially offsets<br>Step 4: Open economy multiplier is SMALLER than closed: 1/(1вИТcвВБ+m) where m = marginal propensity to import<br><b>Trade openness reduces the multiplier</b> because spending leaks abroad.`,
import_leak:`<b>Import leakage (open economy):</b><br>MPC = ${mpc.toFixed(2)} but some spending goes to imports<br>Step 1: If import propensity m = 0.2, effective MPC for domestic = ${(mpc-0.2).toFixed(2)}<br>Step 2: Open multiplier = 1/(1вИТ${(mpc-0.2).toFixed(2)}) = ${(1/(1-mpc+0.2)).toFixed(2)}<br>Step 3: Compare closed: ${mult.toFixed(2)} vs open: ${(1/(1-mpc+0.2)).toFixed(2)}<br><b>Open economies have weaker fiscal multipliers.</b> This is why small open economies rely more on monetary/exchange rate policy.`
};
document.getElementById('kc-insight').innerHTML=exps[sc]||`MPC = ${mpc.toFixed(2)} вЖТ Multiplier = <b>${mult.toFixed(2)}</b>. Click a scenario to see how the multiplier works step by step.`;
}

gLine(svg,M.l,toY(lmLevel),W-M.r,toY(lmLevel),'#059669',2.2);gText(svg,W-M.r+2,toY(lmLevel),st==='mp'||st==='mt'?'LM\'':'LM',11,'#059669','start',700);
gText(svg,W-80,M.t+16,'UIP: E = (1+i)/(1+i*) √Ч ƒТбµЙ',9,'#7C3AED','end');
const eqY=(0.8+isShift-lmLevel)/0.6;
gCircle(svg,toX(Math.min(Math.max(eqY,.05),.9)),toY(lmLevel),5,'#1B2A4A');
const sc=window._mfScenario;
const exps={
mp:'<b>Monetary easing (iвЖУ) вАФ DOUBLE STIMULUS:</b><br>Step 1: CB cuts i вЖТ LM shifts DOWN<br>Step 2: Channel 1 (domestic): lower i вЖТ IвЖС вЖТ YвЖС<br>Step 3: Channel 2 (UIP): lower i вЖТ capital outflows вЖТ EвЖС (depreciation)<br>Step 4: EвЖС вЖТ domestic goods cheaper for foreigners вЖТ EXвЖС вЖТ YвЖС<br>Step 5: Both channels reinforce вЖТ YвЖСвЖС<br><b>Result: YвЖСвЖС, iвЖУ, EвЖС (depreciation).</b><br><b>Key exam point:</b> Monetary policy is MORE effective in open economy because it works through BOTH i and E.',
mt:'<b>Monetary tightening (iвЖС):</b><br>Step 1: CB raises i вЖТ LM shifts UP<br>Step 2: Higher i вЖТ IвЖУ вЖТ YвЖУ (domestic)<br>Step 3: Higher i вЖТ capital inflows вЖТ EвЖУ (appreciation)<br>Step 4: EвЖУ вЖТ exports more expensive вЖТ EXвЖУ вЖТ YвЖУ further<br><b>Result: YвЖУвЖУ, iвЖС, EвЖУ (appreciation).</b> Double contraction.',
fp:'<b>Fiscal expansion (GвЖС) вАФ PARTIALLY OFFSET:</b><br>Step 1: GвЖС вЖТ IS shifts RIGHT вЖТ YвЖС at given i<br>Step 2: If CB keeps i unchanged: YвЖС, E unchanged вЖТ full effect<br>Step 3: BUT if YвЖС вЖТ CB raises i вЖТ capital inflows вЖТ EвЖУ (appreciation)<br>Step 4: EвЖУ вЖТ exports expensive вЖТ EXвЖУ вЖТ partially offsets GвЖС effect<br><b>Result: YвЖС (but less than closed economy), EвЖУ.</b><br><b>Key exam point:</b> Fiscal policy is LESS effective in open economy due to exchange rate offset (crowding out via E).',
capflight:'<b>Capital flight:</b><br>Step 1: Risk event вЖТ investors pull capital out вЖТ FвЖУ<br>Step 2: EвЖС (sharp depreciation) вЖТ import costsвЖС вЖТ PвЖС<br>Step 3: IS shifts LEFT (wealth destruction, uncertainty)<br>Step 4: CB may raise i to defend E вЖТ further contraction<br><b>Result: YвЖУ, EвЖС (depreciation), PвЖС.</b> This is the Asian Financial Crisis 1997-98 pattern.',
foreign_rec:'<b>Foreign recession (Y*вЖУ):</b><br>Step 1: Trading partners in recession вЖТ their demandвЖУ вЖТ our EXвЖУ<br>Step 2: IS shifts LEFT (lost export demand)<br>Step 3: YвЖУ вЖТ can trigger domestic recession via multiplier<br>Step 4: CB can cut i to offset вЖТ EвЖС вЖТ helps competitiveness<br><b>Result: YвЖУ, EXвЖУ.</b> Small open economies are vulnerable to external demand shocks.'
};
document.getElementById('mf-insight').innerHTML=exps[sc]||'Open economy IS-LM with exchange rate. Click a scenario to see how monetary vs fiscal policy differ in effectiveness.';
}

// ===== 7. Solow Growth =====
function drawSolow(){
const c=document.getElementById('gc-solow');
const scenarios=[
{id:'save_up',label:'Higher savings (sвЖС)'},
{id:'save_dn',label:'Lower savings (sвЖУ)'},
{id:'pop_up',label:'Population growthвЖС'},

{id:'war',label:'Capital destruction (war)'},
{id:'reset',label:'вЯ≤ Reset'}
];
c.innerHTML=`<div class="g-card"><h4>Solow Growth Model</h4><p class="g-desc">y=f(k) concave (diminishing returns). Steady state: sf(k) = (ќі+n+g)k. Only TFP growth drives long-run growth.</p>
<div class="g-canvas-wrap"><div id="solow-svg"></div></div>
${scBar(scenarios,'solow')}

<div class="g-ctrl"><label>ќі+n+g:</label><input type="range" min="5" max="40" value="15" id="sol-d" oninput="updSolow()"><span class="g-val" id="sol-dv">0.15</span></div>
<div class="g-ctrl"><label>TFP (A):</label><input type="range" min="50" max="200" value="100" id="sol-a" oninput="updSolow()"><span class="g-val" id="sol-av">1.00</span></div>
</div><div class="g-insight" id="sol-insight"></div></div>`;

}
window.applyScenario_solow=function(id,btn){
btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const presets={save_up:[50,15,100],save_dn:[15,15,100],pop_up:[30,30,100],tech_up:[30,15,170],war:[30,15,70],reset:[30,15,100]};
const v=presets[id]||[30,15,100];

function updSolow(){
const W=500,H=320,M={l:50,r:20,t:20,b:40};
const s=+document.getElementById('sol-s').value/100;
const dep=+document.getElementById('sol-d').value/100;
const A=+document.getElementById('sol-a').value/100;
document.getElementById('sol-sv').textContent=s.toFixed(2);
document.getElementById('sol-dv').textContent=dep.toFixed(2);
document.getElementById('sol-av').textContent=A.toFixed(2);
const pw=document.getElementById('solow-svg');pw.innerHTML='';
const svg=makeSVG(pw,W,H,'sol-s2');
makeAxes(svg,W,H,M,'Capital per eff. worker (k)','Output per eff. worker (y)');
const pW=W-M.l-M.r,pH=H-M.t-M.b;
const kMax=8,yMax=3;
const toX=k=>M.l+(k/kMax)*pW,toY=y=>M.t+(1-y/yMax)*pH;
const f=k=>A*Math.pow(k,0.35);
let d1='';for(let k=0.1;k<=kMax;k+=.1){d1+=(k<=0.15?'M':'L')+toX(k)+','+toY(Math.min(f(k),yMax*0.98))}
gPath(svg,d1,'#2563EB',2.2);gText(svg,toX(kMax-0.3),toY(f(kMax-0.3))-12,'f(k)',11,'#2563EB');
let d2='';for(let k=0.1;k<=kMax;k+=.1){d2+=(k<=0.15?'M':'L')+toX(k)+','+toY(Math.min(s*f(k),yMax*0.98))}
gPath(svg,d2,'#059669',2);gText(svg,toX(kMax-0.3),toY(Math.min(s*f(kMax-0.3),yMax*0.95))-12,'sf(k)',11,'#059669');
let d3='';for(let k=0;k<=kMax;k+=.2){d3+=(k<=0.1?'M':'L')+toX(k)+','+toY(Math.min(dep*k,yMax*0.98))}
gPath(svg,d3,'#DC2626',1.8,'5 4');gText(svg,toX(kMax-0.3),toY(Math.min(dep*(kMax-0.3),yMax*0.95))+14,'(ќі+n+g)k',11,'#DC2626');
let kStar=1,bestDiff=999;
for(let k=0.1;k<=kMax;k+=.02){const diff=Math.abs(s*f(k)-dep*k);if(diff<bestDiff){bestDiff=diff;kStar=k}}
const yStar=f(kStar);
if(kStar<kMax-0.5){gCircle(svg,toX(kStar),toY(s*f(kStar)),5,'#1B2A4A');gLine(svg,toX(kStar),toY(s*f(kStar)),toX(kStar),H-M.b,'#1B2A4A',1.5,'3 3');gText(svg,toX(kStar),H-M.b+14,'k*='+kStar.toFixed(1),10,'#1B2A4A');gLine(svg,toX(kStar),toY(yStar),M.l,toY(yStar),'#2563EB',1,'3 3');gText(svg,M.l-6,toY(yStar),'y*',10,'#2563EB','end')}
const sc=window._solScenario;
const exps={
save_up:`<b>Higher savings (sвЖС):</b><br>Step 1: sвЖС вЖТ sf(k) curve shifts UP (more investment at every k)<br>Step 2: sf(k) > (ќі+n+g)k вЖТ capital accumulates вЖТ kвЖС<br>Step 3: Economy moves along f(k) to new, higher k*<br>Step 4: y* rises (higher output per worker)<br>Step 5: BUT: growth rate only temporarily higher during transition<br><b>Result: higher k* and y*, but NOT higher long-run growth rate.</b> Savings cannot drive permanent growth due to diminishing returns. Only g_A (TFP growth) can.`,
save_dn:`<b>Lower savings (sвЖУ):</b><br>Step 1: sвЖУ вЖТ sf(k) shifts DOWN<br>Step 2: (ќі+n+g)k > sf(k) вЖТ capital decumulates вЖТ kвЖУ<br>Step 3: y* falls вЖТ lower living standards<br><b>Result: lower k*, lower y*.</b> Consuming too much today means less capital and output tomorrow.`,
pop_up:`<b>Population growthвЖС (nвЖС):</b><br>Step 1: nвЖС вЖТ (ќі+n+g)k line becomes STEEPER<br>Step 2: Need more investment just to maintain capital per worker<br>Step 3: k* falls вЖТ y* falls<br><b>Result: k*вЖУ, y*вЖУ.</b> This is the Malthusian concern: more people dilute capital per worker. BUT: in practice, more people can also mean more ideas (endogenous growth).`,
tech_up:`<b>Technology shock (AвЖС):</b><br>Step 1: AвЖС вЖТ f(k) shifts UP (more output per unit of capital)<br>Step 2: sf(k) also shifts UP вЖТ new steady state with higher k* and y*<br>Step 3: Unlike savings, TFP growth (g_A) raises the GROWTH RATE permanently<br>Step 4: This is the Solow residual вАФ the part of growth not explained by K or L<br><b>Result: y*вЖС, AND permanent growth at rate g_A.</b><br><b>Key insight:</b> Long-run growth = g_A. Everything else (savings, population) only affects the LEVEL.`,
war:`<b>Capital destruction (war/disaster):</b><br>Step 1: K destroyed вЖТ k falls below k*<br>Step 2: At low k: sf(k) > (ќі+n+g)k вЖТ capital rebuilds<br>Step 3: Economy grows FAST during reconstruction (convergence)<br>Step 4: Returns to same k* eventually<br><b>Result: temporary devastation, then rapid catch-up growth.</b> This explains Germany/Japan post-WWII "economic miracles" вАФ they were catching up to their steady state.`
};
document.getElementById('sol-insight').innerHTML=exps[sc]||`Steady state: k* вЙИ ${kStar.toFixed(1)}, y* вЙИ ${yStar.toFixed(2)}. Click a scenario to understand what drives long-run growth.`;
}

    const mx=55,my=30,gw=W-mx-30,gh=H-my-40;
    // axes
    gLine(svg,mx,my,mx,my+gh,'#333',1.5);gLine(svg,mx,my+gh,mx+gw,my+gh,'#333',1.5);
    gText(svg,mx-8,my-8,'i',12,navy,'middle',700);gText(svg,mx+gw+12,my+gh+2,'Y',12,navy,'middle',700);
    // LM
    const lm0=cfg.lm0||{x1:.05,y1:.85,x2:.95,y2:.2};
    gLine(svg,mx+lm0.x1*gw,my+lm0.y1*gh,mx+lm0.x2*gw,my+lm0.y2*gh,green,2.2);
    gText(svg,mx+lm0.x2*gw+14,my+lm0.y2*gh,'LM',11,green,'start',700);
    if(cfg.lm1){
      gLine(svg,mx+cfg.lm1.x1*gw,my+cfg.lm1.y1*gh,mx+cfg.lm1.x2*gw,my+cfg.lm1.y2*gh,green,2,'6 4');
      gText(svg,mx+cfg.lm1.x2*gw+14,my+cfg.lm1.y2*gh,"LM'",11,green,'start',600);
    }
    // IS0
    const is0=cfg.is0||{x1:.05,y1:.15,x2:.85,y2:.9};
    gLine(svg,mx+is0.x1*gw,my+is0.y1*gh,mx+is0.x2*gw,my+is0.y2*gh,blue,2.2);
    gText(svg,mx+is0.x2*gw+6,my+is0.y2*gh+10,'ISвВА',11,blue,'start',700);
    // IS1
    if(cfg.is1){
      gLine(svg,mx+cfg.is1.x1*gw,my+cfg.is1.y1*gh,mx+cfg.is1.x2*gw,my+cfg.is1.y2*gh,blue,2,'6 4');
      gText(svg,mx+cfg.is1.x2*gw+6,my+cfg.is1.y2*gh+10,'ISвВБ',11,blue,'start',600);
    }
    // Equilibria
    if(cfg.e0){
      const ex=mx+cfg.e0[0]*gw,ey=my+cfg.e0[1]*gh;
      svg.appendChild(mkEl('circle',{cx:ex,cy:ey,r:5,fill:navy}));
      gText(svg,ex+10,ey-8,'EвВА',11,navy,'start',700);
      gLine(svg,ex,ey,ex,my+gh,gray,1,'4 3');gLine(svg,ex,ey,mx,ey,gray,1,'4 3');
      gText(svg,ex,my+gh+14,'YвВА',10,gray,'middle');gText(svg,mx-14,ey,'iвВА',10,gray,'middle');
    }
    if(cfg.e1){
      const ex=mx+cfg.e1[0]*gw,ey=my+cfg.e1[1]*gh;
      svg.appendChild(mkEl('circle',{cx:ex,cy:ey,r:5,fill:red}));
      gText(svg,ex+10,ey-8,'EвВБ',11,red,'start',700);
      gLine(svg,ex,ey,ex,my+gh,red,1,'4 3');gLine(svg,ex,ey,mx,ey,red,1,'4 3');
      gText(svg,ex,my+gh+14,'YвВБ',10,red,'middle');gText(svg,mx-14,ey,'iвВБ',10,red,'middle');
    }
    // Arrow
    if(cfg.e0&&cfg.e1&&cfg.arrow!==false){
      const ax=mx+cfg.e0[0]*gw,ay=my+cfg.e0[1]*gh,bx=mx+cfg.e1[0]*gw,by=my+cfg.e1[1]*gh;
      const midx=(ax+bx)/2,midy=(ay+by)/2;
      gPath(svg,`M${ax+4},${ay}Q${midx},${midy-18},${bx-4},${by}`,purple,1.8);
    }
  }
  // Phillips Curve helper
  function drawPCgraph(svg,W,H,cfg){
    const mx=55,my=25,gw=W-mx-30,gh=H-my-45;
    gLine(svg,mx,my,mx,my+gh,'#333',1.5);gLine(svg,mx,my+gh,mx+gw,my+gh,'#333',1.5);

    gText(svg,lx,my+gh+14,'UвВЩ='+Math.round(cfg.un*100/cfg.uscale)+'%',10,navy,'middle',600);
    gText(svg,lx+8,my+8,'LRPC',10,navy,'start',700);

    // Points
    (cfg.points||[]).forEach(p=>{
      const px=mx+p[0]*gw,py=my+p[1]*gh;
      svg.appendChild(mkEl('circle',{cx:px,cy:py,r:5,fill:p[3]||navy}));
      gText(svg,px+10,py-6,p[2],11,p[3]||navy,'start',700);
    });
  }
  // Solow helper
  function drawSolowGraph(svg,W,H,cfg){
    const mx=55,my=25,gw=W-mx-30,gh=H-my-45;
    gLine(svg,mx,my,mx,my+gh,'#333',1.5);gLine(svg,mx,my+gh,mx+gw,my+gh,'#333',1.5);
    gText(svg,mx-8,my-8,'y,i',12,navy,'middle',700);gText(svg,mx+gw+12,my+gh+2,'k',12,navy,'middle',700);
    // f(k)
    let pts='';for(let t=0;t<=1;t+=.02){const x=t,y=1-Math.pow(x,.4);pts+=`${mx+x*gw},${my+y*gh} `}
    svg.appendChild(mkEl('polyline',{points:pts.trim(),fill:'none',stroke:navy,'stroke-width':2.2}));
    gText(svg,mx+.95*gw+8,my+(1-Math.pow(.95,.4))*gh,'f(k)',11,navy,'start',700);
    // sf(k)
    const s=cfg.s||.5;pts='';for(let t=0;t<=1;t+=.02){const x=t,y=1-s*Math.pow(x,.4);pts+=`${mx+x*gw},${my+y*gh} `}
    svg.appendChild(mkEl('polyline',{points:pts.trim(),fill:'none',stroke:blue,'stroke-width':2}));
    gText(svg,mx+.95*gw+8,my+(1-s*Math.pow(.95,.4))*gh,'sf(k)',11,blue,'start',700);
    // s1f(k) if provided
    if(cfg.s1){
      pts='';for(let t=0;t<=1;t+=.02){const x=t,y=1-cfg.s1*Math.pow(x,.4);pts+=`${mx+x*gw},${my+y*gh} `}
      svg.appendChild(mkEl('polyline',{points:pts.trim(),fill:'none',stroke:blue,'stroke-width':2,'stroke-dasharray':'6 4'}));
      gText(svg,mx+.95*gw+8,my+(1-cfg.s1*Math.pow(.95,.4))*gh,"sвВБf(k)",11,blue,'start',600);
    }
    // (d+gA+gN)k line
    const slope=cfg.slope||.5;
    gLine(svg,mx,my+gh,mx+gw,my+(1-slope)*gh,red,2);
    gText(svg,mx+gw+4,my+(1-slope)*gh-6,cfg.slopeLabel||'(ќі+gвВР+gвВЩ)k',10,red,'start',600);
    // second slope line
    if(cfg.slope2){
      gLine(svg,mx,my+gh,mx+gw,my+(1-cfg.slope2)*gh,red,2,'6 4');
      gText(svg,mx+gw+4,my+(1-cfg.slope2)*gh-6,cfg.slope2Label||"(ќі+gвВРвВБ+gвВЩ)k",10,red,'start',600);
    }
    // k* markers
    (cfg.kstars||[]).forEach(ks=>{
      const kx=mx+ks[0]*gw;
      gLine(svg,kx,my+gh,kx,my+(1-s*Math.pow(ks[0],.4))*gh,gray,1,'4 3');
      gText(svg,kx,my+gh+14,ks[1],10,navy,'middle',700);
    });
  }

function renderGlossary(){
const el=document.getElementById('glossary-view');
let totalTerms=GLOSSARY.reduce((a,g)=>a+g.terms.length,0);
let h=`<div class="glo-title">\ud83d\udcd6 Exam Glossary</div>
<div class="glo-sub">${totalTerms} terms across ${GLOSSARY.length} categories \u2014 every testable concept from Prof. Azis\u2019s Weeks 1\u20137.</div>
<input type="text" class="glo-search" id="glo-q" placeholder="Search any term..." oninput="filterGlossary()">`;
GLOSSARY.forEach((g,gi)=>{
h+=`<div class="glo-market" id="glo-m-${gi}">
<div class="glo-market-head" style="background:${g.color};color:${g.text};border-bottom:1px solid ${g.border}30" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
<span>${g.market}</span><span class="glo-count">${g.terms.length} terms</span></div>
<div class="glo-market-body">`;
g.terms.forEach(([name,def])=>{
h+=`<div class="glo-term"><span class="glo-term-name">${name}</span><span class="glo-term-def">${def}</span></div>`;
});
h+=`</div></div>`;
});
el.innerHTML=h;
}
function filterGlossary(){
const q=document.getElementById('glo-q').value.toLowerCase().trim();
document.querySelectorAll('.glo-term').forEach(t=>{
const name=t.querySelector('.glo-term-name').textContent.toLowerCase();
const def=t.querySelector('.glo-term-def').textContent.toLowerCase();
t.style.display=(name.includes(q)||def.includes(q))?'':'none';
});
if(q){document.querySelectorAll('.glo-market-body').forEach(b=>b.style.display='')}
}
</script>
