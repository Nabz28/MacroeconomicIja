eqs:["EX = EXNO + EX_oil (structural + commodity)","EX = f(Y_world, E¬ЈP*/P, W, productivity)","NX = EX вИТ IM (net exports in AD)","Marshall-Lerner: |ќµEX| + |ќµIM| > 1 вЖТ depreciation improves NX","J-curve: CUR initially worsens after depreciation, then improves"],
det:["Y_world вАФ foreign income/demand (NOT domestic Y вАФ common exam trap!)","E вАФ depreciation makes exports cheaper for foreigners вЖТ EXвЖС","P vs P* вАФ relative price levels (domestic inflation hurts competitiveness)","W вАФ wage costs (German wage moderation вЖТ export boom)","Trade policy, tariffs, FTAs, sanctions (EXO shocks)","EXNO вАФ structural non-oil export capacity (industrialization level)"],
eff:["Y вАФ AD injection from foreign demand","CUR вАФ current account credit side","E вАФ FX supply (foreigners buy domestic currency to pay)","N вАФ employment in export sectors"],
chains:["E depreciates вЖТ EXвЖС вЖТ YвЖС вЖТ NвЖС [exchange rate вЖТ competitiveness вЖТ growth]","Y_worldвЖС вЖТ EXвЖС вЖТ YвЖС [foreign demand transmission вАФ why EM growth depends on US/China]","WвЖС вЖТ competitivenessвЖУ вЖТ EXвЖУ вЖТ CURвЖУ вЖТ E depreciates eventually [wage-trade-FX feedback loop]","EXвЖС вЖТ CURвЖС вЖТ E appreciates вЖТ EXвЖУ [self-limiting: export success strengthens currency, eroding competitiveness]"],
intuition:"Exports depend on TWO things you largely can't control: how rich your trading partners are (Y_world) and how cheap your goods are relative to theirs (competitiveness). Depreciation helps competitiveness but with the J-CURVE lag: initially, import bills rise (same volume but higher local-currency cost) вЖТ CUR worsens. Only after 12-18 months do trade volumes adjust enough to improve CUR. The Marshall-Lerner condition (elasticities sum > 1) must hold for depreciation to eventually help вАФ and it usually does for most countries.",
tip:"EX depends on FOREIGN Y, not domestic Y вАФ this is the #1 exam trap in trade questions. Marshall-Lerner condition: depreciation improves trade balance only if |ќµEX| + |ќµIM| > 1. J-curve: short-run CUR worsens after depreciation (volume response lags, price effect immediate). For Indonesia: oil/commodity exports are price-inelastic and depend on global commodity prices, while manufacturing EXNO depends on competitiveness. Distinguish the two in analysis.",
graph:"TRADE"},

IM:{name:"IM вАФ Imports",desc:"Foreign goods purchased domestically вАФ a LEAKAGE from the circular flow that reduces every multiplier in the open economy. IM depends on DOMESTIC Y (not foreign) because when domestic income rises, households and firms buy more of everything, including foreign goods. The marginal propensity to import (m) in the multiplier denominator 1/(1вИТcвВБ(1вИТt)+m) means a highly import-dependent economy has a small multiplier вАФ domestic stimulus largely benefits foreign producers.",
eqs:["IM = IMNO + IMO (non-oil + oil)","IM = m¬ЈY + f(E¬ЈP*/P)","m = marginal propensity to import","Open-economy multiplier: 1/(1вИТcвВБ(1вИТt)+m)","High m вЖТ small multiplier вЖТ domestic policy less effective"],
det:["Y вАФ domestic income (PRIMARY driver, positive)","E вАФ depreciation raises import costs вЖТ IMвЖУ (expenditure switching)","IMO вАФ oil imports (price-inelastic, exogenous to domestic policy)","Consumer preferences, tariffs, trade policy"],
eff:["Y вАФ leakage from AD (reduces multiplier effectiveness)","CUR вАФ current account debit","E вАФ FX demand (need foreign currency to pay for imports)","Multiplier вАФ m reduces effectiveness of ALL demand policies"],
chains:["YвЖС вЖТ IMвЖС вЖТ CURвЖУ вЖТ E depreciates [income вЖТ import leakage вЖТ trade balance вЖТ exchange rate]","E depreciates вЖТ IMвЖУ вЖТ expenditure switching to domestic goods вЖТ YвЖС [depreciation helps domestic producers]","P_oilвЖС вЖТ IMOвЖС вЖТ CURвЖУ вЖТ E depreciates вЖТ PвЖС [oil shock transmission for importers like Indonesia]"],
intuition:"Every dollar of domestic spending that goes to imports is a dollar that doesn't recirculate domestically. If m = 0.3, then 30 cents of every new dollar of income leaks abroad. Combined with savings (1вИТcвВБ) and taxes (t), these leakages reduce the multiplier from its theoretical maximum. For Indonesia and similar economies with significant oil import dependence, the IMO component creates structural vulnerability to global oil price shocks вАФ a price spike hits CUR, E, and P simultaneously.",
tip:"IM depends on DOMESTIC Y вАФ this is the leakage. On quantitative questions: if m = 0.2, cвВБ = 0.8, t = 0.25, then multiplier = 1/(1вИТ0.6+0.2) = 1/0.6 = 1.67. Without imports (m=0): multiplier = 1/(1вИТ0.6) = 2.5. Imports reduced the multiplier from 2.5 to 1.67 вАФ a 33% reduction in policy effectiveness! This is why small open economies get less bang for their fiscal buck. Also distinguish IMNO (income & price elastic) from IMO (price inelastic вАФ oil) in analysis.",
graph:"IMPORTS"},

E:{name:"E вАФ Nominal Exchange Rate",desc:"Price of foreign currency in domestic terms (EвЖС = depreciation = domestic currency weaker). Short-run: capital flows dominate (i differentials via interest parity). Medium-run: trade flows reassert (CUR imbalances correct via E). The impossible trinity (Mundell): a country cannot simultaneously maintain free capital flows, a fixed exchange rate, AND independent monetary policy вАФ must choose two of three.",
eqs:["Interest parity: i = i_world + E(ќФE)/E + RP","BOP: CUR + Financial Account = 0","Real exchange rate: q = E¬ЈP*/P","Marshall-Lerner condition for depreciation effect"],
det:["i вИТ i_world вАФ interest differential (short-run dominant driver)","CUR вАФ trade balance (medium-run adjustment)","INFLOW вАФ capital flows, FDI, portfolio investment","Risk premium вАФ country risk, political stability","Expectations & speculation"],
eff:["EX вАФ depreciation boosts export competitiveness","IM вАФ depreciation raises import costs","P вАФ exchange rate pass-through (imported inflation)","CUR вАФ J-curve: initially worsens, then improves"],
chains:["iвЖС вЖТ INFLOWвЖС вЖТ E appreciates вЖТ EXвЖУ, IMвЖС вЖТ YвЖУ [exchange rate channel of monetary policy вАФ very important for open economies]","CUR deficit вЖТ FX demand > supply вЖТ E depreciates вЖТ EXвЖС, IMвЖУ вЖТ self-correcting [automatic trade balance adjustment]","E depreciates вЖТ PвЖС via import prices вЖТ central bank may raise i вЖТ E appreciates [exchange rate-inflation-policy feedback]","Sudden capital stop вЖТ E crashes вЖТ import costs spike вЖТ PвЖСвЖС вЖТ financial crisis [EM currency crisis mechanism вАФ Indonesia 1997-98]"],
intuition:"E is where trade meets finance. In the short run, money moves faster than goods вАФ so capital flows dominate exchange rate movements. A 1% interest rate advantage attracts billions in capital within hours, appreciating the domestic currency. Trade flows (exports, imports) take months to adjust. This is why exchange rates are so volatile day-to-day but tend toward purchasing power parity over decades. The impossible trinity is the organizing principle: Indonesia with free capital flows and a floating rupiah has independent monetary policy. China with (partially) controlled capital and a managed yuan sacrifices some monetary independence. The Eurozone members have free capital and fixed rates (single currency) but gave up national monetary policy entirely.",
tip:"Convention: EвЖС = depreciation (domestic currency weaker). J-curve: after depreciation, CUR WORSENS before improving (12-18 months). Impossible trinity вАФ pick any 2: (1) Free capital + Flexible E вЖТ independent monetary policy (US, Indonesia). (2) Free capital + Fixed E вЖТ no monetary independence (Hong Kong dollar peg, Eurozone members). (3) Fixed E + independent monetary policy вЖТ must restrict capital flows (China, partially). Interest parity: i = i_world + expected depreciation + RP. If domestic i > i_world, capital flows IN вЖТ E appreciates UNTIL expected future depreciation exactly offsets the interest advantage.",
graph:"EXRATE"},

EXNO:{name:"EXNO вАФ Non-Oil Exports",desc:"Structural export capacity beyond commodities вАФ manufacturing, services, technology. Countries with strong EXNO are diversified and resilient to commodity price swings.",eqs:["EX = EXNO + EX_oil"],det:["E, Y_world, W, productivity, trade agreements, industrial policy"],eff:["EX, CUR, Y, employment quality"],chains:["AвЖС вЖТ EXNOвЖС вЖТ sustainable growth path","WвЖС faster than productivity вЖТ EXNOвЖУ вЖТ competitiveness loss"],intuition:"The difference between Norway (strong EXNO despite oil wealth) and Venezuela (total oil dependence). Building EXNO requires decades of structural reform: education, infrastructure, institutions, industrial policy. Currency depreciation alone doesn't build lasting export capacity.",tip:"For Indonesia: palm oil, coal, nickel are commodity exports (volatile). Manufacturing EXNO (textiles, electronics) provides stable employment and growth. Hilirisasi (downstream processing) policy aims to shift from raw commodity exports to value-added EXNO.",graph:null},

IMNO:{name:"IMNO вАФ Non-Oil Imports",desc:"Non-commodity imports вАФ consumer goods, capital goods, intermediate inputs. More responsive to Y and E than oil imports.",eqs:["IM = IMNO + IMO"],det:["Y, E, tariffs, consumer preferences"],eff:["IM, CUR, multiplier"],chains:["YвЖС вЖТ IMNOвЖС вЖТ CUR worsens","E depreciates вЖТ IMNOвЖУ (expenditure switching works here)"],intuition:"IMNO responds to both income (Y) and price (E) signals, unlike oil imports which are volume-inelastic. When analyzing trade balance responses to depreciation, IMNO adjusts but IMO doesn't.",tip:"Separate IMNO from IMO вАФ they have very different price elasticities. Expenditure switching (depreciation вЖТ buy domestic instead of imports) works for IMNO but NOT for IMO.",graph:null},

IMO:{name:"IMO вАФ Oil Imports",desc:"Oil and energy import bill вАФ treated as exogenous because volume is price-inelastic in the short run and price is set on global markets (OPEC, geopolitics). For oil-importing countries like Indonesia, oil price spikes are the classic supply shock causing STAGFLATION: PвЖС AND YвЖУ simultaneously.",
eqs:["IMO = P_oil √Ч Q_oil","SRAS left shift: P_oilвЖС вЖТ production costsвЖС","Subsidi energi (Indonesia): government absorbs part of P_oil increase"],
det:["Global oil price (OPEC, geopolitics вАФ fully exogenous)","Domestic energy intensity / efficiency","Energy subsidies (buffer but fiscal cost)"],
eff:["IM total вЖТ import bill spike","CUR вЖТ current account deterioration","E вЖТ depreciation pressure","P вЖТ cost-push inflation (energy is in everything)","Y вЖТ negative supply shock (higher production costs)","Government budget вЖТ if subsidies absorb the shock (Indonesia's subsidi BBM)"],
chains:["P_oilвЖС вЖТ IMOвЖС вЖТ CURвЖУ вЖТ EвЖУ вЖТ imported inflation вЖТ PвЖС [external channel: trade balance вЖТ FX вЖТ prices]","P_oilвЖС вЖТ production costsвЖС вЖТ SRAS shifts left вЖТ YвЖУ AND PвЖС simultaneously (STAGFLATION) [supply channel: direct cost impact]","P_oilвЖС вЖТ IMвЖС вЖТ NXвЖУ вЖТ ADвЖУ вЖТ reinforces Y decline [demand channel: trade balance worsening reduces AD]","Indonesia: P_oilвЖС вЖТ subsidi BBM costвЖС вЖТ APBN deficitвЖС вЖТ fiscal space shrinks вЖТ G constrained [fiscal channel specific to Indonesia]"],
intuition:"An oil price spike is the macroeconomic equivalent of being punched from three directions at once: (1) your import bill surges вЖТ CUR worsens вЖТ currency weakens вЖТ imported inflation. (2) Energy costs in production rise вЖТ SRAS shifts left вЖТ output falls AND prices rise. (3) The central bank faces an impossible choice: raise i to fight inflation (deepens recession) or cut i to support growth (worsens inflation). There is no good answer вАФ only bad and less bad. For Indonesia specifically, the ICP (Indonesian Crude Price) vs APBN assumption gap is critical: when actual oil prices exceed the budget assumption, subsidi energi costs explode, widening the fiscal deficit.",
tip:"Stagflation = SRAS shifts left вЖТ PвЖС and YвЖУ. This is the HARDEST policy scenario because tools that fix one problem worsen the other. Historical cases: 1973 OPEC embargo, 1979 Iranian revolution, 2022 Russia-Ukraine energy crisis. For Indonesia: track ICP vs APBN assumption. If APBN assumes ICP = $70/bbl but actual = $90/bbl, the subsidi gap creates ~Rp50T additional fiscal pressure. SKK Migas lifting data determines domestic oil production (partially offsets imports).",graph:null},

CUR:{name:"CUR вАФ Current Account",desc:"Current account вЙИ EX вИТ IM + net income + transfers. The broadest measure of whether a country is earning more from the world than it spends. CUR deficit = spending more abroad than earning = must be financed by capital inflows (INFLOW). The critical identity: CUR = S вИТ I (national savings minus investment). A deficit means domestic investment exceeds domestic savings вАФ the gap is funded by foreign savings.",
eqs:["CUR вЙИ NX = EX вИТ IM (simplified)","CUR = S вИТ I (savings-investment identity)","BOP: CUR + Financial Account (INFLOW) = 0","Twin deficits: CUR = (S_private вИТ I) + (T вИТ G)","Persistent CUR deficit вЖТ net foreign debtor"],
det:["EX, IM (trade flows)","E (competitiveness)","Y vs Y_world (relative income)","S вИТ I gap (structural)","G вИТ T (fiscal deficit feeds into CUR via twin deficits)"],
eff:["E вАФ deficit вЖТ depreciation pressure (self-correcting)","INFLOW вАФ deficit must be financed by foreign capital","GCUR вАФ one country's deficit = another's surplus","BOND вАФ foreign holdings of domestic debt increase","National wealth вАФ persistent deficit = accumulating foreign liabilities"],
chains:["CUR deficit вЖТ E depreciates вЖТ EXвЖС, IMвЖУ вЖТ CUR improves [automatic correction вАФ but takes 12-18 months via J-curve]","CUR deficit вЖТ needs INFLOW вЖТ must keep i attractive вЖТ constrains monetary policy [external constraint on domestic policy]","GвЖС вЖТ budget deficitвЖС вЖТ national savingвЖУ вЖТ SвИТI gap widens вЖТ CURвЖУ [twin deficits: fiscal profligacy вЖТ external imbalance]","Sudden stop: INFLOW reverses вЖТ E crashes вЖТ IM costs spike вЖТ forced import compression вЖТ deep recession [EM crisis mechanism вАФ Indonesia 1997-98, Argentina 2001]"],
intuition:"Think of CUR as a household budget: if you spend more than you earn, you must borrow the difference. A country running a CUR deficit is doing exactly that вАФ borrowing from foreigners to finance excess spending. This is fine as long as foreigners are willing to lend (INFLOW continues). But if confidence evaporates вАФ political crisis, global risk-off, contagion вАФ capital can flee overnight (sudden stop), forcing a brutal adjustment: currency crashes, imports collapse, deep recession. Indonesia experienced exactly this in 1997-98. The S вИТ I identity reveals the structural cause: either investment is too high relative to savings (possibly good вАФ building productive capacity) or savings are too low (possibly bad вАФ consumption-driven deficit).",
tip:"Key identities to memorize: (1) CUR = S вИТ I. (2) CUR + Financial Account = 0 (BOP). (3) Twin deficits: fiscal deficit вЖТ CUR deficit. Use these on any exam question about trade balances. The S вИТ I identity is especially powerful: it shows that trade deficits are fundamentally about savings-investment imbalances, NOT about trade policy. A country can't fix its CUR deficit with tariffs if the underlying SвИТI gap persists вАФ the deficit just shifts to other trading partners.",
graph:"CUR"},

INFLOW:{name:"INFLOW вАФ Capital Inflows",desc:"Net capital/financial account flows. Driven by interest differentials (i вИТ i_world), growth expectations, and risk appetite. The impossible trinity links INFLOW to exchange rate regime and monetary policy independence. Sudden capital flow reversals are the primary mechanism of EM financial crises.",
eqs:["INFLOW = f(i вИТ i_world, growth, risk premium)","BOP: CUR + INFLOW = 0","Interest parity links INFLOW to E dynamics"],
det:["i вИТ i_world (primary short-run driver)","GDP growth prospects (attracts FDI)","Risk premium / institutional quality","Global risk appetite (risk-on/risk-off cycles)","Capital controls"],
eff:["E вАФ appreciation (capital inflow = FX supply increase)","BOND demand вЖС вЖТ YIELDвЖУ","STOCK demand вЖС (portfolio flows)","Forex reserves (if central bank intervenes)"],
chains:["iвЖС вЖТ INFLOWвЖС вЖТ E appreciates вЖТ EXвЖУ вЖТ YвЖУ [exchange rate channel: domestic tightening spills over via trade]","INFLOWвЖС вЖТ BOND demandвЖС вЖТ YIELDвЖУ вЖТ rвЖУ вЖТ IвЖС [foreign capital eases domestic financial conditions]","Sudden reversal вЖТ INFLOWвЖУвЖУ вЖТ E crashes вЖТ imported inflation вЖТ banking crisis вЖТ deep recession [the EM crisis template]","Fed tightens вЖТ global risk-off вЖТ EM INFLOWвЖУ вЖТ EM currencies depreciate вЖТ forced EM tightening [global financial cycle contagion]"],
intuition:"Capital flows are the financial counterpart of trade flows. In the short run, money moves MUCH faster than goods вАФ billions can flow in or out in a single day based on interest differentials or risk sentiment. This makes exchange rates volatile and can overwhelm trade fundamentals. For Indonesia, the experience of 1997-98 was traumatic: capital that had flowed in during the boom years suddenly reversed, the rupiah collapsed from ~2,400 to ~17,000 per USD, and the economy contracted 13%. The lesson: dependence on short-term capital flows (hot money) creates fragility. That's why BI maintains forex reserves and Indonesia has developed macroprudential policies to manage capital flow volatility.",
tip:"The impossible trinity is the ORGANIZING FRAMEWORK for open economy macro. Mundell-Fleming: with free capital mobility + flexible E вЖТ monetary policy works (via E channel), fiscal policy offset (via E appreciation). With free capital + fixed E вЖТ fiscal works, monetary impotent. Indonesia chose: free capital (mostly) + flexible E вЖТ retains monetary policy independence вЖТ BI can set i based on domestic conditions. Key for exams: sudden stops cause the worst EM crises. A current account deficit financed by volatile portfolio flows (hot money) is much more dangerous than one financed by stable FDI.",
graph:"INFLOWS"},

STOCK:{name:"STOCK вАФ Stock Prices",desc:"Equity market valuations вАФ forward-looking: P = ќ£ E(dividends)/(1+r)^t. Two competing forces: expected earnings (from Y growth вАФ bullish) and the discount rate (from r вАФ bearish). Connects to real economy via wealth effect (STOCK вЖТ WEALTH вЖТ C) and Tobin's q (STOCK вЖТ q вЖТ I).",
eqs:["P_stock = ќ£ E(dividends)/(1+r)^t","P/E = 1/(r вИТ g) [Gordon growth model]","Tobin's q = market cap / replacement cost","WEALTH includes STOCK value","MPC out of stock wealth вЙИ 0.03-0.05"],
det:["r (inverse вАФ discount rate: rвЖС вЖТ STOCKвЖУ)","Y (positive вАФ earnings growth)","M (liquidity: QE вЖТ STOCKвЖС)","Risk appetite / sentiment","i vs bond yields (relative return)"],
eff:["WEALTH вЖТ C (wealth effect)","I via Tobin's q (q>1 вЖТ build new capital)","Confidence / animal spirits","Financial stability (crashes вЖТ systemic risk)"],
chains:["iвЖС вЖТ rвЖС вЖТ STOCKвЖУ вЖТ WEALTHвЖУ вЖТ CвЖУ вЖТ YвЖУ [monetary вЖТ asset вЖТ consumption: why rate hikes often trigger sell-offs]","YвЖС вЖТ earningsвЖС вЖТ STOCKвЖС вЖТ WEALTHвЖС вЖТ CвЖС вЖТ YвЖС more [virtuous cycle: growth feeds asset prices feeds consumption feeds more growth]","STOCKвЖС вЖТ q > 1 вЖТ IвЖС вЖТ YвЖС вЖТ earningsвЖС вЖТ STOCKвЖС [Tobin's q investment accelerator вАФ powerful in booms]","STOCK crash вЖТ WEALTHвЖУвЖУ вЖТ CвЖУвЖУ вЖТ YвЖУвЖУ вЖТ earningsвЖУ вЖТ STOCKвЖУ more [doom loop: 2008-style financial crisis transmission]"],
intuition:"Stock prices reflect a tug-of-war between EARNINGS (what companies make, driven by Y growth вАФ optimistic force) and DISCOUNT RATE (what investors demand as return, driven by r вАФ pessimistic force). This is why stocks can fall even when the economy is strong: if the central bank raises rates aggressively, the discount rate effect overwhelms the earnings effect. During QE (MвЖСвЖС), both forces were aligned: low rates (low discount) plus recovery (rising earnings) вЖТ STOCKвЖСвЖС. The wealth effect then transmits to Main Street: Americans' stock wealth is ~$40 trillion, so even a 3-5 cent per dollar MPC means a 10% market move shifts consumption by $120-200 billion вАФ enough to measurably affect GDP.",
tip:"Know the two stock price drivers: (1) earnings/growth (Y link вАФ numerator of DCF) and (2) discount rate (r link вАФ denominator of DCF). When both move in the SAME direction (YвЖС and rвЖС during tightening), the net effect on STOCK depends on which dominates вАФ that's why market reactions to rate hikes are ambiguous. Tobin's q is the investment link: if market values the existing capital stock above replacement cost, it's cheaper to build new capital than buy existing вЖТ IвЖС. Wealth effect: ~3-5 cents per dollar of wealth gain goes to consumption. On exams, trace the full channel: iвЖС вЖТ rвЖС вЖТ STOCKвЖУ вЖТ WEALTHвЖУ вЖТ CвЖУ вЖТ YвЖУ.",
graph:"STOCK"},

BOND:{name:"BOND вАФ Bond Prices",desc:"Government and corporate bond prices вАФ INVERSE of yields. When BOND prices rise, YIELD falls, and vice versa вАФ this is a mathematical identity, not a behavioral relationship. Bonds are the vehicle for government deficit financing, QE/QT, and the risk-free rate benchmark that anchors ALL other rates in the economy.",
eqs:["P_bond = ќ£ C/(1+y)^t + F/(1+y)^n","P_bond вЖФ YIELD (inverse identity)","Duration: % price change per 1% yield change","BOND supply = government deficit financing","QE: central bank buys BOND вЖТ priceвЖС вЖТ YIELDвЖУ"],
det:["YIELD (inverse вАФ the core identity)","i вАФ policy rate anchors short-term bond prices","ѕАбµЙ вАФ inflation expectations (higher вЖТ BONDвЖУ вЖТ YIELDвЖС)","G вИТ T вАФ fiscal deficit drives BOND supply (more issuance вЖТ pricesвЖУ)","INFLOW вАФ foreign demand (вЖТ pricesвЖС вЖТ yieldsвЖУ)","QE/QT вАФ central bank buying/selling"],
eff:["YIELD (inverse by definition)","WEALTH вАФ bond portfolio value","r вАФ benchmark for all borrowing costs","I вАФ corporate bonds priced off government bonds","E вАФ foreign bond demand affects capital flows"],
chains:["iвЖС вЖТ BONDвЖУ вЖТ YIELDвЖС вЖТ rвЖС вЖТ IвЖУ вЖТ YвЖУ [monetary transmission through the bond market]","GвЖС вЖТ deficit вЖТ BOND supplyвЖС вЖТ BONDвЖУ вЖТ YIELDвЖС вЖТ IвЖУ [CROWDING OUT вАФ government borrowing raises rates for everyone]","INFLOWвЖС вЖТ BOND demandвЖС вЖТ BONDвЖС вЖТ YIELDвЖУ вЖТ rвЖУ вЖТ IвЖС [foreign capital eases domestic conditions]","QE: central bank buys BOND вЖТ BONDвЖС вЖТ YIELDвЖУ вЖТ rвЖУ вЖТ IвЖС + WEALTHвЖС вЖТ stimulus [unconventional monetary policy]","QT: central bank sells BOND вЖТ BONDвЖУ вЖТ YIELDвЖС вЖТ rвЖС вЖТ tightening [unwinding stimulus]"],
intuition:"Bond prices and yields are like a seesaw: when one goes up, the other goes down by mathematical necessity. If a bond pays $50/year coupon and you buy it for $1,000, your yield is 5%. If the price drops to $833, the same $50 coupon gives you 6% yield. Central banks exploit this: buying bonds (QE) pushes prices up and yields down, reducing borrowing costs economy-wide. Government deficit spending works in reverse: issuing more bonds floods the market with supply вЖТ prices fall вЖТ yields rise вЖТ borrowing becomes more expensive for EVERYONE including private firms вЖТ crowding out.",
tip:"When exam says 'bond yields rise': bond prices FALL, borrowing costs INCREASE, investment FALLS, government debt becomes more expensive to service. Crowding out mechanism: GвЖС вЖТ deficit вЖТ more bond issuance (supplyвЖС) вЖТ BOND pricesвЖУ вЖТ YIELDвЖС вЖТ private IвЖУ. QE does the opposite: central bank buys bonds (demandвЖС) вЖТ BONDвЖС вЖТ YIELDвЖУ вЖТ stimulus. Duration tells you sensitivity: a 10-year bond with duration 8 loses ~8% of its value for each 1% yield increase.",graph:"BOND"},

WEALTH:{name:"WEALTH вАФ Household Net Worth",desc:"Total household wealth = financial assets (STOCK + BOND) + real estate вИТ liabilities. The critical channel transmitting asset market movements to consumption and the real economy. The MPC out of wealth is small (~3-5 cents per dollar) but total wealth is ENORMOUS, making the aggregate effect significant. The 2008 crisis demonstrated the catastrophic potential: simultaneous stock AND housing wealth destruction вЖТ massive deleveraging вЖТ consumption collapse вЖТ deep recession.",
eqs:["WEALTH = STOCK + BOND + Housing вИТ Debt","C = CвВА + cвВБ(YвИТT) + cвВВ¬ЈWEALTH","cвВВ вЙИ 0.03-0.05 (MPC out of wealth)"],
det:["STOCK prices","BOND prices / yields","Housing prices (often the largest component for typical households)","Household debt (leverage amplifies both gains and losses)"],
eff:["C вАФ wealth effect: feel richer вЖТ spend more (even without selling assets)","Confidence вАФ wealth gains improve sentiment broadly","Collateral вАФ higher home values вЖТ can borrow more against equity вЖТ CвЖС further","Financial stability вАФ WEALTH crash вЖТ forced deleveraging вЖТ systemic risk"],
chains:["STOCKвЖС вЖТ WEALTHвЖС вЖТ CвЖС вЖТ YвЖС [equity wealth channel вАФ primary for upper-income households]","HousingвЖС вЖТ WEALTHвЖС вЖТ CвЖС + collateralвЖС вЖТ borrowingвЖС вЖТ CвЖС even more [housing wealth is MORE potent because more households own homes than stocks]","WEALTH crash вЖТ deleveraging вЖТ CвЖУвЖУ вЖТ YвЖУвЖУ вЖТ more asset price falls вЖТ vicious spiral [2008 doom loop вАФ Minsky moment]","QE вЖТ STOCKвЖС + BONDвЖС вЖТ WEALTHвЖС вЖТ CвЖС [how unconventional monetary policy reaches the real economy]"],
intuition:"WEALTH is the bridge between Wall Street and Main Street. When your stock portfolio or home value rises, you don't have to SELL to feel the effect вАФ you simply feel wealthier and more confident, loosening your wallet: dining out more, buying a nicer car, renovating the kitchen. This behavioral response, multiplied across millions of households, moves the macroeconomy. The danger is the reverse: when asset prices crash (as in 2008), households face a triple hit: (1) negative wealth effect reduces consumption, (2) underwater mortgages prevent refinancing, (3) margin calls and debt covenants force asset sales at depressed prices (deleveraging), which pushes prices down further. This vicious cycle is what turned a housing correction into the worst recession since the 1930s.",
tip:"Quantitative benchmark: a 20% stock market decline reduces consumption by approximately 1-1.5% of GDP. A 20% housing price decline is WORSE because (1) more households own homes than stocks, (2) housing is typically leveraged (mortgage), amplifying the wealth loss, and (3) housing serves as collateral for other borrowing. On exams: always specify the wealth channel explicitly: STOCKвЖС вЖТ WEALTHвЖС вЖТ CвЖС вЖТ YвЖС. For 2008 questions: simultaneous housing + stock crash вЖТ unprecedented wealth destruction вЖТ deleveraging вЖТ credit crunch вЖТ deep recession вЖТ needed both fiscal (GвЖСвЖС) and unconventional monetary (QE) response.",graph:null},

YIELD:{name:"YIELD & gYIELD вАФ Bond Yields",desc:"Government bond yield = inverse of BOND price. The risk-free benchmark that anchors ALL borrowing costs: mortgage rates, corporate bond rates, bank lending rates. The YIELD CURVE (short vs long-term yields) is one of the most powerful predictive indicators in economics вАФ an inverted curve has preceded every US recession since 1970.",
eqs:["YIELD вЖФ BOND price (inverse identity)","YIELD = i + term premium + ѕАбµЙ + credit risk","Real yield = YIELD вИТ ѕАбµЙ","Yield curve: plot of yields across maturities (3m to 30y)","Normal: upward sloping (long > short). Inverted: downward (short > long)"],
det:["i вАФ policy rate anchors the short end","ѕАбµЙ вАФ inflation expectations drive the long end","BOND supply (government deficits) вАФ more supply вЖТ higher YIELD","BOND demand (QE, INFLOW, risk appetite) вАФ more demand вЖТ lower YIELD","Term premium вАФ compensation for holding longer-duration bonds"],
eff:["r вАФ THE benchmark borrowing cost for the entire economy","I вАФ corporate investment cost: corporate yield = YIELD + credit spread","STOCK вАФ competing return: YIELDвЖС вЖТ investors rotate from stocks to bonds вЖТ STOCKвЖУ","E вАФ higher YIELD attracts foreign capital вЖТ INFLOWвЖС вЖТ E appreciates","Government debt service вАФ higher YIELD вЖТ more expensive to service existing debt вЖТ constrains fiscal space"],
chains:["iвЖС вЖТ short YIELDвЖС вЖТ curve flattens/inverts вЖТ recession signal [rate hikes first hit the short end, signaling future economic weakness]","GвЖС вЖТ deficit вЖТ BOND supplyвЖС вЖТ YIELDвЖС вЖТ rвЖС вЖТ IвЖУ [crowding out: the fiscal deficit channel]","INFLOWвЖС вЖТ BOND demandвЖС вЖТ YIELDвЖУ вЖТ easier financial conditions [capital inflows suppress domestic yields]","ѕАбµЙвЖС вЖТ long YIELDвЖС вЖТ real borrowing costsвЖС вЖТ tighter conditions [inflation expectations channel]","Yield curve inverts (short > long) вЖТ recession within 12-18 months (historically reliable signal) [markets pricing in future rate cuts due to expected economic weakness]"],
intuition:"The yield curve is like the bond market's weather forecast for the economy. NORMAL (upward sloping): markets expect growth and gradual rate normalization вАФ lending long-term is riskier, so long rates are higher. FLAT: markets are uncertain вАФ short rates have been raised but the economy is showing strain. INVERTED (short > long): markets are saying 'the central bank will HAVE to cut rates in the future because a recession is coming.' The track record is remarkable: yield curve inversions have preceded every US recession since 1970, with roughly a 12-18 month lead time. It's not magic вАФ it's rational expectations: if markets expect a recession, they expect future rate cuts, which drives long-term rates below short-term rates.",
tip:"Yield curve inversion = recession warning. When exam provides yield curve data, check if short rates exceed long rates. Crowding out quantitative trace: GвЖС $100B вЖТ needs $100B more bond issuance вЖТ BOND supplyвЖС вЖТ YIELDвЖС by ~0.1-0.3pp (depends on market depth) вЖТ private borrowing costs rise вЖТ some I projects become unprofitable вЖТ IвЖУ. The more elastic investment is to r, the more crowding out. In a liquidity trap (iвЙИ0, flat yield curve), crowding out is minimal because yields are already at the floor вАФ this is when fiscal policy is most effective.",
graph:"YIELD"},

IGC:{name:"IGC вАФ Investment Grade Credit",desc:"Corporate credit spreads вАФ the extra cost firms pay above the risk-free rate (YIELD). Widens in recessions (default risk rises), tightens in booms. The FINANCIAL ACCELERATOR mechanism: recession вЖТ wider spreads вЖТ higher corporate borrowing costs вЖТ less investment вЖТ deeper recession вЖТ even wider spreads.",
eqs:["Corporate yield = YIELD + credit spread","Spread = f(default risk, liquidity, risk appetite)","Financial accelerator: YвЖУ вЖТ spreadsвЖС вЖТ IвЖУ вЖТ YвЖУ more"],
det:["YIELD (risk-free benchmark)","Y (recessions raise default probability вЖТ wider spreads)","Corporate health (leverage, profitability)","Risk appetite (risk-on: tight spreads. Risk-off: wide)","M / liquidity conditions"],
eff:["I вАФ the ACTUAL corporate borrowing cost includes the spread","Financial stability вАФ spread spikes signal systemic stress","STOCK вАФ higher funding costs reduce profitability"],
chains:["YвЖУ вЖТ default riskвЖС вЖТ spreads widen вЖТ effective rвЖС вЖТ IвЖУ вЖТ YвЖУ more [financial accelerator вАФ the amplification mechanism]","Risk-off вЖТ spreads spike вЖТ IвЖУ globally вЖТ synchronized downturn [global financial contagion channel]","Central bank QE вЖТ buys corporate bonds вЖТ spreads compress вЖТ IвЖС [unconventional policy directly targeting credit conditions]"],
intuition:"The financial accelerator explains why financial crises cause such DEEP recessions compared to 'normal' downturns. In a normal recession, GDP falls maybe 2-3% and recovers in a year. In a financial crisis (2008, 1997-98), GDP falls 5-13% and recovery takes 5-10 years. Why? Because the credit market AMPLIFIES the shock: recession вЖТ banks worried about defaults вЖТ charge higher spreads вЖТ companies can't afford to invest or refinance вЖТ more companies fail вЖТ banks' fears confirmed вЖТ spreads widen more вЖТ vicious cycle. The financial sector doesn't just transmit shocks вАФ it makes them worse.",
tip:"The financial accelerator is the key concept for explaining why financial crises are so severe. On exams: (1) Normal recession: ADвЖУ вЖТ YвЖУ вЖТ recovery via self-correction. (2) Financial crisis: ADвЖУ вЖТ YвЖУ вЖТ spreads widen вЖТ IвЖУ further вЖТ YвЖУ further вЖТ spreads widen more вЖТ doom loop. Breaking the cycle requires the central bank acting as lender of last resort (prevent bank failures) plus QE (directly compress spreads) plus fiscal stimulus (bypass the broken financial system).",
graph:null},

GCUR:{name:"GCUR вАФ Global Current Account",desc:"By accounting identity, all countries' current accounts sum to zero globally. One country's surplus = another country's deficit. Global imbalances drive capital flows, exchange rates, and financial stability risks.",
eqs:["ќ£ CUR_i = 0 (global identity)"],det:["Global savings-investment imbalances","Commodity super-cycles","Exchange rate misalignments","Demographics (aging savers vs young borrowers)"],eff:["E вАФ global FX adjustment pressures","BOND вАФ cross-border capital flows","INFLOW вАФ surplus countries finance deficit countries"],
chains:["China surplus вЖТ capital flows to US вЖТ low US interest rates вЖТ housing bubble вЖТ 2008 crisis [Bernanke's 'global savings glut' hypothesis]","GCUR imbalances вЖТ political tensions вЖТ trade wars вЖТ EXO shocks [imbalances create political friction]"],
intuition:"In a closed global system, every dollar of surplus somewhere is a dollar of deficit elsewhere. When China ran massive surpluses, that capital had to GO somewhere вАФ it flowed to the US, financing the US current account deficit, suppressing US interest rates, and fueling the housing bubble that eventually triggered the 2008 crisis. Global imbalances are not abstract accounting вАФ they have real, sometimes catastrophic, consequences.",
tip:"Global identity: ќ£ CUR = 0. The 'global savings glut' (Bernanke hypothesis) explains the pre-2008 puzzle of low interest rates despite strong growth: excess saving from China, Germany, and oil exporters flooded into US financial markets.",graph:null},

K:{name:"K вАФ Capital Stock",desc:"Accumulated physical capital вАФ machines, factories, infrastructure. Grows via investment, shrinks via depreciation. The Solow model shows K accumulation has DIMINISHING RETURNS (ќ± < 1): doubling K less than doubles Y. Only TFP growth (A) can sustain long-run per-capita growth.",
eqs:["K_{t+1} = K_t + I_t вИТ ќіK_t","Y = A¬ЈKбµЕ¬ЈN¬євБїбµЕ (ќ± typically 0.3-0.4)","MPK = ќ±¬ЈA¬Ј(N/K)¬євБїбµЕ (diminishing in K)","Solow steady state: s¬Јf(k) = (n+ќі)¬Јk"],
det:["I вАФ gross investment adds to K","ќі вАФ depreciation rate (typically 5-10% per year)","Historical accumulation"],
eff:["YвВЫ вАФ more K вЖТ higher potential output","MPL вАФ K-L complementarity raises labor productivity","N demand вАФ more productive workers are in higher demand","r вАФ MPK determines return on capital (diminishes as K grows)"],
chains:["IвЖС вЖТ KвЖС вЖТ YвВЫвЖС вЖТ LRAS shifts right [investment today = capacity tomorrow]","KвЖС вЖТ diminishing MPK вЖТ rвЖУ eventually вЖТ K growth slows [Solow convergence вАФ why poor countries can grow fast by accumulating K, but growth eventually slows]","KвЖС вЖТ MPLвЖС вЖТ NбµИвЖС вЖТ NвЖС вЖТ YвЖС [capital makes workers more productive, increasing labor demand]"],
intuition:"The Solow model's KEY insight: capital accumulation ALONE cannot sustain growth because of diminishing returns. The first factory in a village transforms productivity. The 1000th factory in an industrial district adds barely anything. In steady state, investment just replaces depreciated capital вАФ no net growth. Only A (technology/TFP) can keep pushing the production function up without limit. This is why institutions, education, and innovation matter more than just building things.",
tip:"K shifts LRAS right. In Solow: increasing savings rate s raises steady-state K and Y/N level but NOT the long-run GROWTH RATE вАФ only A growth does that. This is the levels vs. growth distinction: higher s вЖТ richer in level, but same growth rate once steady state is reached. Practice the Solow diagram: y = f(k) production function (concave) vs. (n+ќі)k depreciation line (linear). Intersection = steady state k*.",
graph:"SOLOW"},

A:{name:"A вАФ Technology / TFP",desc:"Total Factor Productivity вАФ measures how efficiently K and N combine into output. The Solow residual: everything in growth that K and N accumulation can't explain. The ONLY variable that can sustain long-run per-capita growth, because unlike K, there are no diminishing returns to ideas. This is why institutions, education, rule of law, and innovation ecosystems matter more than any other policy for long-run prosperity.",
eqs:["Y = A ¬Ј KбµЕ ¬Ј N¬євБїбµЕ","Solow residual: gA = gY вИТ ќ±¬ЈgK вИТ (1вИТќ±)¬ЈgN","MPL = (1вИТќ±)¬ЈA¬Ј(K/N)бµЕ [A raises worker productivity]","MPK = ќ±¬ЈA¬Ј(N/K)¬євБїбµЕ [A raises capital productivity]","Historically: gA accounts for ~50% of GDP growth in developed countries"],
det:["R&D investment and innovation rates","Institutional quality (rule of law, property rights, contract enforcement, corruption)","Education quality and human capital","Openness to trade and FDI (technology transfer)","Entrepreneurship culture","Geographic and historical factors"],
eff:["YвВЫ вАФ directly raises potential output at EVERY level of K and N","MPL вАФ workers produce more per hour вЖТ sustainable real wage growth without inflation","MPK вАФ capital is more productive вЖТ investment returns rise вЖТ IвЖС","W вАФ productivity growth (gA) allows wage growth without cost-push inflation"],
chains:["AвЖС вЖТ YвВЫвЖС вЖТ LRAS shifts right вЖТ economy can grow without inflation [the only free lunch in macro]","AвЖС вЖТ MPLвЖС вЖТ NбµИвЖС вЖТ NвЖС вЖТ YвЖС [productivity-driven employment growth]","AвЖС вЖТ gA allows gW without PвЖС [wages can rise without inflation when workers are more productive]","AвЖС вЖТ MPKвЖС вЖТ investment more attractive вЖТ IвЖС вЖТ KвЖС вЖТ YвВЫвЖС further [virtuous cycle: better technology attracts investment which builds capacity which enables more innovation]"],
intuition:"A is the magic variable вАФ the only one without tradeoffs. Higher A means BOTH more output AND lower unit costs вЖТ LRAS AND SRAS shift right вЖТ you get growth without inflation. This is the growth economist's holy grail. But A can't be directly controlled by policy вАФ it emerges from institutions, education, culture, and serendipity. The countries that got rich (US, Europe, Japan, Korea, Singapore) did so primarily through A growth, not just K accumulation. The countries that stagnated despite massive investment (Soviet Union) did so because institutional failure suppressed A. For Indonesia, the hilirisasi (downstream processing) agenda and digital economy development are fundamentally about raising A in specific sectors.",
tip:"A shifts BOTH LRAS right AND SRAS right вАФ it's the only variable that unambiguously improves the supply side. In growth accounting: gA = gY вИТ ќ±¬ЈgK вИТ (1вИТќ±)¬ЈgN (the Solow residual). Historically, TFP growth accounts for about 40-60% of GDP growth in developed countries вАФ the rest is factor accumulation. For development economics questions: explain why institutions and A matter more than investment (K) for sustained growth вАФ reference Solow convergence and diminishing returns to K.",
graph:"TFP"},

TP:{name:"T/P вАФ Taxes & Transfers",desc:"Tax policy (T) and transfer payments вАФ the fiscal instruments that affect household disposable income and the budget balance. Key distinction: spending multiplier > tax multiplier because some of a tax cut is SAVED (MPC < 1). Automatic stabilizers (taxes fall and transfers rise automatically in recessions) provide countercyclical support without legislation.",
eqs:["Disposable income = Y вИТ T + Transfers","Tax multiplier = вИТcвВБ/(1вИТcвВБ(1вИТt)+m) [SMALLER than spending mult]","Spending multiplier = 1/(1вИТcвВБ(1вИТt)+m)","Balanced-budget multiplier = 1 (Haavelmo theorem)","Auto stabilizers: TвЖУ when YвЖУ, transfersвЖС when UвЖС"],
det:["Tax rates and brackets (political decisions)","Transfer programs (unemployment insurance, social safety net)","Automatic stabilizers (built into the tax/transfer system)"],
eff:["C via disposable income (primary channel)","Y via fiscal multiplier","Budget balance вЖТ BOND supply","Income distribution вЖТ affects aggregate MPC"],
chains:["TвЖУ вЖТ (YвИТT)вЖС вЖТ CвЖС вЖТ YвЖС [tax cut stimulus вАФ but multiplier < G multiplier because MPC < 1]","TransfersвЖС вЖТ direct income support вЖТ CвЖС (high MPC for transfer recipients) вЖТ YвЖС","Auto stabilizers: YвЖУ вЖТ TвЖУ automatically + transfersвЖС вЖТ cushions demand вЖТ stabilizes Y [the economy's built-in shock absorbers]","TвЖУ вЖТ deficitвЖС вЖТ BOND supplyвЖС вЖТ YIELDвЖС вЖТ partial crowding out [financing cost of tax cuts]"],
intuition:"Why is the tax multiplier smaller than the spending multiplier? When government spends $1, ALL of it enters the spending stream (the road gets built). When government cuts taxes by $1, households SAVE some of it (MPC < 1) вАФ only cвВБ of the tax cut becomes spending. If cвВБ = 0.75, a $1 tax cut generates only $0.75 of new spending. That's why |tax mult| < |spending mult|. Automatic stabilizers are the economy's immune system: during a recession, tax collections fall (people earn less вЖТ pay less tax) and transfer payments rise (more people qualify for unemployment benefits), automatically supporting demand without anyone in parliament having to vote. This 'passive' fiscal policy prevents recessions from becoming depressions.",
tip:"Three multipliers to memorize and compare: (1) Spending: k_G = 1/(1вИТcвВБ(1вИТt)+m). (2) Tax: k_T = вИТcвВБ/(1вИТcвВБ(1вИТt)+m). (3) Balanced-budget: k_BB = 1 (Haavelmo вАФ if ќФG = ќФT, then ќФY = ќФG, always). Note: |k_T| < |k_G| because cвВБ < 1. On exams, if asked 'which is more effective вАФ spending increase or tax cut?' the answer is spending increase (bigger multiplier). But tax cuts may be preferred politically or if spending takes time to implement.",
graph:null},

COVID:{name:"COVID вАФ Pandemic Shock",desc:"The 'everything shock' вАФ simultaneously hitting demand (lockdowns вЖТ CвЖУвЖУ), supply (disruptions вЖТ SRAS left), labor (LFвЖУ, Great Resignation), trade (supply chain collapse), and asset markets (initial crash, then QE-fueled recovery). Unique because it hit BOTH AD and AS вАФ P direction was genuinely ambiguous. The unprecedented policy response (fiscal + monetary, globally coordinated) prevented a depression but laid groundwork for 2022-23 inflation.",
eqs:["ADвЖУ: lockdowns вЖТ CвВА collapses вЖТ AD shifts left","ASвЖУ: supply disruptions вЖТ SRAS shifts left","YвЖУ unambiguously (both shifts reduce output)","P direction AMBIGUOUS (demandвЖУ pulls P down, supplyвЖУ pushes P up)","Policy: GвЖСвЖСвЖС + MвЖСвЖСвЖС вЖТ unprecedented stimulus"],

let scale=1,tx_=0,ty_=0,drag=false,dX=0,dY=0;const area=document.getElementById('canvas-area');
function apT(){svgEl.style.transform=`translate(${tx_}px,${ty_}px) scale(${scale})`;svgEl.style.transformOrigin='0 0';document.getElementById('zpct').textContent=Math.round(scale*100)+'%'}
area.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:.9;const br=area.getBoundingClientRect();const mx=e.clientX-br.left,my=e.clientY-br.top;tx_=mx-(mx-tx_)*f;ty_=my-(my-ty_)*f;scale*=f;scale=Math.max(.25,Math.min(5,scale));apT()},{passive:false});
area.addEventListener('mousedown',e=>{if(e.button===0){drag=true;dX=e.clientX-tx_;dY=e.clientY-ty_;area.style.cursor='grabbing'}});
window.addEventListener('mousemove',e=>{if(drag){tx_=e.clientX-dX;ty_=e.clientY-dY;apT()}});
window.addEventListener('mouseup',()=>{drag=false;area.style.cursor='grab'});
function zoomBtn(f){const br=area.getBoundingClientRect();const cx=br.width/2,cy=br.height/2;tx_=cx-(cx-tx_)*f;ty_=cy-(cy-ty_)*f;scale*=f;scale=Math.max(.25,Math.min(5,scale));apT()}
function zoomFit(){const br=area.getBoundingClientRect();const sx=br.width/W_T,sy=br.height/H_T;scale=Math.min(sx,sy)*.92;tx_=(br.width-W_T*scale)/2;ty_=(br.height-H_T*scale)/2;apT()}
setTimeout(zoomFit,80);window.addEventListener('resize',()=>setTimeout(zoomFit,100));

sections:[
{head:"Course Overview & Why Macroeconomics Matters",num:"1",cards:[
{title:"Rationale",content:`<p>Macroeconomics describes how the <em>whole economy</em> works and functions. Studying it helps understand not only the broader economic landscape but also the role and importance of how people's <strong>expectations about future economic policies</strong> influence their current actions вАФ including decisions made by business and the financial community.</p><p>From the policy maker's standpoint, macroeconomics is a critical tool to design effective economic strategies based on the <strong>interaction of expectations and decisions</strong> within the economy. We also need to understand how interactions of macro variables like unemployment, inflation, and key components of GDP are connected to welfare measures beyond GDP (e.g., inequality and poverty).</p>`},

{head:"GDP вАФ Three Approaches to Measurement",num:"2",cards:[
{title:"1. Production Approach (Value Added)",content:`<p>GDP = sum of <strong>value added</strong> across all sectors of the economy. Avoids double-counting by measuring only the value each stage of production adds.</p>
<ul>
<li><strong>Primary:</strong> Agriculture, Mining & Quarrying</li>
<li><strong>Secondary:</strong> Manufacturing, Construction, Electricity-Gas-Water</li>
<li><strong>Tertiary:</strong> Trade/Hotel/Restaurant, Transport & Communication, Finance/Real Estate, Other Services</li>
</ul>
<div class="wk-formula">GDPвВВвВАвВВвВБ (Indonesia) = Rp 11,118,868.5 billion</div>
<p><strong>Key Indonesia trends:</strong> Manufacturing share declined from 23% (2000) to 20% (2021). Mining & Quarrying fell from 16% to 12%. Trade and Transport grew significantly. This reflects Indonesia's ongoing structural transformation from industrial to service-based economy.</p>`},
{title:"2. Income Approach (Factor Payments)",content:`<p>GDP = total income earned by factors of production in creating output.</p>
<div class="wk-formula">GDP = Wages + Operating Surplus (Profit) + Taxes on Production</div>
<p><strong>Indonesia data:</strong> Wages are about <strong>one-third of GDP</strong> (~30-35%). Operating surplus (profit) is the largest share (~60-65%). Taxes on production are small (~3-5%). In manufacturing, the profit share is even higher relative to wages вАФ indicating capital-intensive production and potential inequality implications.</p>
<div class="wk-highlight">рЯТ° The low wage share of GDP in Indonesia has implications for inequality вАФ if profits are concentrated among capital owners while most workers earn relatively low wages, GDP growth may not translate into broad-based welfare improvement. This connects to Prof. Azis's research on the macro-poverty-inequality nexus.</div>`},
{title:"3. Expenditure Approach (Most Used in Macroeconomics!)",content:`<p>The approach used in the <strong>Workhorse Macro Model</strong>. GDP = total spending on final goods and services.</p>
<div class="wk-formula">Y = C + I + G + (EX вИТ IM)</div>
<table class="wk-table"><tr><th>Component</th><th>Label</th><th>Indonesia Share (2021)</th><th>Key Feature</th></tr>
<tr><td>Household Consumption</td><td>C</td><td>~52-54%</td><td>Largest, most stable</td></tr>
<tr><td>Non-profit Consumption</td><td>(part of C)</td><td>~1%</td><td>Small</td></tr>
<tr><td>Government Consumption</td><td>G</td><td>~8-9%</td><td>Policy instrument</td></tr>
<tr><td>Government Investment</td><td>I_G</td><td>~2-3%</td><td>Infrastructure</td></tr>
<tr><td>Private Investment</td><td>I_P</td><td>~29-30%</td><td>Most volatile!</td></tr>
<tr><td>Exports</td><td>EX</td><td>~21-23%</td><td>Foreign demand</td></tr>
<tr><td>Imports</td><td>IM</td><td>~18-19%</td><td>Leakage</td></tr></table>
<div class="wk-exam">рЯУЭ <strong>Exam focus:</strong> Know all three approaches and that they must give the SAME GDP figure. The expenditure approach (Y = C+I+G+NX) is the one used in macro modeling. Private Investment (I_P) is the most volatile component вАФ its swings drive business cycles. C is the largest but most stable.</div>`},
]},
{head:"Four Key Macroeconomic Indicators",num:"3",cards:[
{title:"The Macro Dashboard",content:`<p>Every economy is evaluated on four key metrics. These correspond directly to variables in the flowchart model:</p>
<table class="wk-table"><tr><th>Indicator</th><th>Variable</th><th>What It Measures</th><th>Indonesia (recent)</th></tr>
<tr><td>Real GDP Growth (gY)</td><td>Y</td><td>Speed of economic expansion</td><td>~5% (pre-COVID trend)</td></tr>
<tr><td>Inflation (ѕА)</td><td>P</td><td>Rate of price level increase</td><td>~3-4% (BI target: 2.5¬±1%)</td></tr>
<tr><td>Current Account (CA)</td><td>CUR</td><td>External balance position</td><td>~0 to -3% of GDP</td></tr>
<tr><td>Unemployment Rate (u)</td><td>U</td><td>Labor market slack</td><td>~5-6%</td></tr></table>
<div class="wk-highlight">рЯТ° These four indicators are interconnected through the model: gYвЖС вЖТ uвЖУ (Okun's Law) вЖТ ѕАвЖС (Phillips Curve) вЖТ CAвЖУ (income leaks to imports). No indicator can be analyzed in isolation вАФ this is the WHOLE POINT of the five-market model.</div>`},
]},
{head:"Macroeconomic Accounts вАФ Money, Fiscal, BOP",num:"4",cards:[
{title:"Monetary Survey (Central Bank Balance Sheet)",content:`<p>The monetary survey shows how money is created and distributed in the economy. Key components:</p>
<ul>
<li><strong>Assets side:</strong> Net Foreign Assets + Net Domestic Assets (claims on government, claims on private sector)</li>
<li><strong>Liabilities side:</strong> Broad Money (M2) = Currency in circulation + Transferable deposits + Other deposits + Securities</li>
</ul>
<div class="wk-formula">Broad Money (M2) Indonesia 2021 вЙИ Rp 7,324.8 trillion (~43% of GDP)
Base money growth вЖТ via money multiplier вЖТ Broad money
Velocity: V = Nominal GDP / M2 вЙИ 2.3</div>
<p><strong>Policy tools beyond interest rates:</strong> Bond selling/buying (OMO), reserve requirements, QE. Central banks use the <em>active use of balance sheets</em> (both assets and liabilities) to navigate policy challenges.</p>`},
{title:"Central Government Budget (Fiscal)",content:`<p>Indonesia's fiscal structure (2021, Rp trillion):</p>
<ul>
<li><strong>Revenue:</strong> ~Rp 1,744T (tax revenue ~Rp 1,432T + non-tax ~Rp 247T + oil & gas ~Rp 97T)</li>
<li><strong>Expenditure:</strong> ~Rp 2,750T (current ~Rp 1,505T + personnel ~Rp 381T + subsidies ~Rp 193T + interest ~Rp 311T + capital ~Rp 389T + transfers to regions ~Rp 729T)</li>
<li><strong>Overall balance:</strong> Deficit ~Rp 906T (~5.7% of GDP in 2020-2021 due to COVID, normally capped at 3%)</li>
<li><strong>Financing:</strong> Net government securities issuance ~Rp 1,066T</li>
</ul>
<p><strong>Energy subsidies</strong> (subsidi energi: fuel + electricity) are a major fiscal pressure point вАФ when global oil prices spike, subsidi BBM costs explode, widening the deficit.</p>`},
{title:"Balance of Payments (BOP)",content:`<p>Indonesia's external accounts (USD million):</p>
<div class="wk-formula">BOP = Current Account + Capital/Financial Account = 0
CUR = Goods trade + Services + Primary Income + Secondary Income
Financial Account = FDI + Portfolio + Other Investment</div>
<ul>
<li><strong>Goods trade:</strong> Generally surplus (commodity exports: palm oil, coal, nickel), but oil & gas is a deficit item (~$-12B)</li>
<li><strong>Services:</strong> Deficit (~$-3.5B, tourism partially offsets)</li>
<li><strong>Primary income:</strong> Deficit (~$-6 to -8B, profit repatriation by foreign companies)</li>
<li><strong>Financial account:</strong> Net inflow finances the CUR deficit вАФ heavily dependent on portfolio flows (hot money) and FDI</li>
</ul>
<div class="wk-exam">рЯУЭ <strong>Exam connection:</strong> BOP identity: CUR + Financial Account = 0. A CUR deficit MUST be financed by capital inflows (INFLOW). If INFLOW stops suddenly вЖТ balance of payments crisis вЖТ E crashes (1997-98 Indonesia). Reserve assets (USD ~$130-140B) provide a buffer.</div>`},
]},
{head:"The Workhorse Macroeconomic Model",num:"5",cards:[
{title:"Short Run & Medium Run: The Triangle",content:`<p>Prof. Azis presents the macro core as a <strong>triangle</strong> connecting three key variables:</p>
<div class="wk-formula">Growth of Output (gY) вЖРвЖТ Unemployment (u) вЖРвЖТ Inflation (ѕА)</div>
<ul>
<li><strong>Okun's Law</strong> connects gY and u: (»≤ вИТ Y)/»≤ = c(u вИТ ≈Ђ). When Y grows faster than potential, u falls.</li>
<li><strong>Phillips Relation</strong> connects u and ѕА: ѕА_t вИТ ѕА_{t-1} = вИТќ±(u_t вИТ u_n). When u falls below natural rate, inflation accelerates.</li>
<li><strong>Aggregate Demand</strong> connects ѕА and gY: through the IS-LM-Phillips framework, inflation feeds back to monetary policy which affects demand.</li>
</ul>
<div class="wk-highlight">рЯТ° This triangle IS the short-to-medium run macro model. Every shock traces through this triangle. Example: GвЖС вЖТ gYвЖС (demand) вЖТ uвЖУ (Okun's) вЖТ ѕАвЖС (Phillips) вЖТ central bank raises i вЖТ gYвЖУ (feedback). The triangle captures the fundamental tradeoffs in macro policy.</div>`},
{title:"Long Run: Saving, Capital & Technology",content:`<p>In the long run, the model shifts from demand-driven to supply-driven:</p>
<div class="wk-formula">Y = F(K, N) вАФ production function
I = S = sY вАФ investment equals savings
K_t вИТ (1вИТќі)K_{t-1} = I вАФ capital accumulation</div>
<ul>
<li><strong>Short-run:</strong> Comparative-static analysis (IS-LM shifts, multiplier effects)</li>
<li><strong>Medium-run:</strong> Trend implications (SRAS adjusts, expectations update)</li>
<li><strong>Long-run:</strong> Technology (TFP) drives sustained growth. Short-run fluctuations look very small relative to the long-run trend.</li>
</ul>`},
{title:"The Full Integrated Model (Slide 34)",content:`<p>Prof. Azis's integrated model connects ALL the pieces:</p>
<ul>
<li><strong>External shock (F)</strong> вЖТ through UIP вЖТ E вЖТ via Marshall-Lerner вЖТ EX, IM вЖТ NX & CA</li>
<li><strong>IS-LM</strong> (short run): MвЖС вЖТ M/PвЖС вЖТ iвЖУ вЖТ YвЖС вЖТ uвЖУ (Okun's) вЖТ ѕАвЖС (Phillips) вЖТ Taylor Rule response</li>
<li><strong>Medium run:</strong> P changes вЖТ M/PвЖУ вЖТ real effects. Asset prices (P_stock, P_bond) вЖТ Wealth Effect вЖТ C</li>
<li><strong>Long run:</strong> S & ќФA (savings and TFP growth) вЖТ YвЖУ trend вЖТ permanent capacity</li>
<li><strong>Hicks-Mundell-Fleming:</strong> Open economy IS-LM with exchange rate and capital flows</li>
<li><strong>Macroprudential Policy:</strong> Additional regulatory tools beyond monetary/fiscal</li>
</ul>
<div class="wk-exam">рЯУЭ <strong>Exam strategy:</strong> This integrated model IS the flowchart you built. Every exam question can be answered by tracing through this system. Always start with which market the shock hits, then trace through the connections to all other markets. The model captures short-run (IS-LM), medium-run (Phillips + expectations), and long-run (Solow + TFP).</div>`},
]},
{head:"Anomalies & Contemporary Issues",num:"6",cards:[
{title:"Anomaly: Expectations",content:`<p>Expectations play a central role in all macro models. Economic agents (households, firms, government) must think not just about today's conditions but years into the future when making decisions about investment, consumption, and saving.</p>
<ul>
<li><strong>Problem of measurement:</strong> How do people actually form expectations? This affects what data we collect and how.</li>
<li><strong>Lucas Critique (1970s):</strong> Macro policy evaluation is invalid if the policy change itself alters how people form expectations. This led to <strong>Rational Expectations</strong> вАФ the assumption that people use all available information and understand the economic model.</li>
<li><strong>Implications:</strong> Anticipated policy changes may have NO real effect if agents have already adjusted. Only SURPRISE policies work вАФ but then credibility suffers.</li>
</ul>`},
{title:"Anomaly: Credibility & Time Inconsistency",content:`<p><strong>Time Inconsistency (TI):</strong> The incentive for the central bank to deviate from its announced policy once other players have committed. Example: CB announces low inflation target вЖТ workers set wages accordingly вЖТ CB then has incentive to lower rates for stimulus (since inflation expectations are already anchored).</p>
<p><strong>Standard solutions:</strong></p>
<ul>
<li>Inflation targeting вАФ questionable effectiveness!</li>
<li>Central bank independence вАФ unclear if sufficient!</li>
<li>Choose "conservative" central bankers who hate inflation вАФ but what about society's broader welfare?</li>
</ul>
<p>Prof. Azis (quoting Solow): <em>"If you don't know what you're doing, for heaven's sake do it gently."</em></p>
<div class="wk-highlight">рЯТ° <strong>Bounded rationality:</strong> Heterogeneous agents have different вАФ and sometimes conflicting вАФ goals, information, capacities to process it, expectations, and beliefs about how the economy works. Real expectations formation is a social and psychological process, not the purely rational process assumed in textbook models.</div>`},
{title:"Anomaly: Macro & Welfare Disconnect",content:`<p>Prof. Azis's research shows that <strong>increasing GDP growth can coexist with growing interregional inequality</strong>. Indonesia's Williamson Index of consumption per capita inequality ROSE even as GDP growth trended upward (2001-2019).</p>
<p>This means: GDP growth alone is NOT sufficient for welfare improvement. The distribution of growth matters вАФ who benefits and who is left behind. This connects to why the course covers inequality, poverty, and welfare measures beyond GDP.</p>`},
]},
{head:"Evolution of Macroeconomics вАФ Historical Context",num:"7",cards:[
{title:"Timeline of Macro Thought",content:`<table class="wk-table"><tr><th>Era</th><th>Key Development</th><th>Key Concept</th></tr>
<tr><td>1930s</td><td>Great Depression вЖТ Keynesian macro</td><td>Demand deficiency, government intervention</td></tr>
<tr><td>1950s+</td><td>Post-WWII welfare state</td><td>Mixed economy, Phillips curve</td></tr>
<tr><td>1970s</td><td>Great Inflation & oil shocks</td><td>Price rigidity, New Keynesian, stagflation</td></tr>
<tr><td>>1980s</td><td>Great Moderation</td><td>New Classical, RBC, Rational Expectations, DSGE</td></tr>
<tr><td>1990s</td><td>Financial crises (Asia 1997-98)</td><td>Macro vs Financial Imbalances, Liquidity trap</td></tr>
<tr><td>2000s</td><td>Global imbalances вЖТ GFC 2008</td><td>Financial innovation risks, NIRP, QE</td></tr>
<tr><td>2010s</td><td>Taper Tantrum</td><td>Capital flow risks, financial spillover</td></tr>
<tr><td>2020s</td><td>COVID-19</td><td>Health capital, Macro-SD, unprecedented stimulus</td></tr></table>
<p>Contemporary extensions: <strong>MMT</strong> (Modern Monetary Theory вАФ government as currency issuer, inflation controlled by taxes), <strong>Technology & robotization</strong> (elasticity of substitution between K and L determines inequality impact), <strong>Crypto currency</strong> (challenges to monetary policy and financial stability), <strong>Climate change</strong> (uncertainty, social discount rate, lasting productivity effects).</p>`},
]},
]},

week2:{title:"Week 2 вАФ Short Run: From IS-LM to AD, and Exchange Rate to UIP",
subtitle:"Prof. Iwan J. Azis ¬Ј Equilibrium in Goods, Money & Exchange Rate Markets ¬Ј Lead Characters: Y, i, MЋҐ, C, I, NX, E, Twin Deficit, UIP, AD",
sections:[
{head:"Goods Market Equilibrium & Behavioral Equations",num:"1",cards:[
{title:"The Goods Market System",content:`<p>The goods market is built from behavioral equations for each GDP component. Prof. Azis lays out the full system:</p>
<div class="wk-formula">Y = GDP = C + I + G + (EX вИТ IM/ќµ)</div>
<p>Each component has a <strong>behavioral function</strong> вАФ it doesn't just sit there, it responds to other variables:</p>
<div class="wk-formula">C = cвВА + cвВБ(Y вИТ T)    [consumption: cвВБ = MPC > 0]
I = aвВА + aвВБ(Y) + aвВВ(i)   [investment: aвВБ > 0, aвВВ < 0]
EX = ќ±* + ќ≤*Y* + ќ≥ќµ    [exports: depend on foreign Y*, real ER]
IM = ќ± + ќ≤Y + ќ≥ќµ    [imports: depend on domestic Y]
IM/ќµ = ќ± + ќ≤Y    [imports in domestic goods terms]</div>
<p>Key variables: <span class="wk-key">ќµ = E/PбµИбґ†</span> real exchange rate, <span class="wk-key">E = Rp/USD</span> nominal exchange rate, <span class="wk-key">PбµИбґ† = P/P*</span> price ratio.</p>
<div class="wk-highlight">рЯТ° Production (Y) вЖТ Income (Y) вЖТ Demand (Z) вАФ these are interchangeable! Z = Y = GDP. The circular flow: output creates income, income creates demand, demand determines output.</div>`},
{title:"Indonesia GDP by Expenditure (2025 data from slides)",content:`<table class="wk-table"><tr><th>Component</th><th>2025 (Current, Rp B)</th><th>Share</th></tr>
<tr><td>Consumption (C)</td><td>13,156,300</td><td>55.23%</td></tr>
<tr><td>Investment (I)</td><td>7,293,700</td><td>30.62%</td></tr>
<tr><td>Government (G)</td><td>1,794,300</td><td>7.53%</td></tr>
<tr><td>Exports (EX)</td><td>5,442,300</td><td>22.85%</td></tr>
<tr><td>Imports (IM)</td><td>4,894,000</td><td>20.54%</td></tr></table>
<div class="wk-formula">Nominal GDP 2025 = Rp 23,821,100 B вЙИ $1.42 Trillion
GDP per Capita вЙИ $4,963 | Population: 286.7 million | IDR/USD: 16,741.87</div>`},
]},
{head:"The Multiplier вАФ Why $1 of Spending Creates More Than $1 of GDP",num:"2",cards:[
{title:"Deriving the Multiplier (Balanced Trade Case)",content:`<p>If trade is balanced (NX = 0), substitute C into Y:</p>
<div class="wk-formula">Y = Z = cвВА + cвВБ(Y вИТ T) + I + G
Y = 1/(1 вИТ cвВБ) √Ч [cвВА вИТ cвВБT + I + G]
      вЖС                    вЖС
   Multiplier    Autonomous Spending</div>
<p><strong>Example:</strong> If cвВБ = 0.6, multiplier = 1/(1вИТ0.6) = <strong>2.5</strong>. So a Rp 100B increase in G raises Y by Rp 250B. The key insight: cвВА represents consumer confidence вАФ a shift in sentiment shifts autonomous spending.</p>
<div class="wk-exam">рЯУЭ On the Keynesian cross diagram: the demand line ZZ has slope cвВБ < 1, crossing the 45¬∞ line at equilibrium. When autonomous spending increases by ќі, output increases by ѕБ > ќі due to the multiplier (ѕБ = multiplier √Ч ќі).</div>`},
{title:"Open Economy Multiplier & Trade Imbalance",content:`<p>Adding trade changes everything. With imports as a leakage:</p>
<div class="wk-formula">Y = 1/(1вИТcвВБ) √Ч [cвВА вИТ cвВБT + I + G] + EX вИТ IM/ќµ</div>
<p>The demand curve for <strong>domestic goods</strong> now has a <em>smaller slope</em> (and hence <strong>lower multiplier</strong>) because some spending leaks to imports. Two critical implications:</p>
<ul><li><strong>Smaller effect on output</strong> вАФ domestic policy less effective</li>
<li><strong>Adverse effect on trade balance</strong> вАФ as Y rises, IM rises, NX worsens</li></ul>
<p><em>The higher the output, the greater the tendency toward trade deficit.</em> This is because IM = ќ± + ќ≤Y вАФ imports are an increasing function of domestic income.</p>`},
]},
{head:"Twin Deficits вАФ Fiscal Deficit вЖФ Trade Deficit",num:"3",cards:[
{title:"The Twin Deficit Identity (Key Derivation!)",content:`<p>Start from the AD identity and derive the savings-investment balance:</p>
<div class="wk-formula">Y = C + I + G + EX вИТ IM/ќµ
Subtract (C + T) from both sides:
Y вИТ C вИТ T = I + (G вИТ T) + (EX вИТ IM/ќµ)
     S    = I + (G вИТ T) + NX

Rearrange:
(T вИТ G) = (I вИТ S) + (EX вИТ IM/ќµ)

Thus: if (T вИТ G) < 0 (fiscal deficit),
then (EX вИТ IM/ќµ) < 0 (trade deficit) вЖТ "TWIN DEFICIT"</div>
<p>If fiscal and trade are both in balance: <strong>S = I</strong> (private saving equals investment).</p>
<div class="wk-highlight">рЯТ° The twin deficit is a fundamental identity, not just a theory. If government spends more than it collects (fiscal deficit), and saving-investment gap is unchanged, the trade balance MUST worsen. This is why GвЖС вЖТ YвЖС вЖТ IMвЖС вЖТ trade deficit вЖТ CUR deficit. Larger government deficit also leads to larger CA deficit.</div>`},
{title:"Application 1: Increased G вЖТ Twin Deficit",content:`<p>Fiscal expansion in an open economy: GвЖС shifts AD up вЖТ Y rises at new equilibrium вЖТ but at the new higher Y, the economy is in both fiscal AND trade deficit.</p>
<div class="wk-formula">Fiscal Expansion вЖТ Higher gY вЖТ Fiscal Deficit вЖТ Trade Deficit (IM leakage) вЖТ Twin Deficits вЖТ Current Account Deficit</div>
<p>This is the fundamental <strong>macro policy tradeoff</strong>: fiscal stimulus boosts output but worsens external balance.</p>`},
{title:"Application 2: Increased Foreign Demand (EXвЖС)",content:`<p>When there's a recession, it's better if FOREIGN demand increases (rather than domestic). But this requires either:</p>
<ol><li>A strong world economy вЖТ problem: may cause a world recession if all countries try this</li>
<li>Currency depreciation to make exports cheaper вЖТ problem: leads to 'currency war'</li></ol>
<p><strong>The need for international coordination!</strong> If every country tries to depreciate simultaneously, no one gains competitiveness вАФ it's a zero-sum game.</p>`},
]},
{head:"Exchange Rate, Depreciation & J-Curve",num:"4",cards:[
{title:"Exchange Rate-Inflation Tradeoff",content:`<p>Depreciation can boost exports but causes inflation through two channels:</p>
<ul><li><strong>Direct channel (short run):</strong> EвЖС вЖТ import pricesвЖС вЖТ PвЖС ("imported inflation"). Prices adjust faster than trade volumes.</li>
<li><strong>Indirect channel (medium run):</strong> EвЖС вЖТ EXвЖС вЖТ YвЖС вЖТ via Phillips Curve вЖТ PвЖС</li></ul>
<div class="wk-formula">Rising E вЖТ rising P or rising ѕА (always!)
This is why "just depreciate the currency" is NOT a free lunch.</div>`},
{title:"The J-Curve Effect",content:`<p>After depreciation, the trade balance initially <strong>worsens before improving</strong>:</p>
<ul><li><strong>Short run:</strong> Prices adjust immediately but volumes (quantities of EX and IM) are slow to respond вЖТ import bill rises in domestic currency вЖТ NX worsens</li>
<li><strong>Medium run:</strong> Volumes adjust вАФ export quantities rise, import quantities fall вЖТ NX improves</li></ul>
<p>The path traces a "J" shape on the NX vs time graph.</p>
<div class="wk-formula">RER-NER-Inflation relationship:
(ќФќµ/ќµ) = (ќФE/E) + ѕА_t вИТ ѕА*_t
% real appreciation = % nominal appreciation + inflation differential</div>`},
{title:"Marshall-Lerner Condition",content:`<p>For depreciation to ACTUALLY improve the trade balance, exports must increase enough and imports decrease enough to compensate for higher import prices:</p>
<div class="wk-formula">ML Condition: |ќµ_EX| + |ќµ_IM| > 1
(sum of export and import price elasticities must exceed 1)</div>
<p><strong>Example:</strong> If 1% depreciation вЖТ 0.9% relative increase in EX, and 0.8% relative decrease in IM, trade balance NX/EX improves by (0.9 + 0.8 вИТ 1)% = 0.7%.</p>
<div class="wk-exam">рЯУЭ <strong>Policy Mix:</strong> Depreciation reduces trade deficit via EXвЖС, but also raises Y and P. If inflation is to be avoided, combine depreciation with reduced spending (GвЖУ). But if initial Y and P are low, depreciation alone is favorable.</div>`},
]},
{head:"Money Market, LM Curve & Interest Rate Determination",num:"5",cards:[
{title:"Types of Money Supply",content:`<ul>
<li><span class="wk-key">M0 (Monetary Base)</span> вАФ notes and coins in circulation. Expanded by CB purchases (OMO)</li>
<li><span class="wk-key">Reserve Money (RM)</span> вАФ base money = currency in circulation + reserve balances at CB</li>
<li><span class="wk-key">M1 (Narrow)</span> вАФ currency held by public + demand deposits (DD)</li>
<li><span class="wk-key">M2 (Broad)</span> вАФ M1 + savings, time deposits, retail money market funds</li></ul>`},
{title:"Money Market Equilibrium & Bond Pricing",content:`<p>Money demand (MбµИ) depends on two things:</p>
<div class="wk-formula">M = $Y ¬Ј L(i)    or    M/P = Y ¬Ј L(i)
     (+)  (-)              Real money stock = Real balance</div>
<p><strong>1. Level of transactions вЖТ $Y</strong> (more output вЖТ more money needed). Note: $Y/MбµИ = "velocity of money."</p>
<p><strong>2. Interest rate вЖТ L(i)</strong> (higher i вЖТ hold less money, buy more bonds).</p>
<p>Bond price and interest rate are inversely related:</p>
<div class="wk-formula">If 1-year bond (e.g., SUN) pays RpX/year, price = PбµЗ:
i = (RpX вИТ PбµЗ) / PбµЗ  вЖТ  given PбµЗ, we know i
PбµЗ = RpX / (1 + i)    вЖТ  given i, we know PбµЗ</div>`},
{title:"LM Curve: Traditional vs Modern",content:`<p><strong>Traditional way (money targeting):</strong> CB chooses MЋҐ. If Y increases вЖТ MбµИ increases вЖТ i must increase to restore equilibrium. Result: LM curve <strong>slopes upward</strong>.</p>
<p><strong>Modern way (interest rate targeting):</strong> CB chooses i directly and adjusts MЋҐ to achieve it. Result: LM curve is <strong>horizontal</strong> at the target rate. When Y changes, CB adjusts MЋҐ to keep i constant.</p>
<div class="wk-exam">рЯУЭ Modern central banks (BI, Fed, ECB) all use interest rate targeting. The LM is horizontal. This simplifies IS-LM: the IS curve determines Y for a given i set by the CB. This is why the Taylor Rule (which sets i) is so central.</div>`},
]},
{head:"UIP, Exchange Rate Market & Mundell-Fleming",num:"6",cards:[
{title:"Uncovered Interest Parity (UIP)",content:`<p>UIP connects the money market to the exchange rate market. Investors choosing between Indonesian bonds and US bonds:</p>
<div class="wk-formula">UIP: (1 + iвВЬ) = (EвВЬ)(1 + i*вВЬ)(1/EбµЙвВЬвВКвВБ)

Simplified: iвВЬ вЙИ i*вВЬ вИТ (EбµЙвВЬвВКвВБ вИТ EвВЬ)/EвВЬ

Domestic interest rate = Foreign rate вИТ Expected appreciation</div>
<p><strong>Example:</strong> If US 1-year rate is 3% lower than Indonesian rate, investors expect the dollar to appreciate ~3% against the rupiah. That's why they hold US bonds despite lower yield.</p>
<p><strong>Key insight:</strong> Higher i вЖТ capital INFLOW вЖТ E <strong>appreciates</strong> (Rp/$ falls). Lower i вЖТ capital OUTFLOW вЖТ E <strong>depreciates</strong> (Rp/$ rises).</p>`},
{title:"IS-LM-UIP: The Mundell-Fleming Model",content:`<div class="wk-formula">Goods: Y = C(YвИТT) + I(Y,i) + G + NX(Y, Y*, (1+i)/(1+i*) √Ч ƒТбµЙ)
Money: i = ƒЂ  (horizontal LM)
ER: E = (1+i)/(1+i*) √Ч ƒТбµЙ  (from UIP)</div>
<p>This three-equation system is the <strong>Mundell-Fleming model</strong> вАФ the workhorse for open-economy short-run analysis. The IS curve slopes down in (Y, i) space. The LM is horizontal. The exchange rate is determined by interest parity.</p>`},
{title:"Policy Analysis: Monetary & Fiscal in Mundell-Fleming",content:`<p><strong>Monetary policy (iвЖУ):</strong> LM shifts down вЖТ YвЖС directly AND E depreciates вЖТ EXвЖС вЖТ further YвЖС. Monetary policy works through BOTH channels.</p>
<p><strong>Fiscal policy (GвЖС):</strong> IS shifts right вЖТ if CB keeps i unchanged, YвЖС and E unchanged. If CB raises i in response вЖТ E appreciates вЖТ EXвЖУ вЖТ partially offsets the fiscal stimulus.</p>
<div class="wk-exam">рЯУЭ Key exam result: In open economy with flexible E and capital mobility, monetary policy is MORE effective than fiscal policy (fiscal gets offset by E appreciation). This is the opposite of fixed E regimes where fiscal works and monetary doesn't.</div>`},
{title:"From IS-LM to AD Curve",content:`<p>The AD curve shows how P affects Y through the money market:</p>
<div class="wk-formula">If MвЖС (or PвЖУ): M/PвЖС вЖТ iвЖУ вЖТ YвЖС    [movement along AD]
If MвЖУ (or PвЖС): M/PвЖУ вЖТ iвЖС вЖТ YвЖУ    [movement along AD]

From IS: Y = C(YвИТT) + I(Y,i) + G + EX вИТ IM(Y)  вЖТ Expenditure
From LM: M/P = Y ¬Ј L(i)  вЖТ Real Balance
Hence AD: Y = Y(M/P, G, T, EX, IM)  вЖТ AD curve slopes down</div>
<p>The AD curve summarizes simultaneous equilibrium in goods and money markets. It slopes down because PвЖС вЖТ M/PвЖУ вЖТ iвЖС вЖТ IвЖУ вЖТ YвЖУ.</p>
<div class="wk-highlight">рЯТ° The complete Week 2 equilibrium determines four variables simultaneously: <span class="wk-key">Y</span> (output), <span class="wk-key">i</span> (interest rate), <span class="wk-key">P</span> (price level), and <span class="wk-key">E</span> (exchange rate). All four markets (goods, money, ER, and later labor) must clear together.</div>`},
]},
]},
week3:{title:"Week 3 вАФ Medium Run: Labor Market, Prices & Combining 4 Markets",
subtitle:"Prof. Iwan J. Azis ¬Ј Wage & Price Setting, AS Curve, Phillips Curve, IS-LM-PC Model, AD-AS Equilibrium, Supply & Demand Shocks",
sections:[
{head:"Wage Determination: Labor Market & Wages",num:"1",cards:[
{title:"Wage-Setting Relation",content:`<p>Wages are set based on unemployment, expected prices, and institutional factors:</p>
<div class="wk-formula">W = PбµЙ ¬Ј F(u, z)
         (вИТ) (+)

u = unemployment (inverse: high u вЖТ low W)
z = institutional factors (positive: stronger institutions вЖТ higher W)
PбµЙ = expected price level</div>
<p><strong>Institutional factors (z):</strong> Collective bargaining, unemployment insurance, labor unions, minimum wage laws, political factors (labor party strength).</p>
<div class="wk-highlight">рЯТ° <strong>COVID-19 exception:</strong> Normally high u вЖТ low W. But post-COVID saw high u WITH high W because of high labor demand during recovery vs workers' changed preferences (Great Resignation) вЖТ labor shortage despite measured unemployment.</div>`},
{title:"Price-Setting Relation",content:`<p>Firms set prices as a markup (ќЉ) over wages:</p>
<div class="wk-formula">P = (1 + ќЉ) ¬Ј W

Rearranging for real wage:
W/P = 1/(1 + ќЉ)    вЖР Price-Setting line (horizontal in W/P vs u space)</div>
<p>The markup ќЉ reflects market power вАФ monopolistic competition means firms charge above marginal cost.</p>`},
{title:"Equilibrium: Natural Rate of Unemployment",content:`<p>Setting wage-setting equal to price-setting:</p>
<div class="wk-formula">W/PбµЙ = F(u, z)    [Wage Setting вАФ downward sloping]
W/P = 1/(1 + ќЉ)    [Price Setting вАФ horizontal]

In equilibrium (PбµЙ = P): F(uвВЩ, z) = 1/(1 + ќЉ)
вЖТ uвВЩ = natural rate of unemployment</div>
<p><strong>What shifts the natural rate?</strong></p>
<ul><li>If <strong>z goes up</strong> (stronger unions, higher unemployment insurance, Europe): WS shifts up вЖТ uвВЩ <strong>increases</strong></li>
<li>If <strong>ќЉ goes down</strong> (anti-trust law, more competition): PS shifts up вЖТ uвВЩ <strong>decreases</strong></li></ul>
<div class="wk-exam">рЯУЭ The natural rate uвВЩ is NOT fixed вАФ it depends on institutional factors (z) and market structure (ќЉ). Policy CAN change uвВЩ through structural reforms, just not through demand management.</div>`},
]},
{head:"Indonesia's Labor Market Structure",num:"2",cards:[
{title:"Labor Market Breakdown (August 2020)",content:`<div class="wk-formula">Population: 270.2 million
вЖТ Manpower (15-64): 204 million
  вЖТ Labor Force (L): 138.2 million  [LFP = L/MP = 67.7%]
    вЖТ Employed (N): 128.5 million
    вЖТ Unemployed (U): 9.7 million = 7.02%
  вЖТ Non-Labor Force: 65.8 million
вЖТ Non-manpower (<15 or >64): 30.2 million</div>
<p>Key Indonesia definitions: employed = minimum 1 hour continuously during last week. Half/partially employed = less than 35 hours per week. Data from SAKERNAS survey (4 times per year, 75,000 household sample).</p>
<p><strong>NEET (Not in Education, Employment or Training):</strong> ~9.9 million young Indonesians (aged 15-24) вАФ a major structural concern for Indonesia's demographic dividend.</p>`},
{title:"Wages, Labor Productivity & Output Growth",content:`<p>In competitive equilibrium: <strong>W/P = Y/L</strong> (real wage = labor productivity). The relationship between labor productivity growth and output growth:</p>
<div class="wk-formula">Production Function: Y = A ¬Ј F(K, L)
MPL = dY/dL (marginal product)
APL = Y/L (average product)

Growth of A or TFP вФАвФР
                     вФЬвЖТ Growth of Y/L вЖТ Growth of Y or Y/N
Growth of K/L вФАвФАвФАвФАвФАвФАвФШ</div>
<p><strong>Indonesia data:</strong> National labor productivity grew 2.91%/year on average, real wage grew 3.13%/year. But the absolute gap is enormous: productivity at Rp 3.8M vs real wage at Rp 977K. The productivity-wage ratio averaged 3.69x over 23 years вАФ meaning workers capture only ~27% of their productivity in wages.</p>`},
{title:"Minimum Wage & Omnibus Law",content:`<p><strong>Minimum wage tradeoff:</strong> Higher wages vs potential job losses. Impact depends on the level:</p>
<ul><li>If set at moderate level вЖТ employment impact is modest (David Card, Nobel 2021: "very unlikely that minimum wage has large negative employment effect")</li>
<li>If set too high вЖТ significant job losses for least-skilled workers</li>
<li>Can increase productivity in some cases</li></ul>
<p><strong>Indonesia's Omnibus Law (Cipta Kerja):</strong></p>
<ul><li>Minimum wage no longer sectoral</li>
<li>Reduced severance from 36-60 weeks to 24 weeks (+ 8 weeks insurance = 32 total)</li>
<li>Fixed-term contracts capped at 5 years</li>
<li>Employment insurance scheme added as safety net</li></ul>
<div class="wk-exam">рЯУЭ Card & Krueger's finding: minimum wage increases were accompanied by employment INCREASES in some cases вАФ contradicting the standard textbook prediction. The key is whether the labor market is competitive (textbook: min wage вЖТ unemployment) or monopsonistic (min wage can raise both wages AND employment).</div>`},
]},
{head:"Aggregate Supply (AS) Curve Derivation",num:"3",cards:[
{title:"From Labor Market to AS",content:`<p>Deriving the AS curve step by step from wage and price setting:</p>
<div class="wk-formula">Given: u = (LвИТN)/L = 1 вИТ N/L
Simple production: Y = N вЖТ u = 1 вИТ Y/L

From Price Setting: P = (1 + ќЉ) ¬Ј W
From Wage Setting: W = PбµЙ ¬Ј F(u, z)

Combine: P = PбµЙ ¬Ј (1 + ќЉ) ¬Ј F(1 вИТ Y/L, z)

AS Relation: P = PбµЙ(1 + ќЉ)F(1 вИТ Y/L, z)
                              вЖС
                         negative: YвЖС вЖТ uвЖУ вЖТ WвЖС вЖТ PвЖС</div>
<p>The AS curve slopes <strong>upward</strong>: higher Y вЖТ lower u вЖТ higher wages вЖТ higher prices.</p>`},
{title:"AS Curve Properties & Shifts",content:`<p><strong>Key properties:</strong></p>
<ul><li>If Y < YвВЩ вЖТ P < PбµЙ (economy below potential, prices below expected)</li>
<li>If Y > YвВЩ вЖТ P > PбµЙ (overheating, prices above expected)</li>
<li>AS passes through (YвВЩ, PбµЙ) вАФ at natural output, actual price equals expected price</li></ul>
<p><strong>What shifts AS?</strong> If W goes up for any reason вЖТ PбµЙ goes up вЖТ AS shifts LEFT (upward). This is the medium-run adjustment mechanism:</p>
<div class="wk-formula">Y > YвВЩ вЖТ P > PбµЙ вЖТ workers revise PбµЙ upward вЖТ WвЖС вЖТ AS shifts left вЖТ YвЖУ back toward YвВЩ
Y < YвВЩ вЖТ P < PбµЙ вЖТ workers revise PбµЙ downward вЖТ WвЖУ вЖТ AS shifts right вЖТ YвЖС back toward YвВЩ</div>
<p>Natural output (YвВЩ) = output with flexible prices/wages (medium run). Potential output (YвВЪвВТвВЬ) = output under perfect competition.</p>`},
]},
{head:"Phillips Curve вАФ AS in Growth Rates",num:"4",cards:[
