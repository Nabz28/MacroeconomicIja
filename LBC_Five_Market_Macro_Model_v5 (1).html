{title:"From AS Levels to PC Growth Rates",content:`<p>Instead of looking at price LEVELS (AS curve), convert to growth RATES:</p>
<div class="wk-formula">AS: YвЖС вЖТ NвЖС вЖТ uвЖУ вЖТ WвЖС вЖТ PвЖС
Convert to growth rates:
gYвЖС вЖТ gNвЖС вЖТ guвЖУ вЖТ gWвЖС вЖТ gPвЖС

gP = inflation rate = ѕА

Phillips Curve: ѕА вИТ ѕАбµЙ = вИТќ±(u вИТ uвВЩ)

If ѕАбµЙ = ѕА(tвИТ1) [adaptive expectations]:
ѕА вИТ ѕА(вИТ1) = (ќ±/L)(Y вИТ YвВЩ)  вЖР PC in output gap form</div>
<p>The <strong>Phillips Curve replaces the AS curve</strong> when we work with growth rates instead of levels. Lower output lowers inflation; higher output raises inflation.</p>
<p><strong>NAIRU:</strong> The natural rate of unemployment is the rate required to keep inflation CONSTANT вАФ hence "Non-Accelerating Inflation Rate of Unemployment."</p>`},
]},
{head:"Combining All 4 Markets: IS-LM-PC Model",num:"5",cards:[
{title:"The IS-LM-PC Framework",content:`<p>Prof. Azis introduces the complete <strong>IS-LM-PC</strong> model (Goods + Money + Labor, later + ER):</p>
<div class="wk-formula">IS: Y = C(YвИТT) + I(Y,r) + G + NX    [goods market, uses REAL rate r]
LM: i = ƒЂ  (horizontal, CB targets rate)    [money market]
PC: ѕА вИТ ѕА(вИТ1) = (ќ±/L)(Y вИТ YвВЩ)    [labor/prices, Phillips curve]

Real rate: r вЙИ i вИТ ѕАбµЙвВЬвВКвВБ    [Fisher equation]</div>
<p><strong>Why use r instead of i?</strong> (1) Investment decisions are in real terms вАФ what matters is the cost net of inflation. (2) In deflation: lowering nominal i during falling prices вЖТ r actually RISES вЖТ contractionary. This is the deflation spiral (Japan since mid-1990s).</p>`},
{title:"Medium-Run Convergence & Policy Effects",content:`<p><strong>Key result:</strong> Any deviation from potential output will, in the medium run, return to potential output. The mechanism:</p>
<ul><li>Y > YвВЩ вЖТ ѕА rising вЖТ PбµЙвЖС вЖТ AS shifts left вЖТ YвЖУ back to YвВЩ (at higher P)</li>
<li>Y < YвВЩ вЖТ ѕА falling вЖТ PбµЙвЖУ вЖТ AS shifts right вЖТ YвЖС back to YвВЩ (at lower P)</li></ul>
<p><strong>AD Shock (fiscal consolidation):</strong> GвЖУ вЖТ IS shifts left вЖТ YвЖУ below YвВЩ вЖТ ѕА falls вЖТ in medium run, inflation decline lowers r вЖТ Y recovers to YвВЩ at lower interest rate. Fiscal consolidation is contractionary short-run but neutral medium-run.</p>
<p><strong>Supply Shock (oil priceвЖС):</strong> Oil price acts like ќЉвЖС вЖТ PS shifts down вЖТ uвВЩ rises вЖТ YвВЩ falls вЖТ AS shifts left вЖТ PвЖС AND YвЖУ = <strong>STAGFLATION</strong>. In medium run, higher oil price permanently raises the price level.</p>`},
{title:"The Deflation Spiral Trap",content:`<p>If the zero lower bound prevents monetary policy from lowering i further:</p>
<div class="wk-formula">Y < YвВЩ вЖТ ѕА falls вЖТ ѕАбµЙ falls вЖТ r = i вИТ ѕАбµЙ RISES (because ѕАбµЙ is falling!)
вЖТ higher r вЖТ Y falls more вЖТ ѕА falls more вЖТ r rises more вЖТ spiral!</div>
<p>This is the <strong>deflation spiral</strong> вАФ Japan's experience since mid-1990s. Lowering nominal i during deflation actually causes real rate r to increase, worsening the recession. This is why fiscal policy (GвЖС) becomes crucial at the zero lower bound.</p>
<div class="wk-exam">рЯУЭ <strong>Exam essential:</strong> At the zero lower bound, monetary policy is trapped. Only fiscal policy or unconventional monetary policy (QE) can stimulate. The deflation spiral is self-reinforcing: falling prices вЖТ rising real rates вЖТ falling output вЖТ falling prices more. Japan is the canonical case study.</div>`},
{title:"All Four Markets Together",content:`<p>The complete four-market model (slide 42-43): IS-LM (goods + money) + UIP (exchange rate) + PC (labor/prices):</p>
<div class="wk-formula">Monetary Tightening (iвЖС):
Goods & Money: iвЖС вЖТ rвЖС вЖТ IвЖУ вЖТ YвЖУ below YвВЩ
Exchange Rate: iвЖС вЖТ capital inflow вЖТ E appreciates (Rp/$ falls) вЖТ NXвЖУ
Labor/Phillips: YвЖУ вЖТ uвЖС вЖТ ѕА falls вЖТ PC shifts down
Medium run: Y returns to YвВЩ, ѕА permanently lower, E overshoots then settles</div>
<p>Four simultaneous adjustments across four markets вАФ this is the complete Workhorse Macroeconomic Model in action.</p>
<div class="wk-highlight">рЯТ° <strong>The four-market diagram:</strong> Top-left: IS-LM (r vs Y). Top-right: Interest parity (i vs E). Bottom: Phillips Curve (ќФѕА vs Y). Any policy shock traces through all three panels. Practice drawing this for the exam.</div>`},
]},
]},
week4:{title:"Week 4 вАФ Long Run: Technology, Solow Model & Macro Econometric Modeling",
subtitle:"Prof. Iwan J. Azis ¬Ј Summary of 4 Markets, Solow Growth Model, TFP & Productivity, Single Equations vs System of Equations, Basic Econometrics Review",
sections:[
{head:"Summary of the Four-Market Model",num:"1",cards:[
{title:"Mundell-Fleming: 3 Markets Simultaneously",content:`<p>The Mundell-Fleming model captures simultaneous equilibrium in goods, money, and exchange rate markets:</p>
<div class="wk-formula">IS: Y = C(YвИТT) + I(Y,i) + G + NX(Y,Y*,E)  [goods market вАФ downward sloping]
LM: i = ƒЂ  [money market вАФ horizontal, CB targets rate]
UIP: (1+iвВЬ) = (1+i*вВЬ)(EвВЬ/EбµЙвВЬвВКвВБ)  [exchange rate market]</div>
<p><strong>Key result:</strong> An increase in interest rate reduces output both <em>directly</em> (via IвЖУ) and <em>indirectly</em> (through exchange rate appreciation вЖТ NXвЖУ).</p>`},
{title:"AD Curve Derivation (From IS-LM)",content:`<div class="wk-formula">From IS: Y = C(YвИТT) + I(Y,i) + G + EX вИТ IM(Y) вЖТ Expenditure
From LM: M/P = Y¬ЈL(i) вЖТ Real Balance
Hence: AD relation: Y = Y(M/P, G, T, EX, IM)

When PвЖС вЖТ M/PвЖУ вЖТ iвЖС вЖТ YвЖУ  [AD slopes DOWN]</div>`},
{title:"Adding the Labor Market: AS Curve & Phillips Curve",content:`<div class="wk-formula">AS: P = PбµЙ(1+ќЉ)F(1 вИТ Y/L, z)  [upward sloping: YвЖС вЖТ uвЖУ вЖТ WвЖС вЖТ PвЖС]

Key dynamics:
вАҐ If Y < YвВЩ вЖТ P < PбµЙ вЖТ PбµЙ adjusts down вЖТ AS shifts RIGHT вЖТ Y rises back
вАҐ If Y > YвВЩ вЖТ P > PбµЙ вЖТ PбµЙ adjusts up вЖТ AS shifts LEFT вЖТ Y falls back

PC Curve replaces AS: ѕА вИТ ѕАбµЙ = (ќ±/L)(Y вИТ YвВЩ)
NAIRU = natural rate of unemployment that keeps inflation constant</div>
<p><strong>Monetary expansion in AD-AS:</strong> MвЖС вЖТ M/PвЖС вЖТ AD shifts right вЖТ YвЖС above YвВЩ вЖТ PвЖС вЖТ PбµЙвЖС вЖТ WвЖС вЖТ AS shifts left вЖТ process continues until Y = YвВЩ at higher P. <strong>Money is neutral in the medium run.</strong></p>`},
{title:"Four-Market Equilibrium Diagram",content:`<p>The complete 4-market diagram has <strong>four panels</strong>:</p>
<ul>
<li><strong>Top-left (GM & MM):</strong> IS-LM in (Y, r) space вАФ goods & money markets</li>
<li><strong>Top-right (EM):</strong> Interest parity in (E, i) space вАФ exchange rate market</li>
<li><strong>Bottom-left (LbM/AS):</strong> AD-AS in (Y, P) space вАФ labor/price level</li>
<li><strong>Bottom-right (PC):</strong> Phillips Curve in (Y, ѕАвИТѕАћД) space вАФ inflation dynamics</li>
</ul>
<div class="wk-exam">рЯУЭ <strong>Application вАФ Monetary Tightening:</strong> iвЖС вЖТ LM shifts up вЖТ YвЖУ and rвЖС (GM&MM) вЖТ E appreciates, Rp/$ falls (EM) вЖТ ѕА falls below target, PC shifts down (LbM) вЖТ In medium run: lower inflation вЖТ lower PбµЙ вЖТ AS shifts right вЖТ Y recovers to YвВЩ at permanently lower P and ѕА.</div>`},
]},
{head:"Long-Run Growth: Technology, Saving & Productivity",num:"2",cards:[
{title:"The Solow Growth Model",content:`<p>The production function in intensive (per-worker) form:</p>
<div class="wk-formula">Y/N = f(K/N)  [output per worker depends on capital per worker]
Investment per worker: I/N = s¬Јf(K/N)  [savings = investment]
Depreciation per worker: ќі¬Ј(K/N)
Capital dynamics: K_{t+1}/N вИТ K_t/N = s¬Јf(K_t/N) вИТ ќі¬Ј(K_t/N)</div>
<p><strong>When capital is low:</strong> investment > depreciation вЖТ capital increases вЖТ output grows.</p>
<p><strong>When capital is high:</strong> investment < depreciation вЖТ capital decreases вЖТ output falls.</p>
<p>The economy converges to the <strong>steady state</strong> where s¬Јf(K/N)* = ќі¬Ј(K/N)*.</p>`},
{title:"Steady State & Golden Rule",content:`<p><strong>Steady state:</strong> Y/N and K/N are no longer changing. The economy has reached its long-run equilibrium.</p>
<div class="wk-formula">Steady state condition: s¬Јf(K/N)* = ќі¬Ј(K/N)*
Production at steady state: Y = f(K/N)* where (K/N)* is the steady-state capital</div>
<p><strong>Effects of different saving rates:</strong> A country with a higher saving rate (sвВБ > sвВА) achieves a higher level of output per worker in steady state. But it does NOT grow faster permanently вАФ just reaches a higher level.</p>
<p><strong>Golden Rule:</strong> The level of capital that maximizes steady-state consumption per worker. If capital exceeds the Golden Rule level, reducing savings would increase both current AND future consumption. Most countries are below the Golden Rule вЖТ higher savings helps future generations but costs current ones.</p>
<div class="wk-highlight">рЯТ° <strong>Key insight:</strong> Higher saving rate (s) increases the LEVEL of K/AN and Y/AN but does NOT affect the GROWTH RATE of Y/N or Y. Only technological progress (gA) determines long-run growth.</div>`},
{title:"Technology & Effective Labor",content:`<div class="wk-formula">Y = F(K, AN)  where AN = "effective labor"
Y/AN = f(K/AN)  [output per effective worker]
I/AN = s¬Јf(K/AN)
Required investment: (ќі + gA + gN)¬ЈK/AN

Steady state: s¬Јf(K/AN)* = (ќі + gA + gN)¬Ј(K/AN)*</div>
<p>In the long-run steady state, Y and K must grow at the same rate as AN, i.e., <strong>gA + gN</strong>. The economy is on a "balanced growth path."</p>
<div class="wk-formula">Solow Residual = Rate of TFP growth = gY вИТ [ќ±¬ЈgN + (1вИТќ±)¬ЈgK]
In steady state: labor productivity growth (gY вИТ gN) = gA</div>
<p><strong>Technology's ambiguous effect on AD:</strong> TP can shift AS right (lower costs). TP may raise confidence вЖТ CвЖС, IвЖС вЖТ AD right. But TP can also cause job insecurity fears вЖТ CвЖУ вЖТ AD left. So AS shift is clear, AD shift is unknown.</p>`},
]},
{head:"Indonesia's Labor Productivity",num:"3",cards:[
{title:"International Comparison (ILO 2023 Data)",content:`<table class="wk-table"><tr><th>Country</th><th>Output per Worker (PPP $)</th><th>GDP per Hour Worked (PPP $)</th></tr>
<tr><td>USA</td><td>134,766.6</td><td>70</td></tr>
<tr><td>Malaysia</td><td>61,903.8</td><td>26</td></tr>
<tr><td>China</td><td>37,549.8</td><td>15</td></tr>
<tr><td><strong>Indonesia</strong></td><td><strong>27,262.3</strong></td><td><strong>14</strong></td></tr>
<tr><td>India</td><td>20,108.2</td><td>8</td></tr></table>
<p>Indonesia's labor productivity in PPP terms ($27,262) is much higher than in nominal USD ($5,088) because goods/services are cheaper domestically вАФ PPP adjusts for this purchasing power difference.</p>
<p><strong>Indonesia's productivity growth decomposition (2011-2023):</strong> Productivity growth fluctuated between -4% to +4%, with the COVID period showing a sharp decline. The decomposition shows: static structural change (workers moving between sectors), dynamic structural (within-sector improvement), and a "within" component (technological change within sectors).</p>`},
{title:"Saving, Steady State & Policy Implications",content:`<p>Prof. Azis emphasizes key policy conclusions from the Solow model:</p>
<ul>
<li>Output level depends on capital amount; capital depends on saving/investment вЖТ the interaction leads to convergence to steady state</li>
<li>Higher saving rate вЖТ higher steady-state level of output, but <strong>growth rate in long run = zero</strong> (without tech progress)</li>
<li>Increasing s requires an <strong>initial decrease in consumption</strong> вЖТ long-run benefit (higher C) comes at short-run cost (lower C)</li>
<li><strong>Golden Rule dilemma:</strong> policymakers must decide how much weight to put on welfare of CURRENT vs FUTURE generations</li>
</ul>
<div class="wk-exam">рЯУЭ Labor productivity = GDP per employed person. It's linked to economic growth, competitiveness, and living standards. Indonesia's low productivity per hour ($14 vs US $70) reflects the development gap вАФ closing it requires TFP growth (A), not just capital accumulation (K).</div>`},
]},
{head:"Macro Econometric Modeling: Single vs System Equations",num:"4",cards:[
{title:"Single Equation Estimation (OLS)",content:`<p>Estimating each behavioral equation independently using OLS regression:</p>
<div class="wk-formula">Consumption: C = cвВА + cвВБ¬ЈYDIS + cвВВ¬ЈC(t-1) + cвВГ¬ЈWEALTH + ќµ
Investment: I = aвВА + aвВБ¬ЈY + aвВВ¬Јi + aвВГ¬ЈCOVID + ќµ
Money Demand: M = bвВА + bвВБ¬Јi + bвВВ¬ЈYCUR¬≤ + ќµ
Exchange Rate: E = dвВА + dвВБ¬ЈF + dвВВ¬ЈE(t-1) + ќµ
Prices: P = eвВА + eвВБ¬ЈM + eвВВ¬Јu + eвВГ¬ЈMGAP + ќµ
Employment: N = fвВА + fвВБ¬ЈY + ќµ
Wages: W = gвВА + gвВБ¬ЈP + ќµ</div>
<p><strong>Problem:</strong> OLS ignores that variables are simultaneously determined. Y affects C, but C affects Y back. This endogeneity biases OLS estimates.</p>`},
{title:"System of Simultaneous Equations",content:`<p>Better approach: estimate ALL equations together as a system, accounting for endogeneity. STATA results from the slides show coefficients change between single-equation and system estimation:</p>
<table class="wk-table"><tr><th>Equation</th><th>Key Variable</th><th>OLS Coefficient</th><th>System Coefficient</th></tr>
<tr><td>Consumption</td><td>MPC (YDIS)</td><td>0.308</td><td>0.382</td></tr>
<tr><td>Investment</td><td>Y effect</td><td>0.336</td><td>0.272</td></tr>
<tr><td>Investment</td><td>i effect</td><td>-9,164</td><td>-9,257</td></tr>
<tr><td>Exchange Rate</td><td>F (capital flows)</td><td>-0.028</td><td>-0.104</td></tr>
<tr><td>Prices</td><td>M effect</td><td>0.000011</td><td>0.0000088</td></tr>
<tr><td>Employment</td><td>Y effect</td><td>24.67</td><td>23.90</td></tr>
<tr><td>Wages</td><td>P effect</td><td>21,494</td><td>23,134</td></tr></table>
<p><strong>Notice:</strong> Coefficients change вАФ sometimes substantially вАФ between single and system estimation. The system approach captures the feedback loops that OLS misses.</p>`},
{title:"Cautionary Notes on Modeling",content:`<ul>
<li>This is a <strong>simplified version</strong> of Indonesia's model, tailored for the class</li>
<li>Results depend on country-specific conditions</li>
<li>Data quality, availability, and scale matter</li>
<li><strong>Common pitfalls:</strong> wrong functional form, excluded relevant variables, deliberate policy changes, missing interactions among variables (endogeneity)</li>
</ul>`},
]},
{head:"Review of Basic Econometrics",num:"5",cards:[
{title:"The Three Key Statistics",content:`<p>Prof. Azis says: "The only statistics you need to pay attention to in this course":</p>
<div class="wk-formula">1. Coefficient (ќ≤) = size and sign (direction of relationship)
2. t-ratio = ќ≤ / Standard Error  [вЙ• 1.6 is acceptable]
   вЖТ larger |t| = more confident the sign is correct вЖТ smaller p-value
3. R¬≤ = proportion of variance in Y explained by X variables (0 to 1, higher = better)</div>
<p><strong>Critical distinction:</strong> t-ratio and R¬≤ measure DIFFERENT things. High t-ratio but low R¬≤ may indicate large sample size. High R¬≤ but low t-ratio may indicate multicollinearity.</p>`},
{title:"Hypothesis Testing & P-Value",content:`<p><strong>Steps:</strong> (1) Set HвВА (null: no relationship) and HвВР (alternative: relationship exists). (2) Calculate t-statistic and p-value. (3) If p вЙ§ ќ± (typically 0.05), reject HвВА.</p>
<div class="wk-formula">t = ќ≤ћВ / SE(ќ≤ћВ)    [coefficient divided by its standard error]
Reject HвВА if |t| > t(ќ±/2, nвИТk)    [compare against t-table critical value]
p-value: probability of getting result вЙ• |t| under HвВА</div>
<p><strong>Type I error:</strong> reject HвВА when it's true (false alarm). <strong>Type II error:</strong> accept HвВА when it's false (missed detection). Example: HвВА = "no virus." Type I = declare virus when none exists. Type II = declare no virus when it's present.</p>`},
{title:"R¬≤ and Adjusted R¬≤",content:`<div class="wk-formula">R¬≤ = 1 вИТ SSR/SST = 1 вИТ (unexplained variation / total variation)
SST = ќ£(y вИТ »≥)¬≤ = SSR + SSE
SSR (residual) = ќ£(y вИТ ≈Ј)¬≤  [unexplained]
SSE (explained) = ќ£(≈Ј вИТ »≥)¬≤  [explained]

Adjusted R¬≤ = 1 вИТ [(1вИТR¬≤)(nвИТ1)/(nвИТkвИТ1)]
  вЖТ penalizes for adding useless variables
  вЖТ always вЙ§ R¬≤</div>
<p><strong>Degree of freedom:</strong> n вИТ k where n = sample size, k = number of estimated parameters. If {4, 2, 6, 8} with no constraints вЖТ 4 degrees of freedom. If told "mean = 5" вЖТ only 3 df (4th value is determined).</p>
<div class="wk-exam">рЯУЭ <strong>Exam checklist for reading regression output:</strong> (1) Check coefficient SIGN вАФ does it match theory? (2) Check t-ratio (вЙ• 1.6) or p-value (< 0.05) вАФ is it statistically significant? (3) Check R¬≤ вАФ how much variation is explained? (4) Compare single-equation vs system results вАФ do coefficients change meaningfully?</div>`},
]},
]},
week5:{title:"Week 5 вАФ Financial Markets: Bonds, Stocks & Uncertainty",
subtitle:"Prof. Iwan J. Azis ¬Ј Bond Pricing & Yields, Yield Curve, Stock Prices, Tobin\'s q, Wealth Effect, Financial Stability",
sections:[
{head:"Recapitulation: SR & MR Macroeconomics",num:"1",cards:[
{title:"Short Run vs Medium Run",content:'<table class="wk-table"><tr><th></th><th>Short Run</th><th>Medium Run</th></tr><tr><td><strong>Output</strong></td><td>Determined by demand (AD)</td><td>Output = potential output (YвВЩ)</td></tr><tr><td><strong>Inflation</strong></td><td>Higher GAP вЖТ higher inflation</td><td>Inflation is stable</td></tr><tr><td><strong>Interest rate</strong></td><td>Set by CB</td><td>Converges to natural rate (rвВЩ)</td></tr><tr><td><strong>Fiscal consolidation</strong></td><td>GвЖУ вЖТ YвЖУ, CвЖУ, IвЖУ</td><td>Y returns to YвВЩ, C lower, I higher</td></tr><tr><td><strong>Oil priceвЖС</strong></td><td>Higher ѕА, possibly YвЖУ (stagflation)</td><td>Lower YвВЩ permanently</td></tr></table><div class="wk-highlight">рЯТ° Deflation spiral: GAP<0 вЖТ ѕАвЖУ вЖТ real rate rises (even if i=0) вЖТ YвЖУ more вЖТ ѕАвЖУ more. Japan since mid-1990s. Speed of adjustment to medium-run determines if you are "classical" or "Keynesian."</div>'},
]},
{head:"Bond Market Fundamentals & PDV",num:"2",cards:[
{title:"Present Discount Value вАФ Foundation of All Asset Pricing",content:'<div class="wk-formula">Rp 1 today вЖТ Rp (1+iвВЬ) next year вЖТ Rp (1+iвВЬ)(1+iвВЬвВКвВБ) in 2 years\nReverse: Rp 1 in 2 years = Rp 1/[(1+iвВЬ)(1+iвВЬвВКвВБ)] today\nExample: i=5%, PDV of Rp1 in 2 years = 1/(1.05)¬≤ вЙИ Rp 0.91</div><p>General formula: V = zвВЬ + zбµЙвВЬвВКвВБ/(1+iвВЬ) + zбµЙвВЬвВКвВВ/[(1+iвВЬ)(1+iбµЙвВЬвВКвВБ)] + ...</p><p>For bonds (fixed nominal payments) вЖТ use nominal rates. For C and I decisions вЖТ use real rates. Both give same answer.</p>'},
{title:"Bond Pricing & Yields",content:'<div class="wk-formula">1-year bond: PвВБвВЬ = 1000/(1+iвВБвВЬ)\n2-year bond: PвВВвВЬ = 1000/[(1+iвВБвВЬ)(1+iбµЙвВБвВЬвВКвВБ)]\nWith constant yield: PвВВвВЬ = 1000/(1+iвВВвВЬ)¬≤\n\nExample: PвВВвВЬ = Rp800 вЖТ iвВВвВЬ = (1000/800)^0.5 вИТ 1 = 11.8%</div><p>Bond prices and yields are INVERSELY related вАФ always. CB bond purchases (QE) вЖТ priceвЖС вЖТ yieldвЖУ вЖТ stimulus. Government deficit вЖТ bond supplyвЖС вЖТ priceвЖУ вЖТ yieldвЖС вЖТ crowding out.</p>'},
{title:"Money Creation via Bond Purchases",content:'<p>When CB buys a Rp1000 bond (reserve requirement = 10%):</p><ul><li>Bank-1 receives Rp1000 deposit вЖТ keeps Rp100 reserves вЖТ lends Rp900</li><li>Bank-2 receives Rp900 вЖТ keeps Rp90 вЖТ lends Rp810</li><li>Bank-3 receives Rp810 вЖТ keeps Rp81 вЖТ lends Rp729...</li><li><strong>Total money created: Rp10,000</strong> (= 1000 √Ч 1/rr = 1000/0.10)</li></ul><p>Money multiplier = 1/reserve requirement. CB selling bonds reverses this: reduces reserves вЖТ contracts money supply.</p>'},
]},
{head:"Yield Curve вАФ Predicting Recessions",num:"3",cards:[
{title:"Deriving Future Expected Rates",content:'<div class="wk-formula">iвВВвВЬ = 0.5(iвВБвВЬ + iбµЙвВБвВЬвВКвВБ)\nRearranging: iбµЙвВБвВЬвВКвВБ = 2¬ЈiвВВвВЬ вИТ iвВБвВЬ\n\nExample: iвВБвВЬ=1.5%, iвВВвВЬ=2.5% вЖТ iбµЙвВБвВЬвВКвВБ = 5% вИТ 1.5% = 3.5%\nвЖТ Markets expect HIGHER rates вЖТ positive slope вЖТ recovery signal</div><p><strong>Normal curve</strong> (upward): markets expect ratesвЖС вЖТ recovery. <strong>Inverted</strong> (downward): markets expect ratesвЖУ вЖТ recession ahead. <strong>Caveat:</strong> If CB is reluctant to cut despite recession signals, yield curve may stay upward-sloping even as recession approaches.</p><p><strong>Two theories:</strong> (1) Expectations theory вАФ purely about expected future rates. (2) Liquidity preference вАФ investors demand a premium for holding long-term вЖТ naturally upward-sloping even without rate expectations.</p>'},
{title:"Indonesia Bond Market Data",content:'<p>Indonesia 2-yr yield fell 2bps, 10-yr rose 18bps (Sep-Oct 2024). US inflation has larger impact on Indonesia short-term yields; Germany/Japan on long-term. EM response is asymmetric: weak under expansion, stronger under contraction. Indonesia = 16.9% of ASEAN bond issuance (Q3 2024).</p>'},
]},
{head:"Stock Market: Pricing & Wealth Effect",num:"4",cards:[
{title:"Stock Price = PDV of Expected Dividends",content:'<div class="wk-formula">Nominal: QвВЬ = DбµЙвВЬвВКвВБ/(1+iвВБвВЬ) + DбµЙвВЬвВКвВВ/[(1+iвВБвВЬ)(1+iбµЙвВБвВЬвВКвВБ)] + ...\nReal: QвВЬ = DвВЬвВКвВБ/(1+rвВБвВЬ) + DвВЬвВКвВВ/[(1+rвВБвВЬ)(1+rбµЙвВБвВЬвВКвВБ)] + ...\n\nKey vs Bonds: Bond numerator FIXED (coupon), Stock numerator VARIABLE (dividends = f(Y))\nDividend D is positively related to firm profit вЖТ positively related to GDP</div>'},
{title:"Wealth Effect & Policy Response",content:'<p>Stocks enter consumption via wealth: Y = C[(W, (YвИТT))] + I + G + NX</p><p>Two scenarios after CвЖС shifts IS right:</p><ul><li><strong>Market expects i unchanged:</strong> YвЖС вЖТ higher earnings вЖТ STOCKвЖС</li><li><strong>Market expects CB raises i:</strong> rвЖС вЖТ higher discount rate вЖТ STOCKвЖУ even if Y unchanged</li></ul><p>With non-flat LM: Steep LM вЖТ iвЖС a lot, YвЖС little вЖТ stocks DOWN. Flat LM вЖТ iвЖС little, YвЖС a lot вЖТ stocks UP.</p>'},
{title:"Tobin\'s q & Fads",content:'<div class="wk-formula">q = Market value / Replacement cost\nq > 1 вЖТ build new capital (invest) rather than buy existing\nq < 1 вЖТ buy existing firms rather than build (M&A)</div><p><strong>Fads:</strong> Past price increases create excessive optimism вЖТ extrapolation вЖТ "hot" stocks priced above fundamentals. The Magnificent 7 (>30% of S&P 500) trade at 2-3√Ч P/E of remaining 493. Not purely AI вАФ investors see them as safe bets with fortress balance sheets.</p>'},
]},
{head:"Financial Stability & Diversification",num:"5",cards:[
{title:"Key Findings",content:'<p><strong>IMF 2025 study (6,600+ banks):</strong> 5% AE / 8% EM banks vulnerable to rate changes. 3%/6% as exposed as SVB. Little aggregate risk, but outlier banks can trigger panics вЖТ need macroprudential policy.</p><p><strong>Post-2020 structural shift:</strong> Stock-bond correlation turned positive during selloffs вЖТ diversification fails when needed most. Investors must rethink portfolios; policymakers need credible frameworks and stress testing.</p><div class="wk-exam">рЯУЭ <strong>Exam essentials:</strong> (1) Bond price = PDV of coupons, inversely related to yield. (2) Stock price = PDV of dividends (variable). (3) Yield curve predicts recessions. (4) Wealth effect: STOCKвЖС вЖТ WвЖС вЖТ CвЖС вЖТ IS right. (5) Tobin\'s q links stock prices to real investment. (6) Stock reaction depends on whether policy was ANTICIPATED (rational expectations).</div>'},
]},
]},
week6:{title:"Week 6 вАФ Expectation, Uncertainty & Time Inconsistency",
subtitle:"Prof. Iwan J. Azis \u00b7 Modeling Financial Markets, Role of Expectation in C & I, Uncertainty in Macro Models, Time Inconsistency (Kydland & Prescott)",
sections:[
{head:"Modeling Financial Markets",num:"1",cards:[
{title:"Bond Market Function",content:'<p>The bond market is modeled both as a single equation and within a simultaneous equations system.</p><div class="wk-formula">Single equation: Bond = \u03b1 + \u03b2 Yield + e\n  \u2192 OLS: \u03b2 = -49.80, R\u00b2 = 0.408\n\nSimultaneous (3SLS): \u03b2 = -59.42 (larger magnitude!)\n  \u2192 Endogeneity bias corrected\n\nExtended single eq: Bond = \u03b1 + \u03b2 Yield + \u03b3 Gn + \u03b4 COVID + e\n  \u2192 R\u00b2 = 0.637, Yield coeff = -36.92, Gn positive & significant</div><p><strong>Key insight:</strong> Government spending in current prices (Gn) is positively related to bond issuance. COVID dummy is significant вАФ the pandemic period shifted bond market dynamics. The simultaneous equations coefficient is LARGER than OLS, suggesting OLS underestimates the yield-bond relationship due to endogeneity.</p>'},
{title:"Bond Yield Function",content:'<div class="wk-formula">Single equation: Yield = \u03b1 + \u03b2 i + e\n  \u2192 \u03b2 = 0.505, R\u00b2 = 0.643 (81 obs)\n\nSimultaneous: \u03b2 = 0.505, highly significant (z = 7.98)\n\nExtended: Yield = \u03b1 + \u03b2 ilag + \u03b3 idif + e\n  \u2192 ilag coeff = 0.794 (R\u00b2 = 0.596)\n  \u2192 idif (interest rate differential) coeff = 0.08 (not significant at 5%)</div><p>The yield closely tracks the policy rate (i) with a positive relationship. Using lagged interest rate (ilag) gives better fit, reflecting that yield adjusts with a delay to policy changes. Interest rate differential (idif = i \u2212 i_world) captures global spillovers but is weaker.</p>'},
{title:"Stock Market Function",content:'<div class="wk-formula">Basic: Stock = \u03b1 + \u03b2 Y + \u03b3 Yield + e\n  \u2192 Y coeff = 0.003 (+), Yield = -204.83 (-), R\u00b2 = 0.956\n\nWith COVID: Stock = \u03b1 + \u03b2 Y + \u03b3 Yield + \u03b4 COVID + e\n  \u2192 COVID coeff = -422.64 (significant negative shock)\n\nRevised (with YWORLD): Stock = \u03b1 + \u03b2 Y + \u03b3 Yield + \u03b4 YWORLD + e\n  \u2192 Single eq: all significant, R\u00b2 = 0.956\n\nSimultaneous: Y = 0.0022 (+), Yield = -228.48 (-)\n  \u2192 Magnitudes change vs OLS!</div><p><strong>Interpretation:</strong> Stock prices are positively driven by GDP (Y) and negatively by yields. Higher yields mean higher discount rates \u2192 lower PV of dividends \u2192 lower stock prices. COVID had a large negative impact (\u2248 -423 index points). Adding world output (YWORLD) captures global sentiment spillovers.</p>'},
{title:"Mechanism of 5 Markets: Open Capital Account",content:'<p>The interaction of all five markets shows how monetary policy transmits through the entire economy:</p><div class="wk-formula">Case: i\u2193 (monetary easing)\n  F\u2193 \u2192 E\u2191 (depreciation) \u2192 NEX\u2191 \u2192 P\u2191\n  i\u2193 \u2192 Y\u2191 \u2192 u\u2193 \u2192 C\u2191\n  Bond\u2191 \u2192 Yield\u2193 \u2192 Stock\u2191 \u2192 Wealth\u2191 \u2192 C\u2191\n\nCase: i\u2191 (monetary tightening)\n  F\u2191 \u2192 E\u2193 (appreciation) \u2192 NEX\u2193 \u2192 P\u2193\n  i\u2191 \u2192 Y\u2193 \u2192 u\u2191 \u2192 C\u2193\n  Bond\u2193 \u2192 Yield\u2191 \u2192 Stock\u2193 \u2192 Wealth\u2193 \u2192 C\u2193</div><div class="wk-highlight">\ud83d\udca1 Macroeconomics is fundamentally a story about the process from disequilibrium to equilibrium, except when rigidity causes prolonged disequilibrium. This partly explains why workhorse models fail to explain extreme events like the 2008 GFC and COVID \u2014 they assume smooth adjustment mechanisms.</div><p><strong>Why simultaneous equations?</strong> Single equations miss the feedback loops. Y affects Stock, but Stock affects Wealth which affects C which affects Y. Only a simultaneous system captures these interdependencies correctly.</p>'},
]},
{head:"Role of Expectation in C & I",num:"2",cards:[
{title:"Consumption: Beyond Current Income",content:'<p>Consumption depends on more than just current disposable income:</p><div class="wk-formula">Y = C[W, (Y \u2212 T)] + I(\u03a0\u1d49/(1+r)) + G + EX(Y*, E) \u2212 E\u00b7IM(Y, RER)\n\nConsumption determinants:\n  1. Current disposable income (Y \u2212 T)\n  2. Expected future income (Ye)\n  3. Financial wealth W = non-human wealth\n     (stocks, bonds, bank accounts, house value)\n  4. Human wealth = PV of after-tax labor income</div><p><strong>Friedman\u2019s Permanent Income Theory (PITC):</strong> Consumers look beyond current income \u2014 they consume based on their \u201cpermanent\u201d (long-run average) income. A temporary bonus won\u2019t change spending much; a permanent raise will.</p><p><strong>Modigliani\u2019s Life Cycle Theory (LCTC):</strong> Planning horizon = entire lifetime. Each year, consume roughly the same level \u2192 borrow when income is low (young), save when income is high (middle-age), dissave in retirement.</p>'},
{title:"Investment: Keynes\u2019 Approach",content:'<p>Keynes argued that we can only reach full employment if investment offsets the full employment level of savings. Investment creates income which creates equivalent saving.</p><div class="wk-formula">I = \u03b1 + \u03b2 \u03a0f + \u03b3 S + \u03b4 PK + \u03b5 r + e\n    (+)  (+)  (\u2212)  (\u2212)\n\n\u03a0f = entrepreneurial forecast of profitability\nS = surprise (realized \u2212 forecast profits)\nPK = price of a unit of capital\nr = interest rate</div><p><strong>Keynes\u2019 key insight:</strong> The demand for new capital is first and foremost a function of its <em>prospective yield</em> \u2014 not interest rates. Investment is critically dependent on entrepreneurial expectations. The focus is not physical productivity but <em>discounted lifetime value</em>.</p><div class="wk-highlight">\ud83d\udca1 Keynes de-emphasized interest rates: \u201cA more typical explanation of the crisis is not primarily a rise in the rate of interest, but a sudden collapse in the marginal efficiency of capital.\u201d \u2014 This means animal spirits and expectations matter more than the cost of borrowing!</div>'},
{title:"Investment & Present Value of Expected Profits",content:'<div class="wk-formula">Machine bought in year t generates expected profit \u03a0\u1d49\u209c\u208a\u2081 in t+1:\n  PV in year t = [1/(1+r\u209c)] \u00d7 \u03a0\u1d49\u209c\u208a\u2081\n\nWith depreciation \u03b4, profit in t+2:\n  (1\u2212\u03b4)\u03a0\u1d49\u209c\u208a\u2082\n  PV = [1/((1+r\u209c)(1+r\u1d49\u209c\u208a\u2081))] \u00d7 (1\u2212\u03b4)\u03a0\u1d49\u209c\u208a\u2082\n\nTotal PV of expected profits:\n  V(\u03a0\u1d49\u209c) = \u03a0\u1d49\u209c\u208a\u2081/(1+r\u209c) + (1\u2212\u03b4)\u03a0\u1d49\u209c\u208a\u2082/[(1+r\u209c)(1+r\u1d49\u209c\u208a\u2081)] + ...</div><p>Investment is fundamentally <strong>forward-looking</strong> and depends primarily on expected future profits, discounted by expected future real interest rates, adjusted for depreciation.</p>'},
{title:"Static Expectation & User Cost of Capital",content:'<p>Under static expectation, firms assume future profits and rates stay constant:</p><div class="wk-formula">If \u03a0\u1d49\u209c\u208a\u2081 = \u03a0\u1d49\u209c\u208a\u2082 = ... = \u03a0\u209c and r\u1d49\u209c\u208a\u2081 = r\u1d49\u209c\u208a\u2082 = ... = r\u209c\n\nThen: V(\u03a0\u1d49\u209c) = \u03a0\u209c / (r\u209c + \u03b4)\n\nInvestment: I\u209c = I(\u03a0\u209c / (r\u209c + \u03b4))\n\nRental (user) cost of capital = r\u209c + \u03b4\n  r = real interest rate\n  \u03b4 = depreciation rate</div><p>Investment depends on the <strong>ratio of profit to user cost</strong>. Higher profit \u2192 more investment. Higher user cost \u2192 less investment. This is linked to <strong>Tobin\u2019s q</strong>: stock price tells firms how much the market values each unit of existing capital. If q > 1, build new capital. If q < 1, buy existing firms (M&A).</p>'},
{title:"Dropping Static Expectation & Current Profit",content:'<p>When we drop the assumption that the future equals the past:</p><ul><li>If current profit is low, firms cannot easily finance new machines \u2014 borrowing is risky (bankruptcy risk)</li><li>Hence investment depends on BOTH expected PV of future profits AND current profit level</li></ul><div class="wk-formula">I\u209c = I[V(\u03a0\u1d49\u209c), \u03a0\u209c]\n       (+)    (+)\n\nWhat determines \u03a0\u209c?\n  \u03a0\u209c = \u03a0(Y\u209c/K\u209c)   (+)\n  Higher sales-to-capital ratio \u2192 higher profits per unit of capital</div>'},
{title:"C vs I: Similarity & Key Difference",content:'<p><strong>Similarity:</strong> Both C and I respond to whether shocks are perceived as transitory or permanent. Holiday sales lead to transitory investment boom. Temporary income bonus barely changes consumption.</p><p><strong>Critical difference:</strong></p><ul><li><strong>Consumption:</strong> Permanent income\u2191 \u2192 C\u2191 by roughly the same amount (one-for-one). Increasing C by MORE would require cuts later.</li><li><strong>Investment:</strong> Faced with a permanent sales increase, PV of expected profits rises, firms may proceed quickly with large capital spending \u2192 I can EXCEED the increase in sales (overshoot)</li></ul><div class="wk-highlight">\ud83d\udca1 Investment should be MORE VOLATILE than consumption. Data from Indonesia (1991\u20132020) confirms this: investment growth deviates from its mean by up to ~45%, while consumption deviations are far smaller (\u223c10-15%). During the 1998 Asian crisis, investment collapsed by nearly 50% while consumption fell by about 5%.</div>'},
]},
{head:"Uncertainty in Macro Models",num:"3",cards:[
{title:"Model Uncertainty: IMF\u2019s 10-Model Exercise",content:'<p>The IMF used 10 macroeconometric models (EAGLE, GIMF, QUEST, FSGM, G-Cubed, GFM, SIGMA, Oxford, GMUSE, NiGEM) with roughly similar structure (detailed IS-LM-PC) to trace the effects of a US policy rate cut of 100bps for 2 years.</p><div class="wk-formula">Results: Output response to 1% rate cut\n  After 1 year: Average = +0.8%, Range = 0.1% to 2.1%\n  After 2 years: Average = +1.0%, Range = 0.2% to 2.0%\n\n\u2192 Substantial uncertainty about policy effects!</div><div class="wk-highlight">\ud83d\udca1 Robert Solow (Nobel laureate): \u201cI was once able to explain to the Board of Directors of the Federal Reserve Bank of Boston that Brainard had proved that if you don\u2019t know what you\u2019re doing, for heaven\u2019s sake do it gently.\u201d</div>'},
{title:"Policy Under Certainty vs Uncertainty: A Numerical Example",content:'<p>Scenario: Economy in recession, u = 6%, u\u2099 = 4%, gap = 2%. By Okun\u2019s law, 1% extra output growth \u2192 0.4% reduction in u. Need 5% extra growth to close gap.</p><div class="wk-formula">WITH CERTAINTY (using model average):\n  1% rate cut \u2192 0.8% output growth\n  To get 5% growth: cut rate by 5%/0.8% = 6.25%\n\nWITH UNCERTAINTY (using model range):\n  6.25% rate cut \u2192 Y response ranges from:\n    0.625% (0.1 \u00d7 6.25) to 13.1% (2.1 \u00d7 6.25)\n  \u2192 u reduction ranges from:\n    0.25% (0.4 \u00d7 0.625) to 5.24% (0.4 \u00d7 13.1)\n  \u2192 u could end up between:\n    0.76% (6% \u2212 5.24%) and 5.75% (6% \u2212 0.25%)!\n\nIf strongest model is right: u = 0.76% \u2192 3.24% below u\u2099\n  \u2192 ENORMOUS inflationary pressures!</div><p><strong>Conclusion:</strong> Given uncertainty, the CB should cut rates by MUCH LESS than 6.25%. This is the Brainard principle \u2014 when uncertain about effects, move cautiously and adjust incrementally.</p>'},
]},
{head:"Time Inconsistency (Kydland & Prescott)",num:"4",cards:[
{title:"The Core Problem: Good Intentions \u2192 Bad Outcomes",content:'<p><strong>Finn Kydland & Edward Prescott (2004 Nobel Prize):</strong> Good intentions by policy makers can lead to disaster when they think the trade-off between macro objectives can be compromised.</p><div class="wk-formula">Phillips Curve: \u03c0 = \u03c0\u1d49 \u2212 \u03b1(u \u2212 u\u2099)\n  (NAIRU = Non-Accelerating Inflation Rate of Unemployment)\n\nStep 1: CB announces 0% inflation target\n  \u2192 If believed: \u03c0\u1d49 = 0, u = u\u2099, \u03c0 = 0 \u2713\n\nStep 2: CB \u201cseemingly\u201d does better\n  If \u03b1 = 0.5, accepting \u03c0 = 1% \u2192 u drops 2% below u\u2099\n  Attractive! CB deviates from its promise.\n\nStep 3: Wage setters catch on\n  \u2192 They raise \u03c0\u1d49 to 1%\n  \u2192 To still get u 2% below u\u2099, need \u03c0 = 2%\n\nStep 4: Spiral continues...\n  \u03c0\u1d49 keeps rising, actual \u03c0 keeps rising\n  Eventually: high persistent inflation with NO unemployment benefit</div>'},
{title:"Why It\u2019s Called \u201cTime Inconsistency\u201d",content:'<p>The policy that is <em>optimal at the time of announcement</em> (0% inflation) becomes <em>suboptimal once others have acted</em> (set wages based on the announcement). The CB has an incentive to deviate AFTER the private sector has committed.</p><ul><li><strong>Before wage setting:</strong> Optimal plan = 0% inflation \u2713</li><li><strong>After wage setting:</strong> CB sees opportunity to reduce u by accepting some inflation \u2192 deviates from plan \u2718</li><li><strong>Result:</strong> Wage setters learn this, stop trusting announcements \u2192 \u03c0\u1d49 rises \u2192 worse outcome than simply sticking to the original 0% target</li></ul><div class="wk-exam">\ud83d\udcdd <strong>Exam essentials:</strong> (1) Bond\u2191 when Yield\u2193 (inverse). Stock\u2191 when Y\u2191 and Yield\u2193. (2) Investment depends on V(\u03a0\u1d49) and current \u03a0 \u2014 Keynes says expectations matter more than interest rates. (3) User cost = r + \u03b4. Tobin\u2019s q links stock market to real investment. (4) Investment is MORE volatile than consumption. (5) Brainard principle: under uncertainty, act gently. (6) Time inconsistency: CB promise of low \u03c0 is not credible if it has incentive to deviate \u2192 solution: CB independence, rules, inflation targeting.</div>'},
]},
]},
week7:{title:"Week 7 вАФ Technological Progress & Modeling 5 Markets",
subtitle:"Prof. Iwan J. Azis \u00b7 Technological Progress & Solow Residual, TFP Growth, FEBUI 2026 Simultaneous Equations Model, Counterfactual Analysis, Recent Events (Oil Price, War, Financial Crisis)",
sections:[
{head:"Technological Progress (TP)",num:"1",cards:[
{title:"TP & Effective Labor",content:'<p>A \u201cstate of technology\u201d (A) tells us how much output (Y) can be produced from given amounts of capital (K) and labor (N). TP can either increase Y with the same N, or maintain Y with less N.</p><div class="wk-formula">Production function with TP:\n  Y = F(K, AN)   where AN = \u201ceffective labor\u201d\n  Y/AN = f(K/AN) ............(1)\n\nFrom I = S = sY:\n  I/AN = s \u00d7 Y/AN\n  I/AN = s \u00d7 f(K/AN) .........(2)</div><p>The concept of <strong>effective labor (AN)</strong> is crucial: technological progress is \u201clabor-augmenting\u201d \u2014 it\u2019s as if each worker becomes more productive, equivalent to having more workers. Growth in A is what drives long-run increases in output per capita.</p>'},
{title:"Solow Residual & TFP",content:'<div class="wk-formula">Solow residual = g_Y \u2212 [\u03b1 g_N + (1\u2212\u03b1) g_K]\n  = actual output growth MINUS growth attributable\n    to labor and capital\n\nTFP growth (g_A):\n  residual = \u03b1 \u00d7 g_A\n  \u2192 g_A = residual / \u03b1 (labor share)\n\nDistinction:\n  Labor productivity growth = g_Y \u2212 g_N = Y/N growth\n  TFP growth = g_A = \u201cpure\u201d technology contribution\n  TFP captures efficiency gains beyond just adding K or N</div>'},
{title:"Measuring TFP: Cobb-Douglas Production Function",content:'<div class="wk-formula">Y\u209c = A\u209c K\u209c\u1d45 L\u209c\u00b9\u207b\u1d45\n\nIn growth rates:\n  \u0394ln Y\u209c = \u0394ln A\u209c + \u03b1 \u0394ln K\u209c + (1\u2212\u03b1) \u0394ln L\u209c\n\nSolving for TFP:\n  \u0394ln A\u209c = \u0394ln Y\u209c \u2212 \u03b1 \u0394ln K\u209c \u2212 (1\u2212\u03b1) \u0394ln L\u209c\n\nEmpirical regression:\n  ln Y\u209c = const + \u03b1 ln K\u209c + \u03b2 ln L\u209c\n\nDiscrete version (for annual data):\n  ln(A\u209c\u208a\u2081/A\u209c) = ln(Y\u209c\u208a\u2081/Y\u209c) \u2212 \u03b1\u0305 ln(K\u209c\u208a\u2081/K\u209c) \u2212 (1\u2212\u03b1\u0305) ln(L\u209c\u208a\u2081/L\u209c)\n  where \u03b1\u0305 = average capital share over the period</div>'},
{title:"Determinants of Technological Progress",content:'<p>What drives TP varies across countries and institutional contexts:</p><ul><li><strong>R&D activities:</strong> Trade-off between fertility (generating ideas) and appropriability (capturing returns from ideas)</li><li><strong>Legal/Patent system:</strong> Little advantage to being first \u2192 innovation vs imitation trade-off</li><li><strong>Property rights protection:</strong> Few create new technologies if profits are appropriated by state (bribes, corrupt bureaucrats) or stolen by others</li><li><strong>Management practices:</strong> Study of 20 Indian textile firms showed improved management raised productivity by 18% through better quality, efficiency, and reduced inventory</li><li><strong>Institutions:</strong> South vs North Korea \u2014 private ownership vs nationalized, strong state vs central planning, legal protection vs state-decision</li></ul><p>There is a strong positive correlation between protection from expropriation and GDP per capita (Acemoglu, 2004).</p>'},
]},
{head:"TP Effects on AS-AD & Unemployment",num:"2",cards:[
{title:"Short-Run Effects of TP on Output & Prices",content:'<p>TP reduces the number of inputs required to produce 1 unit of Y, so producers can lower prices:</p><div class="wk-formula">AS effect: AS shifts RIGHT (equilibrium at point C)\n  \u2192 Lower prices, higher output\n\nAD effect: AMBIGUOUS!\n  Optimistic case: TP \u2192 confidence\u2191, expectations\u2191\n    \u2192 C\u2191 and I\u2191 \u2192 AD shifts RIGHT (point B\u2019)\n  Pessimistic case: TP \u2192 job security concerns,\n    restructuring fears, no new I needed\n    \u2192 C\u2193 (or S\u2191) \u2192 AD shifts LEFT\n\nNet AD shift is UNKNOWN\n\nEmployment effect: N = Y/A\n  If g_Y > g_A \u2192 employment increases\n  If g_Y < g_A \u2192 employment decreases</div><div class="wk-highlight">\ud83d\udca1 The price effects differ between the two AD shift cases. If AD shifts right, both output and prices could increase (point B\u2019). If AD stays put, output rises but prices fall (point C). This ambiguity is a central analytical challenge.</div>'},
{title:"Case 1: Correct Expectation of Productivity Growth (A\u1d49 = A)",content:'<div class="wk-formula">With TP, cost of producing 1 unit of Y becomes W/A (not W)\n\nPrice setting: P = (1+m) W/A  \u2192  W/P = A/(1+m)\nWage setting: W = A\u1d49 P\u1d49 F(u,z)\n  If A\u1d49 = A: W/P = A F(u,z)\n\nIf g_A = 10%:\n  g(W/P) from BOTH price-setting AND wage-setting = 10%\n  \u2192 u\u2099 is INDEPENDENT of A and g_A</div><p><strong>Key result:</strong> When expectations are correct, an increase in productivity shifts BOTH the wage-setting and price-setting curves up by the same proportion. The natural rate of unemployment does not change. Real wages grow at the same rate as productivity.</p>'},
{title:"Case 2: Incorrect Expectation (A\u1d49 \u2260 A)",content:'<p>If workers incorrectly predict productivity growth \u2014 say actual A growth is SLOWER than expected (A\u1d49):</p><div class="wk-formula">Wage setting W/P = A\u1d49 F(u,z) shifts up MORE\n  than price setting W/P = A/(1+m)\n\n\u2192 u\u2099 INCREASES temporarily\n\u2192 Stays elevated until expectations adjust: A\u1d49 = A</div><p><strong>Practical implication:</strong> A slowdown in productivity growth, if workers\u2019 expectations adjust slowly, leads to a temporary increase in the natural rate of unemployment. Workers demand wages as if productivity is still growing fast \u2192 firms can\u2019t afford it \u2192 higher equilibrium unemployment. This happened in many economies during the post-2000 productivity slowdown.</p>'},
]},
{head:"FEBUI 2026 Simultaneous Equations Model",num:"3",cards:[
{title:"The 5 Markets + Supply Side",content:'<p>The FEBUI Class 2026 model covers 5 markets plus a supply-side (production function):</p><table class="wk-table"><tr><th>#</th><th>Market</th><th>Key Variables</th></tr><tr><td>1</td><td>Goods Market</td><td>Y, C, I, G, EX, IM</td></tr><tr><td>2</td><td>Money Market</td><td>M, i, P</td></tr><tr><td>3</td><td>Exchange Rate Market</td><td>E, EXNO, IMNO, idif</td></tr><tr><td>4</td><td>Labor (Price) Market</td><td>W, P, N, u, gu</td></tr><tr><td>5</td><td>Financial & Capital Market</td><td>Stock, Bond, Yield, Wealth, INFLOW</td></tr><tr><td>6</td><td>Supply Side (PF)</td><td>lnYS = f(lnN, lnK) Cobb-Douglas</td></tr></table>'},
{title:"Equations List (3SLS System)",content:'<div class="wk-formula">Behavioral Equations (estimated via 3SLS):\n  cons_eq:    C = f(YDIS, Clag1, Wealth)\n  invest_eq:  I = f(Y, r, E, COVID)\n  EXNO_eq:    EXNO = f(EXNO, E, IMNO)\n  IMNO_eq:    IMNO = f(IMNO, E, IGC)\n  M_eq:       M = f(M, i, YCUR)\n  E_eq:       E = f(E, idif, INFLOW)\n  P_eq:       P = f(P, M, u, GAPlag1)\n  gu_eq:      gu = f(gu, gY, gW)\n  Stock_eq:   Stock = f(Stock, Y, Yield, INFLOW)\n  Bond_eq:    Bond = f(Bond, Yield, GCUR)\n  Yield_eq:   Yield = f(Yield, i, Yieldlag1)\n  gYield_eq:  gYield = f(gYield, i, Bond, Yieldlag)\n  W_eq:       W = f(W, P)\n  INFLOW_eq:  INFLOW = f(INFLOW, i, Bond)\n  N_eq:       N = f(N, Y, gW)\n  YS_eq:      lnYS = f(lnYS, lnN, lnK)  [CD-PF]</div>'},
{title:"Key Identities in the Model",content:'<div class="wk-formula">Y     = C + I + G + EX \u2212 IM\nWealth = Stock + Bond\nIM    = IMNO + IMO\nEX    = EXNO + EXO\nYDIS  = Y \u2212 T/P\nidif  = i \u2212 iworld\nr     = i/P\ngY    = Y \u2212 Ylag1\nu     = L.u + gu   (u accumulates from gu)\nYS    = exp(lnYS)\nGAP   = YS \u2212 Y\nG     = GCUR/P\nIGC   = I + G + C\n\nExogenous: i, iworld, VWORLD, EXO, IMO,\n           T, G, LF, L, COVID, INFLOW1</div>'},
{title:"3SLS Regression Results Overview",content:'<p>The model uses <strong>Three-Stage Least Squares (3SLS)</strong> estimation with 40 observations across 16 behavioral equations:</p><table class="wk-table"><tr><th>Equation</th><th>R\u00b2</th><th>\u03c7\u00b2</th><th>Significant?</th></tr><tr><td>C (consumption)</td><td>0.991</td><td>5587.62</td><td>\u2713\u2713\u2713</td></tr><tr><td>I (investment)</td><td>0.872</td><td>313.26</td><td>\u2713\u2713\u2713</td></tr><tr><td>EXNO</td><td>0.924</td><td>815.58</td><td>\u2713\u2713\u2713</td></tr><tr><td>IMNO</td><td>0.971</td><td>1716.91</td><td>\u2713\u2713\u2713</td></tr><tr><td>M (money)</td><td>0.977</td><td>2314.89</td><td>\u2713\u2713\u2713</td></tr><tr><td>E (exchange rate)</td><td>0.451</td><td>96.76</td><td>\u2713\u2713</td></tr><tr><td>P (prices)</td><td>0.615</td><td>141.61</td><td>\u2713\u2713\u2713</td></tr><tr><td>Stock</td><td>0.736</td><td>150.49</td><td>\u2713\u2713\u2713</td></tr><tr><td>Bond</td><td>0.578</td><td>190.56</td><td>\u2713\u2713\u2713</td></tr><tr><td>N (employment)</td><td>0.948</td><td>1602.35</td><td>\u2713\u2713\u2713</td></tr><tr><td>lnYS (prod fn)</td><td>0.952</td><td>1851.57</td><td>\u2713\u2713\u2713</td></tr></table><p>Most equations have very high R\u00b2 values. Exchange rate (E) has the lowest R\u00b2 at 0.451, reflecting the inherent difficulty of modeling FX movements.</p>'},
]},
{head:"Counterfactual Analysis",num:"4",cards:[
{title:"Interest Rate Increased by 10% (i \u00d7 1.1)",content:'<p>Shock period: 2025Q1 to 2025Q4. Average % deviation from dynamic baseline:</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th><th>Direction</th></tr><tr><td>Wealth</td><td>\u22125.51%</td><td style="color:#DC2626">\u2193\u2193\u2193</td></tr><tr><td>Investment (I)</td><td>\u22124.73%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Exports (EX)</td><td>\u22124.49%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Output (Y)</td><td>\u22124.08%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Exchange Rate (E)</td><td>\u22123.78%</td><td style="color:#DC2626">\u2193 (appreciation)</td></tr><tr><td>Consumption (C)</td><td>\u22123.55%</td><td style="color:#DC2626">\u2193\u2193</td></tr><tr><td>Imports (IM)</td><td>\u22123.37%</td><td style="color:#DC2626">\u2193</td></tr><tr><td>Prices (P)</td><td>\u22121.60%</td><td style="color:#DC2626">\u2193</td></tr><tr><td>Yield</td><td>+2.70%</td><td style="color:#059669">\u2191</td></tr><tr><td>Unemployment (u)</td><td>+2.94%</td><td style="color:#DC2626">\u2191</td></tr></table><div class="wk-highlight">\ud83d\udca1 A 10% interest rate hike is contractionary across the board: wealth falls most (\u22125.5%), followed by investment and exports. The Rupiah appreciates (E\u2193) due to capital inflows, hurting exports. Unemployment rises while yields increase as expected.</div>'},
{title:"Interest Rate Decreased by 10% (i \u00d7 0.9)",content:'<p>Symmetrically opposite effects (roughly mirror image):</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th><th>Direction</th></tr><tr><td>Wealth</td><td>+5.51%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Investment (I)</td><td>+4.72%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Exports (EX)</td><td>+4.48%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Output (Y)</td><td>+4.08%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Exchange Rate (E)</td><td>+3.78%</td><td style="color:#059669">\u2191 (depreciation)</td></tr><tr><td>Consumption (C)</td><td>+3.54%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Imports (IM)</td><td>+3.36%</td><td style="color:#059669">\u2191</td></tr><tr><td>Prices (P)</td><td>+1.60%</td><td style="color:#059669">\u2191</td></tr><tr><td>Yield</td><td>\u22122.70%</td><td style="color:#059669">\u2193</td></tr><tr><td>Unemployment (u)</td><td>\u22122.94%</td><td style="color:#059669">\u2193</td></tr></table><p>Rate cut is expansionary: wealth, investment, output, and consumption all rise. E depreciates (capital outflows), boosting exports. Near-perfect symmetry confirms the model is approximately linear around baseline.</p>'},
{title:"Government Spending Increased by 10% (G \u00d7 1.1)",content:'<p>Fiscal expansion has MUCH LARGER effects than monetary policy:</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th><th>Magnitude</th></tr><tr><td>Wealth</td><td>+91.1%</td><td style="color:#059669">\u2191\u2191\u2191 (massive)</td></tr><tr><td>Exports (EX)</td><td>+36.1%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Imports (IM)</td><td>+34.4%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Consumption (C)</td><td>+33.9%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Output (Y)</td><td>+33.4%</td><td style="color:#059669">\u2191\u2191\u2191</td></tr><tr><td>Investment (I)</td><td>+29.5%</td><td style="color:#059669">\u2191\u2191</td></tr><tr><td>Prices (P)</td><td>+3.9%</td><td style="color:#059669">\u2191</td></tr><tr><td>Unemployment (u)</td><td>\u221227.4%</td><td style="color:#059669">\u2193\u2193\u2193</td></tr><tr><td>Yield</td><td>\u22120.36%</td><td>small</td></tr></table><div class="wk-highlight">\ud83d\udca1 G\u00d710% has 8\u201310\u00d7 larger impact than i\u00d710%! This reflects the direct demand injection of fiscal policy vs the indirect transmission of monetary policy. Wealth effect is enormous (+91%) due to the stock-bond-wealth-consumption feedback loop. However, both imports and exports rise, and prices increase modestly (+3.9%).</div>'},
{title:"Government Spending Decreased by 10% (G \u00d7 0.9)",content:'<p>Fiscal contraction (austerity):</p><table class="wk-table"><tr><th>Variable</th><th>% Change</th></tr><tr><td>Wealth</td><td>\u221289.6%</td></tr><tr><td>Exports (EX)</td><td>\u221235.6%</td></tr><tr><td>Imports (IM)</td><td>\u221234.0%</td></tr><tr><td>Consumption (C)</td><td>\u221233.4%</td></tr><tr><td>Output (Y)</td><td>\u221232.9%</td></tr><tr><td>Investment (I)</td><td>\u221229.1%</td></tr><tr><td>Exchange Rate (E)</td><td>\u221220.2%</td></tr><tr><td>Prices (P)</td><td>\u22123.8%</td></tr><tr><td>Unemployment (u)</td><td>+26.9%</td></tr><tr><td>Yield</td><td>+52.0%</td></tr></table><p>Austerity causes devastating contraction. Yield spikes by 52% as markets lose confidence. Unemployment surges by 27%. This is why abrupt fiscal consolidation during recessions is dangerous \u2014 the multiplier effects cascade through all 5 markets.</p>'},
]},
{head:"Selected Recent Events: Macro Impacts",num:"5",cards:[
{title:"Capital Flows & Sterilized Intervention",content:'<div class="wk-formula">Capital INFLOWS:\n  \u2192 Rp appreciation (E\u2193)\n  \u2192 Unfavorable for net-exports\n  \u2192 Increased vulnerability (weakened fundamentals)\n\nSterilized Intervention:\n  CB buys $ using Rp \u2192 Ms\u2191 \u2192 Rp depreciates\n  But Ms\u2191 raises inflation risk\n  \u2192 CB \u201csterilizes\u201d by raising i\n  \u2192 Back to square one: Rp appreciates again!\n\nCapital OUTFLOWS:\n  \u2192 Rp depreciation (E\u2191)\n  \u2192 CB unloads forex reserves to add $ supply\n  \u2192 Dwindling reserves = increased vulnerability</div>'},
{title:"Oil Price Increase: Effect on Unemployment",content:'<div class="wk-formula">POIL\u2191 \u2192 Price-setting curve shifts DOWN\n  W/P = A/(1+m)  where m\u2019 > m (higher markup)\n  \u2192 Lower real wage (w_real\u2193)\n  \u2192 Higher natural unemployment (u\u2099\u2191)\n  \u2192 Lower natural employment (EMP\u2099\u2193)\n  \u2192 Lower natural output (Y\u2099\u2193)\n  Equilibrium shifts from A to A\u2019</div><p><strong>Dynamic adjustment:</strong> POIL increase \u2192 new AS goes through B with lower Y\u2099 and expected price P\u1d49 \u2192 AS shifts to AS\u2019. AD effect is ambiguous: firms may cancel investment plans OR shift to less oil-intensive production; income redistributes from oil buyers (who spend more) to oil producers (who spend less). Net AD shift may cancel out. In short run, only AS shifts: eq from A to A\u2019 with higher prices and lower output (<strong>stagflation</strong>). Over time, AS continues shifting up as output remains above the new, lower Y\u2099.</p>'},
{title:"Current War, Energy & Tariff Shocks",content:'<ul><li><strong>Strait of Hormuz closure</strong> deprived the world of ~20mn br/day \u2014 largest-ever oil supply shock. Wild intraday price swings and strategic reserve releases without historical precedent.</li><li><strong>2025 \u201cliberation day\u201d tariffs:</strong> Initially, asset prices fell sharply, gold rallied, growth forecasts slashed. But: tech wave swamped the tariff wave, carrying risk appetite and growth. Global equities ended a fifth higher than at their start.</li><li><strong>Now deeper:</strong> Unlike 2025, inflation pressures are resurgent due to energy prices \u2192 CBs cannot ease rates to cushion demand. Rising defense spending \u2192 fiscal pressures \u2192 global bond yields rising \u2192 tighter monetary conditions squeezing global demand.</li></ul><div class="wk-highlight">\ud83d\udca1 Risk of AI valuation correction: if AI companies fail to deliver earnings matching lofty valuations, reevaluation of productivity expectations could interact with geopolitical strains to (1) hinder effective policy implementation, and (2) trigger abrupt financial market corrections spreading from AI-linked companies to broader markets, eroding household wealth.</div>'},
{title:"Another Financial Crisis Looming?",content:'<p>Private credit funds are reporting customer withdrawal attempts. Financial crises typically have two features:</p><ul><li><strong>1. Runs:</strong> The 2023 mini-crisis started with a run on SVB (depositors withdrew over fears of bond losses). Private credit has \u201cgates\u201d (limits on withdrawal amounts per period), so no chaotic unwinding.</li><li><strong>2. Contagion:</strong> Already happening. Investors are scanning for funds similar to those facing withdrawals. The gates that prevent runs may perversely SPEED contagion: \u201cIf you can\u2019t sell what you want, you sell what you can.\u201d</li></ul>'},
{title:"Quiz 6 Practice Questions",content:'<div class="wk-exam">\ud83d\udcdd <strong>Quiz 6 Questions:</strong><br><br><strong>Q1:</strong> In conducting monetary policy, the Central Bank can use the bonds market in addition to interest rate as its policy instrument. What is the mechanism of such monetary policy, and explain how the process leads to changes in money supply.<br><br><strong>Q2:</strong> By using the formula discussed in class, explain why in a normal condition the bond market and the stock market tend to move in the opposite direction (negative correlation), and why in recent years they move in the same direction.</div><p><strong>Hint for Q1:</strong> Think about open market operations (OMO): CB buys bonds \u2192 pays with new money \u2192 reserves\u2191 \u2192 Ms\u2191 via money multiplier. CB sells bonds \u2192 absorbs money \u2192 reserves\u2193 \u2192 Ms\u2193.</p><p><strong>Hint for Q2:</strong> Normally: i\u2191 \u2192 Bond price\u2193 (inverse) but Stock price also\u2193 (higher discount rate). However, bond yield = 1/bond price, so Yield\u2191 when Bond\u2193 and Stock\u2193 \u2192 negative bond-stock correlation. In recent crises, both sell off simultaneously (positive correlation) because of risk-off sentiment, margin calls, and \u201csell what you can\u201d dynamics.</p>'},
]},
]},

sections:[
{head:"Question 1 вАФ Goods & IS-LM",num:"1",pts:"1aвАУ1b",prompt:"1a. Gambarkan dengan menggunakan kurva IS-LM kondisi (ii)вАУ(v). 1b. Hitung Y equilibrium dan multiplier.",
cards:[
{title:"1a(ii) вАФ Covid spending above 3% deficit",content:`<div class="exam-prompt">Pemerintah menggelontorkan dana untuk pengendalian Covid dan bansos selama 2020вАУ2022 melebihi batas deficit 3%.</div>
<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Concept:</b> Expansionary fiscal policy вАФ G rises significantly вЖТ aggregate demand increases.</div>
<div class="exam-step"><b>IS shifts RIGHT</b> because AD = C + I + G, and GвЖС.</div>
<div class="exam-step"><b>LM unchanged</b> вАФ money supply not affected.</div>
<div class="exam-step"><b>Result:</b> YвВБ > YвВА and iвВБ > iвВА. Higher output raises money demand вЖТ interest rate rises.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM: Expansionary Fiscal Policy</div><svg id="eg-2023-1aii" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">Because Covid spending and social assistance increase G, aggregate demand rises and IS shifts right. With LM unchanged, equilibrium output increases and the interest rate also rises.</div>
</div>`},
{title:"1a(iii) вАФ VAT rises to 11%, G unchanged",content:`<div class="exam-prompt">Pemerintah pusat meningkatkan PPN menjadi 11%. Asumsikan belanja pemerintah pusat tidak meningkat.</div>
<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Concept:</b> Higher VAT reduces household purchasing power вЖТ C falls. G unchanged вЖТ no offset.</div>
<div class="exam-step"><b>IS shifts LEFT</b> вАФ contractionary fiscal policy.</div>
<div class="exam-step"><b>LM unchanged.</b></div>
<div class="exam-step"><b>Result:</b> YвВБ < YвВА and iвВБ < iвВА. Lower output reduces money demand вЖТ interest rate falls.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM: Contractionary Fiscal (VATвЖС)</div><svg id="eg-2023-1aiii" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">An increase in VAT reduces private consumption and weakens aggregate demand. The net effect is contractionary, shifting IS left, reducing both output and the equilibrium interest rate.</div>
</div>`},
{title:"1a(iv) вАФ Commodity firms increase investment",content:`<div class="exam-prompt">Perusahaan sektor komoditas meningkatkan investasi seiring naiknya harga ekspor produk-produknya.</div>
<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Concept:</b> Rising export prices вЖТ higher expected profits вЖТ IвЖС.</div>
<div class="exam-step"><b>IS shifts RIGHT</b> вАФ higher autonomous investment.</div>
<div class="exam-step"><b>LM unchanged.</b></div>
<div class="exam-step"><b>Result:</b> YвЖС and iвЖС.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM: Investment Boom</div><svg id="eg-2023-1aiv" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">Higher export prices raise expected returns on investment. IS shifts right, increasing output and the equilibrium interest rate.</div>
</div>`},
{title:"1a(v) вАФ Wheat firms reduce spending (wheat priceвЖС, iвЖС)",content:`<div class="exam-prompt">Perusahaan produsen makanan berbasis gandum menurunkan belanja dan investasi seiring naiknya harga impor gandum dan suku bunga.</div>
<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Concept:</b> Higher imported wheat вЖТ production costsвЖС вЖТ profitabilityвЖУ вЖТ firms cut spending and I. Higher i also discourages borrowing.</div>
<div class="exam-step"><b>IS shifts LEFT</b> вАФ autonomous spending falls.</div>
<div class="exam-step"><b>LM unchanged</b> (safest answer unless explicitly stated as monetary tightening).</div>
<div class="exam-step"><b>Result:</b> YвЖУ and iвЖУ in the new equilibrium.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM: Cost Shock + Investment Cut</div><svg id="eg-2023-1av" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">Rising imported wheat prices and borrowing costs reduce profitability and investment. IS shifts left, reducing output. Equilibrium i falls because lower Y reduces money demand.</div>
</div>`},
{title:"1b вАФ Equilibrium Income Calculation",content:`<div class="exam-prompt">C = 300 + 0.75(YвИТT), I = 175, G = 100, T = 100.<br>(i) Find Y equilibrium. (ii) Find Y equilibrium if G rises to 200. Find multiplier.</div>
<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Step 1:</b> C = 300 + 0.75(YвИТ100) = 225 + 0.75Y</div>
<div class="exam-eq-box" id="eq-2023-1bi"></div>
<div class="exam-step"><b>Step 2:</b> Y = C + I + G = (225+0.75Y) + 175 + 100 = 500 + 0.75Y</div>
<div class="exam-step"><b>Step 3:</b> 0.25Y = 500 вЖТ <b>Y* = 2000</b></div>
<div class="exam-step"><b>With G = 200:</b> Y = (225+0.75Y) + 175 + 200 = 600 + 0.75Y вЖТ 0.25Y = 600 вЖТ <b>Y* = 2400</b></div>
<div class="exam-step"><b>Multiplier:</b> ќФY/ќФG = (2400вИТ2000)/(200вИТ100) = 400/100 = <b>4</b></div>
<div class="exam-step">Consistent with formula: 1/(1вИТMPC) = 1/(1вИТ0.75) = 1/0.25 = <b>4</b></div>
<div class="exam-interp">Every 1-unit increase in G raises equilibrium Y by 4 units through the multiplier process.</div>
</div>`},
]},
{head:"Question 2 вАФ Financial Market",num:"2",pts:"2AвАУ2C",prompt:"Peran bank sentral, rumah tangga, perusahaan, dan pemerintah dalam menentukan suku bunga.",
cards:[
{title:"2A вАФ Roles in Determining Interest Rates",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Central Bank:</b> Controls M (money supply). Open market operations: buying bonds вЖТ MвЖС вЖТ iвЖУ. Selling bonds вЖТ MвЖУ вЖТ iвЖС. Main institution controlling the interest rate.</div>
<div class="exam-step"><b>Households:</b> Demand money for transactions/precaution. IncomeвЖС вЖТ money demandвЖС вЖТ iвЖС. When uncertain, prefer cash over bonds вЖТ bond demandвЖУ вЖТ iвЖС.</div>
<div class="exam-step"><b>Firms:</b> Need money for operations вЖТ money demand. Issue bonds to finance investment вЖТ bond supplyвЖС вЖТ bond priceвЖУ вЖТ iвЖС.</div>
<div class="exam-step"><b>Government:</b> Deficit financing вЖТ bond supplyвЖС вЖТ iвЖС. Expansionary fiscal вЖТ YвЖС вЖТ money demandвЖС вЖТ iвЖС.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Money Market & Bond Market</div><svg id="eg-2023-2a" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">Key relationship: bond price and interest rate move inversely. P_BвЖС вЖТ iвЖУ, P_BвЖУ вЖТ iвЖС. Money supply shifts are vertical; money demand is downward-sloping in i.</div>
</div>`},
{title:"2B вАФ Fiscal policy to maintain purchasing power вЖТ i and Y",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Mechanism:</b> Subsidies, transfers, or tax cuts вЖТ CвЖС вЖТ ADвЖС вЖТ IS shifts right.</div>
<div class="exam-step"><b>YвЖС:</b> Higher aggregate demand raises equilibrium output.</div>
<div class="exam-step"><b>iвЖС:</b> Higher Y вЖТ money demandвЖС вЖТ with fixed M, i must rise.</div>
<div class="exam-step"><b>Partial crowding out:</b> Higher i discourages some private I, so ќФY is less than the full multiplier effect.</div>
<div class="exam-step"><b>Bond market:</b> Deficit-financed вЖТ bond supplyвЖС вЖТ bond priceвЖУ вЖТ iвЖС further.</div>
<div class="exam-interp">Expansionary fiscal policy raises both Y and i. The rise in i partially crowds out private investment.</div>
</div>`},
{title:"2C вАФ Monetary policy to control inflation вЖТ i and Y",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Mechanism:</b> Contractionary monetary policy: MвЖУ or policy rateвЖС.</div>
<div class="exam-step"><b>Money market:</b> M/P supply shifts left вЖТ iвЖС.</div>
<div class="exam-step"><b>IS-LM:</b> LM shifts left/up вЖТ YвЖУ, iвЖС.</div>
<div class="exam-step"><b>Real effects:</b> iвЖС вЖТ IвЖУ вЖТ ADвЖУ вЖТ YвЖУ вЖТ inflation gradually falls.</div>
<div class="exam-step"><b>Bond market:</b> CB sells bonds вЖТ bond supplyвЖС вЖТ priceвЖУ вЖТ yieldвЖС.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">IS-LM: Contractionary Monetary Policy</div><svg id="eg-2023-2c" viewBox="0 0 420 280"></svg></div>
<div class="exam-interp">To control inflation, the CB tightens monetary policy. LM shifts left, raising i and reducing Y. The higher i depresses I and AD, so inflation gradually falls.</div>
</div>`},
]},
{head:"Question 3 вАФ Phillips Curve",num:"3",pts:"3aвАУ3d",prompt:"SRPC: ѕА_t вИТ ѕА_{tвИТ1} = вИТќ±(U_t вИТ U_n). Given: ѕА_{tвИТ1}=5%, U_n=10%, ќ±=0.5.",
cards:[
{title:"3a вАФ Equilibrium inflation (SRPC вИ© LRPC)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>SRPC:</b> ѕА_t = ѕА_{tвИТ1} вИТ ќ±(U_t вИТ U_n) = 5 вИТ 0.5(U_t вИТ 10) = 10 вИТ 0.5U_t</div>
<div class="exam-step"><b>LRPC:</b> Vertical at U = U_n = 10%.</div>
<div class="exam-step"><b>Equilibrium:</b> Set U_t = U_n = 10: ѕА = 10 вИТ 0.5(10) = <b>5%</b></div>
<div class="exam-step"><b>Equilibrium point:</b> (U, ѕА) = (10%, 5%)</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Short-Run & Long-Run Phillips Curves</div><svg id="eg-2023-3a" viewBox="0 0 420 300"></svg></div>
<div class="exam-interp">At U = U_n, inflation equals last period's inflation (5%). The LRPC is vertical at U=10%, and the SRPC passes through (10,5) with slope вИТ0.5.</div>
</div>`},
{title:"3b вАФ If government wants U=8%, what inflation?",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Substitute U_t=8 into SRPC:</b> ѕА = 10 вИТ 0.5(8) = 10 вИТ 4 = <b>6%</b></div>
<div class="exam-step"><b>Point A = (8%, 6%)</b> lies on the SRPC, LEFT of LRPC. This is a short-run point, not sustainable.</div>
<div class="exam-interp">To reduce unemployment to 8% (below natural rate), inflation must accelerate to 6%. This involves the government accepting higher inflation for lower unemployment вАФ the classic short-run tradeoff.</div>
</div>`},
{title:"3c вАФ Stagflation: U=10%, ѕА=8%",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Original SRPC gives ѕА=5% at U=10.</b> But now ѕА=8% at U=10 вЖТ this point is ABOVE the original SRPC.</div>
<div class="exam-step"><b>The SRPC has shifted upward.</b> Caused by: adverse supply shock, higher expected inflation, or higher imported input prices.</div>
<div class="exam-step"><b>Stagflation point S = (10%, 8%)</b> on the LRPC and on a new, higher SRPCвВБ.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Stagflation: SRPC Shifts Upward</div><svg id="eg-2023-3c" viewBox="0 0 420 300"></svg></div>
<div class="exam-interp">At stagflation (10%, 8%), inflation is much higher than the 5% equilibrium even though U is at the natural rate. The SRPC has shifted up вАФ consistent with a negative supply shock or increased inflation expectations.</div>
</div>`},
{title:"3d вАФ Restoring equilibrium after stagflation",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Step 1:</b> Contractionary monetary policy вЖТ raise i, reduce M growth вЖТ credibly commit to lower inflation вЖТ reduces AD and ѕА expectations.</div>
<div class="exam-step"><b>Step 2:</b> Supply-side policies вЖТ stabilize food/energy supply, improve productivity, reduce bottlenecks вЖТ shifts SRPC downward.</div>
<div class="exam-step"><b>Step 3:</b> As inflation expectations fall, SRPC shifts back down.</div>
<div class="exam-step"><b>Step 4:</b> Economy returns to (U, ѕА) = (10%, 5%) вАФ original equilibrium.</div>
<div class="exam-interp">Restoring equilibrium requires both demand management (anti-inflation tightening) and supply-side policies to address the root cause. Pure demand contraction alone would raise U temporarily.</div>
</div>`},
]},
{head:"Question 4 вАФ Solow Growth Model",num:"4",pts:"4aвАУ4f",prompt:"Y_t = F(K_t, A_tN_t), output/investment per effective labor, steady state, dynamics, saving rate change, technological progress change.",
cards:[
{title:"4a вАФ Output, investment, required investment per effective labor",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>y = f(k):</b> Output per effective labor. Concave, increasing, starts from origin.</div>
<div class="exam-step"><b>sf(k):</b> Actual investment per effective labor. Same shape as f(k) but scaled down by s (since 0 < s < 1).</div>
<div class="exam-step"><b>(ќі+g_A+g_N)k:</b> Required (break-even) investment. Straight line from origin.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Solow Diagram: Three Curves</div><svg id="eg-2023-4a" viewBox="0 0 460 320"></svg></div>
<div class="exam-interp">The intersection of sf(k) and (ќі+g_A+g_N)k determines steady-state k*. At k*, output per effective labor is y* = f(k*).</div>
</div>`},
{title:"4b вАФ Steady state definition",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Definition:</b> ќФk = 0, so capital per effective labor is constant over time.</div>
<div class="exam-step"><b>Condition:</b> sf(k*) = (ќі + g_A + g_N)k* вАФ actual investment = break-even investment.</div>
<div class="exam-step"><b>At steady state:</b> k and y per effective labor are constant. But total Y grows at g_A+g_N, and Y/N grows at g_A.</div>
<div class="exam-interp">The steady state is the long-run equilibrium. Technology is the only source of sustained per-worker growth.</div>
</div>`},
{title:"4c вАФ Dynamics toward steady state",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>If k < k*:</b> sf(k) > (ќі+g_A+g_N)k вЖТ ќФk > 0 вЖТ k rises toward k*.</div>
<div class="exam-step"><b>If k > k*:</b> sf(k) < (ќі+g_A+g_N)k вЖТ ќФk < 0 вЖТ k falls toward k*.</div>
<div class="exam-step">The steady state is <b>globally stable</b> вАФ the economy always converges to k* from any starting point.</div>
<div class="exam-interp">Steady state acts as a stable attractor. Below it: capital accumulates. Above it: capital decumulates relative to effective labor.</div>
</div>`},
{title:"4d вАФ Saving rate increases (sвВБ > s)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Investment curve shifts up:</b> sвВБf(k) > sf(k) for all k.</div>
<div class="exam-step"><b>Required investment unchanged:</b> (ќі+g_A+g_N)k stays the same.</div>
<div class="exam-step"><b>New steady state:</b> kвВБ* > kвВА* and yвВБ* > yвВА*.</div>
<div class="exam-step"><b>Key:</b> Higher saving raises the LEVEL of output per effective labor, NOT the long-run growth rate.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Solow: Saving Rate Increase</div><svg id="eg-2023-4d" viewBox="0 0 460 320"></svg></div>
<div class="exam-interp">sвЖС shifts the investment curve up, creating a new higher steady state. The economy transitions from kвВА* to kвВБ* during which growth temporarily exceeds the steady-state rate.</div>
</div>`},
{title:"4e вАФ Technological progress increases (g_A1 > g_A)",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>Required investment line becomes steeper:</b> (ќі+g_A1+g_N)k > (ќі+g_A+g_N)k.</div>
<div class="exam-step"><b>Investment curve sf(k) unchanged.</b></div>
<div class="exam-step"><b>New steady state:</b> kвВБ* < kвВА* and yвВБ* < yвВА* (per effective labor).</div>
<div class="exam-step"><b>Crucial subtlety:</b> This is per EFFECTIVE labor. Total Y and Y/N may grow FASTER because A grows faster.</div>
<div class="exam-graph-wrap"><div class="exam-graph-title">Solow: Faster Tech Progress</div><svg id="eg-2023-4e" viewBox="0 0 460 320"></svg></div>
<div class="exam-interp">Faster g_A makes the break-even line steeper вЖТ k* falls. But this means output per worker grows at g_A1 > g_A вАФ a good outcome even though k* and y* per effective labor are lower.</div>
</div>`},
{title:"4f вАФ Three reasons to invest",content:`<div class="exam-soln-btn" onclick="this.nextElementSibling.classList.toggle('open')">рЯУЦ Show Full Solution</div>
<div class="exam-soln-content">
<div class="exam-step"><b>1. Replace depreciated capital (ќіk):</b> Machines wear out. Without replacement investment, K shrinks.</div>
<div class="exam-step"><b>2. Equip new workers (g_N¬Јk):</b> Growing labor force needs capital to maintain k.</div>
<div class="exam-step"><b>3. Keep up with technology (g_A¬Јk):</b> Faster-growing effective labor requires more K to keep K/(AN) constant.</div>
<div class="exam-step"><b>Combined:</b> Required investment = (ќі + g_N + g_A)k.</div>
<div class="exam-interp">These three components explain the break-even investment line in the Solow diagram. If investment falls below this, capital per effective worker declines.</div>
</div>`},
]},
]},
